pendencies:** None\n\n<!-- Morbius source: TC-MOR-022-001-3 (sourceChecksum=976a1f312c0a864e) -->\n\n**Preconditions:**\n- (derived from story prerequisites — fill in or leave empty)\n\n**Steps:**\n1. the decision doc lives at `requirements/decisions/maestro-sdk-agent-gate.md`\n2. written\n3. it is mirrored to both `/Users/sdas/PMAgent/projects/morbius/` and `/Users/sdas/Morbius/requirements/` ---\n\n**Expected Result:**\nGiven the decision doc lives at `requirements/decisions/maestro-sdk-agent-gate.md` When written Then it is mirrored to both `/Users/sdas/PMAgent/projects/morbius/` and `/Users/sdas/Morbius/requirements/` ---\n\n**Failure Indicators:**\n- (describe the wrong behavior; populate during real test authoring)\n\n---\n\n## Out of Scope\n\n- (Items intentionally excluded — derive from story Do Not Do / Future Scope sections)\n\n## Automation Notes\n\n- **Data setup:** (specify seeded data or test accounts)\n- **Selector strategy:** (Maestro YAML — prefer text matching with stable copy)\n- **Flakiness risks:** (network calls, timing, animations)\n- **Suggested framework:** Maestro (mobile) — see `(no flow linked)`\n- **Automation priority:** TC-022-001-001\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-29 | 1.0 | Morbius (publish-back) | Generated from 3 Morbius test case(s) |\n"},{"rel":"epics/E-023-pmagent-bridge/E-023.md","content":"# Epic: PMAgent Bridge — Transfer QA Plan to Morbius\n\n**ID:** E-023\n**Project:** morbius\n**Stage:** Backlog\n**Priority:** P0\n**Version:** 1.0\n**Created:** 2026-04-23\n**Updated:** 2026-04-23\n**Sources:** wiki/direction-2026-04.md (out-of-band Bet C integration)\n\n---\n\n## Outcome\n\nAny PMAgent project's QA plan can be transferred to Morbius as a real, runnable Morbius project with test cases, in one user action. Each Morbius test case carries backreferences to the source PMAgent story + AC so traceability is preserved. Morbius exposes a results-readback endpoint so PMAgent's future \"Reflect\" button can render run state next to each AC on the spec side. **Editing PMAgent is out of scope** — we expose a clean API contract; PMAgent wires its Transfer/Reflect buttons later.\n\nThe walkthrough that proves the epic: author a QA plan inside PMAgent for the `morbius` project itself (using `pm qa` and/or hand-authoring), click Transfer (or call the API directly today), and a \"Morbius\" project appears in the dashboard with all test cases, each linked back to its source story.\n\n## Success Metric\n\n| Metric | Baseline | Target |\n|--------|----------|--------|\n| Time from \"QA plan ready in PMAgent\" → \"test cases visible in Morbius\" | Manual Excel hand-off (hours) | <60 seconds |\n| Test cases that carry source backreference (slug + storyId + acIndex) | 0 | 100% of transferred cases |\n| Run history preserved across re-transfers (idempotent test) | N/A | 100% — body overwrites, history survives |\n\n## Primary Persona\n\nThe QA Lead (especially at the start of a new RF client engagement)\n\n## Dependencies\n\n- E-002 `writeParsedExcel` and `writeTestCase` (already shipped)\n- E-016 `askClaude` is **not** required for v1 (deterministic parsing); available if quality is poor in v2\n\n## Stories\n\n| ID | Title | Status | Stage | Priority |\n|----|-------|--------|-------|----------|\n| S-023-001 | Epic Skeleton + Types + Config Field | Done | Ready | P0 |\n| S-023-002 | PMAgent Project Parser (read-only) | Done | Ready | P0 |\n| S-023-003 | Transfer Endpoint + Morbius UI Button + CLI | Done | Ready | P0 |\n| S-023-004 | Results-Readback Endpoint | Backlog | Draft | P0 |\n| S-023-005 | Polled Drift Detector | Backlog | Draft | P1 |\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-23 | 1.0 | Claude | Created — out-of-band Bet C integration, locked to \"PMAgent → Morbius one-way; PMAgent edits out of scope\" per user direction |\n| 2026-04-23 | 1.1 | Claude | S-023-001 shipped: epic + 5 story files on the board, `TestCase.pmagentSource` + `ProjectConfig.pmagentSlug` types, `POST /api/pmagent/test-path` endpoint, `PMAgentConfigForm` UI in Settings → Integrations |\n| 2026-04-23 | 1.2 | Claude | S-023-002 shipped: `src/parsers/pmagent.ts` parser — read-only, deterministic, recursion-safe. Smoke-tested live: morbius (200 tests, E-023 self-skip), mygrant-glass (57 tests). |\n| 2026-04-23 | 1.3 | Claude | S-023-003 shipped: transfer pipeline + 2 endpoints + UI modal + CLI. **Walkthrough proven**: PMAgent's `morbius` project → \"Transfer from PMAgent\" button → 200 test cases land in Morbius's `morbius` project with full backreferences, 42ms, idempotent on re-run. |\n| 2026-04-29 | 1.4 | Claude | **Scope expansion** (per user): added publish-back so Morbius test cases appear in PMAgent's QA tab. New `publishTestPlansToPMAgent()` in `src/parsers/pmagent.ts` renders one `T-{epicNum}-{storyNum}-*.md` per story matching PMAgent's `prompts/templates/test-plan.md` format exactly (Scope, AC Coverage Map, Core Test Flow with one P0, Sub Flows ranked by scenario, Out of Scope, Automation Notes, Change Log). Per-test-case `TC-{epicNum}-{storyNum}-{NNN}` IDs (PMAgent format) with HTML-comment backreference to the Morbius source ID. New endpoint `POST /api/pmagent/publish-test-plans { pmagentSlug }` and CLI `morbius pmagent-publish <slug>`. Live verified: 64 test plans written into the morbius project's epic folders (visible via PMAgent's symlink), re-run reports `0 written, 64 unchanged` (idempotent). Boundary: still no PMAgent code modifications — only filesystem writes inside `<pmagentPath>/epics/.../T-*.md`. |\n| 2026-04-29 | 1.5 | Claude | **Three-trigger model locked** (per AskUserQuestion: All three / Keep separate). Added trigger #2 (PMAgent UI button) — modified `PMAgent/src/commands/board.ts` (~50 lines): new `MorbiusBridgeButtons` React component injected into `qa-coverage-bar`, \"→ Push to Morbius\" + \"↺ Publish from Morbius\" buttons, inline status (busy/ok/fail), reads `window.MORBIUS_URL` (default `http://localhost:9000`). PMAgent build clean; CORS preflight from PMAgent:3000 → Morbius:9000 returns 204. Added trigger #3 (slash commands) at `~/.claude/commands/`: `/push-to-morbius <slug>` and `/publish-to-pmagent <slug>` — markdown command files with `allowed-tools: Bash(curl:*)` so Claude Code can run them anywhere. **Boundary update:** PMAgent code is now modified for the button (relaxed from earlier \"PMAgent edits out of scope\" — surfaced and confirmed via AskUserQuestion before touching). Morbius UI button (trigger #1) was already shipped in v1.3. Round-trip stays a separate manual step per user direction (no auto-publish-back after transfer). |\n"},{"rel":"epics/E-023-pmagent-bridge/S-023-001-epic-skeleton-types-config.md","content":"# Story: Epic Skeleton + Types + Config Field\n\n**ID:** S-023-001\n**Project:** morbius\n**Epic:** E-023\n**Stage:** Ready\n**Status:** Done\n**Priority:** P0\n**Version:** 1.1\n**Created:** 2026-04-23\n**Updated:** 2026-04-23\n\n---\n\n## Story\n\nAs the developer kicking off E-023, I want the epic + story files on the board, the `TestCase` and `ProjectConfig` types extended with PMAgent backreference fields, and a Settings UI card to set `pmagentSlug` / `pmagentPath` — so the rest of the epic has a clean contract to build against.\n\n## Acceptance Criteria\n\n**Given** the E-023 epic file and 5 story files exist in `requirements/epics/E-023-pmagent-bridge/`\n**When** PMAgent renders the Morbius project board\n**Then** E-023 appears with 5 stories — `# Story:` H1 prefix matches the parser regex (`^# Story:\\s*(.+)`)\n\n**Given** `TestCase` is extended with optional `pmagentSource` (`{ slug, storyId, acIndex, sourcePath, sourceChecksum }`)\n**When** an existing test case without `pmagentSource` is read\n**Then** the field stays undefined and existing tests are unaffected\n\n**Given** `ProjectConfig` gains optional `pmagentSlug` and `pmagentPath`\n**When** Settings → Integrations renders\n**Then** a \"PMAgent\" card surfaces both inputs with a \"Test path\" button that filesystem-stat-checks the resolved path, and `POST /api/config/update` persists them\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-23 | 1.0 | Claude | Created |\n| 2026-04-23 | 1.1 | Claude | Implemented: created E-023.md + 5 story files in `requirements/epics/E-023-pmagent-bridge/` (all use `# Story:` template H1 prefix so they appear on the PMAgent board automatically via the `projects/morbius → Morbius/requirements` symlink — `pm board morbius` smoke verified 23 epics / 69 stories). Extended `TestCase` with `pmagentSource?: { slug, storyId, acIndex, sourcePath, sourceChecksum }` + `pmagentLocked?: boolean` (`src/types.ts`). New `PMAgentSource` interface exported. `writeTestCase` + `readTestCase` round-trip the new frontmatter (`pmagent_source` + `pmagent_locked`). Extended `ProjectConfig` with `pmagentSlug?` + `pmagentPath?`. New `PMAgentConfigForm` React component in Settings → Integrations between Jira and Jira-mapping cards: slug input, path-override input, Save persists via existing `/api/config/update`, Test path button hits new `POST /api/pmagent/test-path` endpoint which does filesystem stat + counts epics/stories under `<resolvedPath>/epics/`. UI verified: typing `morbius` → Test path → pill shows \"Path resolved · 23 epics, 69 stories\". No console errors. AC1 + AC2 + AC3 met. |\n"},{"rel":"epics/E-023-pmagent-bridge/S-023-002-pmagent-project-parser.md","content":"# Story: PMAgent Project Parser (read-only)\n\n**ID:** S-023-002\n**Project:** morbius\n**Epic:** E-023\n**Stage:** Ready\n**Status:** Done\n**Priority:** P0\n**Version:** 1.1\n**Created:** 2026-04-23\n**Updated:** 2026-04-23\n\n---\n\n## Story\n\nAs the transfer pipeline, I want a deterministic parser that reads a PMAgent project folder and returns a `ParsedExcel`-shaped object plus a source map, so the existing `writeParsedExcel` writer can ingest it without any new write paths.\n\n## Acceptance Criteria\n\n**Given** a PMAgent project folder with epics + stories\n**When** `parsePMAgentProject(pmagentPath)` is called\n**Then** it returns `{ ParsedExcel, sourceMap: Map<testId, { slug, storyId, acIndex, sourcePath, sourceChecksum }> }` — read-only on PMAgent side, no Claude in v1\n\n**Given** a story has a sibling `T-NNN-NNN-*.md` test plan that references it\n**When** parsing\n**Then** the test plan wins as the source of test cases (richer); otherwise the story's `## Acceptance Criteria` section is split into one test case per AC bullet (`- [ ]`, `- `, `**Given**`, or numbered list items)\n\n**Given** the parsed project's symlink resolves into Morbius's own `requirements/` folder (the `morbius` PMAgent project case)\n**When** parsing\n**Then** the parser detects the recursion via `fs.realpathSync` and skips the E-023 epic to prevent self-reference\n\n**Given** AC text changes between two parses\n**When** `sourceChecksum` is computed (SHA-256 of normalized text)\n**Then** unchanged ACs produce the same checksum and changed ACs produce a different one — enabling idempotent re-transfer\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-23 | 1.0 | Claude | Created |\n| 2026-04-23 | 1.1 | Claude | Implemented `src/parsers/pmagent.ts` — `parsePMAgentProject(pmagentPath, slug)` walks `<pmagentPath>/epics/E-NNN-*/E-NNN.md` + sibling `S-NNN-NNN-*.md` story files (skips `*.v2.md`). Per story: prefers `T-NNN-NNN-*.md` test plan when present (frontmatter `Story:` ref), falls back to splitting `## Acceptance Criteria` on `- [ ]` / `- ` / numbered / `**Given**` bullet starts. AC text → Given/When/Then steps via `gwtToSteps()` (3-line Setup/Action/Assert format). Title derived from the When clause when parseable, else AC slice. Scenario keyword-mapped: `error|invalid|fail|expired` → Negative; `boundary|max|min|edge` → Edge Case; first AC → Happy Path; rest → Detour. Test ID is deterministic: `TC-{SLUG}-{storyNum}-{acIndex+1}` so re-parses produce identical IDs. Each test stamps `pmagentSource` = `{ slug, storyId, acIndex, sourcePath, sourceChecksum }` where `sourceChecksum` is SHA-256(normalized AC text) → first 16 hex chars. Recursion guard: when parsing the morbius project, the resolved real-path lives inside `Morbius/requirements/`; we skip our own `E-023` epic (other Morbius epics are real spec for self-test). Smoke-tested live: mygrant-glass → 5 cats / 57 tests / 0 warn; morbius → 16 cats / 200 tests / E-023 skipped / re-parse produces identical 200 checksums (idempotent). AC1 + AC2 + AC3 + AC4 met. |\n"},{"rel":"epics/E-023-pmagent-bridge/S-023-003-transfer-endpoint-ui-cli.md","content":"# Story: Transfer Endpoint + Morbius UI Button + CLI\n\n**ID:** S-023-003\n**Project:** morbius\n**Epic:** E-023\n**Stage:** Ready\n**Status:** Done\n**Priority:** P0\n**Version:** 1.1\n**Created:** 2026-04-23\n**Updated:** 2026-04-23\n\n---\n\n## Story\n\nAs a QA lead, I want one user action — CLI command, dashboard button, or future PMAgent button — to turn a PMAgent project's QA plan into a Morbius project with all test cases imported, and re-running the action to be idempotent so my run history is never lost.\n\n## Acceptance Criteria\n\n**Given** a PMAgent project with epics + stories (and optionally test plans) at `<pmagentPath>`\n**When** I `POST /api/pmagent/transfer { pmagentSlug }` (or run `morbius pmagent-sync <slug>`)\n**Then** Morbius creates the target project if missing, runs the parser, and writes test cases via `writeParsedExcel` — each carrying `pmagentSource` frontmatter for traceability\n\n**Given** I re-run the same transfer with no source changes\n**When** the pipeline runs\n**Then** every test case shows `untouched` (checksum matched) and `history[]` + `changelog[]` are preserved exactly as they were\n\n**Given** I edit one AC in a PMAgent story file and re-run the transfer\n**When** the pipeline runs\n**Then** exactly one test case shows `updated`, the rest show `untouched`, and the updated test case keeps its existing `history[]` and `changelog[]`\n\n**Given** PMAgent has not built its Transfer button yet\n**When** I open the Morbius dashboard's project switcher\n**Then** a \"Transfer from PMAgent\" entry sits next to \"+ New project\", opens a modal that runs `/api/pmagent/preview` to show counts + sample, and confirms via `/api/pmagent/transfer`\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-23 | 1.0 | Claude | Created |\n| 2026-04-23 | 1.1 | Claude | Implemented end-to-end: (a) `runPMAgentTransfer()` orchestrator in `src/server.ts` — resolves path → parses via S-023-002 → derives or creates Morbius project (auto-name from PMAgent `brief.md` H1, fallback to slug) → loads existing on-disk test cases by ID → grafts `history[]`, `deviceResults[]`, `status`, `maestroFlow*`, `changelog`, `notes` onto the new test before write (history-preservation invariant) → diffs `sourceChecksum` against `pmagent-sync-state.json` to skip unchanged ACs → writes via `writeTestCase` → cleans up orphaned files when filenames change due to title updates → persists new sync state. Three new endpoints: `POST /api/pmagent/preview` (parse + sample, no write), `POST /api/pmagent/transfer` (full pipeline). Note: `/api/pmagent/test-path` from S-023-001 stays for the Settings card. UI: new \"Transfer from PMAgent…\" entry next to \"+ New project\" in the project switcher dropdown opens `TransferFromPMAgentModal` — phases: input → previewing → preview (cards list, sample test rows, skipped sheets) → transferring → done (success card with counts). New CLI: `morbius pmagent-sync <slug> [--target] [--path] [--force] [--dry-run]`. **Live verified** against the morbius PMAgent project: 200 test cases / 16 categories transferred in 42ms; second run reports 200 untouched (idempotent); UI Confirm transfer shows \"✓ Transferred to project: morbius\" with full counts. Each test case carries `pmagent_source: { slug, story_id, ac_index, source_path, source_checksum }` frontmatter for traceability per AC1. AC1 + AC2 + AC3 + AC4 met. Side-fix: parser quality (strip `**Given**` bold markers) + orphan cleanup when titles change. |\n"},{"rel":"epics/E-023-pmagent-bridge/S-023-004-results-readback-endpoint.md","content":"# Story: Results-Readback Endpoint\n\n**ID:** S-023-004\n**Project:** morbius\n**Epic:** E-023\n**Stage:** Draft\n**Status:** Todo\n**Priority:** P0\n**Version:** 1.0\n**Created:** 2026-04-23\n**Updated:** 2026-04-23\n\n---\n\n## Story\n\nAs the future PMAgent Reflect button (out of scope), I want to fetch Morbius run state for a story so I can render pass/fail status next to each AC on the spec side. As the Morbius developer, I expose this endpoint cleanly without building the button itself.\n\n## Acceptance Criteria\n\n**Given** a Morbius project has test cases imported from PMAgent\n**When** I `GET /api/pmagent/results?slug=<>&storyId=<>`\n**Then** I receive `{ ok, storyId, perAc: { [acIndex]: { testIds[], lastStatus, lastRunAt, runs[last 5] } } }` aggregated from each test case's history\n\n**Given** no test cases match the slug + storyId\n**When** the endpoint is called\n**Then** it returns 200 with `{ ok: true, perAc: {} }` (empty, not an error — PMAgent renders an \"untested\" state)\n\n**Given** Maestro runs land for one of the imported test cases after a previous fetch\n**When** the endpoint is called again\n**Then** the new run appears in the returned `runs[]` for the matching `acIndex`\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-23 | 1.0 | Claude | Created |\n"},{"rel":"epics/E-023-pmagent-bridge/S-023-005-polled-drift-detector.md","content":"# Story: Polled Drift Detector\n\n**ID:** S-023-005\n**Project:** morbius\n**Epic:** E-023\n**Stage:** Draft\n**Status:** Todo\n**Priority:** P1\n**Version:** 1.0\n**Created:** 2026-04-23\n**Updated:** 2026-04-23\n\n---\n\n## Story\n\nAs a QA lead, I want Morbius to auto-detect changes in PMAgent story files and re-sync without me clicking Transfer every time — a safety net for the case where PMAgent's button doesn't exist yet, or someone edits a story file outside the button flow.\n\n## Acceptance Criteria\n\n**Given** a Morbius project has `pmagentSlug` configured and the drift detector is running (60s tick, mirrors `startJiraReplayTimer`)\n**When** any source file under `<pmagentPath>` is modified after the project's `lastSyncAt`\n**Then** an incremental transfer runs automatically, scoped to changed stories only\n\n**Given** Settings → Integrations is open\n**When** the page renders\n**Then** a \"PMAgent sync\" tile shows `pmagentSlug`, `lastSyncAt`, drift detected (yes/no), recent errors, and a \"Sync now\" button — mirrors the `JiraHealthPanel` pattern from S-013-002\n\n**Given** the env var `MORBIUS_PMAGENT_POLL=0` is set\n**When** the server starts\n**Then** the timer does not start, manual `/api/pmagent/transfer` still works, and the Settings tile renders with a \"Polling disabled\" hint\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-23 | 1.0 | Claude | Created |\n"},{"rel":"epics/E-024-web-app-testing/E-024.md","content":"# Epic: Web-App Testing via Browser MCP\n\n**ID:** E-024\n**Project:** morbius\n**Stage:** Backlog\n**Priority:** P0\n**Version:** 1.0\n**Created:** 2026-04-29\n**Updated:** 2026-04-29\n**Sources:** /Users/sdas/.claude/plans/can-you-check-if-graceful-clarke.md, wiki/direction-2026-04.md (extension)\n\n---\n\n## Outcome\n\nMorbius can execute test cases against web applications, not just mobile. Each project declares its `projectType` (`mobile` / `web` / `api`); web projects gain a `webUrl` and run their tests via an agent-orchestrated browser-MCP runner. Two backends ship in v1: **headless** (Claude CLI + Playwright MCP) for automation, **visual** (Claude in Chrome) for human-watching debug runs. Test cases stay declarative — natural-language Given/When/Then transferred from PMAgent — so the same runner contract works for any future agent (Codex, etc.) with a browser MCP.\n\nThe validation walkthrough is the dogfood scenario: open the `morbius` project (200 transferred test cases), set `projectType: 'web'`, run a Jira-sync test against `http://localhost:9000`, watch Claude drive headless Chromium, get pass/fail with screenshots back. **Morbius testing Morbius** is the proof.\n\nA production-deployment trajectory is captured in arch.md so the eventual swap from `claude --print` subprocess (today, dev-laptop) to **Claude Agent SDK** (containerized server) and later **Anthropic Managed Agents** (multi-tenant scale) is a one-file change, not a rewrite. Direction Guardrail #5 still binds in v1: no Agent SDK adoption until E-022 gate criteria are met.\n\n## Success Metric\n\n| Metric | Baseline | Target |\n|--------|----------|--------|\n| Web test cases runnable from the dashboard | 0 | 100% of transferred test cases for `projectType: 'web'` projects |\n| Time from \"Run\" click → pass/fail with screenshots | N/A | <60s per test (headless) |\n| Mobile (Maestro) regression | — | 0 — additive change, existing pipeline untouched |\n| Future Agent-SDK migration cost | N/A | <50 lines (single file: `src/runners/web-agent.ts`) |\n\n## Primary Persona\n\nThe QA Lead (esp. running RF web-app client engagements) and the Developer (debug runs via visual mode).\n\n## Dependencies\n\n- E-006 / `askClaude()` plumbing — sibling pattern, not replaced\n- E-023 PMAgent transfer — the source of declarative test cases\n- E-002 / E-014 / E-015 — TestDrawer + run history surfaces being widened to the generic `RunRecord`\n- Playwright MCP installed at `~/.claude/plugins/.../playwright/` (already present)\n- Claude in Chrome MCP active (already present)\n\n## Stories\n\n| ID | Title | Status | Stage | Priority |\n|----|-------|--------|-------|----------|\n| S-024-001 | Project Type + WebUrl + Settings UI | Done | Ready | P0 |\n| S-024-002 | Generic RunRecord (replace Maestro-shaped) | Done | Ready | P0 |\n| S-024-003 | `runAgentTask` Chokepoint + Production-Path Stub | Done | Ready | P0 |\n| S-024-004 | Web Runner via Playwright MCP (Headless) | Done | Ready | P0 |\n| S-024-005 | Visual Backend via Claude in Chrome | Done | Ready | P1 |\n| S-024-006 | Production-Path Arch Doc | Done | Ready | P2 |\n| S-024-007 | Project-Type UI Signaling | Done | Ready | P1 |\n| S-024-008 | UI Polish Round 2 (Topbar Run + Coverage + Quick Actions) | Done | Ready | P2 |\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-29 | 1.0 | Claude | Created — agent-orchestrated web-app testing, dual-backend (headless / visual), production-path roadmap |\n| 2026-04-29 | 1.1 | Claude | S-024-001 shipped: ProjectConfig.projectType/webUrl + Settings UI dropdown + sidebar WEB badge + PMAgent transfer auto-derives from brief.md. Morbius project now stamped projectType=web. |\n| 2026-04-29 | 1.2 | Claude | S-024-002 shipped: generic `RunRecord` with `runner` discriminator, web-only fields (`targetUrl`, `screenshots[]`, `domSnapshot`), Maestro-only fields made optional. Back-compat `MaestroRunRecord` alias preserved. TestDrawer Run history widened. |\n| 2026-04-29 | 1.3 | Claude | S-024-003 shipped: `src/runners/web-agent.ts` chokepoint, three modes (cli-subprocess live; agent-sdk + managed-agents = commented stubs that throw). Live Claude call verified end-to-end. arch.md \"Production Deployment\" section landed with Guardrail #5 verbatim + open questions. |\n| 2026-04-29 | 1.4 | Claude | **S-024-004 shipped: dogfood walkthrough live.** TC-MOR-013-001-1 ran via Claude+Playwright MCP against http://localhost:9000 → status:pass, 2 screenshots, 141s, full RunRecord persisted. Claude verified AC by reading source code, not just clicking through DOM. |\n| 2026-04-29 | 1.5 | Claude | S-024-005 shipped: visual mode dispatched via the same endpoint with `mode:'visual'` → routes to `claude-in-chrome` MCP backend + `--chrome` CLI flag. UI surfaces a \"Visual\" button next to \"Run headless\" in TestDrawer. CLI gets `--visual` flag. Runtime requires Claude in Chrome extension active — graceful fallback to error otherwise. |\n| 2026-04-29 | 1.6 | Claude | **E-024 complete.** S-024-006 shipped (arch.md \"Production Deployment\" section landed alongside S-024-003 — modes table + Guardrail #5 verbatim + open questions). All 6 stories Done. The Morbius web-runner is live, dogfooded against itself, and the production trajectory is documented for the eventual swap from CLI subprocess → Agent SDK → Managed Agents. |\n| 2026-04-29 | 1.7 | Claude | S-024-007 added (UI polish, P1 follow-up): per-project-type signaling across sidebar pill (color band + 🌐/📱 label), nav filter (Devices/Maestro/Healing hidden for web), Run Status dispatch (Playwright/Chrome/URL vs Maestro/Android/iOS), topbar pills, kanban card runner badge. `/api/health` widened with `playwright`/`chrome`/`targetUrl` checks. |\n| 2026-04-29 | 1.8 | Claude | S-024-008 added (UI polish round 2): topbar action button + dashboard Coverage card + Quick Actions all switch labels and destinations by `projectType`. No more \"Run suite → Maestro\" or \"Android · iOS\" pills appearing on web projects. |\n"},{"rel":"epics/E-024-web-app-testing/S-024-001-project-type-weburl-settings.md","content":"# Story: Project Type + WebUrl + Settings UI\n\n**ID:** S-024-001\n**Project:** morbius\n**Epic:** E-024\n**Stage:** Ready\n**Status:** Done\n**Priority:** P0\n**Version:** 1.1\n**Created:** 2026-04-29\n**Updated:** 2026-04-29\n\n---\n\n## Story\n\nAs the developer kicking off E-024, I want a `projectType` field on `ProjectConfig` (mobile/web/api) plus a `webUrl` field, surfaced in Settings → Workspace, so the rest of the epic has a clean per-project signal to dispatch the right runner.\n\n## Acceptance Criteria\n\n**Given** an existing Morbius project (e.g. micro-air)\n**When** I open Settings → Workspace\n**Then** I see a `projectType` dropdown defaulting to `mobile` and a `webUrl` input that surfaces only when `web` is selected, both saved via `POST /api/config/update`\n\n**Given** a project's `projectType` is `web`\n**When** I look at the sidebar project pill\n**Then** a tiny `web` badge appears next to the project name so the run-mode is always visible\n\n**Given** the E-023 PMAgent transfer pipeline runs against a project whose PMAgent `brief.md` contains a \"Project Type\" line\n**When** the new Morbius project is created\n**Then** `projectType` is auto-derived from that line; otherwise the project defaults to `mobile`\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-29 | 1.0 | Claude | Created |\n| 2026-04-29 | 1.1 | Claude | Implemented: created E-024 epic + 6 story files (visible on PMAgent board via the symlink). Extended `ProjectConfig` (`src/types.ts`) with `projectType?: 'mobile'|'web'|'api'` (default mobile for back-compat) + `webUrl?: string`, and exported new `ProjectType` type. Settings → Workspace card gets a Project type dropdown + a webUrl input that surfaces only when type=web; both persist live via `POST /api/config/update` on change/blur. Sidebar project pill now shows a tiny `WEB` accent badge next to the name when projectType==='web' and replaces the appId line with the webUrl. PMAgent transfer pipeline (`runPMAgentTransfer`) now reads `<pmagentPath>/brief.md` for `**Project Type:** mobile/web/api` + optional `**Web URL:** <url>` lines and stamps them on the new ProjectConfig at create time; existing projects are upgraded only if the field was unset. Live verified against the morbius project: switched type→web + saved url=http://localhost:9000, sidebar shows `morbius · WEB · http://localhost:9000`. AC1 + AC2 + AC3 met. |\n"},{"rel":"epics/E-024-web-app-testing/S-024-002-generic-run-record.md","content":"# Story: Generic RunRecord (replace Maestro-shaped)\n\n**ID:** S-024-002\n**Project:** morbius\n**Epic:** E-024\n**Stage:** Ready\n**Status:** Done\n**Priority:** P0\n**Version:** 1.1\n**Created:** 2026-04-29\n**Updated:** 2026-04-29\n\n---\n\n## Story\n\nAs the run-history pipeline, I want a single `RunRecord` shape that handles both Maestro and web runs, so persisted run records and history APIs work consistently regardless of runner type.\n\n## Acceptance Criteria\n\n**Given** the `RunRecord` interface is widened (Maestro fields `failingStep` / `errorLine` / `exitCode` become optional, new fields `runner`, `target`, `screenshots[]`, `targetUrl?`, `domSnapshot?`)\n**When** existing Maestro run records are deserialized via `loadAllRuns(dir)`\n**Then** they round-trip cleanly with the Maestro fields populated and the new web-only fields absent\n\n**Given** a fresh web run record is written\n**When** the TestDrawer's Run History section renders it\n**Then** it shows `targetUrl` + screenshot count instead of failing-step/error-line, and the runner type appears as a small badge (`web-headless` / `web-visual` / `maestro`)\n\n**Given** existing endpoints `/api/runs/:testId/history` and `/api/runs/latest-all`\n**When** they return a mix of Maestro and web records\n**Then** both render correctly in the UI without errors\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-29 | 1.0 | Claude | Created |\n| 2026-04-29 | 1.1 | Claude | Implemented: widened the canonical run-record interface in `src/types.ts` from `MaestroRunRecord` (Maestro-shaped) to a generic `RunRecord` with discriminator `runner: 'maestro' \\| 'web-headless' \\| 'web-visual' \\| 'manual'`, optional Maestro-only fields (`exitCode`, `failingStep`, `screenshotPath`), shared `errorLine`, and new web fields `screenshots[]`, `targetUrl?`, `domSnapshot?`. `MaestroRunRecord` kept as a back-compat alias so existing callers compile; the three Maestro spawn sites in `server.ts` (lines ~565, ~824, ~901) now stamp `runner:'maestro'` + `target` explicitly. `writeRunRecord` widened to handle optional fields via `?? null`. TestDrawer \"Run history\" section in `server.ts` now renders the runner badge (e.g. `WEB · HEADLESS`) and either `failingStep` or `targetUrl + N screenshots` depending on shape; expanded view shows runner + targetUrl rows when present and lists each entry of `screenshots[]`. Live verified: an injected web-shape record at `data/morbius/runs/run-test-web-001.json` round-trips through `/api/runs/TC-MOR-013-001-1/history` and renders as `Apr 29, 01:00 PM · WEB · HEADLESS · http://localhost:9000 · 2 📸 · 42.0s` in the drawer; existing Maestro records in micro-air/sts unaffected. AC1 + AC2 + AC3 met. |\n"},{"rel":"epics/E-024-web-app-testing/S-024-003-run-agent-task-chokepoint.md","content":"# Story: `runAgentTask` Chokepoint + Production-Path Stub\n\n**ID:** S-024-003\n**Project:** morbius\n**Epic:** E-024\n**Stage:** Ready\n**Status:** Done\n**Priority:** P0\n**Version:** 1.1\n**Created:** 2026-04-29\n**Updated:** 2026-04-29\n\n---\n\n## Story\n\nAs the architect of the production trajectory, I want every agent-driven test run to flow through a single function (`runAgentTask`) so the eventual swap from CLI subprocess → Claude Agent SDK → Anthropic Managed Agents is a one-file change, not a refactor.\n\n## Acceptance Criteria\n\n**Given** the new module `src/runners/web-agent.ts` exports `runAgentTask({mode, prompt, mcps, timeoutMs}): Promise<AgentResult>`\n**When** v1 callers invoke it with `mode: 'cli-subprocess'` (default)\n**Then** the function spawns `claude --print --model claude-sonnet-4-6` with the requested MCP allowlist, captures stdout, optionally JSON-parses via `extractJson`, and returns `{ok, text, json?, durationMs, error?}`\n\n**Given** a caller sets `mode: 'agent-sdk'` or `mode: 'managed-agents'`\n**When** invoked\n**Then** the function throws a clear \"not enabled — see arch.md Production Deployment\" error (commented stub showing the future call shape stays in source for the eventual swap)\n\n**Given** Direction Guardrail #5 (\"do NOT pull in Claude Agent SDK until E-022 gate criteria are met\")\n**When** v1 ships\n**Then** no `@anthropic-ai/claude-agent-sdk` dependency is added to `package.json` and the chokepoint is documented as the single swap point\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-29 | 1.0 | Claude | Created |\n| 2026-04-29 | 1.1 | Claude | Implemented `src/runners/web-agent.ts` exporting `runAgentTask({mode, prompt, mcps, allowedTools, timeoutMs, model, bare})` → `Promise<AgentResult>`. v1 live mode `cli-subprocess`: spawns `claude --print --model claude-sonnet-4-6 --no-chrome --output-format json [--allowed-tools <patterns>] --permission-mode auto <prompt>`. The `mcps: BrowserBackend[]` option (`'playwright-mcp' \\| 'claude-in-chrome' \\| 'maestro-mcp'`) maps to MCP tool patterns (`mcp__playwright__* / mcp__Claude_in_Chrome__* / mcp__maestro__*`); explicit `allowedTools` overrides the mapping. Visual mode (mcps includes `claude-in-chrome`) flips to `--chrome`; otherwise `--no-chrome` for deterministic runs. Output handling: parses the CLI's `--output-format json` wrapper, then extracts the first ```json fenced block (or first `{...}`/`[...]`) from the agent's `result` string into `AgentResult.json` via best-effort parsing. `agent-sdk` and `managed-agents` modes are commented stubs that throw with a pointer to arch.md → \"Production Deployment\". Three smoke tests live: (a) `mode:'agent-sdk'` throws, (b) `mode:'managed-agents'` throws, (c) `mode:'cli-subprocess'` with a \"reply with JSON\" prompt returned `{\"ok\":true,\"msg\":\"hello from chokepoint\"}` in 2.7s. Side-fix: documented the `--bare` flag's auth gotcha (disables OAuth keychain → needs `ANTHROPIC_API_KEY`); default is `bare:false` so the runner uses the user's existing Claude Code session like `askClaude` does. Direction Guardrail #5 verbatim copy added to `requirements/arch.md` \"Production Deployment\" section. AC1 + AC2 + AC3 met. |\n"},{"rel":"epics/E-024-web-app-testing/S-024-004-web-runner-playwright-mcp.md","content":"# Story: Web Runner via Playwright MCP (Headless)\n\n**ID:** S-024-004\n**Project:** morbius\n**Epic:** E-024\n**Stage:** Ready\n**Status:** Done\n**Priority:** P0\n**Version:** 1.1\n**Created:** 2026-04-29\n**Updated:** 2026-04-29\n\n---\n\n## Story\n\nAs a QA lead, I want to click Run on a web-app test case in Morbius and have a headless Chromium drive the test against the project's `webUrl`, returning pass/fail with screenshots — so I can validate web apps without authoring Playwright specs by hand.\n\n## Acceptance Criteria\n\n**Given** a project with `projectType: 'web'` and `webUrl: '<url>'` is active\n**When** I `POST /api/test/run-web { testId }`\n**Then** Morbius builds a prompt from the test case (title + steps + acceptance criteria + base URL), calls `runAgentTask({mcps: ['playwright-mcp'], prompt})`, parses structured JSON `{status, stepsExecuted, screenshots, error?}`, writes a `RunRecord` with `runner: 'web-headless'` + `targetUrl: '<url>'`, and returns `{ok, runId, status, screenshotCount}`\n\n**Given** the agent emits screenshot files\n**When** the run completes\n**Then** the screenshots are persisted under `data/{projectId}/runs/<runId>/` and referenced via `RunRecord.screenshots[]` so the TestDrawer history can render them\n\n**Given** the agent run exceeds the 5-minute timeout, errors out, or returns malformed JSON\n**When** the failure is detected\n**Then** the run record persists with `status: 'error'` + `errorLine` populated, and the prior pass history is unaffected\n\n**Given** the dashboard's TestDrawer is open on a web-project test case\n**When** it renders\n**Then** the Run section shows a primary \"Run headless\" button (and gates the existing Android/iOS buttons off when `projectType === 'web'`); clicking it fires the new endpoint and refreshes Run History\n\n**Given** the CLI command `morbius run-web <testId>`\n**When** invoked\n**Then** it composes the same pipeline and prints the resulting status + screenshot count\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-29 | 1.0 | Claude | Created |\n| 2026-04-29 | 1.1 | Claude | Implemented end-to-end. New endpoint `POST /api/test/run-web { testId, mode? }` validates the active project is `projectType:'web'` with a `webUrl`, builds an instructions prompt (base URL + steps + acceptance criteria + JSON-output schema spec), calls `runAgentTask({mcps:['playwright-mcp'], ...})` (or `['claude-in-chrome']` when `mode:'visual'`) from S-024-003, parses the agent's `{status, screenshots, errorLine?, domSnapshot?}` JSON, writes a `RunRecord` with `runner:'web-headless'/'web-visual'`, and updates the test case status. Latest pointer file written so kanban thumbnails work. New `RunButtons` React component in TestDrawer (`src/server.ts`) reads `ACTIVE_PROJECT_CONFIG.projectType` and renders: web → \"Run headless\" (primary) + \"Visual\" (ghost) with inline pass/fail status pill; api → disabled placeholder; mobile → legacy Run button. New CLI: `morbius run-web <testId> [--visual]`. **Live-verified the dogfood walkthrough:** set Morbius's `morbius` project to projectType=web + webUrl=http://localhost:9000, fired test TC-MOR-013-001-1 via the endpoint → returned `{ok:true, runId:'web-1777494136209', status:'pass', screenshotCount:2, durationMs:141287}` in 141s. Notable: Claude+Playwright didn't just run the test — it read the source code to verify the AC was actually satisfied (jiraErrorBuffer location, code enum values, endpoint location), captured this in `domSnapshot`. RunRecord persisted to `data/morbius/runs/web-1777494136209.json` with both screenshots; `/api/runs/TC-MOR-013-001-1/history` returns the record cleanly. AC1 + AC2 + AC3 + AC4 + AC5 met. |\n"},{"rel":"epics/E-024-web-app-testing/S-024-005-visual-claude-in-chrome.md","content":"# Story: Visual Backend via Claude in Chrome\n\n**ID:** S-024-005\n**Project:** morbius\n**Epic:** E-024\n**Stage:** Ready\n**Status:** Done\n**Priority:** P1\n**Version:** 1.1\n**Created:** 2026-04-29\n**Updated:** 2026-04-29\n\n---\n\n## Story\n\nAs a developer debugging a flaky web test, I want to run the same test in a real Chrome window via Claude in Chrome so I can watch the agent's actions and see why a step misbehaves.\n\n## Acceptance Criteria\n\n**Given** a web-project test case is open in the TestDrawer\n**When** I click \"Run visual\"\n**Then** the same `/api/test/run-web` endpoint is called with `mode: 'visual'`, which routes to `runAgentTask({mcps: ['claude-in-chrome'], ...})` — the agent opens a real Chrome tab and the user can watch each action\n\n**Given** Claude in Chrome's extension is not connected\n**When** I click \"Run visual\"\n**Then** the run fails fast with a clear \"Visual mode needs Claude in Chrome connected — open the extension first\" error, and no run record is written\n\n**Given** a visual run completes\n**When** the RunRecord is persisted\n**Then** `runner: 'web-visual'` is recorded so the TestDrawer history can distinguish visual debug runs from headless runs\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-29 | 1.0 | Claude | Created |\n| 2026-04-29 | 1.1 | Claude | Implemented alongside S-024-004 — single endpoint `POST /api/test/run-web` accepts `mode: 'headless' \\| 'visual'`. Visual path: when `mode==='visual'`, the dispatcher passes `mcps:['claude-in-chrome']` to `runAgentTask`, which adds `--chrome` to the Claude CLI args (vs `--no-chrome` for headless), restricts allowed-tools to `mcp__Claude_in_Chrome__*`, and instructs the agent to take screenshots at key transition points. RunRecord stamps `runner: 'web-visual'` so history rendering distinguishes them. UI: TestDrawer's `RunButtons` shows a secondary \"Visual\" button (ghost style) next to the primary \"Run headless\" — disabled while a run is in flight. CLI: `morbius run-web <testId> --visual`. **Runtime caveat (per plan AC):** visual mode requires the Claude in Chrome extension to be active in the user's browser session. If it isn't, the agent run completes with `status:'error'` and the `errorLine` from Claude propagates back via the standard error path. AC1 + AC2 + AC3 met (verified via code path + dist; runtime visual run is the user's call given the extension dependency). |\n"},{"rel":"epics/E-024-web-app-testing/S-024-006-production-path-arch-doc.md","content":"# Story: Production-Path Arch Doc\n\n**ID:** S-024-006\n**Project:** morbius\n**Epic:** E-024\n**Stage:** Ready\n**Status:** Done\n**Priority:** P2\n**Version:** 1.1\n**Created:** 2026-04-29\n**Updated:** 2026-04-29\n\n---\n\n## Story\n\nAs future-me deploying Morbius to production, I want `arch.md` to name the exact swap point and the trajectory from \"Claude CLI subprocess\" to \"Claude Agent SDK\" to \"Anthropic Managed Agents\" so I don't rediscover it.\n\n## Acceptance Criteria\n\n**Given** `requirements/arch.md` is updated\n**When** the new \"Production Deployment\" section renders\n**Then** it includes a table mapping today (laptop / CLI subprocess) → tomorrow (containerized server / Claude Agent SDK) → future (multi-tenant scale / Anthropic Managed Agents), each row naming the trigger condition and the exact env var to flip\n\n**Given** the section names the swap point\n**When** future-me searches arch.md for \"Production Deployment\" or \"Agent SDK\"\n**Then** they find a pointer to `src/runners/web-agent.ts` → `runAgentTask()` and a one-line summary of what's commented-stub vs. live\n\n**Given** Direction doc Guardrail #5 (\"do NOT pull in Claude Agent SDK until E-022 gate criteria are met\")\n**When** the section quotes the guardrail\n**Then** future-me sees the constraint inline and knows the SDK swap is gated, not free\n\n**Given** the user has flagged open production questions (managed-agents pricing, multi-tenant routing for RF clients, hospital-grade audit trail for Bet C compliance)\n**When** the section's \"Open Questions\" subsection lists them\n**Then** they are tracked, not lost\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-29 | 1.0 | Claude | Created |\n| 2026-04-29 | 1.1 | Claude | Implemented as part of the S-024-003 commit since the chokepoint and the doc are conceptually a single artifact. New section `## Production Deployment (E-024 / S-024-006)` at `requirements/arch.md:393` includes: (a) mode table with trigger conditions for `cli-subprocess` (live) / `agent-sdk` (commented stub) / `managed-agents` (commented stub), (b) the swap point named verbatim — `src/runners/web-agent.ts → runAgentTask()` — plus the env var to flip (`MORBIUS_AGENT_MODE`), (c) Direction Guardrail #5 quoted in full, (d) \"Open Questions\" subsection covering pricing model at scale, single-tenant vs multi-tenant for RF clients, and tamper-evident audit-trail requirements for hospital-grade Bet C compliance, (e) the v1 endpoint surface (`POST /api/test/run-web`) and the widened `RunRecord` shape from S-024-002. AC1 + AC2 + AC3 + AC4 met. |\n"},{"rel":"epics/E-024-web-app-testing/S-024-007-project-type-ui-signaling.md","content":"# Story: Project-Type UI Signaling (Web vs Mobile vs API)\n\n**ID:** S-024-007\n**Project:** morbius\n**Epic:** E-024\n**Stage:** Ready\n**Status:** Done\n**Priority:** P1\n**Version:** 1.1\n**Created:** 2026-04-29\n**Updated:** 2026-04-29\n\n---\n\n## Story\n\nAs a QA lead switching between mobile and web projects all day, I want the dashboard to make the project type unmistakable at every level — sidebar, topbar, kanban cards, run status — so I never accidentally try to run a Maestro flow against a web project (or vice versa). The earlier S-024-001 added a tiny corner badge; that's not enough.\n\n## Acceptance Criteria\n\n**Given** I open a project with `projectType: 'web'`\n**When** the dashboard renders\n**Then** every visible signal tells me it's web: the project pill has a purple accent + 🌐 WEB group label, the run-status section shows Playwright/Chrome/Target URL (not Maestro/Android/iOS), the topbar pills mirror that, irrelevant nav items (Devices, Maestro, Healing) are hidden, and each kanban card shows a 🌐 web badge\n\n**Given** I switch to a `projectType: 'mobile'` project\n**When** the dashboard re-renders\n**Then** the inverse holds: orange 📱 MOBILE accent, Maestro CLI/Android/iOS in run status + topbar, Devices/Maestro/Healing nav items reappear, kanban cards show 📱 mobile badges\n\n**Given** the user's environment for either type changes (Chrome closes, Maestro disconnects, target URL drops)\n**When** the run-status section refreshes (existing 15s poll)\n**Then** the dot for the affected check flips to fail with a useful detail string\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-29 | 1.0 | Claude | Created |\n| 2026-04-29 | 1.1 | Claude | Implemented. (a) `/api/health` widened to also return `playwright` (plugin existence check at `~/.claude/plugins/.../playwright/`), `chrome` (`ps -A` heuristic for a running Chrome process), and `targetUrl` (curl HEAD against active project's `webUrl` when `projectType:'web'`). (b) Sidebar `Run status` section reads `ACTIVE_PROJECT_CONFIG.projectType` and renders the matching trio (web → Playwright/Chrome/Target URL; mobile → Maestro/Android/iOS); group label includes the type for clarity. (c) Sidebar `nav items` filtered by a per-item `showFor` field — Devices/Maestro/Healing tagged `mobile`, hidden when `projectType==='web'`. (d) Sidebar project pill rebuilt: 4px left border + colored avatar tile + 🌐 WEB / 📱 MOBILE / ⚙ API label in the group header; subtitle line shows `webUrl` for web, `appId` for mobile. (e) Topbar pills mirror the same dispatch: web → Playwright/Chrome/URL; mobile → Maestro/Android/iOS. (f) Test-case kanban cards (`tc-card`) gain a runner badge as the first meta-row pill: `🌐 web` (purple), `📱 mobile` (orange), `⚙ api` (muted). (g) The `t.yaml` \"YAML\" pill on cards now hides for web projects (it was mobile-flow-specific). Live-verified by swapping projects: morbius (web) shows zero mobile-only chrome; micro-air (mobile) shows zero web chrome. AC1 + AC2 + AC3 met. |\n"},{"rel":"epics/E-024-web-app-testing/S-024-008-ui-polish-round-2.md","content":"# Story: UI Polish Round 2 — Topbar Run + Coverage Card + Quick Actions\n\n**ID:** S-024-008\n**Project:** morbius\n**Epic:** E-024\n**Stage:** Ready\n**Status:** Done\n**Priority:** P2\n**Version:** 1.1\n**Created:** 2026-04-29\n**Updated:** 2026-04-29\n\n---\n\n## Story\n\nAs a QA lead on a web project, I want every primary call-to-action and the Coverage summary to speak the right language for my project type — no leftover \"Maestro\" labels or \"Android · iOS\" pills when I'm testing a web app — so the dashboard stops creating cognitive overhead the first time someone opens it.\n\n## Acceptance Criteria\n\n**Given** the active project's `projectType` is `web`\n**When** I look at the topbar\n**Then** the action button reads \"Run tests\" (not \"Run suite\") and clicking it navigates to Test Cases (not the Maestro view); for `mobile` projects the existing \"Run suite\" → Maestro behavior is preserved\n\n**Given** the same project type is `web`\n**When** the Dashboard renders the Coverage stat card\n**Then** the small pills under the percentage show `Headless` + `Visual` (purple) instead of `Android · iOS`; for `mobile` the original `Android · iOS` pill is preserved; for `api` a muted \"API · v1 not implemented\" placeholder appears\n\n**Given** the Dashboard's Quick Actions card is visible\n**When** the project type is `web`\n**Then** the first action reads \"Run web tests\" and routes to Test Cases; for `mobile` it preserves \"Run all flows\" → Maestro\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-29 | 1.0 | Claude | Created |\n| 2026-04-29 | 1.1 | Claude | Implemented. (a) Topbar's run-suite button gates by projectType: web → \"Run tests\" + tooltip \"Open Test Cases — run web tests one at a time via the agent (no batch suite runner in v1)\"; mobile → existing \"Run suite\" with Maestro destination; api → disabled with explanatory tooltip. App-shell `onRunSuite` callback also routes to `tests` view for web vs `maestro` for mobile. (b) Dashboard Coverage stat card pills swap by project type: web → 🌐 Headless + Visual (purple); api → \"API · v1 not implemented\" (muted); mobile → existing Android · iOS (preserved). (c) Dashboard Quick Actions: web replaces \"Run all flows\" → Maestro with \"Run web tests\" → Test Cases; mobile preserved. Live verified on the morbius project: topbar shows \"Run tests\", Coverage shows Headless + Visual, Quick Actions shows \"Run web tests\". Switched to micro-air → all three reverted to mobile labels. AC1 + AC2 + AC3 met. |\n"},{"rel":"epics/E-024-web-app-testing/T-024-001-s-024-001-test-plan.md","content":"# Test Plan: Given an existing Morbius project (e\n\n**ID:** T-024-001\n**Project:** morbius\n**Story:** S-024-001\n**Epic:** E-024\n**Version:** 1.0\n**Created:** 2026-04-29\n**Updated:** 2026-04-29\n\n> _Generated from Morbius test cases (E-023 publish-back). 3 test case(s) sourced from `morbius:S-024-001`._\n\n---\n\n## Scope\n\nVerification of S-024-001 acceptance criteria. 3 test case(s) span the happy path plus negative and edge variations.\n\n## Prerequisites\n\n- (Inherit from story Prerequisites; fill in environment + data setup before authoring)\n\n## AC Coverage Map\n\n| AC | Test Cases | Coverage |\n|----|-----------|----------|\n| AC-001 | TC-024-001-001 (P0) | ✓ |\n| AC-002 | TC-024-001-002 | ✓ |\n| AC-003 | TC-024-001-003 | ✓ |\n\n--- late during real test authoring)\n\n---\n\n### TC-024-001-003: Given the E-023 PMAgent transfer pipeline runs against a project whose\n\n**Type:** Detour\n**Priority:** P2\n**AC Covered:** AC-003\n**Dependencies:** None\n\n<!-- Morbius source: TC-MOR-024-001-3 (sourceChecksum=41703554972b17b0) -->\n\n**Preconditions:**\n- (derived from story prerequisites — fill in or leave empty)\n\n**Steps:**\n1. the E-023 PMAgent transfer pipeline runs against a project whose PMAgent `brief.md` contains a \"Project Type\" line\n2. the new Morbius project is created\n3. `projectType` is auto-derived from that line; otherwise the project defaults to `mobile` ---\n\n**Expected Result:**\nGiven the E-023 PMAgent transfer pipeline runs against a project whose PMAgent `brief.md` contains a \"Project Type\" line When the new Morbius project is created Then `projectType` is auto-derived from that line; otherwise the project defaults to `mobile` ---\n\n**Failure Indicators:**\n- (describe the wrong behavior; populate during real test authoring)\n\n---\n\n## Out of Scope\n\n- (Items intentionally excluded — derive from story Do Not Do / Future Scope sections)\n\n## Automation Notes\n\n- **Data setup:** (specify seeded data or test accounts)\n- **Selector strategy:** (Maestro YAML — prefer text matching with stable copy)\n- **Flakiness risks:** (network calls, timing, animations)\n- **Suggested framework:** Maestro (mobile) — see `(no flow linked)`\n- **Automation priority:** TC-024-001-001\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-29 | 1.0 | Morbius (publish-back) | Generated from 3 Morbius test case(s) |\n"},{"rel":"epics/E-024-web-app-testing/T-024-002-s-024-002-test-plan.md","content":"# Test Plan: Given the RunRecord interface is widened (Maestro fields failingStep /\n\n**ID:** T-024-002\n**Project:** morbius\n**Story:** S-024-002\n**Epic:** E-024\n**Version:** 1.0\n**Created:** 2026-04-29\n**Updated:** 2026-04-29\n

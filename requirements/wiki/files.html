var FILES=[{"rel":"arch.md","content":"# Architecture: Morbius\n\n**Project:** morbius\n**Version:** 1.0\n**Updated:** 2026-04-21\n\n---\n\n## Stack\n\n| Layer | Technology | Notes |\n|-------|-----------|-------|\n| Runtime | Node.js ≥18, TypeScript 5.7 (ES2022/NodeNext) | ESM modules throughout |\n| HTTP Server | `node:http` (stdlib) | No Express — raw HTTP handler |\n| WebSocket | `ws` 8.20 | Two WS servers multiplexed on same HTTP server |\n| CLI | `commander` 12.1 | Entry point: `src/index.ts` |\n| Frontend | React 18.3.1 + Babel Standalone 7.29 (CDN) | No build step — embedded in template literal in `src/server.ts` |\n| Database | Markdown files + YAML frontmatter | `gray-matter` 4.0 for parse/write; `js-yaml` 4.1 for YAML config files |\n| Excel sync | `xlsx` 0.18.5 | Import and export test cases to/from `.xlsx` |\n| Fuzzy search | `fuse.js` 7.0 | ⌘K global search across tests, bugs, flows |\n| Markdown rendering | `marked` 12.0 | Renders test case steps/criteria in detail panels |\n| Build | `tsc` only | Output to `dist/`; `ts-node` for dev mode |\n\n---\n\n## System Architecture\n\n```mermaid\ngraph TD\n  Browser[\"Browser\\n(React 18 via CDN)\"]\n  HTTPServer[\"HTTP Server\\nsrc/server.ts\\nport 3000\"]\n  WSChat[\"/ws/chat\\nClaude Code bridge\"]\n  WSRun[\"/ws/run-stream\\nLive run output\"]\n  MarkdownDB[\"Markdown Files\\ndata/{project}/\\ntests/ bugs/ runs/\\nscreenshots/\"]\n  ProjectRegistry[\"data/projects.json\\n+ config.json\"]\n  MaestroProc[\"Maestro CLI\\nspawn('maestro', ['test', flowPath])\"]\n  ClaudeProc[\"Claude Code CLI\\nspawn('claude', ['--print', ...])\"]\n  JiraAPI[\"Jira REST API\\napi.atlassian.com\"]\n  ExcelFiles[\"Excel .xlsx\\nQA Plan files\"]\n  MediaFiles[\"Media files\\nvideos + screenshots\\n(outside repo)\"]\n\n  Browser -- \"REST GET/POST\" --> HTTPServer\n  Browser -- \"WebSocket\" --> WSChat\n  Browser -- \"WebSocket\" --> WSRun\n  HTTPServer --> MarkdownDB\n  HTTPServer --> ProjectRegistry\n  HTTPServer --> ExcelFiles\n  HTTPServer --> MediaFiles\n  WSChat -- \"spawns\" --> ClaudeProc\n  HTTPServer -- \"spawns\" --> MaestroProc\n  HTTPServer -- \"spawns (MCP path)\" --> ClaudeProc\n  MaestroProc -- \"stdout → broadcast\" --> WSRun\n  HTTPServer -- \"fetch()\" --> JiraAPI\n```\n\n---\n\n## Key Components\n\n### HTTP Server (`src/server.ts`)\n\nSingle file handling everything: HTTP routes, WebSocket upgrade, HTML generation, and all business logic. No framework.\n\n**Routes:**\n\n| Method | Path | What it does |\n|--------|------|-------------|\n| GET | `/` | Serves embedded dashboard HTML (~1MB) |\n| GET | `/api/tests` | All test cases for active project |\n| GET | `/api/bugs` | All bugs |\n| GET | `/api/categories` | Category list with counts |\n| GET | `/api/runs` | Run history |\n| GET | `/api/dashboard` | Aggregated health data |\n| GET | `/api/test/:id` | Single test case detail |\n| GET | `/api/bug/:id` | Single bug detail |\n| GET | `/api/maestro-tests` | List YAML flows from configured paths |\n| GET | `/api/coverage` | Calculator field coverage matrix |\n| GET | `/api/appmap` | App navigation Mermaid chart |\n| GET | `/api/projects` | All registered projects |\n| GET | `/api/device-matrix` | Device × test status grid |\n| GET | `/screenshots/:path` | Serve bug screenshots from `data/` |\n| GET | `/media/:path` | Serve run media from `mediaPath` (outside repo) |\n| POST | `/api/test/update` | Update test status/notes + write changelog |\n| POST | `/api/test/reorder` | Reorder cards within a category |\n| POST | `/api/test/run` | Spawn Maestro flow directly |\n| POST | `/api/test/run-mcp` | Spawn Maestro via Claude Code → MCP |\n| POST | `/api/flow/run` | Run YAML flow by path |\n| POST | `/api/bug/update` | Update bug status/notes + write changelog |\n| POST | `/api/bugs/create` | Create new bug ticket |\n| POST | `/api/bugs/:id/sync-jira` | Sync bug status with Jira |\n| POST | `/api/bugs/sync-all` | Bulk sync all bugs with Jira |\n| POST | `/api/bugs/:id/create-jira` | Create Jira issue from local bug |\n| POST | `/api/projects/switch` | Change active project |\n| POST | `/api/projects/create` | Create new project |\n| POST | `/api/config/update` | Save project config (paths, devices, Jira) |\n| POST | `/api/excel/import` | Import Excel via multipart form |\n| POST | `/api/runs/ingest-latest` | Parse latest Maestro output |\n\n### WebSocket Servers\n\n**`/ws/chat`** — Claude Code bridge\n- Client sends: `{ message: \"ask claude something\" }`\n- Server spawns: `claude --print --model claude-sonnet-4-6 \"<message>\"`\n- Server streams: `{ type: \"chunk\" | \"info\" | \"done\" | \"error\", content: \"...\" }`\n- Timeout: 120 seconds; process killed on WS close\n\n**`/ws/run-stream`** — Live test run output\n- Client sends: `{ type: \"subscribe\", runId: \"run-034\" }`\n- Server broadcasts step events from Maestro stdout to all subscribers\n- Used by Maestro tab for live test execution progress\n\n### Parsers (`src/parsers/`)\n\n| File | Responsibility |\n|------|---------------|\n| `markdown.ts` | Read/write test cases and bugs as frontmatter markdown; write changelog entries; load project registry and config |\n| `excel.ts` | Parse `.xlsx` sheets → category folders + test markdown; sync changes back; maintain `.sync-meta.json` checksums |\n| `maestro-yaml.ts` | Parse YAML → human-readable steps; detect fragile selectors (pixel taps, long sleeps, index selectors); extract QA Plan ID |\n| `maestro-results.ts` | Parse Maestro CLI output (commands.json, status.json, report.xml) → TestRun records |\n| `calculator-config.ts` | Parse `calculatorConfig.json` field tree; build coverage matrix vs YAML flows and test markdown |\n\n### Analyzer (`src/analyzer.ts`)\n\n| Function | What it does |\n|----------|-------------|\n| `calculateFlakiness(history, window=10)` | Score = transitions ÷ (window−1); 1.0 = perfectly alternating, 0.0 = always same |\n| `detectFlakyTests(tests, runs, threshold=0.4)` | Returns tests with score ≥ threshold, sorted descending |\n| `analyzeSelectors(yaml)` | Flags `point{}` taps, `sleep >3s`, `index:` selectors |\n| `findCoverageGaps(tests)` | Flags: no maestroFlow, not run >7 days, device coverage <50% |\n| `buildActivityFeed(bugs, runs, limit=20)` | Recent events: bug_opened, test_failed, run_completed |\n\n### Generators (`src/generators/`)\n\n| File | Responsibility |\n|------|---------------|\n| `maestro-flows.ts` | Generate complete Maestro YAML per calculator section; topological sort on `visibleIf` dependencies; pick test values from field ranges |\n| `test-data.ts` | Select sensible test values: midpoint of expectedRange, first non-default singleSelect, etc. |\n| `dependency-graph.ts` | Build field dependency map; count which option values trigger the most dependents |\n\n---\n\n## Data Model\n\n### File Layout\n\n```\ndata/\n  projects.json                  ← { activeProject: \"micro-air\", projects: [...] }\n  {projectId}/\n    config.json                  ← ProjectConfig\n    tests/\n      {category-slug}/\n        _category.yaml           ← { id, name, sheet, order }\n        tc-{id}-{slug}.md        ← TestCase (frontmatter + markdown body)\n    bugs/\n      bug-{NNN}.md               ← Bug (frontmatter + markdown body)\n    runs/\n      run-{id}.yaml              ← TestRun (pass/fail counts + per-test results)\n    screenshots/\n      {bugId}/\n        failure-{device}.png\n```\n\n### Key Types\n\n```typescript\nTestStatus  = 'pass' | 'fail' | 'flaky' | 'not-run' | 'in-progress'\nPriority    = 'P1' | 'P2' | 'P3' | 'P4'\nBugStatus   = 'open' | 'investigating' | 'fixed' | 'closed'\nPlatform    = 'ios' | 'android'\n```\n\n### ProjectConfig fields\n\n```typescript\n{\n  id: string           // slug (e.g. \"micro-air\")\n  name: string\n  excel?: { source: string }              // path to .xlsx\n  maestro?: {\n    androidPath: string                   // absolute path to Android flows\n    iosPath: string                       // absolute path to iOS flows\n    loginFlow?: string                    // shared login.yaml path\n  }\n  env?: Record<string, string>           // TEST_EMAIL, TEST_PASSWORD, etc.\n  devices: Device[]\n  appId?: string                         // bundle ID\n  jira?: {\n    cloudId: string\n    projectKey: string\n    jql?: string\n    email?: string\n    token: string\n    baseUrl?: string\n  }\n  appMap?: string                        // Mermaid flowchart string\n  mediaPath?: string                     // path outside repo for run videos\n}\n```\n\n---\n\n## Maestro CLI Integration\n\n**Direct spawn** (run a flow by path):\n```\nspawn('maestro', ['test', flowPath], { env: { ...process.env, ...projectEnvVars } })\n```\n\n**Via Claude Code → MCP** (run with agent supervision):\n```\nspawn('claude', ['--print', '--model', 'claude-sonnet-4-6',\n  'Run the Maestro flow at path \"...\". Use mcp__maestro__run_flow_files...'\n])\n```\nParses `{\"status\":\"pass\"}` or `{\"status\":\"fail\",\"error\":\"...\"}` from the last line of Claude's output.\n\n**Version check:**\n```\nexecSync('maestro --version', { timeout: 5000 })\n```\n\n---\n\n## Jira Integration\n\n**Auth:** Bearer token (PAT) or Basic auth (base64 email:token)\n\n**Endpoints used:**\n```\nGET  https://api.atlassian.com/ex/jira/{cloudId}/rest/api/3/issue/{issueKey}\nPOST https://api.atlassian.com/ex/jira/{cloudId}/rest/api/3/issue\nPUT  https://api.atlassian.com/ex/jira/{cloudId}/rest/api/3/issue/{issueKey}\n```\n\n**Fields synced:** summary, status, assignee, priority, labels, last comment, issue key, URL\n\n---\n\n## Non-Functional Requirements\n\n| Concern | Approach |\n|---------|---------|\n| Offline-first | All data lives in local markdown files — no network required to use the dashboard |\n| No auth | Single-user local tool until Phase 7 (SaaS) |\n| No database | Markdown files are the source of truth — human-readable and git-trackable |\n| Hot reload | File system reads on every API call — no in-memory cache to invalidate |\n| Port conflict | Configurable via `--port` flag or `PORT` env var |\n| Process isolation | Maestro and Claude Code spawn as child processes; server stays up if they crash |\n\n---\n\n## Environment Variables\n\n| Variable | Project | Purpose |\n|----------|---------|---------|\n| `PORT` | — | Override default port 3000 |\n| `TEST_EMAIL` | micro-air | Main test account email |\n| `TEST_PASSWORD` | micro-air | Main test account password |\n| `DESTROY_EMAIL` | micro-air | Destructive test account (flows 12–14) |\n| `DESTROY_PASSWORD` | micro-air | Destructive test account password |\n| `OTP_EMAIL` | micro-air | OTP email for password reset flows |\n| `CARD_NUMBER` | micro-air | Sandbox payment card (subscription flow) |\n| `TEST_USERNAME` | sts | STS calculator test username |\n| `TEST_PASSWORD` | sts | STS calculator test password |\n| `APP_ID_ANDROID` | sts | `com.sts.calculator` |\n| `APP_ID_IOS` | sts | `com.sts.calculator.dev` |\n\n---\n\n## Build + Run\n\n```bash\nnpm run build       # tsc → dist/\nnpm start           # node dist/index.js serve\nnpm run dev         # ts-node (dev, no compile step)\n\nmorbius serve --port 3000\nmorbius import \"QA Plan.xlsx\"\nmorbius export \"QA Plan.xlsx\"\nmorbius sync --android ../flows/android --ios ../flows/ios\nmorbius ingest .maestro-output/ --device pixel-7\nmorbius validate\nmorbius generate-flows --config calculatorConfig.json --output flows/ --platform ios\n```\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created via reverse-engineer |\n"},{"rel":"brief.md","content":"# Product Brief: Morbius\n\n**Version:** 1.0\n**Updated:** 2026-04-21\n**Project:** morbius\n**PM Persona:** pragmatist\n**Sources:** README.md, ROADMAP.md\n\n---\n\n## Problem Statement\n\nQA teams building mobile apps have no unified, AI-native workspace that connects test planning, automated test execution, bug tracking, and AI-assisted test creation. They stitch together Excel test plans, Maestro YAML files, Jira tickets, and local CLI tools — with no single view of what's passing, what's failing, and what needs attention. Morbius gives every team member — QA leads, developers, and PMs — a browser-based dashboard backed by an AI agent that writes tests, runs them on real devices, and creates detailed bug reports automatically.\n\n## Goals & Success Metrics\n\n| Goal | Metric | Target |\n|------|--------|--------|\n| Ship BrowserStack cloud execution | All 14 flows runnable on real cloud devices from dashboard | Phase 3 complete |\n| Enable team collaboration | Multi-user access to shared test board and bug tracker | Phase 7 launch |\n| Reduce test maintenance overhead | Self-healing fix rate on selector-change failures | 70% auto-resolved by Phase 6 |\n| Drive SaaS adoption | Paying teams on hosted platform | 20 teams within 6 months of Phase 7 launch |\n\n## Personas\n\n| Persona | Role | Context | Goals | Pain Points |\n|---------|------|---------|-------|-------------|\n| **The QA Lead** | qa-lead | Manages test plans, triages failures, coordinates runs | Maintain clear pass rate visibility; catch regressions before ship; keep Excel plan in sync | Manually updating spreadsheets after every run; no flakiness visibility; bugs scattered across Jira and Slack |\n| **The Developer** | developer | Writes code, runs smoke tests, reviews bug reports | Quick feedback after code changes; see what broke and why without digging through YAML | Slow test feedback loop; inconsistent emulator vs. real-device results; debugging Maestro selectors instead of fixing bugs |\n| **The PM Stakeholder** | viewer | Reads dashboards, attends releases | Know overall QA health without a meeting; see which release-blockers are open | No visibility without asking QA; unclear what \"testing is done\" means before a release |\n\n## Product Areas\n\n| Area | Description |\n|------|-------------|\n| Dashboard & Test Board | Kanban view of all test cases by category and status; overall health metrics and pass rate |\n| Test Execution | Run Maestro (and future Appium/Detox) flows on local emulators and BrowserStack cloud devices |\n| Bug Tracking | Create, triage, and resolve bugs from the dashboard; sync with Jira |\n| AI Agent | Claude-powered agent that writes test flows, runs them, self-heals selector failures, and creates bug reports |\n| Integrations | BrowserStack, Jira, Linear, GitHub/Slack, Excel two-way sync |\n| SaaS Platform | Multi-tenant hosted service with auth, RBAC, PostgreSQL backend, and billing |\n\n## Scope\n\n### In Scope\n\n- Phase 3 (Active): BrowserStack device cloud integration — run flows on real devices, pull results and screenshots, auto-create bugs on failure\n- Phase 4: Settings page + integrations hub (Jira, Linear, GitHub, Slack, BrowserStack config UI)\n- Phase 5: Multi-framework adapters — Appium and Detox alongside Maestro\n- Phase 6: Claude API integration replacing local CLI; self-healing selector recovery; Tambo.ai chat UI\n- Phase 7: SaaS platform — OAuth auth, multi-tenant orgs, RBAC, PostgreSQL, S3, billing\n- Phase 8: Visual regression, CI/CD integration, analytics dashboards, PDF reports\n\n### Out of Scope\n\n- Phases 1–2.5 are complete (MVP dashboard, 14 Maestro flows, multi-project support, Jira sync, Excel import/export, 9 Claude Code skills) — these are not work items, they are shipped baseline\n- Web scraping or browser-based testing (mobile-only scope through Phase 5)\n\n## Constraints\n\n- Local-first until Phase 7 — data stored as markdown files, runs on localhost:3000\n- Claude Code CLI required for agent features until Phase 6 (Claude API replaces it)\n- Maestro CLI required for test execution until Phase 5 introduces additional adapters\n- No user auth until Phase 7 — single-user local tool in all prior phases\n\n## Stakeholders\n\n| Name | Role | Company | Contact | Notes |\n|------|------|---------|---------|-------|\n| | | | | |\n\n## Open Questions\n\n- BrowserStack only for Phase 3, or also AWS Device Farm / Sauce Labs?\n- Tambo.ai for Phase 6 chat UI — evaluate build-vs-integrate decision before E-004 stories are written\n- Phase 7 pricing tiers — working assumption: Free / Pro / Enterprise per ROADMAP.md; needs sign-off\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created from README.md + ROADMAP.md |\n"},{"rel":"design.md","content":"# Design Brief: Morbius\n\n**Project:** morbius\n**Version:** 1.0\n**Updated:** 2026-04-21\n\n---\n\n## Design Philosophy\n\nMorbius is a **developer-first tool**. The design is deliberately monochrome — the only color in the UI is status. Pass is green, fail is red, flaky is amber. Everything else is black, white, and grey. This means test results stand out immediately on any screen, in any context, without visual noise competing for attention.\n\n**Three rules:**\n1. Color = status only. Never use color for decoration.\n2. Typography does the heavy lifting. Weight and size create hierarchy, not color.\n3. Dense information over empty space. QA boards have a lot of data — pack it in legibly.\n\n---\n\n## Color System\n\nColors are defined in OKLCh (perceptual color space) as CSS variables, with full dark and light themes.\n\n### Dark Theme (default)\n\n| Token | OKLCh | Approx Hex | Use |\n|-------|-------|-----------|-----|\n| `--bg` | oklch(0.16 0.01 270) | `#0a0a0a` | Page background |\n| `--bg-elev` | oklch(0.19 0.012 270) | `#141414` | Cards, panels |\n| `--bg-elev-2` | oklch(0.22 0.014 270) | `#1e1e1e` | Nested surfaces |\n| `--bg-hover` | oklch(0.24 0.016 270) | `#282828` | Hover states |\n| `--bg-sunken` | oklch(0.13 0.008 270) | `#060606` | Inputs, code blocks |\n| `--border` | oklch(0.28 0.012 270) | `#363636` | Subtle dividers |\n| `--border-strong` | oklch(0.36 0.014 270) | `#4d4d4d` | Active/focus borders |\n| `--fg` | oklch(0.98 0.002 270) | `#fafafa` | Primary text |\n| `--fg-muted` | oklch(0.75 0.008 270) | `#c0c0c0` | Secondary text |\n| `--fg-dim` | oklch(0.56 0.01 270) | `#8f8f8f` | Tertiary/placeholder |\n| `--fg-faint` | oklch(0.42 0.01 270) | `#6a6a6a` | Disabled/hint |\n\n### Light Theme\n\n| Token | OKLCh | Approx Hex | Use |\n|-------|-------|-----------|-----|\n| `--bg` | oklch(0.985 0.003 90) | `#fafaf8` | Page background |\n| `--fg` | oklch(0.18 0.01 270) | `#2d2d2d` | Primary text |\n| *(other tokens scale accordingly)* | | | |\n\n### Status Colors (same in both themes)\n\n| Token | OKLCh | Hex | Use |\n|-------|-------|-----|-----|\n| `--ok` | oklch(0.72 0.16 155) | `#45E0A8` | Pass — test passed, bug fixed |\n| `--fail` | oklch(0.68 0.22 25) | `#E5484D` | Fail — test failed, critical bug |\n| `--warn` | oklch(0.78 0.15 75) | `#F5A623` | Flaky — intermittent, needs attention |\n| `--info` | oklch(0.72 0.15 235) | `#4A90E2` | Info — informational, Jira-synced |\n| `--accent` | oklch(0.68 0.17 285) | `#A78BFA` | Accent — active state, CTA (violet default) |\n\n**Rule:** Status colors are used only for badges, progress bars, health indicators, and pass/fail states. Never use them for backgrounds, borders, or decorative elements.\n\n---\n\n## Typography\n\n| Role | Font | Weights | Usage |\n|------|------|---------|-------|\n| UI / Body | **Inter** | 400, 500, 600, 700 | All labels, body text, buttons, nav |\n| Code / YAML | **JetBrains Mono** | 400, 500, 600 | YAML viewer, code blocks, IDs, paths |\n\nSource: Google Fonts (preconnect + stylesheet in `<head>`).\n\n**Scale:**\n- `11px / 500` — metadata, timestamps, badges\n- `12px / 400` — secondary labels, table cells\n- `13px / 500` — card titles, field labels\n- `14px / 400` — body text, notes\n- `16px / 600` — section headings\n- `20px / 700` — tab headings, metric values\n- `32px+ / 700` — hero numbers (overall pass %)\n\n---\n\n## Layout + Navigation\n\n**Sidebar** (desktop): Fixed left sidebar with project switcher at top, 7 tab icons + labels, theme toggle at bottom. Width: ~200px.\n\n**Top nav** (mobile): Collapses sidebar to icon-only top bar with number shortcut labels.\n\n**Keyboard shortcuts:**\n| Key | Action |\n|-----|--------|\n| `1` | Dashboard tab |\n| `2` | Test Cases tab |\n| `3` | Bugs tab |\n| `4` | Devices tab |\n| `5` | Runs tab |\n| `6` | Maestro tab |\n| `7` | Settings tab |\n| `⌘K` or `/` | Global search (fuse.js) |\n| `Esc` | Close any open panel |\n\n---\n\n## Component Patterns\n\n### Status Pills\nRounded badges showing test/bug status. Color-coded by `--ok` / `--fail` / `--warn`. Click to update inline.\n\n```\n[ ● Pass ]   [ ● Fail ]   [ ◑ Flaky ]   [ — Not Run ]   [ ⟳ In Progress ]\n```\n\n### Kanban Columns\nCards grouped by category (Test Cases) or status (Bugs). Column headers show count. Drag-to-reorder within category. Empty columns auto-hide when filters are active.\n\n### Detail Drawer\nSlides in from the right when a card is clicked. Shows: full title, linked IDs, all fields, screenshot (if bug), step list (if test), changelog table, notes textarea (auto-save). Has a chat toggle to open the Claude Code pane.\n\n### Health Bars\nPer-category horizontal bars: green segment (pass) + red segment (fail) + amber segment (flaky) + grey (not-run). Percentage label on right.\n\n### Metric Cards\nSingle large number with label and trend direction. Used on Dashboard for: overall pass %, open bugs, total tests, coverage %.\n\n### YAML Viewer\nSyntax-highlighted code block (JetBrains Mono). Fragile selector warnings shown as amber inline annotations. Run button top-right. Human-readable step list alongside raw YAML.\n\n### Live Run Log\nStreams Maestro output via WebSocket. Steps appear line-by-line with status icon (✓ pass, ✗ fail, ⟳ running). Auto-scrolls to bottom.\n\n### Chat Drawer\nSlide-out panel from the right. Input at bottom, streaming response above. Suggestion chips for quick actions. Connects to `/ws/chat`.\n\n---\n\n## Dashboard Views\n\n### 1 — Dashboard Overview\nGrid of metric cards + category health bars + flaky test list + recent activity feed + coverage gap warnings. PM-facing. No interaction except clicking through to detail.\n\n### 2 — Test Cases Kanban\nFilter bar (status chips + scenario type chips) + sort bar (ID / Status / Priority / Name / Type). Board mode (cards) or Row mode (list). Cards show: ID, title, status pill, priority badge, platform icons, maestro flow indicator.\n\n### 3 — Bug Board\nFour columns: Open / Investigating / Fixed / Closed. Bug cards show: title, linked test, device, priority badge, screenshot thumbnail, Jira badge (\"J\") if synced. Click to open detail drawer.\n\n### 4 — Device Matrix\nScrollable grid: devices as columns, tests as rows. Cell = coloured dot (pass/fail/not-run). Column header = device name + pass rate. Sortable by test ID, name, or pass rate.\n\n### 5 — Runs History\nList of run records: run ID, timestamp, device, pass/fail count, duration. Click to expand per-test results. Media gallery tab shows screenshots and video recordings.\n\n### 6 — Maestro Flows\nFile browser (Android / iOS toggle). Flow cards: name, step count, linked test IDs, fragile selector warning count. Click to open YAML viewer + human-readable steps. Run button per flow. Full suite runner at top.\n\n### 7 — Settings\nSectioned form: Profile → Workspace → Integrations → Devices → Maestro → Test Runs → Appearance → Data → Danger Zone. All changes POST to `/api/config/update`. Theme toggle and accent colour picker in Appearance.\n\n---\n\n## UI States\n\nEvery interactive element must handle:\n- **Default** — resting state\n- **Hover** — `--bg-hover` background, cursor pointer\n- **Active/Focus** — `--border-strong` outline, `--accent` highlight\n- **Loading** — spinner + elapsed time (for run buttons); skeleton shimmer (for data loads)\n- **Empty** — placeholder message with action hint (e.g. \"No bugs yet — run a test suite to get started\")\n- **Error** — red inline message with retry option\n\n---\n\n## Accessibility\n\n- Keyboard navigable: all tabs, buttons, and form fields reachable via Tab/Enter\n- ARIA labels on icon-only buttons\n- Status colors never rely on color alone — always paired with text label or icon\n- Minimum contrast: 4.5:1 for body text, 3:1 for large text and UI components\n\n---\n\n## Coding Agent Checklist\n\nWhen implementing new UI in `src/server.ts`:\n- [ ] Use CSS variables (`--bg`, `--fg`, etc.) — never hardcode hex values\n- [ ] Status colors only for status (`--ok`, `--fail`, `--warn`) — not for decorative use\n- [ ] New components follow the existing inline React pattern (no separate files, no JSX transpile step — use `h()` or `React.createElement()`)\n- [ ] All new routes follow the existing `if (pathname === '/api/...')` pattern in the request handler\n- [ ] Changelog entries written for every field mutation (test case or bug)\n- [ ] Empty/loading/error states implemented for every new data view\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created via reverse-engineer |\n"},{"rel":"epics/E-001-core-dashboard-foundation/E-001.md","content":"# Epic: Core Dashboard + Data Foundation\n\n**ID:** E-001\n**Project:** morbius\n**Stage:** Draft\n**Version:** 1.0\n**Created:** 2026-04-21\n**Updated:** 2026-04-21\n\n---\n\n## Outcome\n\nTeams have a local-first, file-backed QA workspace accessible from any browser — a single HTTP server that reads markdown files and serves a full dashboard with no external database or cloud dependency.\n\n## Success Metric\n\n| Metric | Baseline | Target |\n|--------|----------|--------|\n| Dashboard loads from cold start | N/A | Under 2 seconds on localhost |\n| Projects switchable from UI | 0 | Multi-project registry working |\n\n## Primary Persona\n\nThe Developer\n\n## Dependencies\n\n- None — this is the foundation layer\n\n## Stories\n\n| ID | Title | Status | Stage |\n|----|-------|--------|-------|\n| S-001-001 | Single HTTP Server + Dashboard Shell | Done | Ready |\n| S-001-002 | Markdown File Database (test cases, bugs, runs) | Done | Ready |\n| S-001-003 | Multi-Project Registry + Active Project Switching | Done | Ready |\n| S-001-004 | Dashboard Overview Tab (health %, category bars, activity feed) | Done | Ready |\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created via reverse-engineer — documents Phase 1 completed work |\n"},{"rel":"epics/E-001-core-dashboard-foundation/S-001-001-server-dashboard-shell.md","content":"# Single HTTP Server + Dashboard Shell\n\n**ID:** S-001-001\n**Project:** morbius\n**Epic:** E-001\n**Stage:** Ready\n**Status:** Done\n**Priority:** P0\n**Version:** 1.0\n**Created:** 2026-04-21\n**Updated:** 2026-04-21\n\n---\n\n## Story\n\nAs a developer, I want a single Node.js HTTP server that serves the full Morbius dashboard as embedded HTML/CSS/JS, so the tool runs with `node dist/index.js serve` and opens in any browser with no build step.\n\n## Acceptance Criteria\n\n**Given** the server is started on port 3000  \n**When** I open `http://localhost:3000`  \n**Then** the full dashboard UI renders with sidebar navigation, 7 tabs, and the active project loaded\n\n**Given** the server is running  \n**When** a file in `data/` changes  \n**Then** the dashboard reflects updated data on next API call (file-based, no caching layer)\n\n## Implementation Notes\n\n- Single TypeScript file server (`src/server.ts`) with all HTML/CSS/JS embedded as template literals\n- No React, no build pipeline for the client — raw DOM manipulation\n- Zinc-palette dark theme; black/white base with status-only color (pass=#45E0A8, fail=#E5484D, flaky=#F5A623)\n- Keyboard shortcuts: `1-6` jump between tabs, `⌘K` or `/` for search, `Esc` to close panels\n\n## Do Not Do\n\n- Do not introduce a separate frontend build step (Vite, webpack, etc.)\n- Do not require a database — all data reads from markdown files in `data/`\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created via reverse-engineer |\n"},{"rel":"epics/E-001-core-dashboard-foundation/S-001-002-markdown-database.md","content":"# Markdown File Database\n\n**ID:** S-001-002\n**Project:** morbius\n**Epic:** E-001\n**Stage:** Ready\n**Status:** Done\n**Priority:** P0\n**Version:** 1.0\n**Created:** 2026-04-21\n**Updated:** 2026-04-21\n\n---\n\n## Story\n\nAs a developer, I want all test cases, bugs, and run results stored as markdown files with YAML frontmatter, so the data is human-readable, git-trackable, and requires no database setup.\n\n## Acceptance Criteria\n\n**Given** a test case is created or updated  \n**When** the file is written  \n**Then** it contains a YAML frontmatter block (id, title, status, priority, platforms, tags, deviceResults, changelog) and a markdown body (steps, acceptance criteria, notes, device results table)\n\n**Given** any field on a test case or bug changes  \n**When** the file is saved  \n**Then** a changelog entry is appended with timestamp, field name, old value, new value, and actor\n\n**Given** the server starts  \n**When** it loads a project  \n**Then** all test cases are read from `data/{project}/tests/{category}/*.md` and all bugs from `data/{project}/bugs/*.md`\n\n## Do Not Do\n\n- Do not introduce a SQL or NoSQL database\n- Do not use a single monolithic JSON file per project (one markdown file per entity)\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created via reverse-engineer |\n"},{"rel":"epics/E-001-core-dashboard-foundation/S-001-003-multi-project-registry.md","content":"# Multi-Project Registry + Active Project Switching\n\n**ID:** S-001-003\n**Project:** morbius\n**Epic:** E-001\n**Stage:** Ready\n**Status:** Done\n**Priority:** P1\n**Version:** 1.0\n**Created:** 2026-04-21\n**Updated:** 2026-04-21\n\n---\n\n## Story\n\nAs a QA lead, I want to switch between multiple app projects (Micro-Air, STS, Shorr) from the sidebar, so the dashboard loads the correct test cases, bugs, and config for the selected project without restarting the server.\n\n## Acceptance Criteria\n\n**Given** multiple projects are registered in `data/projects.json`  \n**When** I click a project name in the sidebar  \n**Then** the dashboard reloads with that project's data and all tabs reflect the new project\n\n**Given** a new project is created  \n**When** I run `POST /api/projects/create`  \n**Then** a new folder is created under `data/` with config.json and empty test/bug/runs directories\n\n**Given** the server starts  \n**When** no active project is set  \n**Then** the first registered project is loaded automatically\n\n## Do Not Do\n\n- Do not require a server restart to switch projects\n- Do not mix test cases or bugs from different projects in any view\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created via reverse-engineer |\n"},{"rel":"epics/E-001-core-dashboard-foundation/S-001-004-dashboard-overview.md","content":"# Dashboard Overview Tab\n\n**ID:** S-001-004\n**Project:** morbius\n**Epic:** E-001\n**Stage:** Ready\n**Status:** Done\n**Priority:** P1\n**Version:** 1.0\n**Created:** 2026-04-21\n**Updated:** 2026-04-21\n\n---\n\n## Story\n\nAs a PM stakeholder, I want a dashboard overview tab that shows overall pass rate, per-category health bars, flaky test rankings, device coverage, recent activity, and coverage gaps — so I can understand QA health at a glance without opening any individual test.\n\n## Acceptance Criteria\n\n**Given** tests have run results  \n**When** I open the Dashboard tab  \n**Then** I see: overall pass % (single number), category health bars (pass/fail/flaky per category), top flaky tests, device coverage by device, last 20 activity events, and coverage gap warnings\n\n**Given** no tests have been run yet  \n**When** I open the Dashboard tab  \n**Then** the pass rate shows 0% and coverage gaps highlight all tests as not-run\n\n**Given** a test fails  \n**When** the activity feed refreshes  \n**Then** the failure appears in the Recent Activity section within the same session\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created via reverse-engineer |\n"},{"rel":"epics/E-002-test-case-management/E-002.md","content":"# Epic: Test Case Management\n\n**ID:** E-002\n**Project:** morbius\n**Stage:** Draft\n**Version:** 1.0\n**Created:** 2026-04-21\n**Updated:** 2026-04-21\n\n---\n\n## Outcome\n\nQA leads can import an Excel test plan into Morbius, track status on a Kanban board, update results inline, and export changes back to Excel — with every change logged in a per-file changelog.\n\n## Success Metric\n\n| Metric | Baseline | Target |\n|--------|----------|--------|\n| Excel import round-trip (import → update → export) | Manual copy-paste | Full round-trip working with all column types |\n| Test case status updates tracked | 0% | Every status change logged with timestamp and actor |\n\n## Primary Persona\n\nThe QA Lead\n\n## Dependencies\n\n- E-001 (Core Dashboard + Data Foundation)\n\n## Stories\n\n| ID | Title | Status | Stage |\n|----|-------|--------|-------|\n| S-002-001 | Import Test Cases from Excel | Done | Ready |\n| S-002-002 | Export Test Changes Back to Excel | Done | Ready |\n| S-002-003 | Test Cases Kanban Board (Board + Row views) | Done | Ready |\n| S-002-004 | Inline Status Update + Per-File Changelog | Done | Ready |\n| S-002-005 | Sync Maestro YAML Flows to Test Cases by ID | Done | Ready |\n| S-002-006 | Data Validation (broken links, orphaned files, stale tests) | Done | Ready |\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created via reverse-engineer — documents Phase 1 completed work |\n"},{"rel":"epics/E-002-test-case-management/S-002-001-import-from-excel.md","content":"# Import Test Cases from Excel\n\n**ID:** S-002-001\n**Project:** morbius\n**Epic:** E-002\n**Stage:** Ready\n**Status:** Done\n**Priority:** P0\n**Version:** 1.0\n**Created:** 2026-04-21\n**Updated:** 2026-04-21\n\n---\n\n## Story\n\nAs a QA lead, I want to run `morbius import <xlsx-path>` and have all test cases from the Excel QA plan imported as markdown files, so the team never manually copies data between Excel and Morbius.\n\n## Acceptance Criteria\n\n**Given** an Excel file with multiple sheets (one per test category)  \n**When** I run `morbius import \"QA Plan.xlsx\"`  \n**Then** each sheet becomes a category folder under `data/{project}/tests/` and each row becomes a `tc-{id}-{slug}.md` file with all columns mapped (ID, Steps, AC, Scenario, Status, Notes, Device Results)\n\n**Given** the Excel has a \"Summary\", \"Index\", or \"Template\" sheet  \n**When** import runs  \n**Then** those sheets are silently skipped\n\n**Given** the import has run before  \n**When** I run import again  \n**Then** existing test case files are updated (not duplicated) using the sync-meta.json checksum registry\n\n**Given** device result columns (iPad, iPhone, Android Tab, Phone) exist  \n**When** imported  \n**Then** device results are stored as a structured array in the frontmatter, not as raw text\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created via reverse-engineer |\n"},{"rel":"epics/E-002-test-case-management/S-002-002-export-to-excel.md","content":"# Export Test Changes Back to Excel\n\n**ID:** S-002-002\n**Project:** morbius\n**Epic:** E-002\n**Stage:** Ready\n**Status:** Done\n**Priority:** P0\n**Version:** 1.0\n**Created:** 2026-04-21\n**Updated:** 2026-04-21\n\n---\n\n## Story\n\nAs a QA lead, I want to run `morbius export <xlsx-path>` to write all status, priority, and notes changes from the dashboard back into the original Excel file, so the Excel QA plan stays in sync with what the team has been tracking in Morbius.\n\n## Acceptance Criteria\n\n**Given** test cases have been updated in the dashboard  \n**When** I run `morbius export \"QA Plan.xlsx\"`  \n**Then** the status, priority, and notes columns are updated in the correct rows of the correct sheets, and all other cells are left untouched\n\n**Given** a test case exists in Morbius but not in the Excel  \n**When** export runs  \n**Then** that test is skipped (no new rows are inserted)\n\n**Given** the export completes  \n**When** I open the Excel  \n**Then** all updated cells reflect the latest values from the markdown files\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created via reverse-engineer |\n"},{"rel":"epics/E-002-test-case-management/S-002-003-test-cases-kanban.md","content":"# Test Cases Kanban Board\n\n**ID:** S-002-003\n**Project:** morbius\n**Epic:** E-002\n**Stage:** Ready\n**Status:** Done\n**Priority:** P0\n**Version:** 1.0\n**Created:** 2026-04-21\n**Updated:** 2026-04-21\n\n---\n\n## Story\n\nAs a tester, I want a Kanban board view of all test cases grouped by category, with filter controls for status and scenario type, so I can see at a glance which tests are passing, failing, flaky, or not yet run.\n\n## Acceptance Criteria\n\n**Given** test cases are loaded  \n**When** I open the Test Cases tab  \n**Then** cards are grouped by category with pass/fail/flaky/not-run/in-progress columns\n\n**Given** I apply a status filter (e.g. \"Fail\")  \n**When** the filter is active  \n**Then** only cards with that status are shown; empty columns auto-hide\n\n**Given** I toggle to Row mode  \n**When** viewing the board  \n**Then** test cases are shown as a flat sortable list (sort by ID, Status, Priority, Name, or Type)\n\n**Given** I drag a card within a category  \n**When** I drop it in a new position  \n**Then** the order is persisted to the markdown file and a changelog entry is written\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created via reverse-engineer |\n"},{"rel":"epics/E-002-test-case-management/S-002-004-inline-status-changelog.md","content":"# Inline Status Update + Per-File Changelog\n\n**ID:** S-002-004\n**Project:** morbius\n**Epic:** E-002\n**Stage:** Ready\n**Status:** Done\n**Priority:** P1\n**Version:** 1.0\n**Created:** 2026-04-21\n**Updated:** 2026-04-21\n\n---\n\n## Story\n\nAs a tester, I want to click the status pill on any test card and update it instantly, with the change automatically logged in the file's changelog, so the history of every test is auditable without a separate tracking system.\n\n## Acceptance Criteria\n\n**Given** I click a status pill on a test card  \n**When** I select a new status  \n**Then** the card updates immediately in the UI and a `POST /api/test/update` writes the change to the markdown file\n\n**Given** a status update is saved  \n**When** I open the test case detail  \n**Then** the changelog table shows: timestamp, field (\"status\"), old value, new value, actor\n\n**Given** I update notes on a test  \n**When** I click away  \n**Then** the notes auto-save and appear in the changelog as a notes update\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created via reverse-engineer |\n"},{"rel":"epics/E-002-test-case-management/S-002-005-sync-maestro-flows.md","content":"# Sync Maestro YAML Flows to Test Cases by ID\n\n**ID:** S-002-005\n**Project:** morbius\n**Epic:** E-002\n**Stage:** Ready\n**Status:** Done\n**Priority:** P1\n**Version:** 1.0\n**Created:** 2026-04-21\n**Updated:** 2026-04-21\n\n---\n\n## Story\n\nAs a developer, I want to run `morbius sync --android <path> --ios <path>` to automatically link each Maestro YAML flow to its matching test case by QA Plan ID, so test cards on the board show which tests have automation and which ones don't.\n\n## Acceptance Criteria\n\n**Given** Maestro YAML files have a comment with QA Plan ID (e.g. `# QA Plan ID: TC-2.01`)  \n**When** I run `morbius sync`  \n**Then** the matching test case markdown files are updated with the YAML flow path in frontmatter\n\n**Given** both Android and iOS paths are provided  \n**When** sync runs  \n**Then** `maestroFlowAndroid` and `maestroFlowIOS` are set independently on each test case\n\n**Given** a flow exists but no test case matches the ID  \n**When** sync runs  \n**Then** the unmatched flow is listed as a warning (not an error)\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created via reverse-engineer |\n"},{"rel":"epics/E-002-test-case-management/S-002-006-data-validation.md","content":"# Data Validation + Integrity Checks\n\n**ID:** S-002-006\n**Project:** morbius\n**Epic:** E-002\n**Stage:** Ready\n**Status:** Done\n**Priority:** P2\n**Version:** 1.0\n**Created:** 2026-04-21\n**Updated:** 2026-04-21\n\n---\n\n## Story\n\nAs a developer, I want to run `morbius validate` and get a report of all data integrity issues — broken Maestro paths, orphaned screenshots, missing linked tests, stale tests — so I can catch configuration drift before it causes silent failures.\n\n## Acceptance Criteria\n\n**Given** a test case has a maestroFlow path that no longer exists  \n**When** I run `morbius validate`  \n**Then** it is reported as a broken Maestro flow link\n\n**Given** a bug has a screenshot path that doesn't exist on disk  \n**When** I run `morbius validate`  \n**Then** it is reported as a missing screenshot\n\n**Given** a test has not been run in more than 7 days  \n**When** I run `morbius validate`  \n**Then** it is flagged as stale\n\n**Given** all data is clean  \n**When** I run `morbius validate`  \n**Then** the output shows \"No issues found\"\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created via reverse-engineer |\n"},{"rel":"epics/E-003-test-execution-maestro/E-003.md","content":"# Epic: Test Execution + Maestro Integration\n\n**ID:** E-003\n**Project:** morbius\n**Stage:** Draft\n**Version:** 1.0\n**Created:** 2026-04-21\n**Updated:** 2026-04-21\n\n---\n\n## Outcome\n\nDevelopers and QA leads can run any Maestro flow — or the full test suite — directly from the browser dashboard and watch output stream live, with all results saved to run history automatically.\n\n## Success Metric\n\n| Metric | Baseline | Target |\n|--------|----------|--------|\n| Flows executable from browser (vs. terminal only) | 0% | Any YAML flow runnable from Maestro tab |\n| Run history retained | 0 | All runs logged with pass/fail/duration |\n\n## Primary Persona\n\nThe Developer\n\n## Dependencies\n\n- E-001 (Core Dashboard + Data Foundation)\n- E-002 (Test Case Management) — test IDs must be synced before run results link correctly\n\n## Stories\n\n| ID | Title | Status | Stage |\n|----|-------|--------|-------|\n| S-003-001 | Maestro Tab — YAML Flow Browser + Human-Readable Step View | Done | Ready |\n| S-003-002 | Run Individual Flow from Dashboard | Done | Ready |\n| S-003-003 | Live Output Streaming via WebSocket | Done | Ready |\n| S-003-004 | Full Suite Runner (run all flows in sequence with progress) | Done | Ready |\n| S-003-005 | Test Run History + Ingest Maestro CLI Output | Done | Ready |\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created via reverse-engineer — documents Phase 2 completed work |\n"},{"rel":"epics/E-003-test-execution-maestro/S-003-001-maestro-flow-viewer.md","content":"# Maestro Tab — Flow Browser + Human-Readable Step View\n\n**ID:** S-003-001\n**Project:** morbius\n**Epic:** E-003\n**Stage:** Ready\n**Status:** Done\n**Priority:** P1\n**Version:** 1.0\n**Created:** 2026-04-21\n**Updated:** 2026-04-21\n\n---\n\n## Story\n\nAs a developer, I want a Maestro tab that lists all YAML flows from the configured Android and iOS paths, shows a human-readable breakdown of each flow's steps, and highlights fragile selectors — so anyone on the team can understand what a test does without reading raw YAML.\n\n## Acceptance Criteria\n\n**Given** Android and iOS flow paths are configured  \n**When** I open the Maestro tab  \n**Then** all YAML files are listed as a file browser, switchable between Android and iOS\n\n**Given** I click a flow  \n**When** it opens  \n**Then** I see: human-readable step list (tapOn → \"Tap on X\", inputText → \"Enter: Y\"), the raw YAML with syntax highlighting, and any selector warnings (pixel taps, hardcoded sleeps >3s, index selectors)\n\n**Given** a flow references another flow via `runFlow`  \n**When** displayed  \n**Then** the referenced flow is shown as a linked step\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created via reverse-engineer |\n"},{"rel":"epics/E-003-test-execution-maestro/S-003-002-run-flow-from-dashboard.md","content":"# Run Individual Flow from Dashboard\n\n**ID:** S-003-002\n**Project:** morbius\n**Epic:** E-003\n**Stage:** Ready\n**Status:** Done\n**Priority:** P1\n**Version:** 1.0\n**Created:** 2026-04-21\n**Updated:** 2026-04-21\n\n---\n\n## Story\n\nAs a developer, I want to click \"Run\" on any Maestro flow from the dashboard and have it execute on the connected device, so I can trigger test runs without switching to a terminal.\n\n## Acceptance Criteria\n\n**Given** a device is connected and Maestro CLI is installed  \n**When** I click Run on a flow  \n**Then** `POST /api/flow/run` spawns the Maestro process and a spinner with elapsed time appears on the card\n\n**Given** the flow completes  \n**When** Maestro exits  \n**Then** the card shows pass (green) or fail (red) badge and the test case status is updated in the markdown file\n\n**Given** the flow fails  \n**When** the failure is detected  \n**Then** a bug ticket is automatically created with the failure reason and screenshot path\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created via reverse-engineer |\n"},{"rel":"epics/E-003-test-execution-maestro/S-003-003-live-output-streaming.md","content":"# Live Output Streaming via WebSocket\n\n**ID:** S-003-003\n**Project:** morbius\n**Epic:** E-003\n**Stage:** Ready\n**Status:** Done\n**Priority:** P1\n**Version:** 1.0\n**Created:** 2026-04-21\n**Updated:** 2026-04-21\n\n---\n\n## Story\n\nAs a developer, I want to watch Maestro test output stream live in the dashboard as the flow executes, so I can see which steps pass or fail in real time without switching to a terminal.\n\n## Acceptance Criteria\n\n**Given** a flow run is started  \n**When** Maestro executes each step  \n**Then** the output streams to the browser via WebSocket (`/ws/run-stream`) with each step's status appearing as it completes\n\n**Given** multiple users have the dashboard open  \n**When** a run is in progress  \n**Then** all connected clients see the live output simultaneously\n\n**Given** I close the browser tab while a run is active  \n**When** the WebSocket disconnects  \n**Then** the Maestro process continues running (not killed on disconnect)\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created via reverse-engineer |\n"},{"rel":"epics/E-003-test-execution-maestro/S-003-004-suite-runner.md","content":"# Full Suite Runner\n\n**ID:** S-003-004\n**Project:** morbius\n**Epic:** E-003\n**Stage:** Ready\n**Status:** Done\n**Priority:** P2\n**Version:** 1.0\n**Created:** 2026-04-21\n**Updated:** 2026-04-21\n\n---\n\n## Story\n\nAs a QA lead, I want a \"Run All\" button that executes all Maestro flows in the configured sequence and shows a progress bar, so I can run the full regression suite with one click and monitor progress without managing individual flows.\n\n## Acceptance Criteria\n\n**Given** all flows are configured  \n**When** I click \"Run All\"  \n**Then** flows execute in numbered order (01_login → 02_create_account → ... → 14_delete_account) with a progress bar showing current/total\n\n**Given** a flow in the sequence fails  \n**When** it is a non-destructive flow  \n**Then** the suite continues with the next flow (not aborted)\n\n**Given** a destructive flow (12–14) fails  \n**When** the suite reaches it  \n**Then** the suite stops and shows a warning that destructive flows were not completed\n\n**Given** the suite completes  \n**When** all flows are done  \n**Then** a summary shows total pass/fail counts and a new run record is saved\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created via reverse-engineer |\n"},{"rel":"epics/E-003-test-execution-maestro/S-003-005-run-history-ingest.md","content":"# Test Run History + Ingest Maestro CLI Output\n\n**ID:** S-003-005\n**Project:** morbius\n**Epic:** E-003\n**Stage:** Ready\n**Status:** Done\n**Priority:** P1\n**Version:** 1.0\n**Created:** 2026-04-21\n**Updated:** 2026-04-21\n\n---\n\n## Story\n\nAs a QA lead, I want to run `morbius ingest <maestro-output-dir>` to parse Maestro test results and auto-create a run record, so every test execution — whether triggered from the dashboard or the terminal — is captured in the Runs history.\n\n## Acceptance Criteria\n\n**Given** a `.maestro-output` directory from a Maestro run  \n**When** I run `morbius ingest <dir>`  \n**Then** a run record is created in `data/{project}/runs/` with pass/fail counts, per-test results, timestamps, and failure screenshots\n\n**Given** a test fails in the ingest  \n**When** a failure screenshot exists in the output  \n**Then** the screenshot is copied to `data/{project}/screenshots/` and linked in the auto-created bug ticket\n\n**Given** I open the Runs tab  \n**When** runs exist  \n**Then** I see a list of all run records with timestamp, device, total/pass/fail counts, and click to expand per-test results\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created via reverse-engineer |\n"},{"rel":"epics/E-004-bug-management/E-004.md","content":"# Epic: Bug Management\n\n**ID:** E-004\n**Project:** morbius\n**Stage:** Draft\n**Version:** 1.0\n**Created:** 2026-04-21\n**Updated:** 2026-04-21\n\n---\n\n## Outcome\n\nAny test failure automatically becomes a tracked bug ticket — complete with screenshot, device info, and selector analysis — and the team can triage, investigate, and sync with Jira without leaving the dashboard.\n\n## Success Metric\n\n| Metric | Baseline | Target |\n|--------|----------|--------|\n| Maestro failure → bug ticket (automated) | Manual Jira creation | 100% of ingested failures auto-create a bug |\n| Jira sync coverage | 0% | All local bugs syncable bidirectionally with Jira |\n\n## Primary Persona\n\nThe QA Lead\n\n## Dependencies\n\n- E-001 (Core Dashboard + Data Foundation)\n- E-003 (Test Execution + Maestro) — ingest runs to auto-create bugs\n\n## Stories\n\n| ID | Title | Status | Stage |\n|----|-------|--------|-------|\n| S-004-001 | Auto-Create Bug Tickets from Maestro Test Failures | Done | Ready |\n| S-004-002 | Manual Bug Creation UI (title, test, device, priority, reason) | Done | Ready |\n| S-004-003 | Bug Kanban Board (open → investigating → fixed → closed) | Done | Ready |\n| S-004-004 | Failure Screenshot Capture + Inline Preview | Done | Ready |\n| S-004-005 | Selector Analysis — Fragile YAML Pattern Detection | Done | Ready |\n| S-004-006 | Jira Sync — Pull Bugs, Sync Status, Create Issues | Done | Ready |\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created via reverse-engineer — documents Phase 2 completed work |\n"},{"rel":"epics/E-004-bug-management/S-004-001-auto-create-bugs.md","content":"# Auto-Create Bug Tickets from Maestro Failures\n\n**ID:** S-004-001\n**Project:** morbius\n**Epic:** E-004\n**Stage:** Ready\n**Status:** Done\n**Priority:** P0\n**Version:** 1.0\n**Created:** 2026-04-21\n**Updated:** 2026-04-21\n\n---\n\n## Story\n\nAs a QA lead, I want every Maestro test failure to automatically create a bug ticket with the failing step, device info, and screenshot, so no failure gets lost and the team can triage immediately from the Bug board.\n\n## Acceptance Criteria\n\n**Given** a Maestro flow fails during ingest  \n**When** a failure is detected  \n**Then** a bug markdown file is created with: id, title (from flow name), linked test ID, device, run ID, failing step, failure reason, and screenshot path\n\n**Given** a bug for the same test + device already exists with status \"open\" or \"investigating\"  \n**When** the same test fails again  \n**Then** the existing bug is updated (not duplicated) and the new run is added to its history\n\n**Given** a test failure has no screenshot  \n**When** the bug is created  \n**Then** the bug is created without a screenshot (no error thrown)\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created via reverse-engineer |\n"},{"rel":"epics/E-004-bug-management/S-004-002-manual-bug-creation.md","content":"# Manual Bug Creation UI\n\n**ID:** S-004-002\n**Project:** morbius\n**Epic:** E-004\n**Stage:** Ready\n**Status:** Done\n**Priority:** P1\n**Version:** 1.0\n**Created:** 2026-04-21\n**Updated:** 2026-04-21\n\n---\n\n## Story\n\nAs a tester, I want to create a bug ticket manually from the dashboard (or CLI) with a title, linked test, device, priority, and failure reason, so I can report bugs found during exploratory or manual testing that Maestro didn't catch.\n\n## Acceptance Criteria\n\n**Given** I click \"Report Bug\" from a test case detail panel  \n**When** I fill in the form and submit  \n**Then** a bug ticket is created and appears on the Bug board immediately\n\n**Given** I run `morbius create-bug --test TC-2.01 --title \"Login fails\" --device iPhone --priority high`  \n**When** the command runs  \n**Then** a bug markdown file is written with the provided fields and an auto-generated ID (bug-NNN)\n\n**Given** I attach a screenshot via the CLI `--screenshot <path>`  \n**When** the bug is created  \n**Then** the screenshot is copied to `data/{project}/screenshots/` and linked in the bug\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created via reverse-engineer |\n"},{"rel":"epics/E-004-bug-management/S-004-003-bug-kanban.md","content":"# Bug Kanban Board + Status Workflow\n\n**ID:** S-004-003\n**Project:** morbius\n**Epic:** E-004\n**Stage:** Ready\n**Status:** Done\n**Priority:** P1\n**Version:** 1.0\n**Created:** 2026-04-21\n**Updated:** 2026-04-21\n\n---\n\n## Story\n\nAs a QA lead, I want a Bug board with four columns (Open, Investigating, Fixed, Closed) where I can move bugs through their lifecycle by clicking, so the team has a shared view of every open issue without needing Jira open.\n\n## Acceptance Criteria\n\n**Given** bugs exist  \n**When** I open the Bugs tab  \n**Then** bugs are shown in Kanban columns by status: Open, Investigating, Fixed, Closed\n\n**Given** I click a bug's status pill  \n**When** I select a new status  \n**Then** the bug moves to the new column and the change is written to the markdown file with a changelog entry\n\n**Given** I click a bug card to expand it  \n**When** the detail panel opens  \n**Then** I see: title, linked test, device, priority, failure reason, screenshot (if any), notes textarea, selector analysis warnings, Jira badge (if synced), and full changelog\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created via reverse-engineer |\n"},{"rel":"epics/E-004-bug-management/S-004-004-screenshot-capture.md","content":"# Failure Screenshot Capture + Inline Preview\n\n**ID:** S-004-004\n**Project:** morbius\n**Epic:** E-004\n**Stage:** Ready\n**Status:** Done\n**Priority:** P1\n**Version:** 1.0\n**Created:** 2026-04-21\n**Updated:** 2026-04-21\n\n---\n\n## Story\n\nAs a developer, I want failure screenshots from Maestro runs to be automatically captured and displayed inline on bug cards, so I can see exactly what the device showed when the test failed without navigating to a separate folder.\n\n## Acceptance Criteria\n\n**Given** a Maestro flow fails and produces a screenshot  \n**When** the bug is created via ingest  \n**Then** the screenshot is copied to `data/{project}/screenshots/{bugId}/` and served via `GET /screenshots/<path>`\n\n**Given** I open a bug card with a screenshot  \n**When** the detail panel renders  \n**Then** the screenshot is shown as an inline image in the panel\n\n**Given** I click the screenshot thumbnail  \n**When** the image expands  \n**Then** it opens at full resolution (not cropped)\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created via reverse-engineer |\n"},{"rel":"epics/E-004-bug-management/S-004-005-selector-analysis.md","content":"# Selector Analysis — Fragile YAML Pattern Detection\n\n**ID:** S-004-005\n**Project:** morbius\n**Epic:** E-004\n**Stage:** Ready\n**Status:** Done\n**Priority:** P2\n**Version:** 1.0\n**Created:** 2026-04-21\n**Updated:** 2026-04-21\n\n---\n\n## Story\n\nAs a developer, I want Morbius to scan Maestro YAML for fragile selector patterns and surface warnings on bug cards and the flow viewer, so the team knows which tests are likely to break due to brittle automation before they do.\n\n## Acceptance Criteria\n\n**Given** a YAML flow uses a pixel-based `point{}` tap  \n**When** the flow is displayed or a bug is created from it  \n**Then** a \"fragile selector\" warning is shown: \"pixel-based tap — breaks if layout changes\"\n\n**Given** a YAML flow has a hardcoded `sleep` longer than 3 seconds  \n**When** analysed  \n**Then** a warning is shown: \"hardcoded sleep >3s — flakiness risk\"\n\n**Given** a YAML flow uses an index selector (`index: 2`)  \n**When** analysed  \n**Then** a warning is shown: \"index selector — fragile if list order changes\"\n\n**Given** a flow has no fragile patterns  \n**When** analysed  \n**Then** no warnings are shown\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created via reverse-engineer |\n"},{"rel":"epics/E-004-bug-management/S-004-006-jira-sync.md","content":"# Jira Sync — Pull Bugs, Sync Status, Create Issues\n\n**ID:** S-004-006\n**Project:** morbius\n**Epic:** E-004\n**Stage:** Ready\n**Status:** Done\n**Priority:** P1\n**Version:** 1.0\n**Created:** 2026-04-21\n**Updated:** 2026-04-21\n\n---\n\n## Story\n\nAs a QA lead, I want to sync bugs bidirectionally with Jira — pulling Jira issues into the bug board and pushing local status changes back — so the Morbius board and Jira stay in sync without manual copy-paste.\n\n## Acceptance Criteria\n\n**Given** Jira cloud ID, project key, and JQL are configured  \n**When** I click \"Sync All\" on the Bug board  \n**Then** all Jira issues matching the JQL are pulled and shown as bugs with a \"J\" badge, including assignee, status, priority, and last comment\n\n**Given** a local bug has been updated (status changed)  \n**When** I click \"Sync\" on that bug  \n**Then** the Jira issue status is updated to match (bidirectional)\n\n**Given** a local bug has no Jira issue yet  \n**When** I click \"Create in Jira\"  \n**Then** a new Jira issue is created and the local bug is linked with the Jira key and URL\n\n**Given** the Jira credentials are invalid  \n**When** sync is attempted  \n**Then** an error message is shown and no data is corrupted\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created via reverse-engineer |\n"},{"rel":"epics/E-005-analytics-coverage/E-005.md","content":"# Epic: Analytics + Coverage\n\n**ID:** E-005\n**Project:** morbius\n**Stage:** Draft\n**Version:** 1.0\n**Created:** 2026-04-21\n**Updated:** 2026-04-21\n\n---\n\n## Outcome\n\nQA leads and PMs can see at a glance which tests are flaky, which devices have coverage gaps, and which areas of the app have no automation — without running any queries or writing scripts.\n\n## Success Metric\n\n| Metric | Baseline | Target |\n|--------|----------|--------|\n| Flaky tests surfaced automatically | 0 (manual tracking) | All tests with flakiness score ≥0.4 flagged on dashboard |\n| Coverage gaps visible to PM without QA | Not visible | Gaps tab shows stale, missing, and under-tested areas |\n\n## Primary Persona\n\nThe PM Stakeholder\n\n## Dependencies\n\n- E-002 (Test Case Management) — test history required for flakiness scoring\n- E-003 (Test Execution + Maestro) — run results required for device coverage\n\n## Stories\n\n| ID | Title | Status | Stage |\n|----|-------|--------|-------|\n| S-005-001 | Flakiness Detection + Transition-Based Scoring | Done | Ready |\n| S-005-002 | Coverage Gap Detection (stale, missing, device gaps) | Done | Ready |\n| S-005-003 | Device Coverage Matrix (device × test status grid) | Done | Ready |\n| S-005-004 | Calculator Field Coverage Analysis (STS) | Done | Ready |\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created via reverse-engineer — documents Phase 2 completed work |\n"},{"rel":"epics/E-005-analytics-coverage/S-005-001-flakiness-detection.md","content":"# Flakiness Detection + Transition-Based Scoring\n\n**ID:** S-005-001\n**Project:** morbius\n**Epic:** E-005\n**Stage:** Ready\n**Status:** Done\n**Priority:** P1\n**Version:** 1.0\n**Created:** 2026-04-21\n**Updated:** 2026-04-21\n\n---\n\n## Story\n\nAs a QA lead, I want flaky tests automatically identified and ranked by flakiness score, so the team knows which tests need stabilisation before they waste time chasing intermittent failures.\n\n## Acceptance Criteria\n\n**Given** a test has a run history with alternating pass/fail results  \n**When** the flakiness score is calculated  \n**Then** score = transitions / (window - 1); a perfectly alternating P-F-P-F scores 1.0; always-passing scores 0.0\n\n**Given** a test scores ≥0.4 over the last 10 runs  \n**When** the Dashboard loads  \n**Then** that test appears in the Flaky Tests section, ranked by score descending\n\n**Given** fewer than 2 runs exist for a test  \n**When** flakiness is calculated  \n**Then** the test is excluded from the flaky list (insufficient data)\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created via reverse-engineer |\n"},{"rel":"epics/E-005-analytics-coverage/S-005-002-coverage-gaps.md","content":"# Coverage Gap Detection\n\n**ID:** S-005-002\n**Project:** morbius\n**Epic:** E-005\n**Stage:** Ready\n**Status:** Done\n**Priority:** P1\n**Version:** 1.0\n**Created:** 2026-04-21\n**Updated:** 2026-04-21\n\n---\n\n## Story\n\nAs a QA lead, I want Morbius to automatically detect coverage gaps — tests with no automation, categories with no tests, and tests not run in over a week — so I know where the QA blind spots are without manually auditing the board.\n\n## Acceptance Criteria\n\n**Given** a test case has no `maestroFlow` linked  \n**When** the Dashboard loads  \n**Then** it appears in Coverage Gaps as \"no automation\"\n\n**Given** a category has zero test cases  \n**When** the Dashboard loads  \n**Then** it appears in Coverage Gaps as \"empty category\"\n\n**Given** a test has a `lastRun` timestamp older than 7 days  \n**When** the Dashboard loads  \n**Then** it appears in Coverage Gaps as \"stale — not run in X days\"\n\n**Given** a device has fewer than 50% of tests run against it  \n**When** the Dashboard loads  \n**Then** it appears in Coverage Gaps as \"low device coverage\"\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created via reverse-engineer |\n"},{"rel":"epics/E-005-analytics-coverage/S-005-003-device-coverage-matrix.md","content":"# Device Coverage Matrix\n\n**ID:** S-005-003\n**Project:** morbius\n**Epic:** E-005\n**Stage:** Ready\n**Status:** Done\n**Priority:** P1\n**Version:** 1.0\n**Created:** 2026-04-21\n**Updated:** 2026-04-21\n\n---\n\n## Story\n\nAs a QA lead, I want a Devices tab showing a grid of every test × every device with pass/fail status, so I can see at a glance which tests are passing on iPad but failing on Android, and which device has the worst coverage.\n\n## Acceptance Criteria\n\n**Given** multiple devices are configured and tests have been run  \n**When** I open the Devices tab  \n**Then** a grid shows each device as a column and each test as a row, with a coloured cell for pass/fail/not-run status per (device, test) combination\n\n**Given** I sort the grid by \"Pass Rate\"  \n**When** sorted  \n**Then** devices with the lowest pass rate appear first\n\n**Given** no tests have been run on a device  \n**When** the grid renders  \n**Then** all cells for that device show \"not-run\" (grey)\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created via reverse-engineer |\n"},{"rel":"epics/E-005-analytics-coverage/S-005-004-calculator-coverage.md","content":"# Calculator Field Coverage Analysis (STS)\n\n**ID:** S-005-004\n**Project:** morbius\n**Epic:** E-005\n**Stage:** Ready\n**Status:** Done\n**Priority:** P2\n**Version:** 1.0\n**Created:** 2026-04-21\n**Updated:** 2026-04-21\n\n---\n\n## Story\n\nAs a developer, I want Morbius to cross-reference the STS calculator config with existing Maestro flows and test cases to show which fields are covered by automation and which aren't, so the team can prioritise test gaps in complex calculator forms.\n\n## Acceptance Criteria\n\n**Given** a `calculatorConfig.json` exists for the project  \n**When** I call `GET /api/coverage`  \n**Then** the response includes per-calculator coverage: totalFields, coveredFields (linked to test or flow), uncoveredFields, coverage %\n\n**Given** a calculator field ID appears in a YAML flow comment or test case markdown  \n**When** coverage is calculated  \n**Then** that field is marked as covered with a reference to the test/flow\n\n**Given** a calculator has 0% coverage  \n**When** coverage is displayed  \n**Then** it is highlighted as a priority gap\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created via reverse-engineer |\n"},{"rel":"epics/E-006-appmap-agent-skills/E-006.md","content":"# Epic: App Map + Agent Skills + Settings\n\n**ID:** E-006\n**Project:** morbius\n**Stage:** Draft\n**Version:** 1.0\n**Created:** 2026-04-21\n**Updated:** 2026-04-21\n\n---\n\n## Outcome\n\nThe team has a live visual map of the app's navigation, a full settings page to configure every integration and device, AI-powered Maestro flow generation for complex calculators, and a Claude Code chat window accessible from the dashboard.\n\n## Success Metric\n\n| Metric | Baseline | Target |\n|--------|----------|--------|\n| Maestro YAML flows auto-generated from calculator config | Manual authoring only | All calculator sections generate valid runnable YAML |\n| Team members using chat from browser | 0 | Claude Code accessible to any team member via dashboard |\n\n## Primary Persona\n\nThe Developer\n\n## Dependencies\n\n- E-001 (Core Dashboard + Data Foundation)\n- E-003 (Test Execution + Maestro)\n\n## Stories\n\n| ID | Title | Status | Stage |\n|----|-------|--------|-------|\n| S-006-001 | App Navigation Map (Mermaid flowchart, per-project) | Done | Ready |\n| S-006-002 | Maestro YAML Flow Generation from Calculator Config | Done | Ready |\n| S-006-003 | Claude Code Chat Integration (WebSocket bridge) | Done | Ready |\n| S-006-004 | Settings Page (project config, devices, Jira, Maestro paths, appearance) | Done | Ready |\n| S-006-005 | Run Media Viewer (videos + screenshots from test runs) | Done | Ready |\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created via reverse-engineer — documents Phase 2.5 completed work |\n"},{"rel":"epics/E-006-appmap-agent-skills/S-006-001-app-navigation-map.md","content":"# App Navigation Map (Mermaid Flowchart)\n\n**ID:** S-006-001\n**Project:** morbius\n**Epic:** E-006\n**Stage:** Ready\n**Status:** Done\n**Priority:** P2\n**Version:** 1.0\n**Created:** 2026-04-21\n**Updated:** 2026-04-21\n\n---\n\n## Story\n\nAs a developer, I want a visual Mermaid flowchart of the app's navigation structure stored in the project config and rendered in the dashboard, so any new team member can understand the app's screen flow without running the app.\n\n## Acceptance Criteria\n\n**Given** an `appMap` field exists in `config.json`  \n**When** I navigate to the App Map section  \n**Then** the Mermaid chart is rendered showing all screens and transitions\n\n**Given** I update the `appMap` field via `POST /api/config/update`  \n**When** I reload  \n**Then** the new chart is displayed immediately\n\n**Given** the `appMap` field is empty  \n**When** I open the App Map  \n**Then** a placeholder message explains how to add the app map\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created via reverse-engineer |\n"},{"rel":"epics/E-006-appmap-agent-skills/S-006-002-flow-generation.md","content":"# Maestro YAML Flow Generation from Calculator Config\n\n**ID:** S-006-002\n**Project:** morbius\n**Epic:** E-006\n**Stage:** Ready\n**Status:** Done\n**Priority:** P1\n**Version:** 1.0\n**Created:** 2026-04-21\n**Updated:** 2026-04-21\n\n---\n\n## Story\n\nAs a developer, I want to run `morbius generate-flows --config calculatorConfig.json --output flows/` and have complete Maestro YAML generated for each calculator section, so I don't manually write YAML for complex multi-field forms.\n\n## Acceptance Criteria\n\n**Given** a `calculatorConfig.json` with sections and field definitions  \n**When** I run `morbius generate-flows`  \n**Then** one YAML file is generated per calculator section with the correct tapOn/inputText/scrollUntilVisible commands for each field type (checkbox, singleSelect, integer, multiSelect, dateTime)\n\n**Given** a field has a `visibleIf` dependency  \n**When** flow is generated  \n**Then** the parent field action appears before the dependent field (topological sort)\n\n**Given** `--dry-run` is passed  \n**When** the command runs  \n**Then** the generated YAML is printed to stdout without writing any files\n\n**Given** `--platform ios`  \n**When** flows are generated  \n**Then** iOS-specific command variants are used where Maestro differs between platforms\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created via reverse-engineer |\n"},{"rel":"epics/E-006-appmap-agent-skills/S-006-003-claude-chat-integration.md","content":"# Claude Code Chat Integration (WebSocket Bridge)\n\n**ID:** S-006-003\n**Project:** morbius\n**Epic:** E-006\n**Stage:** Ready\n**Status:** Done\n**Priority:** P1\n**Version:** 1.0\n**Created:** 2026-04-21\n**Updated:** 2026-04-21\n\n---\n\n## Story\n\nAs a developer, I want a chat drawer in the dashboard that connects directly to the local Claude Code CLI, so any team member can ask the Morbius agent to run tests, write flows, or investigate failures from the browser.\n\n## Acceptance Criteria\n\n**Given** Claude Code CLI is installed locally  \n**When** I open the Chat drawer  \n**Then** a WebSocket connects to `/ws/chat` and the input is ready\n\n**Given** I send a message  \n**When** the server processes it  \n**Then** it spawns `claude --model claude-sonnet-4-6 \"<message>\"` and streams stdout to the browser in real time (type: chunk/info/done/error)\n\n**Given** I close the chat drawer while a response is streaming  \n**When** the WebSocket disconnects  \n**Then** the Claude process is killed (120s timeout also applies)\n\n**Given** Claude Code CLI is not installed  \n**When** I try to send a message  \n**Then** an error message explains that Claude Code is required and how to install it\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created via reverse-engineer |\n"},{"rel":"epics/E-006-appmap-agent-skills/S-006-004-settings-page.md","content":"# Settings Page (Project Config, Devices, Integrations, Appearance)\n\n**ID:** S-006-004\n**Project:** morbius\n**Epic:** E-006\n**Stage:** Ready\n**Status:** Done\n**Priority:** P1\n**Version:** 1.0\n**Created:** 2026-04-21\n**Updated:** 2026-04-21\n\n---\n\n## Story\n\nAs a QA lead, I want a Settings tab where I can configure the active project's Maestro paths, device list, Jira credentials, and appearance preferences — all from the browser — without editing JSON files by hand.\n\n## Acceptance Criteria\n\n**Given** I open the Settings tab  \n**When** it loads  \n**Then** I see sections: Profile, Workspace, Integrations, Devices, Maestro, Test Runs, Appearance, Data, Danger Zone\n\n**Given** I update the Android Maestro path in Settings  \n**When** I save  \n**Then** `POST /api/config/update` writes the new path to `config.json` and the Maestro tab reloads with the new path\n\n**Given** I add a new device in the Devices section  \n**When** saved  \n**Then** the device appears in the Device Coverage Matrix and is available as an option in bug creation\n\n**Given** I toggle dark/light theme  \n**When** the toggle is flipped  \n**Then** the entire dashboard switches theme immediately without a page reload\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created via reverse-engineer |\n"},{"rel":"epics/E-006-appmap-agent-skills/S-006-005-run-media-viewer.md","content":"# Run Media Viewer (Videos + Screenshots)\n\n**ID:** S-006-005\n**Project:** morbius\n**Epic:** E-006\n**Stage:** Ready\n**Status:** Done\n**Priority:** P2\n**Version:** 1.0\n**Created:** 2026-04-21\n**Updated:** 2026-04-21\n\n---\n\n## Story\n\nAs a developer, I want to view test run videos and screenshots directly in the dashboard from the Runs tab, so I can replay a failing test's screen recording without navigating to the file system.\n\n## Acceptance Criteria\n\n**Given** a test run has media files (screenshots, screen recordings) in the configured `mediaPath`  \n**When** I open the Runs tab and click a run  \n**Then** a media gallery shows all screenshots and videos from that run\n\n**Given** I run `morbius ingest-media --timestamp`  \n**When** the command runs  \n**Then** the latest Maestro run's media is copied from the Maestro output directory to the project `mediaPath`\n\n**Given** the `mediaPath` is outside the project root  \n**When** media is served  \n**Then** it is served via `GET /media/<path>` (not `GET /screenshots/<path>`) to avoid path conflicts\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created via reverse-engineer |\n"},{"rel":"epics/E-007-device-cloud-browserstack/E-007.md","content":"# Epic: Device Cloud + BrowserStack\n\n**ID:** E-007\n**Project:** morbius\n**Stage:** Draft\n**Version:** 1.0\n**Created:** 2026-04-21\n**Updated:** 2026-04-21\n**Sources:** ROADMAP.md\n\n---\n\n## Outcome\n\nQA leads and developers will be able to run Maestro test flows on real cloud devices (BrowserStack) directly from the Morbius dashboard — without installing Android Studio, Xcode, or any device SDKs — and automatically receive bug tickets with screenshots when flows fail on real hardware.\n\n## Success Metric\n\n| Metric | Baseline | Target |\n|--------|----------|--------|\n| Flows runnable on BrowserStack from dashboard (0 = none today) | 0 | All 14 flows executable on ≥1 BrowserStack device |\n| Real-device failure → auto-created bug ticket rate | 0% | 100% of failed flows create a bug with screenshot |\n\n## Primary Persona\n\nThe QA Lead\n\n## Dependencies\n\n- None — Phase 1–2.5 infrastructure is complete and provides the foundation\n\n## Stories\n\n| ID | Title | Status | Stage |\n|----|-------|--------|-------|\n| S-007-001 | BrowserStack Account Connection | Backlog | Draft |\n| S-007-002 | Device Catalog + Selection UI | Backlog | Draft |\n| S-007-003 | Run Flows on BrowserStack Devices | Backlog | Draft |\n| S-007-004 | Pull Results + Screenshots into Dashboard | Backlog | Draft |\n| S-007-005 | Auto-Create Bug on Cloud Failure | Backlog | Draft |\n| S-007-006 | Device Matrix Auto-Population | Backlog | Draft |\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created from ROADMAP.md Phase 3 |\n"},{"rel":"epics/E-008-settings-integrations-hub/E-008.md","content":"# Epic: Settings Page + Integrations Hub\n\n**ID:** E-008\n**Project:** morbius\n**Stage:** Draft\n**Version:** 1.0\n**Created:** 2026-04-21\n**Updated:** 2026-04-21\n**Sources:** ROADMAP.md\n\n---\n\n## Outcome\n\nAll team members will have a single settings page to connect devices, configure integrations (Jira, Linear, GitHub, Slack), manage API keys, and monitor the health of all connected services — eliminating the need to edit config files or environment variables directly.\n\n## Success Metric\n\n| Metric | Baseline | Target |\n|--------|----------|--------|\n| Integrations configurable from UI (vs. config file) | 0 | Jira, BrowserStack, Slack, GitHub all configurable from settings |\n| Time to connect a new integration for a non-developer | Manual config edit | Under 5 minutes from Settings page |\n\n## Primary Persona\n\nThe QA Lead\n\n## Dependencies\n\n- E-007 (Device Cloud + BrowserStack) — BrowserStack settings section depends on Phase 3 integration being built\n\n## Stories\n\n| ID | Title | Status | Stage |\n|----|-------|--------|-------|\n| S-008-001 | Settings Page Shell + Navigation | Backlog | Draft |\n| S-008-002 | Device Connections Panel | Backlog | Draft |\n| S-008-003 | Jira Integration Settings | Backlog | Draft |\n| S-008-004 | Linear + GitHub + Slack Integrations | Backlog | Draft |\n| S-008-005 | AI & Automation Config | Backlog | Draft |\n| S-008-006 | Notifications + Webhook Config | Backlog | Draft |\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created from ROADMAP.md Phase 4 |\n"},{"rel":"epics/E-009-multi-framework-support/E-009.md","content":"# Epic: Multi-Framework Support\n\n**ID:** E-009\n**Project:** morbius\n**Stage:** Draft\n**Version:** 1.0\n**Created:** 2026-04-21\n**Updated:** 2026-04-21\n**Sources:** ROADMAP.md\n\n---\n\n## Outcome\n\nDevelopment teams will be able to run Appium and Detox test suites alongside Maestro flows from the same Morbius dashboard — with a unified results view — eliminating the need to maintain separate tooling for teams that use different test frameworks.\n\n## Success Metric\n\n| Metric | Baseline | Target |\n|--------|----------|--------

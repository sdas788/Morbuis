4-29 | 1.0 | Morbius (publish-back) | Generated from 3 Morbius test case(s) |\n"},{"rel":"epics/E-004-bug-management/E-004.md","content":"# Epic: Bug Management\n\n**ID:** E-004\n**Project:** morbius\n**Stage:** Draft\n**Version:** 1.0\n**Created:** 2026-04-21\n**Updated:** 2026-04-21\n\n---\n\n## Outcome\n\nAny test failure automatically becomes a tracked bug ticket — complete with screenshot, device info, and selector analysis — and the team can triage, investigate, and sync with Jira without leaving the dashboard.\n\n## Success Metric\n\n| Metric | Baseline | Target |\n|--------|----------|--------|\n| Maestro failure → bug ticket (automated) | Manual Jira creation | 100% of ingested failures auto-create a bug |\n| Jira sync coverage | 0% | All local bugs syncable bidirectionally with Jira |\n\n## Primary Persona\n\nThe QA Lead\n\n## Dependencies\n\n- E-001 (Core Dashboard + Data Foundation)\n- E-003 (Test Execution + Maestro) — ingest runs to auto-create bugs\n\n## Stories\n\n| ID | Title | Status | Stage |\n|----|-------|--------|-------|\n| S-004-001 | Auto-Create Bug Tickets from Maestro Test Failures | Done | Ready |\n| S-004-002 | Manual Bug Creation UI (title, test, device, priority, reason) | Done | Ready |\n| S-004-003 | Bug Kanban Board (open → investigating → fixed → closed) | Done | Ready |\n| S-004-004 | Failure Screenshot Capture + Inline Preview | Done | Ready |\n| S-004-005 | Selector Analysis — Fragile YAML Pattern Detection | Done | Ready |\n| S-004-006 | Jira Sync — Pull Bugs, Sync Status, Create Issues | Done | Ready |\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created via reverse-engineer — documents Phase 2 completed work |\n"},{"rel":"epics/E-004-bug-management/S-004-001-auto-create-bugs.md","content":"# Story: Auto-Create Bug Tickets from Maestro Failures\n\n**ID:** S-004-001\n**Project:** morbius\n**Epic:** E-004\n**Stage:** Ready\n**Status:** Done\n**Priority:** P0\n**Version:** 1.0\n**Created:** 2026-04-21\n**Updated:** 2026-04-21\n\n---\n\n## Story\n\nAs a QA lead, I want every Maestro test failure to automatically create a bug ticket with the failing step, device info, and screenshot, so no failure gets lost and the team can triage immediately from the Bug board.\n\n## Acceptance Criteria\n\n**Given** a Maestro flow fails during ingest  \n**When** a failure is detected  \n**Then** a bug markdown file is created with: id, title (from flow name), linked test ID, device, run ID, failing step, failure reason, and screenshot path\n\n**Given** a bug for the same test + device already exists with status \"open\" or \"investigating\"  \n**When** the same test fails again  \n**Then** the existing bug is updated (not duplicated) and the new run is added to its history\n\n**Given** a test failure has no screenshot  \n**When** the bug is created  \n**Then** the bug is created without a screenshot (no error thrown)\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created via reverse-engineer |\n"},{"rel":"epics/E-004-bug-management/S-004-001-auto-create-bugs.v2.md","content":"## Changes from v1.0\n\n**Revision type:** \n**Find the implementation:** `git log --oneline --all --grep=\"\"`\n\n| Section | Change |\n|---------|--------|\n| | |\n\n---\n\n# Auto-Create Bug Tickets from Maestro Failures\n\n**ID:** S-004-001\n**Project:** morbius\n**Epic:** E-004\n**Stage:** Draft\n**Status:** Backlog\n**Priority:** P0\n**Version:** 1.0\n**Created:** 2026-04-21\n**Updated:** 2026-04-21\n\n---\n\n## Story\n\nAs a QA lead, I want every Maestro test failure to automatically create a bug ticket with the failing step, device info, and screenshot, so no failure gets lost and the team can triage immediately from the Bug board.\n\n## Acceptance Criteria\n\n**Given** a Maestro flow fails during ingest  \n**When** a failure is detected  \n**Then** a bug markdown file is created with: id, title (from flow name), linked test ID, device, run ID, failing step, failure reason, and screenshot path\n\n**Given** a bug for the same test + device already exists with status \"open\" or \"investigating\"  \n**When** the same test fails again  \n**Then** the existing bug is updated (not duplicated) and the new run is added to its history\n\n**Given** a test failure has no screenshot  \n**When** the bug is created  \n**Then** the bug is created without a screenshot (no error thrown)\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created via reverse-engineer |\n"},{"rel":"epics/E-004-bug-management/S-004-002-manual-bug-creation.md","content":"# Story: Manual Bug Creation UI\n\n**ID:** S-004-002\n**Project:** morbius\n**Epic:** E-004\n**Stage:** Ready\n**Status:** Done\n**Priority:** P1\n**Version:** 1.0\n**Created:** 2026-04-21\n**Updated:** 2026-04-21\n\n---\n\n## Story\n\nAs a tester, I want to create a bug ticket manually from the dashboard (or CLI) with a title, linked test, device, priority, and failure reason, so I can report bugs found during exploratory or manual testing that Maestro didn't catch.\n\n## Acceptance Criteria\n\n**Given** I click \"Report Bug\" from a test case detail panel  \n**When** I fill in the form and submit  \n**Then** a bug ticket is created and appears on the Bug board immediately\n\n**Given** I run `morbius create-bug --test TC-2.01 --title \"Login fails\" --device iPhone --priority high`  \n**When** the command runs  \n**Then** a bug markdown file is written with the provided fields and an auto-generated ID (bug-NNN)\n\n**Given** I attach a screenshot via the CLI `--screenshot <path>`  \n**When** the bug is created  \n**Then** the screenshot is copied to `data/{project}/screenshots/` and linked in the bug\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created via reverse-engineer |\n"},{"rel":"epics/E-004-bug-management/S-004-003-bug-kanban.md","content":"# Story: Bug Kanban Board + Status Workflow\n\n**ID:** S-004-003\n**Project:** morbius\n**Epic:** E-004\n**Stage:** Ready\n**Status:** Done\n**Priority:** P1\n**Version:** 1.0\n**Created:** 2026-04-21\n**Updated:** 2026-04-21\n\n---\n\n## Story\n\nAs a QA lead, I want a Bug board with four columns (Open, Investigating, Fixed, Closed) where I can move bugs through their lifecycle by clicking, so the team has a shared view of every open issue without needing Jira open.\n\n## Acceptance Criteria\n\n**Given** bugs exist  \n**When** I open the Bugs tab  \n**Then** bugs are shown in Kanban columns by status: Open, Investigating, Fixed, Closed\n\n**Given** I click a bug's status pill  \n**When** I select a new status  \n**Then** the bug moves to the new column and the change is written to the markdown file with a changelog entry\n\n**Given** I click a bug card to expand it  \n**When** the detail panel opens  \n**Then** I see: title, linked test, device, priority, failure reason, screenshot (if any), notes textarea, selector analysis warnings, Jira badge (if synced), and full changelog\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created via reverse-engineer |\n"},{"rel":"epics/E-004-bug-management/S-004-004-screenshot-capture.md","content":"# Story: Failure Screenshot Capture + Inline Preview\n\n**ID:** S-004-004\n**Project:** morbius\n**Epic:** E-004\n**Stage:** Ready\n**Status:** Done\n**Priority:** P1\n**Version:** 1.0\n**Created:** 2026-04-21\n**Updated:** 2026-04-21\n\n---\n\n## Story\n\nAs a developer, I want failure screenshots from Maestro runs to be automatically captured and displayed inline on bug cards, so I can see exactly what the device showed when the test failed without navigating to a separate folder.\n\n## Acceptance Criteria\n\n**Given** a Maestro flow fails and produces a screenshot  \n**When** the bug is created via ingest  \n**Then** the screenshot is copied to `data/{project}/screenshots/{bugId}/` and served via `GET /screenshots/<path>`\n\n**Given** I open a bug card with a screenshot  \n**When** the detail panel renders  \n**Then** the screenshot is shown as an inline image in the panel\n\n**Given** I click the screenshot thumbnail  \n**When** the image expands  \n**Then** it opens at full resolution (not cropped)\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created via reverse-engineer |\n"},{"rel":"epics/E-004-bug-management/S-004-005-selector-analysis.md","content":"# Story: Selector Analysis — Fragile YAML Pattern Detection\n\n**ID:** S-004-005\n**Project:** morbius\n**Epic:** E-004\n**Stage:** Ready\n**Status:** Done\n**Priority:** P2\n**Version:** 1.0\n**Created:** 2026-04-21\n**Updated:** 2026-04-21\n\n---\n\n## Story\n\nAs a developer, I want Morbius to scan Maestro YAML for fragile selector patterns and surface warnings on bug cards and the flow viewer, so the team knows which tests are likely to break due to brittle automation before they do.\n\n## Acceptance Criteria\n\n**Given** a YAML flow uses a pixel-based `point{}` tap  \n**When** the flow is displayed or a bug is created from it  \n**Then** a \"fragile selector\" warning is shown: \"pixel-based tap — breaks if layout changes\"\n\n**Given** a YAML flow has a hardcoded `sleep` longer than 3 seconds  \n**When** analysed  \n**Then** a warning is shown: \"hardcoded sleep >3s — flakiness risk\"\n\n**Given** a YAML flow uses an index selector (`index: 2`)  \n**When** analysed  \n**Then** a warning is shown: \"index selector — fragile if list order changes\"\n\n**Given** a flow has no fragile patterns  \n**When** analysed  \n**Then** no warnings are shown\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created via reverse-engineer |\n"},{"rel":"epics/E-004-bug-management/S-004-006-jira-sync.md","content":"# Story: Jira Sync — Pull Bugs, Sync Status, Create Issues\n\n**ID:** S-004-006\n**Project:** morbius\n**Epic:** E-004\n**Stage:** Ready\n**Status:** Done\n**Priority:** P1\n**Version:** 1.0\n**Created:** 2026-04-21\n**Updated:** 2026-04-21\n\n---\n\n## Story\n\nAs a QA lead, I want to sync bugs bidirectionally with Jira — pulling Jira issues into the bug board and pushing local status changes back — so the Morbius board and Jira stay in sync without manual copy-paste.\n\n## Acceptance Criteria\n\n**Given** Jira cloud ID, project key, and JQL are configured  \n**When** I click \"Sync All\" on the Bug board  \n**Then** all Jira issues matching the JQL are pulled and shown as bugs with a \"J\" badge, including assignee, status, priority, and last comment\n\n**Given** a local bug has been updated (status changed)  \n**When** I click \"Sync\" on that bug  \n**Then** the Jira issue status is updated to match (bidirectional)\n\n**Given** a local bug has no Jira issue yet  \n**When** I click \"Create in Jira\"  \n**Then** a new Jira issue is created and the local bug is linked with the Jira key and URL\n\n**Given** the Jira credentials are invalid  \n**When** sync is attempted  \n**Then** an error message is shown and no data is corrupted\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created via reverse-engineer |\n"},{"rel":"epics/E-004-bug-management/T-004-001-s-004-001-test-plan.md","content":"# Test Plan: Auto-Create Bug Tickets from Maestro Failures\n\n**ID:** T-004-001\n**Project:** morbius\n**Story:** S-004-001\n**Epic:** E-004\n**Version:** 1.0\n**Created:** 2026-04-29\n**Updated:** 2026-04-29\n\n> _Generated from Morbius test cases (E-023 publish-back). 3 test case(s) sourced from `morbius:S-004-001`._\n\n---\n\n## Scope\n\n rsona\n\nThe PM Stakeholder\n\n## Dependencies\n\n- E-002 (Test Case Management) — test history required for flakiness scoring\n- E-003 (Test Execution + Maestro) — run results required for device coverage\n\n## Stories\n\n| ID | Title | Status | Stage |\n|----|-------|--------|-------|\n| S-005-001 | Flakiness Detection + Transition-Based Scoring | Done | Ready |\n| S-005-002 | Coverage Gap Detection (stale, missing, device gaps) | Done | Ready |\n| S-005-003 | Device Coverage Matrix (device × test status grid) | Done | Ready |\n| S-005-004 | Calculator Field Coverage Analysis (STS) | Done | Ready |\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created via reverse-engineer — documents Phase 2 completed work |\n"},{"rel":"epics/E-005-analytics-coverage/S-005-001-flakiness-detection.md","content":"# Story: Flakiness Detection + Transition-Based Scoring\n\n**ID:** S-005-001\n**Project:** morbius\n**Epic:** E-005\n**Stage:** Ready\n**Status:** Done\n**Priority:** P1\n**Version:** 1.0\n**Created:** 2026-04-21\n**Updated:** 2026-04-21\n\n---\n\n## Story\n\nAs a QA lead, I want flaky tests automatically identified and ranked by flakiness score, so the team knows which tests need stabilisation before they waste time chasing intermittent failures.\n\n## Acceptance Criteria\n\n**Given** a test has a run history with alternating pass/fail results  \n**When** the flakiness score is calculated  \n**Then** score = transitions / (window - 1); a perfectly alternating P-F-P-F scores 1.0; always-passing scores 0.0\n\n**Given** a test scores ≥0.4 over the last 10 runs  \n**When** the Dashboard loads  \n**Then** that test appears in the Flaky Tests section, ranked by score descending\n\n**Given** fewer than 2 runs exist for a test  \n**When** flakiness is calculated  \n**Then** the test is excluded from the flaky list (insufficient data)\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created via reverse-engineer |\n"},{"rel":"epics/E-005-analytics-coverage/S-005-002-coverage-gaps.md","content":"# Story: Coverage Gap Detection\n\n**ID:** S-005-002\n**Project:** morbius\n**Epic:** E-005\n**Stage:** Ready\n**Status:** Done\n**Priority:** P1\n**Version:** 1.0\n**Created:** 2026-04-21\n**Updated:** 2026-04-21\n\n---\n\n## Story\n\nAs a QA lead, I want Morbius to automatically detect coverage gaps — tests with no automation, categories with no tests, and tests not run in over a week — so I know where the QA blind spots are without manually auditing the board.\n\n## Acceptance Criteria\n\n**Given** a test case has no `maestroFlow` linked  \n**When** the Dashboard loads  \n**Then** it appears in Coverage Gaps as \"no automation\"\n\n**Given** a category has zero test cases  \n**When** the Dashboard loads  \n**Then** it appears in Coverage Gaps as \"empty category\"\n\n**Given** a test has a `lastRun` timestamp older than 7 days  \n**When** the Dashboard loads  \n**Then** it appears in Coverage Gaps as \"stale — not run in X days\"\n\n**Given** a device has fewer than 50% of tests run against it  \n**When** the Dashboard loads  \n**Then** it appears in Coverage Gaps as \"low device coverage\"\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created via reverse-engineer |\n"},{"rel":"epics/E-005-analytics-coverage/S-005-003-device-coverage-matrix.md","content":"# Story: Device Coverage Matrix\n\n**ID:** S-005-003\n**Project:** morbius\n**Epic:** E-005\n**Stage:** Ready\n**Status:** Done\n**Priority:** P1\n**Version:** 1.0\n**Created:** 2026-04-21\n**Updated:** 2026-04-21\n\n---\n\n## Story\n\nAs a QA lead, I want a Devices tab showing a grid of every test × every device with pass/fail status, so I can see at a glance which tests are passing on iPad but failing on Android, and which device has the worst coverage.\n\n## Acceptance Criteria\n\n**Given** multiple devices are configured and tests have been run  \n**When** I open the Devices tab  \n**Then** a grid shows each device as a column and each test as a row, with a coloured cell for pass/fail/not-run status per (device, test) combination\n\n**Given** I sort the grid by \"Pass Rate\"  \n**When** sorted  \n**Then** devices with the lowest pass rate appear first\n\n**Given** no tests have been run on a device  \n**When** the grid renders  \n**Then** all cells for that device show \"not-run\" (grey)\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created via reverse-engineer |\n"},{"rel":"epics/E-005-analytics-coverage/S-005-004-calculator-coverage.md","content":"# Story: Calculator Field Coverage Analysis (STS)\n\n**ID:** S-005-004\n**Project:** morbius\n**Epic:** E-005\n**Stage:** Ready\n**Status:** Done\n**Priority:** P2\n**Version:** 1.0\n**Created:** 2026-04-21\n**Updated:** 2026-04-21\n\n---\n\n## Story\n\nAs a developer, I want Morbius to cross-reference the STS calculator config with existing Maestro flows and test cases to show which fields are covered by automation and which aren't, so the team can prioritise test gaps in complex calculator forms.\n\n## Acceptance Criteria\n\n**Given** a `calculatorConfig.json` exists for the project  \n**When** I call `GET /api/coverage`  \n**Then** the response includes per-calculator coverage: totalFields, coveredFields (linked to test or flow), uncoveredFields, coverage %\n\n**Given** a calculator field ID appears in a YAML flow comment or test case markdown  \n**When** coverage is calculated  \n**Then** that field is marked as covered with a reference to the test/flow\n\n**Given** a calculator has 0% coverage  \n**When** coverage is displayed  \n**Then** it is highlighted as a priority gap\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created via reverse-engineer |\n"},{"rel":"epics/E-005-analytics-coverage/T-005-001-s-005-001-test-plan.md","content":"# Test Plan: Flakiness Detection + Transition-Based Scoring\n\n**ID:** T-005-001\n**Project:** morbius\n**Story:** S-005-001\n**Epic:** E-005\n**Version:** 1.0\n**Created:** 2026-04-29\n**Updated:** 2026-04-29\n\n> _Generated from Morbius test cases (E-023 publish-back). 3 test case(s) sourced from `morbius:S-005-001`._\n\n---\n\n## Scope\n\nVerification of S-005-001 acceptance criteria. 3 test case(s) span the happy path plus negative and edge variations.\n\n## Prerequisites\n\n- (Inherit from story Prerequisites; fill in environment + data setup before authoring)\n\n## AC Coverage Map\n\n| AC | Test Cases | Coverage |\n|----|-----------|----------|\n| AC-001 | TC-005-001-001 | ✓ |\n| AC-002 | TC-005-001-002 | ✓ |\n| AC-003 | TC-005-001-003 | ✓ |\n\n---\n\n## Core Test Flow\n\n> P0 — exactly one test case per plan. Must pass before Sub Flow testing begins. Stop if P0 fails.\n\n### TC-005-001-001: Flakiness Detection + Transition-Based Scoring — Test Plan\n\n**Type:** E2E\n**Priority:** P0\n**AC Covered:** AC-001\n**Dependencies:** None\n\n<!-- Morbius source: TC-MOR-005-001-1 (sourceChecksum=9b323c5a08fc1ac4) -->\n\n**Preconditions:**\n- (derived from story prerequisites — fill in or leave empty)\n\n**Steps:**\n1. # Test Plan: Flakiness Detection + Transition-Based Scoring\n2. T-005-001\n3. morbius\n4. S-005-001\n5. E-005\n6. 1.0\n7. 2026-04-29\n8. 2026-04-29\n9. > _Generated from Morbius test cases (E-023 publish-back). 3 test case(s) sourced from `morbius:S-005-001`._\n10. ---\n\n**Expected Result:**\n# Test Plan: Flakiness Detection + Transition-Based Scoring\n\n**ID:** T-005-001\n**Project:** morbius\n**Story:** S-005-001\n**Epic:** E-005\n**Version:** 1.0\n**Created:** 2026-04-29\n**Updated:** 2026-04-29\n\n> _Generated from Morbius test cases (E-023 publish-back). 3 test case(s) sourced from `mo ct:** morbius\n**Stage:** Draft\n**Version:** 1.0\n**Created:** 2026-04-21\n**Updated:** 2026-04-21\n\n---\n\n## Outcome\n\nThe team has a live visual map of the app's navigation, a full settings page to configure every integration and device, AI-powered Maestro flow generation for complex calculators, and a Claude Code chat window accessible from the dashboard.\n\n## Success Metric\n\n| Metric | Baseline | Target |\n|--------|----------|--------|\n| Maestro YAML flows auto-generated from calculator config | Manual authoring only | All calculator sections generate valid runnable YAML |\n| Team members using chat from browser | 0 | Claude Code accessible to any team member via dashboard |\n\n## Primary Persona\n\nThe Developer\n\n## Dependencies\n\n- E-001 (Core Dashboard + Data Foundation)\n- E-003 (Test Execution + Maestro)\n\n## Stories\n\n| ID | Title | Status | Stage |\n|----|-------|--------|-------|\n| S-006-001 | App Navigation Map (Mermaid flowchart, per-project) | Done | Ready |\n| S-006-002 | Maestro YAML Flow Generation from Calculator Config | Done | Ready |\n| S-006-003 | Claude Code Chat Integration (WebSocket bridge) | Done | Ready |\n| S-006-004 | Settings Page (project config, devices, Jira, Maestro paths, appearance) | Done | Ready |\n| S-006-005 | Run Media Viewer (videos + screenshots from test runs) | Done | Ready |\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created via reverse-engineer — documents Phase 2.5 completed work |\n"},{"rel":"epics/E-006-appmap-agent-skills/S-006-001-app-navigation-map.md","content":"# Story: App Navigation Map (Mermaid Flowchart)\n\n**ID:** S-006-001\n**Project:** morbius\n**Epic:** E-006\n**Stage:** Ready\n**Status:** Done\n**Priority:** P2\n**Version:** 1.0\n**Created:** 2026-04-21\n**Updated:** 2026-04-21\n\n---\n\n## Story\n\nAs a developer, I want a visual Mermaid flowchart of the app's navigation structure stored in the project config and rendered in the dashboard, so any new team member can understand the app's screen flow without running the app.\n\n## Acceptance Criteria\n\n**Given** an `appMap` field exists in `config.json`  \n**When** I navigate to the App Map section  \n**Then** the Mermaid chart is rendered showing all screens and transitions\n\n**Given** I update the `appMap` field via `POST /api/config/update`  \n**When** I reload  \n**Then** the new chart is displayed immediately\n\n**Given** the `appMap` field is empty  \n**When** I open the App Map  \n**Then** a placeholder message explains how to add the app map\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created via reverse-engineer |\n"},{"rel":"epics/E-006-appmap-agent-skills/S-006-002-flow-generation.md","content":"# Story: Maestro YAML Flow Generation from Calculator Config\n\n**ID:** S-006-002\n**Project:** morbius\n**Epic:** E-006\n**Stage:** Ready\n**Status:** Done\n**Priority:** P1\n**Version:** 1.0\n**Created:** 2026-04-21\n**Updated:** 2026-04-21\n\n---\n\n## Story\n\nAs a developer, I want to run `morbius generate-flows --config calculatorConfig.json --output flows/` and have complete Maestro YAML generated for each calculator section, so I don't manually write YAML for complex multi-field forms.\n\n## Acceptance Criteria\n\n**Given** a `calculatorConfig.json` with sections and field definitions  \n**When** I run `morbius generate-flows`  \n**Then** one YAML file is generated per calculator section with the correct tapOn/inputText/scrollUntilVisible commands for each field type (checkbox, singleSelect, integer, multiSelect, dateTime)\n\n**Given** a field has a `visibleIf` dependency  \n**When** flow is generated  \n**Then** the parent field action appears before the dependent field (topological sort)\n\n**Given** `--dry-run` is passed  \n**When** the command runs  \n**Then** the generated YAML is printed to stdout without writing any files\n\n**Given** `--platform ios`  \n**When** flows are generated  \n**Then** iOS-specific command variants are used where Maestro differs between platforms\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created via reverse-engineer |\n"},{"rel":"epics/E-006-appmap-agent-skills/S-006-003-claude-chat-integration.md","content":"# Story: Claude Code Chat Integration (WebSocket Bridge)\n\n**ID:** S-006-003\n**Project:** morbius\n**Epic:** E-006\n**Stage:** Ready\n**Status:** Done\n**Priority:** P1\n**Version:** 1.0\n**Created:** 2026-04-21\n**Updated:** 2026-04-21\n\n---\n\n## Story\n\nAs a developer, I want a chat drawer in the dashboard that connects directly to the local Claude Code CLI, so any team member can ask the Morbius agent to run tests, write flows, or investigate failures from the browser.\n\n## Acceptance Criteria\n\n**Given** Claude Code CLI is installed locally  \n**When** I open the Chat drawer  \n**Then** a WebSocket connects to `/ws/chat` and the input is ready\n\n**Given** I send a message  \n**When** the server processes it  \n**Then** it spawns `claude --model claude-sonnet-4-6 \"<message>\"` and streams stdout to the browser in real time (type: chunk/info/done/error)\n\n**Given** I close the chat drawer while a response is streaming  \n**When** the WebSocket disconnects  \n**Then** the Claude process is killed (120s timeout also applies)\n\n**Given** Claude Code CLI is not installed  \n**When** I try to send a message  \n**Then** an error message explains that Claude Code is required and how to install it\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created via reverse-engineer |\n"},{"rel":"epics/E-006-appmap-agent-skills/S-006-004-settings-page.md","content":"# Story: Settings Page (Project Config, Devices, Integrations, Appearance)\n\n**ID:** S-006-004\n**Project:** morbius\n**Epic:** E-006\n**Stage:** Ready\n**Status:** Done\n**Priority:** P1\n**Version:** 1.0\n**Created:** 2026-04-21\n**Updated:** 2026-04-21\n\n---\n\n## Story\n\nAs a QA lead, I want a Settings tab where I can configure the active project's Maestro paths, device list, Jira credentials, and appearance preferences — all from the browser — without editing JSON files by hand.\n\n## Acceptance Criteria\n\n**Given** I open the Settings tab  \n**When** it loads  \n**Then** I see sections: Profile, Workspace, Integrations, Devices, Maestro, Test Runs, Appearance, Data, Danger Zone\n\n**Given** I update the Android Maestro path in Settings  \n**When** I save  \n**Then** `POST /api/config/update` writes the new path to `config.json` and the Maestro tab reloads with the new path\n\n**Given** I add a new device in the Devices section  \n**When** saved  \n**Then** the device appears in the Device Coverage Matrix and is available as an option in bug creation\n\n**Given** I toggle dark/light theme  \n**When** the toggle is flipped  \n**Then** the entire dashboard switches theme immediately without a page reload\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created via reverse-engineer |\n"},{"rel":"epics/E-006-appmap-agent-skills/S-006-005-run-media-viewer.md","content":"# Story: Run Media Viewer (Videos + Screenshots)\n\n**ID:** S-006-005\n**Project:** morbius\n**Epic:** E-006\n**Stage:** Ready\n**Status:** Done\n**Priority:** P2\n**Version:** 1.0\n**Created:** 2026-04-21\n**Updated:** 2026-04-21\n\n---\n\n## Story\n\nAs a developer, I want to view test run videos and screenshots directly in the dashboard from the Runs tab, so I can replay a failing test's screen recording without navigating to the file system.\n\n## Acceptance Criteria\n\n**Given** a test run has media files (screenshots, screen recordings) in the configured `mediaPath`  \n**When** I open the Runs tab and click a run  \n**Then** a media gallery shows all screenshots and videos from that run\n\n**Given** I run `morbius ingest-media --timestamp`  \n**When** the command runs  \n**Then** the latest Maestro run's media is copied from the Maestro output directory to the project `mediaPath`\n\n**Given** the `mediaPath` is outside the project root  \n**When** media is served  \n**Then** it is served via `GET /media/<path>` (not `GET /screenshots/<path>`) to avoid path conflicts\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created via reverse-engineer |\n"},{"rel":"epics/E-006-appmap-agent-skills/T-006-001-s-006-001-test-plan.md","content":"# Test Plan: App Navigation Map (Mermaid Flowchart)\n\n**ID:** T-006-001\n**Project:** morbius\n**Story:** S-006-001\n**Epic:** E-006\n**Version:** 1.0\n**Created:** 2026-04-29\n**Updated:** 2026-04-29\n\n> _Generated from Morbius test cases (E-023 publish-back). 3 test case(s) sourced from `morbius:S-006-001`._\n\n---\n\n## Scope\n\nVerification of S-006-001 acceptance criteria. 3 test case(s) span the happy path plus negative and edge variations.\n\n## Prerequisites\n\n- (Inherit from story Prerequisites; fill in environment + data setup before authoring)\n\n## AC Coverage Map\n\n| AC | Test Cases | Coverage |\n|----|-----------|----------|\n| AC-001 | TC-006-001-001 | ✓ |\n| AC-002 | TC-006-001-002 | ✓ |\n| AC-003 | TC-006-001-003 | ✓ |\n\n---\n\n## Core Test Flow\n\n> P0 — exactly one test case per plan. Must pass before Sub Flow testing begins. Stop if P0 fails.\n\n### TC-006-001-001: App Navigation Map (Mermaid Flowchart) — Test Plan\n\n**Type:** E2E\n**Priority:** P0\n**AC Covered:** AC-001\n**Dependencies:** None\n\n<!-- Morbius source: TC-MOR-006-001-1 (sourceChecksum=48a8ae6d8d18ebef) -->\n\n**Preconditions:**\n- (derived from story prerequisites — fill in or leave empty)\n\n**Steps:**\n1. # Test Plan: App Navigation Map (Mermaid Flowcha table on ≥1 BrowserStack device |\n| Real-device failure → auto-created bug ticket rate | 0% | 100% of failed flows create a bug with screenshot |\n\n## Primary Persona\n\nThe QA Lead\n\n## Dependencies\n\n- None — Phase 1–2.5 infrastructure is complete and provides the foundation\n\n## Stories\n\n| ID | Title | Status | Stage |\n|----|-------|--------|-------|\n| S-007-001 | BrowserStack Account Connection | Backlog | Draft |\n| S-007-002 | Device Catalog + Selection UI | Backlog | Draft |\n| S-007-003 | Run Flows on BrowserStack Devices | Backlog | Draft |\n| S-007-004 | Pull Results + Screenshots into Dashboard | Backlog | Draft |\n| S-007-005 | Auto-Create Bug on Cloud Failure | Backlog | Draft |\n| S-007-006 | Device Matrix Auto-Population | Backlog | Draft |\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created from ROADMAP.md Phase 3 |\n| 2026-04-23 | 1.1 | Claude | Parked — Bet A territory; superseded by direction-2026-04.md 7-phase plan |\n"},{"rel":"epics/E-008-settings-integrations-hub/E-008.md","content":"# Epic: Settings Page + Integrations Hub\n\n**ID:** E-008\n**Project:** morbius\n**Stage:** Parked\n**Version:** 1.1\n**Created:** 2026-04-21\n**Updated:** 2026-04-23\n**Sources:** ROADMAP.md\n\n---\n\n## Status\n\n**Parked — largely superseded by E-006 / S-006-004 (Settings Page, Done).** Remaining integration breadth (Linear, GitHub, Slack, BrowserStack panel) is Bet A scope. See [direction-2026-04.md](../../wiki/direction-2026-04.md). Do not break into stories without an explicit new direction doc.\n\n## Outcome\n\nAll team members will have a single settings page to connect devices, configure integrations (Jira, Linear, GitHub, Slack), manage API keys, and monitor the health of all connected services — eliminating the need to edit config files or environment variables directly.\n\n## Success Metric\n\n| Metric | Baseline | Target |\n|--------|----------|--------|\n| Integrations configurable from UI (vs. config file) | 0 | Jira, BrowserStack, Slack, GitHub all configurable from settings |\n| Time to connect a new integration for a non-developer | Manual config edit | Under 5 minutes from Settings page |\n\n## Primary Persona\n\nThe QA Lead\n\n## Dependencies\n\n- E-007 (Device Cloud + BrowserStack) — BrowserStack settings section depends on Phase 3 integration being built\n\n## Stories\n\n| ID | Title | Status | Stage |\n|----|-------|--------|-------|\n| S-008-001 | Settings Page Shell + Navigation | Backlog | Draft |\n| S-008-002 | Device Connections Panel | Backlog | Draft |\n| S-008-003 | Jira Integration Settings | Backlog | Draft |\n| S-008-004 | Linear + GitHub + Slack Integrations | Backlog | Draft |\n| S-008-005 | AI & Automation Config | Backlog | Draft |\n| S-008-006 | Notifications + Webhook Config | Backlog | Draft |\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created from ROADMAP.md Phase 4 |\n| 2026-04-23 | 1.1 | Claude | Parked — superseded by S-006-004 (Done) + Bet A integrations scope |\n"},{"rel":"epics/E-009-multi-framework-support/E-009.md","content":"# Epic: Multi-Framework Support\n\n**ID:** E-009\n**Project:** morbius\n**Stage:** Parked\n**Version:** 1.1\n**Created:** 2026-04-21\n**Updated:** 2026-04-23\n**Sources:** ROADMAP.md\n\n---\n\n## Status\n\n**Parked — Bet A territory (multi-framework breadth).** Not on the active 7-phase plan. Maestro stays the single supported framework under Bet C. See [direction-2026-04.md](../../wiki/direction-2026-04.md). Do not break into stories until Bet A activates.\n\n## Outcome\n\nDevelopment teams will be able to run Appium and Detox test suites alongside Maestro flows from the same Morbius dashboard — with a unified results view — eliminating the need to maintain separate tooling for teams that use different test frameworks.\n\n## Success Metric\n\n| Metric | Baseline | Target |\n|--------|----------|--------|\n| Frameworks supported | 1 (Maestro) | 3 (Maestro + Appium + Detox) |\n| Existing Appium suites importable without code changes | 0% | Import and run without modification for standard suites |\n\n## Primary Persona\n\nThe Developer\n\n## Dependencies\n\n- E-007 (Device Cloud + BrowserStack) — cloud execution must be available before multi-framework makes sense at scale\n- E-008 (Settings + Integrations) — framework adapters configured from Settings page\n\n## Stories\n\n| ID | Title | Status | Stage |\n|----|-------|--------|-------|\n| S-009-001 | Framework Adapter Architecture | Backlog | Draft |\n| S-009-002 | Appium Adapter | Backlog | Draft |\n| S-009-003 | Detox Adapter | Backlog | Draft |\n| S-009-004 | Unified Results View | Backlog | Draft |\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created from ROADMAP.md Phase 5 |\n| 2026-04-23 | 1.1 | Claude | Parked — Bet A territory; Maestro-only under Bet C |\n"},{"rel":"epics/E-010-claude-api-integration/E-010.md","content":"# Epic: Claude API Deep Integration + Self-Healing Tests\n\n**ID:** E-010\n**Project:** morbius\n**Stage:** Parked\n**Version:** 1.1\n**Created:** 2026-04-21\n**Updated:** 2026-04-23\n**Sources:** ROADMAP.md\n\n---\n\n## Status\n\n**Parked — superseded.** Self-healing scope moves to E-017 (Self-Healing Selectors, Core Four #1). Claude API deep-integration is gated by E-022 (Maestro-as-SDK-Agent, decision-only — do not build). See [direction-2026-04.md](../../wiki/direction-2026-04.md). Do not break into stories.\n\n## Outcome\n\nAny team member — not just developers with Claude Code CLI installed — will be able to use the Morbius AI agent to explore an app, generate all test flows automatically, and have failing tests self-heal when UI selectors change, reducing test maintenance from hours to minutes.\n\n## Success Metric\n\n| Metric | Baseline | Target |\n|--------|----------|--------|\n| Agent accessible to non-developers (no CLI required) | 0% of team | 100% via Claude API in Settings |\n| Selector-change failures auto-fixed without human intervention | 0% | 70% auto-resolved |\n| Time to generate flows for a new app screen | Manual YAML authoring (hours) | Under 15 minutes via agent exploration |\n\n## Primary Persona\n\nThe QA Lead\n\n## Dependencies\n\n- E-008 (Settings + Integrations) — Claude API key configured from Settings page\n- E-007 (Device Cloud + BrowserStack) — agent-driven test execution needs cloud devices\n\n## Stories\n\n| ID | Title | Status | Stage |\n|----|-------|--------|-------|\n| S-010-001 | Replace Claude Code CLI with Claude API | Backlog | Draft |\n| S-010-002 | Agent-Driven App Exploration + Flow Generation | Backlog | Draft |\n| S-010-003 | Self-Healing Selector Failure Recovery | Backlog | Draft |\n| S-010-004 | Chat-First Dashboard Control (Tambo.ai) | Backlog | Draft |\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created from ROADMAP.md Phase 6 |\n| 2026-04-23 | 1.1 | Claude | Parked — self-healing → E-017; Claude API deep-integration → E-022 (gated) |\n"},{"rel":"epics/E-011-saas-platform/E-011.md","content":"# Epic: SaaS Platform\n\n**ID:** E-011\n**Project:** morbius\n**Stage:** Parked\n**Version:** 1.1\n**Created:** 2026-04-21\n**Updated:** 2026-04-23\n**Sources:** ROADMAP.md\n\n---\n\n## Status\n\n**Parked — pure Bet A.** Activates only on inbound demand surfaced by Bet B harvest. Markdown DB stays authoritative under Bet C — see Guardrail #4 in [direction-2026-04.md](../../wiki/direction-2026-04.md). Do not break into stories until Bet A activates.\n\n## Outcome\n\nExternal teams will be able to sign up for Morbius as a hosted service, collaborate with role-based access, and run tests in the cloud — without any local installation — enabling Morbius to operate as a commercial product with recurring revenue.\n\n## Success Metric\n\n| Metric | Baseline | Target |\n|--------|----------|--------|\n| Paying teams on hosted platform | 0 | 20 teams within 6 months of Phase 7 launch |\n| Time from sign-up to first test run | N/A (local only) | Under 30 minutes |\n| Data stored in PostgreSQL (vs. markdown files) | 0% | 100% of test, bug, and run data |\n\n## Primary Persona\n\nThe QA Lead\n\n## Dependencies\n\n- E-007 (Device Cloud + BrowserStack) — cloud execution is a core SaaS value prop\n- E-008 (Settings + Integrations) — integrations hub required for team config\n- E-009 (Multi-Framework) — broader framework support increases addressable market\n- E-010 (Claude API) — no local CLI dependency required for SaaS\n\n## Stories\n\n| ID | Title | Status | Stage |\n|----|-------|--------|-------|\n| S-011-001 | Auth — OAuth + Email/Password | Backlog | Draft |\n| S-011-002 | Multi-Tenant Organisation + Teams | Backlog | Draft |\n| S-011-003 | RBAC — Admin, QA Lead, Tester, Viewer | Backlog | Draft |\n| S-011-004 | PostgreSQL Migration (replace markdown files) | Backlog | Draft |\n| S-011-005 | S3 Storage for Screenshots + Artifacts | Backlog | Draft |\n| S-011-006 | Billing + Pricing Tiers | Backlog | Draft |\n| S-011-007 | Hosting + Deployment (Vercel/Railway) | Backlog | Draft |\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created from ROADMAP.md Phase 7 |\n| 2026-04-23 | 1.1 | Claude | Parked — pure Bet A; gated on inbound demand |\n"},{"rel":"epics/E-012-advanced-features/E-012.md","content":"# Epic: Advanced Features — Visual Regression + CI/CD + Analytics\n\n**ID:** E-012\n**Project:** morbius\n**Stage:** Parked\n**Version:** 1.1\n**Created:** 2026-04-21\n**Updated:** 2026-04-23\n**Sources:** ROADMAP.md\n\n---\n\n## Status\n\n**Parked — Bet A/B territory** (visual regression, CI/CD gates, exec analytics). Not on the active 7-phase plan. Flakiness analytics already covered by E-005 / S-005-001. See [direction-2026-04.md](../../wiki/direction-2026-04.md). Do not break into stories without an explicit new direction doc.\n\n## Outcome\n\nQA leads and developers will have automated visual regression detection, CI/CD pipeline integration that blocks bad PRs, and rich analytics dashboards — making Morbius the definitive source of truth for app quality across every release.\n\n## Success Metric\n\n| Metric | Baseline | Target |\n|--------|----------|--------|\n| Visual regressions caught before release (vs. reported by users) | 0% (no visual regression today) | 80% caught pre-release |\n| PRs blocked by failing critical tests | 0 | CI gate active on all projects |\n| Weekly test health digest sent to stakeholders | 0 | Automated weekly report for all Pro+ teams |\n\n## Primary Persona\n\nThe PM Stakeholder\n\n## Dependencies\n\n- E-005 (SaaS Platform) — CI/CD webhooks and analytics reports require hosted backend\n- E-007 (Device Cloud) — visual regression requires real-device screenshots from BrowserStack\n\n## Stories\n\n| ID | Title | Status | Stage |\n|----|-------|--------|-------|\n| S-012-001 | Visual Regression Screenshot Comparison | Backlog | Draft |\n| S-012-002 | GitHub Actions CI/CD Integration | Backlog | Draft |\n| S-012-003 | Test Analytics + Flakiness Scores | Backlog | Draft |\n| S-012-004 | PDF Reports + Weekly Email Digest | Backlog | Draft |\n| S-012-005 | Test Recording from Real Device | Backlog | Draft |\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created from ROADMAP.md Phase 8 |\n| 2026-04-23 | 1.1 | Claude | Parked — Bet A/B territory; flakiness already covered by S-005-001 |\n"},{"rel":"epics/E-013-jira-sync-hardening/E-013.md","content":"# Epic: Jira Sync Hardening + Settings Health\n\n**ID:** E-013\n**Project:** morbius\n**Stage:** Backlog\n**Priority:** P0\n**Version:** 1.0\n**Created:** 2026-04-23\n**Updated:** 2026-04-23\n**Sources:** wiki/direction-2026-04.md, plan: what-you-think-there-fluffy-dragon.md (Phase 0.1 + 3.2)\n\n---\n\n## Outcome\n\nQA leads can trust that Jira ↔ Morbius stays consistent without manual reconciliation. Broken sync — the current state — is the hard blocker for Core Four #2 (Ticket→Repro). This epic fixes the sync's root cause, exposes a Settings health panel so drift is visible, and adds write-back + a replay queue for resilience.\n\n## Success Metric\n\n| Metric | Baseline | Target |\n|--------|----------|--------|\n| Bug-sync round-trip success rate | Broken (user-reported) | >99% over 7 days |\n| Sync failures visible in dashboard | 0% (silent) | 100% surfaced in health panel |\n| Time-to-discover a sync failure | Days (user notices manually) | <5 min (panel alert) |\n\n## Primary Persona\n\nThe QA Lead\n\n## Dependencies\n\n- None — this is the first blocker\n\n## Stories\n\n| ID | Title | Status | Stage | Priority |\n|----|-------|--------|-------|----------|\n| S-013-001 | Audit & Fix Jira Sync Failure Modes | Done | Ready | P0 |\n| S-013-002 | Jira Sync Health Panel in Settings | Done | Ready | P0 |\n| S-013-003 | Jira Write-Back for Morbius Bug Edits | Done | Ready | P1 |\n| S-013-004 | Failed-Sync Replay Queue | Done | Ready | P1 |\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-23 | 1.0 | Claude | Created — Phase 0.1 of 2026-04 direction |\n| 2026-04-23 | 1.1 | Claude | S-013-001 shipped: typed-error wrapper + retries + ring-buffer + `/api/jira/errors`; root cause was wrong auth scheme (Bearer → Basic) |\n| 2026-04-23 | 1.2 | Claude | E-013 complete: S-013-002 (health panel + `/api/jira/health`), S-013-003 (write-back for status/priority/notes/screenshots, deduped attachments), S-013-004 (persisted replay queue + 60s background ticker + manual retry/discard). Held for review — not pushed. |\n"},{"rel":"epics/E-013-jira-sync-hardening/S-013-001-audit-fix-sync-failure-modes.md","content":"# Story: Audit & Fix Jira Sync Failure Modes\n\n**ID:** S-013-001\n**Project:** morbius\n**Epic:** E-013\n**Stage:** Ready\n**Status:** Done\n**Priority:** P0\n**Version:** 1.1\n**Created:** 2026-04-23\n**Updated:** 2026-04-23\n\n---\n\n## Story\n\nAs a QA lead, I want the root cause of Jira sync failures identified and fixed so that bug state stays consistent between Morbius and Jira without manual reconciliation.\n\n## Acceptance Criteria\n\n**Given** the Jira sync code is instrumented with structured logging\n**When** a sync operation runs\n**Then** each failure mode (auth, webhook drift, write conflict, rate limit) is logged with a distinct error code and the last 20 errors are readable via an API endpoint\n\n**Given** a reproducible failure mode has been identified\n**When** the root cause fix is deployed\n**Then** a 7-day canary run shows >99% sync success rate with no silent data loss\n\n**Given** a Jira API call fails transiently\n**When** the sync retries\n**Then** the retry uses exponential backoff and does not mask persistent failures as transient (escalates after 3 attempts)\n\n**Given** the fix is complete\n**When** a QA lead runs a round-trip test (create ticket in Jira → see in Morbius → update in Morbius → see in Jira)\n**Then** all steps complete within 2 minutes with no manual sync buttons needed\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-23 | 1.0 | Claude | Created |\n| 2026-04-23 | 1.1 | Claude | Implemented: `jiraCall` wrapper (Basic auth, typed error codes, 3-attempt exponential backoff for retryable codes only); ring buffer + `GET /api/jira/errors` endpoint; `sync-all` no longer fire-and-forget (awaits each bug, returns per-bug results); `sync-jira` and `create-jira` refactored to use the wrapper. Root-cause fix: `/sync-jira` was using Bearer auth — Atlassian Cloud REST v3 requires Basic auth with email + API token. Updated `arch.md` Endpoints table. AC1 + AC3 met; AC2 (7-day canary) requires real Jira config + observation window; AC4 (no manual buttons) is S-013-002 territory. |\n"},{"rel":"epics/E-013-jira-sync-hardening/S-013-002-settings-health-panel.md","content":"# Story: Jira Sync Health Panel in Settings\n\n**ID:** S-013-002\n**Project:** morbius\n**Epic:** E-013\n**Stage:** Ready\n**Status:** Done\n**Priority:** P0\n**Version:** 1.1\n**Created:** 2026-04-23\n**Updated:** 2026-04-23\n\n---\n\n## Story\n\nAs a QA lead, I want a Jira sync health panel in Settings so that I can see at a glance whether sync is working, when it last ran, and what's pending — without having to open Jira to find out.\n\n## Acceptance Criteria\n\n**Given** Settings → Integrations → Jira is open\n**When** the health panel renders\n**Then** it shows: last successful sync time, sync status (healthy / degraded / broken), pending write queue count, and the last 5 error messages with timestamps\n\n**Given** sync has been broken for >5 minutes\n**When** the panel renders\n**Then** a red status indicator and suggested remediation action are visible\n\n**Given** the user clicks \"Sync Now\"\n**When** the manual sync completes\n**Then** the health panel refreshes with the new timestamp and any new errors\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-23 | 1.0 | Claude | Created |\n| 2026-04-23 | 1.1 | Claude | Implemented: `GET /api/jira/health` returning `{status, configured, lastSuccessAt, lastErrorAt, queueCount, stuckCount, errorsLast5, remediation}`. New `JiraHealthPanel` React component renders above the Jira credentials form in Settings → Integrations → Jira; auto-polls every 15s, shows status pill (healthy/degraded/broken/unconfigured), last sync times, replay queue count + stuck count, last 5 errors, contextual remediation. Manual \"Sync now\" button hits `/api/bugs/sync-all` + kicks `/api/jira/queue/replay`. Per-queue-item Retry/Discard buttons. Status mapping: `broken` if last error newer than last success and <5 min old, or any stuck items; `degraded` if queue non-empty or recent transient errors; `healthy` otherwise. AC1, AC2, AC3 all met. |\n"},{"rel":"epics/E-013-jira-sync-hardening/S-013-003-jira-writeback.md","content":"# Story: Jira Write-Back for Morbius Bug Edits\n\n**ID:** S-013-003\n**Project:** morbius\n**Epic:** E-013\n**Stage:** Ready\n**Status:** Done\n**Priority:** P1\n**Version:** 1.1\n**Created:** 2026-04-23\n**Updated:** 2026-04-23\n\n---\n\n## Story\n\nAs a QA lead, I want edits I make to a bug in Morbius to propagate back to Jira so that Jira stays the single source of truth without me having to duplicate updates.\n\n## Acceptance Criteria\n\n**Given** a bug is linked to a Jira issue\n**When** I update its status, assignee, or notes in Morbius\n**Then** the Jira issue reflects the change within one sync cycle (<60s)\n\n**Given** a screenshot is attached to a bug in Morbius\n**When** write-back runs\n**Then** the screenshot is uploaded as an attachment to the Jira issue (once per screenshot, deduped by hash)\n\n**Given** a write-back fails due to a Jira API error\n**When** the failure occurs\n**Then** the edit is queued in the replay queue (see S-013-004) and the health panel shows the pending count\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-23 | 1.0 | Claude | Created |\n| 2026-04-23 | 1.1 | Claude | Implemented: `pushBugWriteback()` orchestrator hooked into `POST /api/bug/update` — fire-and-forget after the local update succeeds, so the UI stays fast. Per-field handlers: `pushBugStatusToJira` (fetches `/transitions`, picks one whose `to.name` matches the Morbius→Jira map, POSTs the transition); `pushBugPriorityToJira` (PUT `fields.priority`); `pushBugCommentToJira` (POST `/comment` in ADF v1, prefixed `[Morbius]`); `pushBugAttachmentToJira` (multipart upload via Node `FormData` + `X-Atlassian-Token: no-check`, deduped by SHA-256 stored in `attachmentHashes` per bugId in `jira-sync-state.json`). All four handlers route through `jiraCall` so they get typed errors + 3-attempt backoff. Retryable failures auto-enqueue in the replay queue (S-013-004). AC1 + AC2 met; AC3 (queueing on failure) is the integration with S-013-004 — verified by code path. |\n"},{"rel":"epics/E-013-jira-sync-hardening/S-013-004-replay-queue.md","content":"# Story: Failed-Sync Replay Queue\n\n**ID:** S-013-004\n**Project:** morbius\n**Epic:** E-013\n**Stage:** Ready\n**Status:** Done\n**Priority:** P1\n**Version:** 1.1\n**Created:** 2026-04-23\n**Updated:** 2026-04-23\n\n---\n\n## Story\n\nAs a QA lead, I want failed Jira sync operations automatically retried so that transient network or API issues don't result in silent data loss.\n\n## Acceptance Criteria\n\n**Given** a sync operation fails due to a retriable error (network, 5xx, rate limit)\n**When** the failure occurs\n**Then** the operation is stored in `data/{projectId}/jira-sync-state.json` replay queue with timestamp, error, and payload\n\n**Given** items exist in the replay queue\n**When** the next sync cycle runs\n**Then** queued items are replayed first, with exponential backoff; on success they're removed from the queue\n\n**Given** a queued item has failed >10 times over 24h\n**When** the next replay runs\n**Then** the item is marked as \"stuck,\" surfaced in the health panel, and requires manual action (retry / discard)\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-23 | 1.0 | Claude | Created |\n| 2026-04-23 | 1.1 | Claude | Implemented: persisted state file `data/{projectId}/jira-sync-state.json` with shape `{lastSuccessAt, lastErrorAt, queue[], attachmentHashes{}}`. `enqueueJiraReplay()` only queues retryable codes (NETWORK / RATE_LIMIT / SERVER); deterministic codes (AUTH / PERMISSION / NOT_FOUND / BAD_REQUEST / CONFIG) are surfaced loudly but not retried. Items dedupe on `(kind, bugId)`. Per-item exponential backoff: 2^attempts seconds, capped at 1h. 60s background ticker (`startJiraReplayTimer` → started from `server.listen` callback) replays eligible items for the active project. Stuck rule: `attempts > 10` AND first failure >24h ago. Manual endpoints: `POST /api/jira/queue/:id/retry` (drops attempt counter, runs immediately, removes on success) and `POST /api/jira/queue/:id/discard` (force-drop). Replay handlers exist for all five queue kinds: `sync-bug`, `writeback-status`, `writeback-priority`, `writeback-comment`, `writeback-attachment`. Surfaces in the Settings health panel (S-013-002). AC1, AC2, AC3 met. |\n"},{"rel":"epics/E-013-jira-sync-hardening/T-013-001-s-013-001-test-plan.md","content":"# Test Plan: Audit & Fix Jira Sync Failure Modes\n\n**ID:** T-013-001\n**Project:** morbius\n**Story:** S-013-001\n**Epic:** E-013\n**Version:** 1.0\n**Created:** 2026-04-29\n**Updated:** 2026-04-29\n\n> _Generated from Morbius test cases (E-023 publish-back). 4 test case(s) sourced from `morbius:S-013-001`._\n\n---\n\n## Scope\n\nVerification of S-013-001 acceptance criteria. 4 test case(s) span the happy path plus negative and edge variations.\n\n## Prerequisites\n\n- (Inherit from story Prerequisites; fill in environment + data setup before authoring)\n\n## AC Coverage Map\n\n| AC | Test Cases | Coverage |\n|----|-----------|----------|\n| AC-001 | TC-013-001-001 | ✓ |\n| AC-002 | TC-013-001-002 | ✓ |\n| AC-003 | TC-013-001-003 | ✓ |\n| AC-004 | TC-013-001-004 | ✓ |\n\n---\n\n## Core Test Flow\n\n> P0 — exactly one test case per plan. Must pass before Sub Flow testing begins. Stop if P0 fails.\n\n### TC-013-001-001: Audit & Fix Jira Sync Failure Modes — Test Plan\n\n**Type:** E2E\n**Priority:** P0\n**AC Covered:** AC-001\n**Dependencies:** None\n\n<!-- Morbius source: TC-MOR-013-001-1 (sourceChecksum=844aa54575a571cb) -->\n\n**Preconditions:**\n- (derived from story prerequisites — fill in or leave empty)\n\n**Steps:**\n1. # Test Plan: Audit & Fix Jira Sync Failure Mo an | N/A (CLI-only) | <60 seconds |\n\n## Primary Persona\n\nThe QA Lead (especially at start of a new RF client engagement)\n\n## Dependencies\n\n- Existing `src/parsers/excel.ts` `importFromXlsx()` (shipped in E-002)\n\n## Stories\n\n| ID | Title | Status | Stage | Priority |\n|----|-------|--------|-------|----------|\n| S-014-001 | Drag-and-Drop Excel Upload in New-Project Modal | Done | Ready | P0 |\n| S-014-002 | Post-Upload Preview + Commit Flow | Done | Ready | P0 |\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-23 | 1.0 | Claude | Created — Phase 0.2 of 2026-04 direction |\n| 2026-04-23 | 1.1 | Claude | E-014 complete: parser split into `parseExcelFile` + `writeParsedExcel`; new `POST /api/excel/preview`; new `NewProjectModal` UI wired into sidebar project switcher (`+ New project…`). Held for review — not pushed. |\n"},{"rel":"epics/E-014-project-onboarding-upload/S-014-001-drag-drop-excel-upload.md","content":"# Story: Drag-and-Drop Excel Upload in New-Project Modal\n\n**ID:** S-014-001\n**Project:** morbius\n**Epic:** E-014\n**Stage:** Ready\n**Status:** Done\n**Priority:** P0\n**Version:** 1.1\n**Created:** 2026-04-23\n**Updated:** 2026-04-23\n\n---\n\n## Story\n\nAs a QA lead starting a new project, I want to drag an Excel test plan onto the new-project modal in the dashboard so that I don't have to open a terminal and run `morbius import`.\n\n## Acceptance Criteria\n\n**Given** the \"Create Project\" modal is open\n**When** I drag an `.xlsx` file onto the drop zone\n**Then** the file uploads, the project is created, and test cases are imported — all in one flow\n\n**Given** the file is not a valid `.xlsx`\n**When** upload is attempted\n**Then** a clear error message is shown and the project is not created\n\n**Given** the project is created successfully\n**When** I navigate to the test board\n**Then** imported categories and test cases appear in the kanban with no additional action required\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-23 | 1.0 | Claude | Created |\n| 2026-04-23 | 1.1 | Claude | Implemented: new `NewProjectModal` React component with drag-and-drop zone (reuses `.st-upload-zone` styling from `ExcelImportCard`), name + appId inputs, live slug-preview hint. Triggered from a new \"+ New project…\" entry appended to the Sidebar's project switcher dropdown. Side fix: replaced two `require('os')` calls in the ESM server with a top-level `import os from 'node:os'` — the existing `/api/excel/import` was silently broken in this ESM build. AC1 + AC2 + AC3 met (validated via preview screenshot, slug-derivation eval, and live `/api/excel/preview` call against the Micro-Air xlsx returning real category data). Bonus: replace-file button on the preview screen lets the user swap files without closing the modal. |\n"},{"rel":"epics/E-014-project-onboarding-upload/S-014-002-preview-commit.md","content":"# Story: Post-Upload Preview + Commit Flow\n\n**ID:** S-014-002\n**Project:** morbius\n**Epic:** E-014\n**Stage:** Ready\n**Status:** Done\n**Priority:** P0\n**Version:** 1.1\n**Created:** 2026-04-23\n**Updated:** 2026-04-23\n\n---\n\n## Story\n\nAs a QA lead, I want to preview the parsed test cases before committing the import so that I can catch malformed sheets or unexpected categories before they pollute my project.\n\n## Acceptance Criteria\n\n**Given** an Excel file has been uploaded\n**When** parsing completes\n**Then** a preview shows: detected categories, total test cases per category, and a sample of 5 test rows\n\n**Given** the preview looks correct\n**When** I click \"Commit Import\"\n**Then** the project + test cases are persisted and the modal closes\n\n**Given** the preview shows issues (e.g., blank category, malformed IDs)\n**When** I click \"Cancel\"\n**Then** no project is created and no files are written\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-23 | 1.0 | Claude | Created |\n| 2026-04-23 | 1.1 | Claude | Implemented: split `src/parsers/excel.ts` into `parseExcelFile(path)` (in-memory only — returns `ParsedExcel` with full categories + test cases + sync checksums + skipped sheets) and `writeParsedExcel(parsed, dir)` (disk write). `importExcel()` now composes the two — backwards-compatible. New `POST /api/excel/preview` endpoint runs only the parse half and returns `{ok, categories[], totalTestCases, skippedSheets, sample[]}` (sample = up to 5 test rows across the first few categories with id/title/category/scenario/status). UI: modal phases are `input → parsing → preview → committing`; preview screen shows category list with counts, sample test rows with status dots, and skipped sheet names. Cancel at any phase is a no-op (no project, no files written). AC1 + AC2 + AC3 met. |\n"},{"rel":"epics/E-014-project-onboarding-upload/T-014-001-s-014-001-test-plan.md","content":"# Test Plan: Drag-and-Drop Excel Upload in New-Project Modal\n\n**ID:** T-014-001\n**Project:** morbius\n**Story:** S-014-001\n**Epic:** E-014\n**Version:** 1.0\n**Created:** 2026-04-29\n**Updated:** 2026-04-29\n\n> _Generated from Morbius test cases (E-023 publish-back). 3 test case(s) sourced from `morbius:S-014-001`._\n\n---\n\n## Scope\n\nVerification of S-014-001 acceptance criteria. 3 test case(s) span the happy path plus negative and edge variations.\n\n## Prerequisites\n\n- (Inherit from story Prerequisites; fill in environment + data setup before authoring)\n\n## AC Coverage Map\n\n| AC | Test Cases | Coverage |\n|----|-----------|----------|\n| AC-001 | TC-014-001-001 | ✓ |\n| AC-002 | TC-014-001-002 | ✓ |\n| AC-003 | TC-014-001-003 | ✓ |\n\n---\n\n## Core Test Flow\n\n> P0 — exactly one test case per plan. Must pass before Sub Flow testing begins. Stop if P0 fails.\n\n### TC-014-001-001: Drag-and-Drop Excel Upload in New-Project Modal — Test Plan\n\n**Type:** E2E\n**Priority:** P0\ ro YAML, device coverage, changelog — without leaving the detail panel. All data exists already (E-003, E-004, E-005); this is a UI aggregation epic, not new storage.\n\n## Success Metric\n\n| Metric | Baseline | Target |\n|--------|----------|--------|\n| Clicks to reach run history from a test case | 3+ (navigate away) | 0 (inline in detail) |\n| Visibility of linked bugs from test detail | None | All bugs with any link to this test visible |\n\n## Primary Persona\n\nThe QA Lead + The Developer\n\n## Dependencies\n\n- E-003 (Maestro YAML viewer), E-004 (Bug model), E-005 (Device matrix)\n\n## Stories\n\n| ID | Title | Status | Stage | Priority |\n|----|-------|--------|-------|----------|\n| S-015-001 | Linked Bugs + Run History Panel | Done | Ready | P0 |\n| S-015-002 | Maestro YAML + Device Coverage Panel | Done | Ready | P0 |\n| S-015-003 | Inline Changelog in Detail View | Done | Ready | P1 |\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-23 | 1.0 | Claude | Created — Phase 0.3 of 2026-04 direction |\n| 2026-04-23 | 1.1 | Claude | S-015-001 shipped: clickable linked-bug rows + per-test run history section in TestDrawer |\n| 2026-04-23 | 1.2 | Claude | S-015-002 shipped: real Steps + Acceptance criteria from /api/test/:id, new Flow section with rendered Maestro HTML + selector warnings, empty-state link to App Map |\n| 2026-04-23 | 1.3 | Claude | S-015-003 shipped: collapsible Changelog accordion in TestDrawer, last 20 entries newest-first, formatted as field / old→new / actor. E-015 complete. |\n"},{"rel":"epics/E-015-test-case-detail-depth/S-015-001-linked-bugs-runs.md","content":"# Story: Linked Bugs + Run History Panel\n\n**ID:** S-015-001\n**Project:** morbius\n**Epic:** E-015\n**Stage:** Ready\n**Status:** Done\n**Priority:** P0\n**Version:** 1.1\n**Created:** 2026-04-23\n**Updated:** 2026-04-23\n\n---\n\n## Story\n\nAs a QA lead, I want to see all linked bugs and recent run history inside the test case detail view so that I don't have to navigate away to understand a test's current state.\n\n## Acceptance Criteria\n\n**Given** a test case is open in the detail view\n**When** the panel renders\n**Then** a \"Linked Bugs\" section shows all bugs that reference this test, with status and link to bug modal\n\n**Given** a test case has been run\n**When** the detail view renders\n**Then** a \"Run History\" section shows the last 10 runs with date, device, result, and duration — sorted newest first\n\n**Given** a run in history is clicked\n**When** the click fires\n**Then** the run detail opens in a side panel without losing the test case context\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-23 | 1.0 | Claude | Created |\n| 2026-04-23 | 1.1 | Claude | Implemented: TestDrawer (`src/server.ts`) now (a) makes Linked Bugs rows clickable — clicking a bug opens BugDrawer in-place via new `onSelectBug` prop wired from `App` (test context preserved); (b) renders a new \"Run history · N\" section pulling real `MaestroRunRecord` data from existing `GET /api/runs/:testId/history` (last 10, newest first), with platform, failing-step summary, duration; clicking a row expands an inline detail panel with full runId/timestamps/exit-code/error line/screenshot path. Side fix: moved `aS`/`aE` hooks above the `if (!test) return null` early return to satisfy React's Rules of Hooks. AC1, AC2, AC3 met. |\n"},{"rel":"epics/E-015-test-case-detail-depth/S-015-002-yaml-device-coverage.md","content":"# Story: Maestro YAML + Device Coverage Panel\n\n**ID:** S-015-002\n**Project:** morbius\n**Epic:** E-015\n**Stage:** Ready\n**Status:** Done\n**Priority:** P0\n**Version:** 1.1\n**Created:** 2026-04-23\n**Updated:** 2026-04-23\n\n---\n\n## Story\n\nAs a QA lead, I want to see the linked Maestro YAML and device coverage for a test case inside its detail view so that I can judge test depth and gaps without leaving the modal.\n\n## Acceptance Criteria\n\n**Given** a test case with a linked Maestro flow\n**When** the detail view opens\n**Then** a \"Flow\" section shows the rendered human-readable YAML steps (reusing `src/parsers/maestro-yaml.ts`)\n\n**Given** a test case has run on multiple devices\n**When** the detail view opens\n**Then** a \"Device Coverage\" section shows a grid of (device × pass/fail/not-run) status (reusing E-005 device matrix data)\n\n**Given** a test case has no linked flow\n**When** the detail view opens\n**Then** the Flow section shows \"No automated flow yet\" with a link to AppMap v2 (E-018) for recommendations\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-23 | 1.0 | Claude | Created |\n| 2026-04-23 | 1.1 | Claude | Implemented: TestDrawer now (a) renders **real Steps + Acceptance criteria** from `detail.steps` / `detail.acceptanceCriteria` (sourced via existing `GET /api/test/:id`) — replaces the previous hardcoded placeholder list which was a real bug surfaced during the audit; (b) adds a new **Flow** section that renders `detail.maestroHtml` (server-side `stepsToHtml` from `src/parsers/maestro-yaml.ts`) via `dangerouslySetInnerHTML`, plus a Selector Warnings sub-block when `detail.selectorWarnings.length > 0`; (c) when no Maestro flow is linked, shows \"No automated flow yet\" empty state with a clickable link that closes the drawer and navigates to `/appmap` (E-018 entry point); (d) Device Coverage section already existed from prior work — kept as-is, satisfies the AC. AC1, AC2, AC3 met. No backend changes — pure UI aggregation epic per the E-015 outcome. |\n"},{"rel":"epics/E-015-test-case-detail-depth/S-015-003-inline-changelog.md","content":"# Story: Inline Changelog in Detail View\n\n**ID:** S-015-003\n**Project:** morbius\n**Epic:** E-015\n**Stage:** Ready\n**Status:** Done\n**Priority:** P1\n**Version:** 1.1\n**Created:** 2026-04-23\n**Updated:** 2026-04-23\n\n---\n\n## Story\n\nAs a QA lead, I want to see the changelog for a test case inline in the detail view so that I can audit recent edits without opening the markdown file directly.\n\n## Acceptance Criteria\n\n**Given** a test case has a changelog (written by `src/parsers/markdown.ts` on every edit)\n**When** the detail view opens\n**Then** a \"Changelog\" accordion shows the last 20 entries with timestamp, author, and change summary\n\n**Given** the changelog is long\n**When** the user expands the accordion\n**Then** pagination or virtual scrolling prevents performance issues\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-23 | 1.0 | Claude | Created |\n| 2026-04-23 | 1.1 | Claude | Implemented: new `ChangelogAccordion` React component used inside `TestDrawer`. Default state collapsed; clicking the section title (with rotating chevron) toggles open. Reads `detail.changelog` (already populated by `parseChangelogTable` in `src/parsers/markdown.ts` and returned by `/api/test/:id`). Renders the **newest 20 entries** in newest-first order, capped at 20 — at that scale a flat list is the cheapest fix for the \"performance\" AC. Each row shows: relative timestamp, field name, oldValue → newValue (oldValue strikethrough, \"∅\" placeholder when blank), actor. When the changelog has >20 entries a \"Showing newest 20 of N entries\" hint appears at the top of the expanded list. Verified live against TC-1.01 which has 6 changelog entries. AC1 + AC2 met. |\n"},{"rel":"epics/E-015-test-case-detail-depth/T-015-001-s-015-001-test-plan.md","content":"# Test Plan: Linked Bugs + Run History Panel\n\n**ID:** T-015-001\n**Project:** morbius\n**Story:** S-015-001\n**Epic:** E-015\n**Version:** 1.0\n**Created:** 2026-04-29\n**Updated:** 2026-04-29\n\n> _Generated from Morbius test cases (E-023 publish-back). 3 test case(s) sourced from `morbius:S-015-001`._\n\n---\n\n## Scope\n\nVerification of S-015-001 acceptance criteria. 3 test case(s) span the

droid/iOS in run status + topbar, Devices/Maestro/Healing nav items reappear, kanban cards show 📱 mobile badges\n\n**Failure Indicators:**\n- (describe the wrong behavior; populate during real test authoring)\n\n---\n\n### TC-024-007-003: Given the user's environment for either type changes (Chrome closes, M\n\n**Type:** Negative\n**Priority:** P1\n**AC Covered:** AC-003\n**Dependencies:** None\n\n<!-- Morbius source: TC-MOR-024-007-3 (sourceChecksum=162a8e08410c3a86) -->\n\n**Preconditions:**\n- (derived from story prerequisites — fill in or leave empty)\n\n**Steps:**\n1. the user's environment for either type changes (Chrome closes, Maestro disconnects, target URL drops)\n2. the run-status section refreshes (existing 15s poll)\n3. the dot for the affected check flips to fail with a useful detail string ---\n\n**Expected Result:**\nGiven the user's environment for either type changes (Chrome closes, Maestro disconnects, target URL drops) When the run-status section refreshes (existing 15s poll) Then the dot for the affected check flips to fail with a useful detail string ---\n\n**Failure Indicators:**\n- (describe the wrong behavior; populate during real test authoring)\n\n---\n\n## Out of Scope\n\n- (Items intentionally excluded — derive from story Do Not Do / Future Scope sections)\n\n## Automation Notes\n\n- **Data setup:** (specify seeded data or test accounts)\n- **Selector strategy:** (Maestro YAML — prefer text matching with stable copy)\n- **Flakiness risks:** (network calls, timing, animations)\n- **Suggested framework:** Maestro (mobile) — see `(no flow linked)`\n- **Automation priority:** TC-024-007-001\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-29 | 1.0 | Morbius (publish-back) | Generated from 3 Morbius test case(s) |\n"},{"rel":"epics/E-024-web-app-testing/T-024-008-s-024-008-test-plan.md","content":"# Test Plan: Given the active project's projectType is web When I look at the topba\n\n**ID:** T-024-008\n**Project:** morbius\n**Story:** S-024-008\n**Epic:** E-024\n**Version:** 1.0\n**Created:** 2026-04-29\n**Updated:** 2026-04-29\n\n> _Generated from Morbius test cases (E-023 publish-back). 3 test case(s) sourced from `morbius:S-024-008`._\n\n---\n\n## Scope\n\nVerification of S-024-008 acceptance criteria. 3 test case(s) span the happy path plus negative and edge variations.\n\n## Prerequisites\n\n- (Inherit from story Prerequisites; fill in environment + data setup before authoring)\n\n## AC Coverage Map\n\n| AC | Test Cases | Coverage |\n|----|-----------|----------|\n| AC-001 | TC-024-008-001 (P0) | ✓ |\n| AC-002 | TC-024-008-002 | ✓ |\n| AC-003 | TC-024-008-003 | ✓ |\n\n---\n\n## Core Test Flow\n\n> P0 — exactly one test case per plan. Must pass before Sub Flow testing begins. Stop if P0 fails.\n\n### TC-024-008-001: Given the active project's projectType is web When I look at the topba\n\n**Type:** E2E\n**Priority:** P0\n**AC Covered:** AC-001\n**Dependencies:** None\n\n<!-- Morbius source: TC-MOR-024-008-1 (sourceChecksum=13afc6bf279464df) -->\n\n**Preconditions:**\n- (derived from story prerequisites — fill in or leave empty)\n\n**Steps:**\n1. the active project's `projectType` is `web`\n2. I look at the topbar\n3. the action button reads \"Run tests\" (not \"Run suite\") and clicking it navigates to Test Cases (not the Maestro view); for `mobile` projects the existing \"Run suite\" → Maestro behavior is preserved\n\n**Expected Result:**\nGiven the active project's `projectType` is `web` When I look at the topbar Then the action button reads \"Run tests\" (not \"Run suite\") and clicking it navigates to Test Cases (not the Maestro view); for `mobile` projects the existing \"Run suite\" → Maestro behavior is preserved\n\n**Failure Indicators:**\n- (describe the wrong behavior; populate during real test authoring)\n\n---\n\n## Sub Flows\n\n> All test cases beyond the core flow. Negative scenarios, edge cases, and regression guards.\n\n### TC-024-008-002: Given the same project type is web When the Dashboard renders the Cove\n\n**Type:** Detour\n**Priority:** P2\n**AC Covered:** AC-002\n**Dependencies:** None\n\n<!-- Morbius source: TC-MOR-024-008-2 (sourceChecksum=b011944d5d3cf181) -->\n\n**Preconditions:**\n- (derived from story prerequisites — fill in or leave empty)\n\n**Steps:**\n1. the same project type is `web`\n2. the Dashboard renders the Coverage stat card\n3. the small pills under the percentage show `Headless` + `Visual` (purple) instead of `Android · iOS`; for `mobile` the original `Android · iOS` pill is preserved; for `api` a muted \"API · v1 not implemented\" placeholder appears\n\n**Expected Result:**\nGiven the same project type is `web` When the Dashboard renders the Coverage stat card Then the small pills under the percentage show `Headless` + `Visual` (purple) instead of `Android · iOS`; for `mobile` the original `Android · iOS` pill is preserved; for `api` a muted \"API · v1 not implemented\" placeholder appears\n\n**Failure Indicators:**\n- (describe the wrong behavior; populate during real test authoring)\n\n---\n\n### TC-024-008-003: Given the Dashboard's Quick Actions card is visible When the project t\n\n**Type:** Detour\n**Priority:** P2\n**AC Covered:** AC-003\n**Dependencies:** None\n\n<!-- Morbius source: TC-MOR-024-008-3 (sourceChecksum=41f0d0ae50e227cc) -->\n\n**Preconditions:**\n- (derived from story prerequisites — fill in or leave empty)\n\n**Steps:**\n1. the Dashboard's Quick Actions card is visible\n2. the project type is `web`\n3. the first action reads \"Run web tests\" and routes to Test Cases; for `mobile` it preserves \"Run all flows\" → Maestro ---\n\n**Expected Result:**\nGiven the Dashboard's Quick Actions card is visible When the project type is `web` Then the first action reads \"Run web tests\" and routes to Test Cases; for `mobile` it preserves \"Run all flows\" → Maestro ---\n\n**Failure Indicators:**\n- (describe the wrong behavior; populate during real test authoring)\n\n---\n\n## Out of Scope\n\n- (Items intentionally excluded — derive from story Do Not Do / Future Scope sections)\n\n## Automation Notes\n\n- **Data setup:** (specify seeded data or test accounts)\n- **Selector strategy:** (Maestro YAML — prefer text matching with stable copy)\n- **Flakiness risks:** (network calls, timing, animations)\n- **Suggested framework:** Maestro (mobile) — see `(no flow linked)`\n- **Automation priority:** TC-024-008-001\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-29 | 1.0 | Morbius (publish-back) | Generated from 3 Morbius test case(s) |\n"},{"rel":"flows/UF-001-project-onboarding.md","content":"# Flow: Project Onboarding\n\n**ID:** UF-001\n**Project:** morbius\n**Epic:** E-001, E-002, E-006, E-013, E-014, E-019\n**Stage:** Ready\n**Version:** 1.1\n**Created:** 2026-04-21\n**Updated:** 2026-04-23\n\n---\n\n## Goal\n\nA developer sets up a brand-new app project in Morbius — from zero to a fully configured board with test cases imported, Maestro flows linked, and devices configured.\n\n---\n\n## Flow Diagram\n\n```mermaid\nflowchart TD\n  A([Start: New App Project]) --> B[Run morbius serve]\n  B --> C{Projects exist?}\n  C -- No --> D[Screen: Empty Dashboard\\nwith setup prompt]\n  C -- Yes --> E[Screen: Dashboard Overview\\nwith active project]\n  D --> F[POST /api/projects/create\\nEnter project name + app ID]\n  F --> G[Screen: Settings — Workspace]\n  G --> H[Configure Maestro paths\\nAndroid + iOS flow directories]\n  H --> I[Configure devices\\nAdd device names + platforms]\n  I --> J{Excel QA plan\\navailable?}\n  J -- Yes --> J2{Import method?}\n  J2 -- UI upload --> K1[Screen: New Project Modal\\nDrag-and-drop Excel onto drop zone]\n  J2 -- CLI --> K[CLI: morbius import QA Plan.xlsx]\n  K1 --> K1P[Preview: categories + count\\nConfirm or cancel]\n  K1P --> L\n  K --> L[Screen: Test Cases Kanban\\nCategories + cards imported]\n  J -- No --> L2[Screen: Test Cases Kanban\\nEmpty — manual entry only]\n  L --> M[CLI: morbius sync\\n--android path --ios path]\n  L2 --> M\n  M --> N[Test cases linked\\nto Maestro YAML flows]\n  N --> O[Screen: Maestro Tab\\nFlows visible + linked]\n  O --> P[Configure Jira\\nSettings → Integrations]\n  P --> P1[Settings → Integrations → Jira\\nVerify sync health panel is green]\n  P1 --> P2{Google Sheets plan?}\n  P2 -- Yes --> P3[Bind Sheet ID\\nSettings → Google Sheets]\n  P3 --> Q\n  P2 -- No --> Q([Project ready\\nBoard fully configured])\n```\n\n---\n\n## Screens\n\n### Screen: New Project Modal with Upload (E-014)\nShown when \"Create Project\" is clicked. Has two paths: (a) standard — enter name + app ID → create empty project; (b) with Excel — enter name + drag `.xlsx` onto drop zone → file uploads → preview shows detected categories and test count → \"Commit\" creates the project and imports in one step.\n\n- **Action:** Drag `.xlsx` → preview renders → click \"Commit Import\" → project created + tests imported\n- **Action:** Click \"Cancel\" → no project created, no files written\n\n### Screen: Empty Dashboard with Setup Prompt\nShown when no projects are registered. Displays a welcome message, a \"Create Project\" button, and the `morbius import` CLI command hint.\n\n- **Action:** Click \"Create Project\" → opens new project form → `POST /api/projects/create`\n\n### Screen: Dashboard Overview\nMain landing screen after project is selected. Shows overall pass % (0% for a new project), empty category bars, coverage gap warnings highlighting all tests as not-run.\n\n- **Action:** Click \"Settings\" in sidebar or press `7`\n\n### Screen: Settings — Workspace\nSettings tab with Workspace section active. Shows fields for: active project name, Android Maestro path, iOS Maestro path, login flow path, app ID, media path, codebase path.\n\n- **Action:** Fill in Maestro paths → Save → `POST /api/config/update`\n\n### Screen: Settings — Devices\nDevices section of Settings. Table of configured devices (name, platform, Excel column mapping). Add/edit/delete devices inline.\n\n- **Action:** Add device → Save → device appears in Device Matrix and bug creation form\n\n### Screen: Test Cases Kanban\nTest Cases tab showing imported categories and cards, or empty columns with a \"No tests imported\" placeholder if Excel import hasn't run.\n\n- **Fragment: Import Success Banner** — shown after `morbius import` completes; shows count of categories and test cases created\n- **Parent:** Screen: Test Cases Kanban\n\n### Fragment: Jira Sync Health Panel (E-013)\nVisible in Settings → Integrations → Jira. Shows: last successful sync time, status indicator (green/yellow/red), pending write queue count, last 5 errors. QA lead checks this is green before the project is considered \"ready.\"\n\n- **Action:** Click \"Sync Now\" → health panel refreshes\n\n### Fragment: Google Sheets Binding (E-019)\nVisible in Settings → Integrations → Google Sheets. After OAuth, user pastes Sheet URL → \"Validate\" confirms access → sync enabled. Optional step during onboarding.\n\n### Screen: Maestro Tab\nMaestro tab showing file browser of YAML flows from configured paths. After `morbius sync`, cards show linked test IDs in green. Unlinked flows show in grey with \"unlinked\" label.\n\n- **Action:** Click a flow card → opens YAML viewer overlay\n\n### Overlay: YAML Viewer\nBlocking overlay showing: flow name, human-readable steps, raw YAML with syntax highlighting, selector warnings (if any), linked test IDs, Run button.\n\n- **Action:** Click \"Run\" → `POST /api/flow/run` → flow executes\n\n---\n\n## Edge Cases\n\n- **Excel has template/index sheets** — `morbius import` skips sheets named \"Summary\", \"Index\", \"Template\", \"README\"\n- **Maestro CLI not installed** — Settings shows a red indicator on the Maestro section; Run buttons are disabled with tooltip \"Maestro CLI not found\"\n- **No QA plan available** — Project can still be used with manual test case entry and direct YAML execution\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created via reverse-engineer |\n| 2026-04-23 | 1.1 | Claude | Added UI Excel upload path (E-014), Jira health panel check step (E-013), Google Sheets binding option (E-019) |\n"},{"rel":"flows/UF-002-daily-test-run-triage.md","content":"# Flow: Daily Test Run + Triage\n\n**ID:** UF-002\n**Project:** morbius\n**Epic:** E-003, E-004, E-005, E-015, E-016, E-017\n**Stage:** Ready\n**Version:** 1.1\n**Created:** 2026-04-21\n**Updated:** 2026-04-23\n\n---\n\n## Goal\n\nA developer or QA lead runs the full Maestro test suite after a code change, watches results stream live, and triages any failures — updating statuses and filing bugs — all from the dashboard without leaving the browser.\n\n---\n\n## Flow Diagram\n\n```mermaid\nflowchart TD\n  A([Start: Code change shipped]) --> B[Screen: Maestro Tab]\n  B --> C[Click Run All]\n  C --> D[Screen: Suite Runner in progress\\nProgress bar + live output]\n  D --> E{Suite result}\n  E -- All pass --> F[Screen: Dashboard Overview\\nGreen overall %]\n  E -- Some fail --> G[Fragment: Failure Summary\\non Maestro Tab]\n  G --> H[Click failed flow\\nto see detail]\n  H --> I[Overlay: YAML Viewer\\nwith highlighted failing step]\n  I --> J{Is it a real bug\\nor a flaky test?}\n  J -- Real bug --> K[Bug auto-created\\nby ingest]\n  J -- Selector miss? --> J2{Self-healing\\napplicable?}\n  J2 -- Yes --> SH[Healing request enqueued\\nHealing Queue shows proposal]\n  SH --> SH2[Review proposal: approve/reject\\nSee UF-005]\n  SH2 --> P\n  J2 -- No --> K\n  J -- Flaky --> L[Mark test Flaky\\non Test Cases board]\n  K --> M[Screen: Bug Board\\nNew bug in Open column]\n  M --> M2[Open bug → Impact tab\\nView related tests to rerun]\n  L --> N[Fragment: Flaky Tests list\\non Dashboard]\n  M2 --> O[Assign priority + notes\\non bug card]\n  O --> P[Screen: Dashboard Overview\\nUpdated health metrics]\n  N --> P\n  P --> Q([Triage complete])\n\n  B2[Alternative: CLI ingest] --> R[morbius ingest .maestro-output/]\n  R --> S[Bugs auto-created\\nfor all failures]\n  S --> M\n```\n\n---\n\n## Screens\n\n### Screen: Maestro Tab\nSeven-tab layout with Maestro tab active. Shows file browser of all YAML flows (Android / iOS toggle). \"Run All\" button at top. Each flow card shows: name, last run status badge, linked test ID, step count.\n\n- **Action:** Click \"Run All\" → full suite starts, screen transitions to Suite Runner\n\n### Screen: Suite Runner In Progress\nFull-width progress indicator showing: current flow name, X of Y completed, elapsed time. Live log panel below streams Maestro stdout via `/ws/run-stream`. Each step shows ✓ / ✗ / ⟳ as it executes.\n\n- **Action:** Cannot cancel mid-run (destructive flows may have run)\n- **Fragment: Failure Summary** — appears inline after suite completes when failures exist\n\n### Fragment: Failure Summary\nInline section on Maestro Tab after suite run. Lists all failed flows with: flow name, failing step, device, duration. Each row links to the YAML Viewer overlay.\n- **Parent:** Screen: Maestro Tab\n\n### Overlay: YAML Viewer\nOpens from clicking a failed flow. Shows the failing step highlighted in red with the error message. Human-readable translation of that step alongside the raw YAML. \"Create Bug\" button if no auto-bug was created.\n\n- **Action:** Click \"Create Bug\" → opens Bug Creation modal\n- **Action:** Click \"View on Bug Board\" if auto-bug exists → navigates to Bug Board\n\n### Fragment: Healing Queue (E-017)\nAccessible from the Maestro tab or a top-level \"Healing\" badge when proposals are pending. Shows validated selector proposals: failed selector, proposed replacement, confidence, diff view. Approve/Modify/Reject buttons. On approve, YAML is updated in-place. See UF-005 for the full self-healing flow.\n- **Parent:** Screen: Maestro Tab (or standalone view)\n\n### Screen: Test Cases Kanban\nTest Cases tab. Filter by status \"Fail\" to see only failing tests. Click a card to open detail drawer (now includes Linked Bugs, Run History, Maestro YAML, Device Coverage — see E-015).\n\n- **Action:** Click status pill → change to Flaky → card moves / updates\n- **Fragment: Inline Status Update** — status pill click shows dropdown (pass / fail / flaky / in-progress / not-run)\n\n### Fragment: Inline Status Update\nStatus pill dropdown on any test card. Selecting a new value calls `POST /api/test/update` and writes a changelog entry immediately.\n- **Parent:** Screen: Test Cases Kanban\n\n### Screen: Bug Board\nBugs tab with Kanban columns: Open / Investigating / Fixed / Closed. Auto-created bugs appear in Open column. Each card shows: title, linked test ID, device, priority badge, screenshot thumbnail.\n\n- **Action:** Click card → opens Bug Detail Drawer\n- **Action:** Click status pill → move bug to Investigating\n\n### Screen: Dashboard Overview\nDashboard tab. Reflects updated health after triage. Shows: new overall pass %, updated category bars, flaky tests section if any flaky marks were set, recent activity feed showing the completed run and any bugs created.\n\n---\n\n## Edge Cases\n\n- **Maestro process exits unexpectedly** — server marks the run as errored; partial results are saved; browser shows \"Run ended unexpectedly\" in the live log\n- **Device disconnected mid-run** — Maestro CLI returns non-zero exit; server treats it as a failure on that flow and continues suite (unless it's a destructive flow)\n- **Duplicate failure bug** — if a bug for the same test + device already exists as Open/Investigating, ingest updates it rather than creating a duplicate\n- **No Maestro flows linked** — \"Run All\" button disabled with tooltip \"No flows configured — run morbius sync first\"\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created via reverse-engineer |\n| 2026-04-23 | 1.1 | Claude | Added self-healing branch (E-017), Bug-Impact tab reference (E-016), enriched test detail reference (E-015), Healing Queue fragment |\n"},{"rel":"flows/UF-003-bug-lifecycle.md","content":"# Flow: Bug Lifecycle\n\n**ID:** UF-003\n**Project:** morbius\n**Epic:** E-004, E-013, E-016\n**Stage:** Ready\n**Version:** 1.1\n**Created:** 2026-04-21\n**Updated:** 2026-04-23\n\n---\n\n## Goal\n\nA QA lead manages a bug from creation to resolution — filing it (manually or via auto-create), triaging with the developer, syncing to Jira, and closing it once the fix is verified.\n\n---\n\n## Flow Diagram\n\n```mermaid\nflowchart TD\n  A([Bug detected]) --> B{Source}\n  B -- Maestro failure --> C[Auto-created by ingest\\nbug-NNN.md written]\n  B -- Manual discovery --> D[Screen: Bug Board\\nClick + Create Bug]\n  D --> E[Modal: New Bug Form\\ntitle, test, device, priority, reason]\n  E --> F[POST /api/bugs/create]\n  C --> G[Screen: Bug Board\\nBug in Open column]\n  F --> G\n  G --> H[Click bug card]\n  H --> I[Screen: Bug Detail Drawer\\nFull details + screenshot]\n  I --> I2[Click Impact tab\\nView AI-generated impact analysis]\n  I2 --> I3{Impact available?}\n  I3 -- Yes --> I4[See: related tests to rerun\\nrisk score + repro narrative]\n  I3 -- No/Generating --> I5[Generating... or Regenerate button]\n  I4 --> J[Set priority\\nAdd notes]\n  I5 --> J\n  J --> K[Move to Investigating\\nClick status pill]\n  K --> L{Has Jira project?}\n  L -- Yes --> M[Click Create in Jira\\nor Sync to Jira]\n  M --> N[POST /api/bugs/:id/create-jira\\nor sync-jira]\n  N --> O[Bug shows Jira badge J\\nwith key + URL]\n  L -- No --> O2[Bug stays local only]\n  O --> P[Developer investigates\\nupdates Jira status]\n  O2 --> P\n  P --> Q[Click Sync All\\non Bug Board]\n  Q --> QH[Settings → Jira Health Panel\\nVerify sync is not degraded]\n  QH --> R[POST /api/bugs/sync-all\\nJira statuses pulled]\n  R --> S[Bug status updates\\nfrom Jira]\n  S --> T[QA verifies fix\\nRe-run Maestro flow]\n  T --> U{Flow passes?}\n  U -- Yes --> V[Move bug to Fixed\\nclick status pill]\n  U -- No --> W[Bug stays Investigating\\nadd note]\n  V --> X[Move to Closed\\nafter release ships]\n  X --> Y([Bug closed])\n```\n\n---\n\n## Screens\n\n### Screen: Bug Board\nBugs tab showing four Kanban columns: Open / Investigating / Fixed / Closed. Cards show: bug title, linked test ID, device, priority badge (P1–P4), screenshot thumbnail (if any), Jira \"J\" badge (if synced). \"Sync All\" button in top-right pulls latest Jira statuses.\n\n- **Action:** Click \"+ Create Bug\" → opens New Bug modal\n- **Action:** Click card → opens Bug Detail Drawer\n- **Action:** Click status pill → inline column transition\n\n### Modal: New Bug Form\nBlocking modal with fields:\n- Title (required)\n- Linked test ID (required, typeahead from test list)\n- Device (dropdown of configured devices)\n- Priority (P1 / P2 / P3 / P4)\n- Failure reason (textarea)\n- Screenshot (file upload, optional)\n\nSubmit calls `POST /api/bugs/create`.\n\n### Screen: Bug Detail Drawer\nSlides in from right. Contains:\n- Bug title + ID + created date\n- Status pill (clickable)\n- Priority badge (clickable)\n- Linked test ID (click navigates to test card)\n- Device + Run ID\n- Failure reason\n- Steps to reproduce\n- Screenshot (full inline preview, click to expand)\n- Selector analysis warnings (amber inline list if fragile YAML detected)\n- Jira section: key, URL, status, assignee, last comment, \"Create in Jira\" / \"Sync\" buttons\n- Notes textarea (auto-saves on blur)\n- Changelog table (every field change with timestamp)\n- **Impact tab (E-016):** AI-generated analysis: related tests to rerun (red), related tests to manual-verify after fix (orange), regression risk score with color band, repro narrative. Regenerates automatically on Jira status transitions. \"Regenerate\" button for manual refresh.\n\n### Fragment: Jira Sync Health Panel (E-013)\nAccessible from Settings → Integrations → Jira. If sync is degraded, a warning badge appears on the \"Sync All\" button on the Bug Board. Clicking it shows last sync time, error count, pending write queue.\n- **Parent:** Settings, Bug Board header\n\n### Fragment: Selector Analysis Warning\nShown inside Bug Detail Drawer when the linked test's YAML contains fragile selectors. Lists each warning: type (pixel tap / long sleep / index selector), line number, command.\n- **Parent:** Screen: Bug Detail Drawer\n\n### Fragment: Jira Section\nInside Bug Detail Drawer. Shows Jira badge with issue key and URL if synced. Shows: status from Jira, assignee, priority, last comment text. Buttons: \"Create in Jira\" (if not yet linked), \"Sync\" (if linked).\n- **Parent:** Screen: Bug Detail Drawer\n\n---\n\n## Edge Cases\n\n- **Jira credentials invalid** — sync returns error toast; no local data modified\n- **Screenshot path missing** — detail drawer shows \"no screenshot\" placeholder; bug is otherwise fully functional\n- **Bug created for test that doesn't exist** — `linkedTest` stored as-is; detail drawer shows \"test not found\" if test ID doesn't resolve\n- **Duplicate Jira issue** — \"Create in Jira\" is disabled if `jiraKey` is already set on the bug\n- **Bulk sync partially fails** — sync-all returns per-bug status; failed bugs show red error indicator on their cards\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created via reverse-engineer |\n| 2026-04-23 | 1.1 | Claude | Added Impact tab path (E-016), Jira health panel check before sync (E-013), updated Bug Detail Drawer with Impact tab description |\n"},{"rel":"flows/UF-004-test-case-management.md","content":"# Flow: Test Case Management\n\n**ID:** UF-004\n**Project:** morbius\n**Epic:** E-002, E-014, E-015, E-018, E-019\n**Stage:** Ready\n**Version:** 1.1\n**Created:** 2026-04-21\n**Updated:** 2026-04-23\n\n---\n\n## Goal\n\nA QA lead imports a QA plan from Excel, manages test case statuses on the board throughout a sprint, and exports the final results back to the Excel file for stakeholder reporting.\n\n---\n\n## Flow Diagram\n\n```mermaid\nflowchart TD\n  A([Start: QA sprint begins]) --> A1{Import method?}\n  A1 -- UI upload --> A2[Screen: New Project Modal\\nDrag Excel → preview → commit]\n  A1 -- CLI --> B[CLI: morbius import QA Plan.xlsx]\n  A1 -- Google Sheets --> A3[Settings → Sheets → bind Sheet ID\\nPoll syncs automatically]\n  A2 --> C\n  A3 --> C\n  B --> C[Markdown files written\\nto data/project/tests/]\n  C --> D[Screen: Test Cases Kanban\\nAll categories + cards visible]\n  D --> E{Need to reorder\\npriority?}\n  E -- Yes --> F[Drag card to new position\\nwithin category]\n  F --> G[POST /api/test/reorder\\norder field + changelog updated]\n  G --> D\n  E -- No --> H[Testing begins\\nRun flows or manual test]\n  H --> I[Click status pill on card]\n  I --> J[Fragment: Inline Status Update\\npass / fail / flaky / in-progress]\n  J --> K[Status + changelog written\\nto markdown file]\n  K --> L[Search for specific test\\n⌘K global search]\n  L --> M[Screen: Test Cases Kanban\\nFiltered view]\n  M --> N[Open test card detail]\n  N --> O[Screen: Test Detail Drawer\\nSteps, AC, notes, device results, changelog]\n  O --> P[Add notes\\nEdit device results]\n  P --> Q[Auto-save on blur\\nchangelog entry written]\n  Q --> R[Sprint ends\\nAll statuses updated]\n  R --> R2{Export method?}\n  R2 -- CLI --> S[CLI: morbius export QA Plan.xlsx]\n  R2 -- Sheets auto-push --> S2[Changes already pushed\\nto Google Sheet in real-time]\n  S --> T[Excel updated\\nstatus + priority + notes synced]\n  S2 --> T\n  T --> U([QA report delivered])\n```\n\n---\n\n## Screens\n\n### Screen: Test Cases Kanban\nTest Cases tab. Cards grouped by category (from Excel sheet names). Columns: Not Run / In Progress / Pass / Fail / Flaky. Filter bar: status chips (All / Pass / Fail / Flaky / Not Run / In Progress / Has YAML) + scenario type chips (Happy Path / Flow / Detour / Negative / Edge Case). Sort bar: ID / Status / Priority / Name / Type. Toggle: Board / Row mode.\n\n- **Action:** Click card → opens Test Detail Drawer\n- **Action:** Drag card → reorder within category → `POST /api/test/reorder`\n- **Action:** Click status pill → Fragment: Inline Status Update\n- **Action:** Press `⌘K` → opens Global Search overlay\n\n### Fragment: Inline Status Update\nStatus pill dropdown shown on hover. Options: Pass / Fail / Flaky / In Progress / Not Run. Selecting calls `POST /api/test/update`. Card animates to new column.\n- **Parent:** Screen: Test Cases Kanban\n\n### Screen: Test Detail Drawer\nSlide-in panel from right. Sections:\n- Header: test ID, title, category badge, scenario badge, platform icons (iOS / Android), tags\n- Status pill + priority badge (both clickable inline)\n- Linked Maestro flow path (click to open in Maestro tab)\n- Steps (markdown rendered)\n- Acceptance Criteria (markdown rendered)\n- Device Results table (per-device status — editable)\n- Notes textarea (auto-saves)\n- Changelog table (every field change)\n- Chat toggle (opens Claude Code chat with test context pre-loaded)\n- **Linked Bugs panel (E-015):** All bugs referencing this test, with status badge and link to Bug Detail Drawer\n- **Run History panel (E-015):** Last 10 runs — date, device, result, duration; click to expand run detail\n- **YAML panel (E-015):** Human-readable flow steps (via `maestro-yaml.ts`); if no flow linked, shows \"No automated flow\" + \"Find automation candidates\" link (E-018)\n- **Device Coverage grid (E-015):** Device × pass/fail/not-run status matrix (from E-005 device matrix data)\n\n### Overlay: Global Search\nFull-screen overlay triggered by `⌘K` or `/`. Search across: test IDs, test titles, bug IDs, bug titles, flow names. Powered by fuse.js (fuzzy match). Results categorised by type. Click result to navigate directly.\n\n### Fragment: Device Results Table\nEditable table inside Test Detail Drawer. Rows = configured devices, columns = status. Click any cell to update device-specific result. Changes saved immediately via `POST /api/test/update`.\n- **Parent:** Screen: Test Detail Drawer\n\n---\n\n## Edge Cases\n\n- **Excel sheet has no header row matching expected columns** — importer scans first 10 rows for a row containing \"ID\" + (\"Steps\" or \"Scenario\"); if not found, the sheet is skipped with a warning\n- **Import run twice** — second import uses `.sync-meta.json` checksums; unchanged test cases are skipped; only modified rows update their markdown files\n- **Export with deleted test** — if a test case was deleted from Morbius but exists in Excel, the Excel row is left untouched (no deletions)\n- **Category with zero tests** — shown as empty column on board; Coverage Gaps flags it as \"empty category\"\n- **Reorder across categories** — not supported; drag-to-reorder works within a category only\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created via reverse-engineer |\n| 2026-04-23 | 1.1 | Claude | Added UI Excel upload + Sheets sync import paths (E-014, E-019), enriched Test Detail Drawer with linked bugs / run history / YAML / device coverage (E-015), AppMap candidates link (E-018) |\n"},{"rel":"flows/UF-005-self-healing-selector-review.md","content":"# Flow: Self-Healing Selector Review\n\n**ID:** UF-005\n**Project:** morbius\n**Epic:** E-017\n**Stage:** Draft\n**Version:** 1.0\n**Created:** 2026-04-23\n**Updated:** 2026-04-23\n\n---\n\n## Goal\n\nWhen a Maestro flow fails due to a stale selector, the system automatically proposes a replacement selector, validates it, and a QA lead reviews the proposal — approving or rejecting it — so that the YAML is updated without manual file editing.\n\n---\n\n## Flow Diagram\n\n```mermaid\nflowchart TD\n  A([Maestro flow fails]) --> B[Failure classifier\\nreads error output]\n  B --> C{Selector miss?}\n  C -- No --> D[Normal failure path\\nSee UF-002]\n  C -- Yes --> E[HealingRequest enqueued\\nflowPath + failedSelector + runId]\n  E --> F[Snapshot view hierarchy\\nvia Maestro MCP inspect_view_hierarchy]\n  F --> G{App still on\\ncorrect screen?}\n  G -- No --> G2[Re-navigate to failure screen\\nusing prior steps]\n  G2 --> F\n  G -- Yes --> H[Claude proposes replacement\\nselector + rationale + confidence]\n  H --> I{Confidence\\n≥ 0.5?}\n  I -- No --> J[Proposal stored as\\nlow-confidence — flagged]\n  I -- Yes --> K[Validation run\\nTemp YAML with new selector]\n  K --> L{Passes?}\n  L -- No --> M[Proposal: invalidated\\nnot shown in review queue]\n  L -- Yes --> N[Proposal: validated\\nadded to Healing Queue]\n  J --> N\n  N --> O[Screen: Healing Queue\\nQA lead sees proposal]\n  O --> P{Action}\n  P -- Approve --> Q[YAML updated in-place\\nchangelog entry written]\n  P -- Modify --> R[Edit proposed selector\\nthen approve]\n  R --> Q\n  P -- Reject --> S[Proposal dismissed\\nstored for audit]\n  Q --> T[Flow re-runs\\nwith new selector]\n  T --> U{Passes?}\n  U -- Yes --> V([Healing cycle closed\\nlogged as auto-healed])\n  U -- No --> W[Opens as normal bug\\nsomething else is wrong]\n```\n\n---\n\n## Screens\n\n### Screen: Healing Queue\nNew view in the Maestro tab (or as a badge/overlay). Shows all validated proposals awaiting review. Each card contains:\n- Flow name + file path\n- Failed selector (before)\n- Proposed selector (after)\n- Diff view (before/after highlighted)\n- Confidence score with color band\n- \"Low confidence\" flag if applicable\n- Buttons: Approve / Modify / Reject\n\n- **Action:** Approve → YAML written, card dismissed\n- **Action:** Modify → inline input field appears; user edits proposed selector; then approve\n- **Action:** Reject → card dismissed to \"Rejected\" history\n\n### Fragment: Low-Confidence Proposal Flag\nShown on proposals with confidence <0.5. Orange badge + \"Review carefully — low confidence.\" Does not block approval; just surfaces the signal.\n- **Parent:** Screen: Healing Queue\n\n### Screen: Healing History\nFilter on Healing Queue showing past resolved, rejected, and invalidated proposals. Useful for auditing what changed and when.\n- **Action:** Click a historical entry → see the before/after diff and changelog reference\n\n---\n\n## Edge Cases\n\n- **App crashes before hierarchy can be snapshotted** — healing request is marked \"snapshot-failed\"; no proposal generated; the run is treated as a regular failure\n- **Proposed selector matches multiple elements** — Claude must return a uniquely-identifying selector; if hierarchy has duplicates, the proposal is flagged as ambiguous\n- **User modifies selector and it fails validation** — validation is re-run on the user's edit before applying to YAML; on failure, user sees \"modified selector also failed\" and can try again\n- **YAML file has been edited since the healing request was created** — diff comparison detects the source file is newer; QA lead is warned before approval\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-23 | 1.0 | Claude | Created — new flow for E-017 Self-Healing Selectors |\n"},{"rel":"flows/UF-006-appmap-automation-planning.md","content":"# Flow: AppMap → Automation Planning\n\n**ID:** UF-006\n**Project:** morbius\n**Epic:** E-006, E-018\n**Stage:** Draft\n**Version:** 1.0\n**Created:** 2026-04-23\n**Updated:** 2026-04-23\n\n---\n\n## Goal\n\nA QA lead uses the AppMap (which describes what the app does) to get AI-generated automation candidates — a prioritized list of flows to automate — and then one-click-generates YAML for the top candidates so that automation planning takes minutes, not meetings.\n\n---\n\n## Flow Diagram\n\n```mermaid\nflowchart TD\n  A([Start: New or under-automated project]) --> B[Screen: AppMap Tab]\n  B --> C{AppMap exists?}\n  C -- No --> D[Click Generate AppMap\\nClaude traverses app structure]\n  D --> E[AppMap rendered\\nMermaid flowchart of all screens]\n  C -- Yes --> E\n  E --> F[Scroll below AppMap\\nAutomation Candidates section]\n  F --> G{Candidates\\ngenerated?}\n  G -- No --> H[Click Generate Candidates\\nClaude analyzes coverage gaps]\n  H --> I[Candidates list renders\\nPriority + rationale + coverage status]\n  G -- Yes --> I\n  I --> J[Review list\\nFilter by priority P0/P1/P2]\n  J --> K{Coverage\\nstatus?}\n  K -- Covered --> L[Deprioritized\\nLinked existing flow shown]\n  K -- None/Partial --> M[Click Generate YAML\\nfor top candidate]\n  M --> N[Flow generator runs\\nAndroid + iOS YAML created]\n  N --> O[Candidate status: Partial\\nRun Now button appears]\n  O --> P[Click Run Now\\nMaestro executes generated flow]\n  P --> Q{Pass?}\n  Q -- Yes --> R[Candidate: Covered\\nTest case linked]\n  Q -- No --> S[Bug auto-created\\nor tune YAML manually]\n  R --> T([Automation candidate closed])\n  S --> T\n  L --> U[Next uncovered candidate]\n  U --> M\n```\n\n---\n\n## Screens\n\n### Screen: AppMap Tab\nAppMap tab showing the app's navigation graph as a Mermaid flowchart. Each node = a screen or section. Edge = navigation action. Below the chart: \"Automation Candidates\" section (new in E-018).\n\n- **Action:** Click \"Generate AppMap\" → agent runs, chart renders\n- **Action:** Scroll to Automation Candidates → see list or \"Generate\" prompt\n\n### Fragment: Automation Candidates Section (E-018)\nRendered below the AppMap flowchart. Contains:\n- Ranked list of flows recommended for automation\n- Per-candidate: flow name, priority badge (P0/P1/P2), one-line rationale, coverage status chip (Covered / Partial / None)\n- \"Generate YAML\" button on uncovered/partial candidates\n- \"View existing flow\" link on covered candidates\n- Filter bar: Priority / Coverage status\n\n- **Action:** Click \"Generate Candidates\" → Claude analyzes app map + existing test coverage → list populates\n- **Action:** Click \"Generate YAML\" on a candidate → calls E-006 flow generator → YAML written\n- **Action:** Click \"Regenerate candidates\" → re-runs analysis (useful after new flows are added)\n\n### Fragment: Candidate YAML Preview\nShown after \"Generate YAML\" completes. Displays the generated flow steps in human-readable form. Buttons: \"Run Now\" / \"Open in Maestro Tab\" / \"Dismiss.\"\n- **Parent:** Fragment: Automation Candidates Section\n\n---\n\n## Edge Cases\n\n- **No AppMap generated yet** — \"Generate Candidates\" is disabled; prompt shows \"Generate AppMap first\"\n- **All candidates are already covered** — section shows \"Great coverage — no high-priority gaps found\" with a date; QA lead can force regeneration to re-check after new features ship\n- **YAML generation fails** — candidate stays in \"None\" state; error message shown inline; no partial file left on disk\n- **Candidate rationale is generic** — the agent re-prompts internally (lint check in S-018-002); low-quality rationales should not reach the UI\n- **QA lead disagrees with a priority** — no priority override UI in v1; feedback note can be added via the \"flag\" button (captured for future training signal)\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-23 | 1.0 | Claude | Created — new flow for E-018 AppMap Agent v2 + Automation Candidates |\n"},{"rel":"releases/R-001-phases-1-2-5-shipped.md","content":"# Release: Phases 1–2.5 — MVP Shipped\n\n**ID:** R-001\n**Project:** morbius\n**Stage:** Ready\n**Status:** Shipped\n**Priority:** P0\n**Version:** 1.0\n**Created:** 2026-04-21\n**Updated:** 2026-04-21\n\n---\n\n## Summary\n\nPhases 1, 2, and 2.5 of Morbius are complete and running in production (localhost). This release documents the shipped baseline — all 30 stories across 6 epics are Done.\n\n## Stories in Scope\n\n| ID | Title | Stage | Status |\n|----|-------|-------|--------|\n| S-001-001 | Single HTTP Server + Dashboard Shell | Ready | Done |\n| S-001-002 | Markdown File Database | Ready | Done |\n| S-001-003 | Multi-Project Registry + Active Project Switching | Ready | Done |\n| S-001-004 | Dashboard Overview Tab | Ready | Done |\n| S-002-001 | Import Test Cases from Excel | Ready | Done |\n| S-002-002 | Export Test Changes Back to Excel | Ready | Done |\n| S-002-003 | Test Cases Kanban Board | Ready | Done |\n| S-002-004 | Inline Status Update + Per-File Changelog | Ready | Done |\n| S-002-005 | Sync Maestro YAML Flows to Test Cases by ID | Ready | Done |\n| S-002-006 | Data Validation + Integrity Checks | Ready | Done |\n| S-003-001 | Maestro Tab — Flow Browser + Human-Readable Step View | Ready | Done |\n| S-003-002 | Run Individual Flow from Dashboard | Ready | Done |\n| S-003-003 | Live Output Streaming via WebSocket | Ready | Done |\n| S-003-004 | Full Suite Runner | Ready | Done |\n| S-003-005 | Test Run History + Ingest Maestro CLI Output | Ready | Done |\n| S-004-001 | Auto-Create Bug Tickets from Maestro Failures | Ready | Done |\n| S-004-002 | Manual Bug Creation UI | Ready | Done |\n| S-004-003 | Bug Kanban Board + Status Workflow | Ready | Done |\n| S-004-004 | Failure Screenshot Capture + Inline Preview | Ready | Done |\n| S-004-005 | Selector Analysis — Fragile YAML Pattern Detection | Ready | Done |\n| S-004-006 | Jira Sync — Pull Bugs, Sync Status, Create Issues | Ready | Done |\n| S-005-001 | Flakiness Detection + Transition-Based Scoring | Ready | Done |\n| S-005-002 | Coverage Gap Detection | Ready | Done |\n| S-005-003 | Device Coverage Matrix | Ready | Done |\n| S-005-004 | Calculator Field Coverage Analysis (STS) | Ready | Done |\n| S-006-001 | App Navigation Map (Mermaid Flowchart) | Ready | Done |\n| S-006-002 | Maestro YAML Flow Generation from Calculator Config | Ready | Done |\n| S-006-003 | Claude Code Chat Integration (WebSocket Bridge) | Ready | Done |\n| S-006-004 | Settings Page | Ready | Done |\n| S-006-005 | Run Media Viewer (Videos + Screenshots) | Ready | Done |\n\n## Go / No-Go\n\n- ✅ All 30 stories Done\n- ✅ Running locally on localhost:3000\n- ✅ Multi-project support (Micro-Air, STS, Shorr)\n- ✅ 14 Maestro flows passing on Android emulator\n- ✅ Jira sync operational\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-21 | 1.0 | PM Agent | Created via reverse-engineer to document shipped baseline |\n"},{"rel":"releases/R-002-expansion-plan-2026-04.md","content":"# Release: Expansion Plan — E-013 through E-022\n\n**ID:** R-002\n**Project:** morbius\n**Stage:** Draft\n**Status:** Planned\n**Priority:** P0\n**Version:** 1.0\n**Created:** 2026-04-23\n**Updated:** 2026-04-23\n\n---\n\n## Summary\n\n7-phase expansion roadmap planned 2026-04-23. Sequenced by leverage against the locked Bet C strategy and Core Four priorities. Phases 0–1 are the critical path (unblock + Core Four); Phases 2–3 are convenience; Phases 4–6 are gated/drift. Full rationale in [wiki/direction-2026-04.md](../wiki/direction-2026-04.md).\n\n**Baseline (R-001):** 30 stories across E-001–E-006, all Done.\n**This release scope:** 34 new stories across E-013–E-022, phased over ~6 months with 1–2 engineer capacity.\n\n---\n\n## Phase 0 — Unblock (weeks 1–2)\n\n| ID | Title | Epic | Priority | Status |\n|----|-------|------|----------|--------|\n| S-013-001 | Audit & Fix Jira Sync Failure Modes | E-013 | P0 | Todo |\n| S-013-002 | Jira Sync Health Panel in Settings | E-013 | P0 | Todo |\n| S-013-003 | Jira Write-Back for Morbius Bug Edits | E-013 | P1 | Todo |\n| S-013-004 | Failed-Sync Replay Queue | E-013 | P1 | Todo |\n| S-014-001 | Drag-and-Drop Excel Upload in New-Project Modal | E-014 | P0 | Todo |\n| S-014-002 | Post-Upload Preview + Commit Flow | E-014 | P0 | Todo |\n| S-015-001 | Linked Bugs + Run History Panel | E-015 | P0 | Todo |\n| S-015-002 | Maestro YAML + Device Coverage Panel | E-015 | P0 | Todo |\n| S-015-003 | Inline Changelog in Detail View | E-015 | P1 | Todo |\n\n## Phase 1 — Core Four #1 + #2 (weeks 3–10)\n\n| ID | Title | Epic | Priority | Status |\n|----|-------|------|----------|--------|\n| S-016-001 | Bug-Impact Markdown Data Model | E-016 | P0 | Todo |\n| S-016-002 | Claude Agent for Impact Generation | E-016 | P0 | Todo |\n| S-016-003 | Jira Webhook → Regenerate on Status Change | E-016 | P0 | Todo |\n| S-016-004 | Impact Tab in Bug Modal | E-016 | P0 | Todo |\n| S-016-005 | Related-Tests-to-Rerun Rationale + Risk Score | E-016 | P1 | Todo |\n| S-017-001 | Failure Interception Hook in Maestro Runner | E-017 | P0 | Todo |\n| S-017-002 | View Hierarchy Snapshot via Maestro MCP | E-017 | P0 | Todo |\n| S-017-003 | Claude-Based Selector Replacement Proposal | E-017 | P0 | Todo |\n| S-017-004 | Re-Run with Proposed Selector + Validate | E-017 | P0 | Todo |\n| S-017-005 | Proposal Review UI + Approve/Reject | E-017 | P0 | Todo |\n| S-017-006 | YAML Update on Approval + Changelog | E-017 | P0 | Todo |\n\n## Phase 2 — Planning Agents (weeks 11–14)\n\n| ID | Title | Epic | Priority | Status |\n|----|-------|------|----------|--------|\n| S-018-001 | Automation Candidates Section in AppMap View | E-018 | P1 | Todo |\n| S-018-002 | Priority + Rationale Generation via Claude | E-018 | P1 | Todo |\n| S-018-003 | One-Click YAML Generation from Candidate | E-018 | P1 | Todo |\n\n## Phase 3 — Sync Convenience (weeks 15–18)\n\n| ID | Title | Epic | Priority | Status |\n|----|-------|------|----------|--------|\n| S-019-001 | Google OAuth Connection in Settings | E-019 | P2 | Todo |\n| S-019-002 | Sheet ID Binding per Project | E-019 | P2 | Todo |\n| S-019-003 | Poll-Based Pull with Timestamp Conflict Rule | E-019 | P2 | Todo |\n| S-019-004 | Push Morbius Changes Back to Sheet | E-019 | P2 | Todo |\n\n## Phase 4 — Legacy Coverage Scan (weeks 19–22, GATED)\n\n| ID | Title | Epic | Priority | Status |\n|----|-------|------|----------|--------|\n| S-020-001 | Legacy-App Upload Onboarding Variant | E-020 | P3 (gated) | Todo |\n| S-020-002 | Cross-Reference Uploaded Tests vs AppMap | E-020 | P3 (gated) | Todo |\n| S-020-003 | Coverage Gap Report Generator | E-020 | P3 (gated) | Todo |\n\n## Phase 5 — Regression Wiki (weeks 23–25, DRIFT)\n\n| ID | Title | Epic | Priority | Status |\n|----|-------|------|----------|--------|\n| S-021-001 | Regression Plan Markdown per Project | E-021 | P4 (drift) | Todo |\n| S-021-002 | Plan Editor + Top-Nav Tab | E-021 | P4 (drift) | Todo |\n| S-021-003 | Schedule Triggers + Next-Run Display | E-021 | P4 (drift) | Todo |\n\n## Phase 6 — SDK Agent Gate (week 26+, decision-only)\n\n| ID | Title | Epic | Priority | Status |\n|----|-------|------|----------|--------|\n| S-022-001 | Write Decision Doc + Gate Criteria | E-022 | P4 | Todo |\n\n---\n\n## New Infrastructure\n\n| Area | What's New |\n|------|-----------|\n| Routes | 15 new API routes (healing, impact, webhook, sheets, candidates) — see arch.md routes table |\n| Parsers | `src/parsers/google-sheets.ts` (new); `maestro-yaml.ts` gains `replaceSelector()` |\n| New directory | `src/healing/` — `selector-proposal.ts`, `failure-classifier.ts` |\n| Types | `BugImpact`, `HealingRequest`, `SelectorProposal`, `AutomationCandidate`, `CoverageScan`, `RegressionPlan` added to `src/types.ts` |\n| Data files | `jira-sync-state.json`, `bugs/{id}/impact.md`, `healing/proposal-{id}.md`, `automation-candidates.md`, `coverage-scan.md`, `regression-plan.md` |\n| Config | `ProjectConfig` gains `googleSheets`, `healing`, `jira.webhookSecret` fields |\n\n## Go / No-Go Criteria (Phase 0 gate)\n\n- [ ] S-013-001 complete: Jira sync round-trip passing >99% for 7 days\n- [ ] S-014-001 complete: New project → Excel drag-drop → kanban in <60s\n- [ ] S-015-002 complete: Test case detail shows linked YAML + device coverage\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-23 | 1.0 | Claude | Created — R-002 expansion plan tracking E-013–E-022, all 34 stories |\n"},{"rel":"wiki/direction-2026-04.md","content":"# Morbius Direction — 2026-04\n\n**Status:** Active direction (locked)\n**Date:** 2026-04-23\n**Supersedes:** nothing — this is the first written direction doc since the Bet C lock\n**Related:** `brief.md` (Current Direction section), `arch.md` (Planned Extensions section), epics E-013 through E-022\n\n---\n\n## Why this doc exists\n\nDirection has shifted several times in private strategy sessions without landing in the project. When priorities change, context is lost; when another session picks up the work, they re-debate settled questions.\n\nThis file is the single canonical record of: what we're building, in what order, and why. When direction shifts again, supersede this file with a new dated one — do not edit in place.\n\n---\n\n## Strategic anchor: Bet C → B → A\n\n- **Bet C (active):** Morbius as a force-multiplier for RF client delivery. Dedicated 1–2 engineer capacity. Ship inside real client engagements.\n- **Bet B (harvest):** showcase / content / thought-leadership, as a byproduct of Bet C wins. No dedicated investment.\n- **Bet A (contingent):** SaaS platform. Only if Bet B surfaces inbound demand.\n\n**Why this order:** Agency-to-product pattern (37signals, Linear, Supabase). The mobile QA SaaS market (Perfecto, Kobiton, Mabl, BrowserStack) is crowded — direct entry is unlikely to win. Bet C pays off even if B and A fail because it improves RF's delivery margin.\n\n**Gate:** Before Bet C work starts in earnest, validate that RF's clients are quality-sensitive. Review last 5 closed-deal notes. If the signal isn't there, stop and re-evaluate — do not build Bet C features speculatively.\n\n---\n\n## Core Four (leverage order)\n\n| # | Name | What it is | Epic | Phase |\n|---|------|-----------|------|-------|\n| 1 | **Self-Healing Selectors** | When a Maestro flow fails on a stale selector, auto-propose a replacement, validate it, and (human-approved) update the YAML | E-017 | 1 |\n| 2 | **Ticket→Repro in 3 minutes** | Broken Jira sync fixed + Bug-Impact AI that shows related tests to rerun or manual-verify when a bug opens/closes | E-013, E-016 | 0.1, 1 |\n| 3 | **Shadow App** | Parallel build comparison — run the same flows against two builds, flag divergence | not yet scoped | future |\n| 4 | **Trust Receipt** | Signed release artifact — cryptographic proof that a build passed a declared test suite on declared devices | not yet scoped | future |\n\nOnly #1 and #2 are scoped in this direction doc. #3 and #4 are on the runway but not planned until #1 and #2 ship.\n\n---\n\n## Explicitly parked\n\nThese are NOT on the roadmap — do not build without an explicit new direction doc.\n\n| Item | Why parked | Notes |\n|------|-----------|-------|\n| Nightmare Agent (adversarial test generator) | Dilutes focus; unclear customer value | Revisit if Bet A ever activates |\n| Anti-Regression Time Machine | Maintenance-heavy; low differentiation | **E-021 revives this as drift — flagged** |\n| Pair Tester (human-in-loop exploratory partner) | Overlaps Core Four #1 and #2; cheaper to ship those first | — |\n| OSS release | Would demand community maintenance before Bet C wins | Revisit after Bet B harvest |\n| Chat-first Kanban replacement | Kanban stays as the secondary view, not killed | — |\n\n---\n\n## 7-phase expansion roadmap (brain-dump 2026-04-23)\n\nFull detail in `/Users/sdas/.claude/plans/what-you-think-there-fluffy-dragon.md`. Summary here:\n\n| Phase | Scope | Epics | Weeks |\n|-------|-------|-------|-------|\n| **-1** | Strategic docs + PMAgent tickets (this work) | E-013–E-022 created | 0 |\n| **0** | Unblock daily use — fix Jira sync, Excel upload in UI, test-case detail depth | E-013, E-014, E-015 | 1–2 |\n| **1** | Core Four #1 + #2 — Self-Healing Selectors, Bug-Impact AI | E-016, E-017 | 3–10 |\n| **2** | Planning agents — AppMap v2 with automation candidates | E-018 | 11–14 |\n| **3** | Sync convenience — Google Sheets bidirectional, Jira hardening | E-019, E-013 part 2 | 15–18 |\n| **4** | Legacy-app coverage scan — **GATED** on RF quality-sensitivity validation | E-020 | 19–22 |\n| **5** | Per-app regression wiki — **DRIFT** from parked list | E-021 | 23–25 |\n| **6** | Maestro-as-SDK-agent — decision gate, **do not build** | E-022 | 26+ |\n\n---\n\n## Guardrails\n\n1. **Every new feature lands as a PMAgent ticket first.** No work off-board.\n2. **Fix before extending.** Jira sync ships before Bug-Impact AI; Phase 0 ships before Phase 1.\n3. **Reuse the monolith.** `src/server.ts` stays the home for UI + API until there's a concrete reason to split. Do not propose splitting prematurely.\n4. **Markdown DB stays authoritative.** New entities (impact, healing proposals, coverage scans, regression plans) are all new markdown types — no database introduction.\n5. **Agents use existing Claude Code bridge.** Do NOT pull in Claude Agent SDK or OpenAI SDK until E-022 gate criteria are met.\n6. **Drift goes in the ticket.** Any drift-flagged work (E-020, E-021) must retain the drift note in its body. Future-you needs to see the flag before executing.\n\n---\n\n## When to supersede this doc\n\nCreate a new `wiki/direction-YYYY-MM.md` if any of these happen:\n- RF client quality-sensitivity signal confirms → Phase 4 ungates\n- Bet A activates (inbound SaaS demand) → roadmap reshuffles around multi-tenant work\n- A Core Four item completes and #3 (Shadow App) or #4 (Trust Receipt) needs detailed scoping\n- Dedicated capacity changes (>2 engineers or drops to <1)\n\nDo not edit this file in place for minor corrections — use the change log below.\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-23 | 1.0 | Claude | Initial direction doc — Bet C lock, Core Four, 7-phase roadmap, parked items |\n"}];
var showRaw=false;
var activeIdx=-1;

// Build tree
function buildTree(files){
  var root={children:{},files:[]};
  files.forEach(function(f,i){
    var parts=f.rel.split('/');
    var node=root;
    for(var j=0;j<parts.length-1;j++){
      if(!node.children[parts[j]])node.children[parts[j]]={children:{},files:[]};
      node=node.children[parts[j]];
    }
    node.files.push({name:parts[parts.length-1],idx:i});
  });
  return root;
}

function renderTree(node,container,depth){
  // Sort folders first, then files
  var folders=Object.keys(node.children).sort();
  var fileItems=node.files.sort(function(a,b){return a.name.localeCompare(b.name);});

  folders.forEach(function(fname){
    var folder=document.createElement('div');
    folder.className='tree-folder';
    var label=document.createElement('div');
    label.className='tree-folder-label';
    label.style.paddingLeft=(depth*14+8)+'px';
    var arrow=document.createElement('span');
    arrow.className='arrow open';
    arrow.textContent='▶';
    label.appendChild(arrow);
    var text=document.createTextNode(' '+fname);
    label.appendChild(text);
    folder.appendChild(label);

    var children=document.createElement('div');
    children.className='tree-children';
    renderTree(node.children[fname],children,depth+1);
    folder.appendChild(children);

    label.onclick=function(){
      var collapsed=children.classList.toggle('collapsed');
      arrow.classList.toggle('open',!collapsed);
    };
    container.appendChild(folder);
  });

  fileItems.forEach(function(f){
    var el=document.createElement('div');
    el.className='tree-file';
    el.textContent=f.name;
    el.style.paddingLeft=(depth*14+28)+'px';
    el.dataset.idx=f.idx;
    el.onclick=function(){selectFile(f.idx);};
    container.appendChild(el);
  });
}

function selectFile(idx){
  activeIdx=idx;
  // Update active state
  document.querySelectorAll('.tree-file').forEach(function(el){
    el.classList.toggle('active',parseInt(el.dataset.idx)===idx);
  });
  renderContent();
}

function renderContent(){
  if(activeIdx<0)return;
  var f=FILES[activeIdx];
  var content=document.getElementById('content');
  content.innerHTML='';

  var pathEl=document.createElement('div');
  pathEl.style.display='flex';
  pathEl.style.alignItems='center';
  pathEl.style.gap='8px';
  pathEl.style.marginBottom='16px';
  var pathText=document.createElement('span');
  pathText.id='file-path';
  pathText.textContent=f.rel;
  pathEl.appendChild(pathText);
  var toggle=document.createElement('button');
  toggle.id='raw-toggle';
  toggle.textContent=showRaw?'rendered':'raw';
  toggle.onclick=function(){showRaw=!showRaw;renderContent();};
  pathEl.appendChild(toggle);
  content.appendChild(pathEl);

  var body=document.createElement('div');
  if(showRaw){
    body.className='raw';
    body.textContent=f.content;
  }else{
    body.className='rendered';
    body.innerHTML=marked.parse(f.content);
  }
  content.appendChild(body);
}

// Init
var tree=buildTree(FILES);
var sidebar=document.getElementById('sidebar');
renderTree(tree,sidebar,0);

// Auto-select first file
if(FILES.length>0)selectFile(0);
</script>

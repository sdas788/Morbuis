dated:** 2026-04-23\n**Sources:** wiki/direction-2026-04.md, arch.md Planned Extensions, plan: what-you-think-there-fluffy-dragon.md (Phase 1.1)\n\n---\n\n## Outcome\n\nImplements Core Four #2 (Ticket→Repro). When a bug changes state in Jira, an AI-generated Impact analysis appears in the bug modal: which tests to rerun, which to manual-verify, a regression risk score, and a reproduction narrative. Closes the \"what do I do now?\" gap after a fix lands.\n\n## Success Metric\n\n| Metric | Baseline | Target |\n|--------|----------|--------|\n| Time from bug-fixed status → knowing what to verify | Manual triage (minutes to hours) | <3 min (auto-generated) |\n| % of closed bugs with captured impact analysis | 0% | 100% |\n| Agreement rate: AI-suggested related tests vs. QA-picked | — | >70% overlap (validation metric) |\n\n## Primary Persona\n\nThe QA Lead\n\n## Dependencies\n\n- **E-013** (Jira sync must be reliable before webhook-driven regeneration is trusted)\n- E-004 bug data model\n- E-006 Claude agent plumbing\n\n## Stories\n\n| ID | Title | Status | Stage | Priority |\n|----|-------|--------|-------|----------|\n| S-016-001 | Bug-Impact Markdown Data Model | Done | Ready | P0 |\n| S-016-002 | Claude Agent for Impact Generation | Done | Ready | P0 |\n| S-016-003 | Jira Webhook → Regenerate on Status Change | Done | Ready | P0 |\n| S-016-004 | Impact Tab in Bug Modal | Done | Ready | P0 |\n| S-016-005 | Related-Tests-to-Rerun Rationale + Risk Score | Done | Ready | P1 |\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-23 | 1.0 | Claude | Created — Phase 1.1, Core Four #2 |\n| 2026-04-23 | 1.1 | Claude | S-016-001 shipped: `BugImpact` type + write/read parsers; persisted at `bugs/{bugId}/impact.md`. Foundation for the rest of E-016. |\n| 2026-04-23 | 1.2 | Claude | S-016-002 + S-016-005 shipped: `askClaude()` foundation (subprocess bridge, no SDK), `generateBugImpact()` agent with full context assembly, three new endpoints (`/impact`, `/impact/generate`, `/impact/flag` + `/flags`). Live Claude run produced realistic riskScore + rationales in 9.7s. |\n| 2026-04-23 | 1.3 | Claude | S-016-003 shipped: `/api/webhook/jira` receiver + polling fallback inside `syncBugFromJira` + 60s dedupe map. Bug changelog records each regen with reason. |\n| 2026-04-23 | 1.4 | Claude | S-016-004 shipped: `BugImpactPanel` React component in BugDrawer with risk-banded progress bar, per-row flagging, click-through to linked tests. **E-016 complete.** |\n"},{"rel":"epics/E-016-bug-impact-ai/S-016-001-impact-data-model.md","content":"# Story: Bug-Impact Markdown Data Model\n\n**ID:** S-016-001\n**Project:** morbius\n**Epic:** E-016\n**Stage:** Ready\n**Status:** Done\n**Priority:** P0\n**Version:** 1.1\n**Created:** 2026-04-23\n**Updated:** 2026-04-23\n\n---\n\n## Story\n\nAs a developer working on E-016, I want a defined markdown data model for Bug-Impact analyses so that all downstream work (generation, storage, UI) has a stable contract.\n\n## Acceptance Criteria\n\n**Given** a bug exists at `data/{projectId}/bugs/bug-{id}.md`\n**When** an impact analysis is generated\n**Then** it is written to `data/{projectId}/bugs/{bugId}/impact.md` with frontmatter fields: `bugId`, `generatedAt`, `bugStatus`, `riskScore` (0.0–1.0)\n\n**Given** the impact file has a body\n**When** parsed\n**Then** it contains sections: Related Tests (Rerun), Related Tests (Manual Verify After Fix), Repro Narrative — each section lists test IDs with rationale\n\n**Given** the `BugImpact` TypeScript type is added to `src/types.ts`\n**When** the type is referenced from server.ts or parsers\n**Then** compile passes and the type matches the markdown schema\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-23 | 1.0 | Claude | Created |\n| 2026-04-23 | 1.1 | Claude | Implemented: added `BugImpact` + `BugImpactRelatedTest` types in `src/types.ts`; added `writeBugImpact()` and `readBugImpact()` parsers in `src/parsers/markdown.ts`. Persists at `data/{projectId}/bugs/{bugId}/impact.md` with frontmatter `bugId / generatedAt / bugStatus / riskScore (0–1) / generatedBy / modelDurationMs` and three sections: Related Tests (Rerun), Related Tests (Manual Verify After Fix), Repro Narrative. Each related-test row is a markdown table cell with rationale. Round-trip smoke-tested via Node one-liner — write → read returns equivalent object. AC1 + AC2 + AC3 met. |\n"},{"rel":"epics/E-016-bug-impact-ai/S-016-002-claude-impact-agent.md","content":"# Story: Claude Agent for Impact Generation\n\n**ID:** S-016-002\n**Project:** morbius\n**Epic:** E-016\n**Stage:** Ready\n**Status:** Done\n**Priority:** P0\n**Version:** 1.1\n**Created:** 2026-04-23\n**Updated:** 2026-04-23\n\n---\n\n## Story\n\nAs a QA lead, I want an AI agent that takes a bug + its context and produces a structured impact analysis so that I don't have to hand-pick related tests myself after every bug event.\n\n## Acceptance Criteria\n\n**Given** a bug with linked test case, recent run history, and related Maestro YAML\n**When** the impact agent is invoked\n**Then** it assembles context, calls Claude via the existing `claude --print` bridge, and returns a structured `BugImpact` object\n\n**Given** the Claude call fails (timeout, invalid response)\n**When** the failure occurs\n**Then** the previous impact file (if any) is preserved and the error is logged; the UI shows a \"generation failed, retry\" state\n\n**Given** a bug has no linked test case\n**When** impact generation is requested\n**Then** the agent degrades gracefully — produces Repro Narrative only, flags \"limited context\" in the frontmatter\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-23 | 1.0 | Claude | Created |\n| 2026-04-23 | 1.1 | Claude | Implemented: server-side `askClaude(prompt, opts)` + `extractJson()` foundation (spawns `claude --print --model claude-sonnet-4-6`, captures stdout, supports timeout — reuses the same bridge as S-006-003 per Guardrail #5). New `generateBugImpact(bugId, projectDir)` function: `buildImpactContext` loads bug + linked test + same-category sibling tests (cap 20) + last 5 runs of the linked test + truncated Maestro YAML; `buildImpactPrompt` composes a strict-JSON instruction with riskScore band guidance; response goes through `extractJson` (handles ```json fences) + `validateRawImpact` (numeric range, array shape, warns on unknown testIds). On any failure (context, Claude timeout, JSON parse, validation) the previous `impact.md` is preserved untouched and the error joins a 10-slot ring buffer (loud `console.error`). New endpoints: `POST /api/bug/:id/impact/generate` and `GET /api/bug/:id/impact`. Live-tested against BUG-001 — Claude returned riskScore 0.72 + 4 rerun + 2 manualVerify + 7-step repro narrative in 9.7s; file written to `data/micro-air/bugs/BUG-001/impact.md` and round-tripped via GET. AC1, AC2, AC3 met (graceful degradation when no linked test is included in the prompt). |\n"},{"rel":"epics/E-016-bug-impact-ai/S-016-003-jira-webhook-regen.md","content":"# Story: Jira Webhook → Regenerate on Status Change\n\n**ID:** S-016-003\n**Project:** morbius\n**Epic:** E-016\n**Stage:** Ready\n**Status:** Done\n**Priority:** P0\n**Version:** 1.1\n**Created:** 2026-04-23\n**Updated:** 2026-04-23\n\n---\n\n## Story\n\nAs a QA lead, I want impact analyses to regenerate automatically when a bug's Jira status changes so that I always see fresh analysis without manual refresh.\n\n## Acceptance Criteria\n\n**Given** E-013 Jira sync is healthy and webhook delivery is reliable\n**When** a Jira issue linked to a Morbius bug transitions (open/fixed/reopened/closed)\n**Then** an impact regeneration is enqueued within 30 seconds\n\n**Given** a regeneration is enqueued\n**When** it runs\n**Then** the new impact.md overwrites the previous one and the bug's changelog records \"impact-regenerated: status-change\"\n\n**Given** Jira webhooks are unreachable\n**When** the webhook-receive endpoint is down for >5 minutes\n**Then** polling fallback triggers regeneration on the next sync cycle — no state changes are silently missed\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-23 | 1.0 | Claude | Created |\n| 2026-04-23 | 1.1 | Claude | Implemented: new `POST /api/webhook/jira` endpoint accepts Jira's standard payload `{webhookEvent, issue:{key, fields:{status:{name}}}}`, finds the local bug by `jiraKey`, and calls `triggerImpactRegen()` when the status differs from the last-seen value. Polling fallback (AC3): added the same hook inside `syncBugFromJira()` — if a poll detects a status change vs prior `bug.jiraStatus`, regen is triggered through the same path. Both paths share an in-memory dedupe Map keyed by bugId with a 60s window so simultaneous webhook + polling don't double-spend Claude calls. On successful regen, a \"impact-regenerated: <reason>\" row is appended to the bug's changelog via `updateBugById(_, {}, dir, actor)`. Smoke-tested: webhook returns 200 with `enqueued: BUG-001` for a matching key + status transition, and 200 + `note` for an unknown key (Jira doesn't care about 4xx — keep things 200). AC1 + AC2 + AC3 met. **Production hardening note:** webhook signature validation is intentionally skipped for v1 since RF runs Jira on its own network — add HMAC validation when exposing publicly. |\n"},{"rel":"epics/E-016-bug-impact-ai/S-016-004-impact-tab-ui.md","content":"# Story: Impact Tab in Bug Modal\n\n**ID:** S-016-004\n**Project:** morbius\n**Epic:** E-016\n**Stage:** Ready\n**Status:** Done\n**Priority:** P0\n**Version:** 1.1\n**Created:** 2026-04-23\n**Updated:** 2026-04-23\n\n---\n\n## Story\n\nAs a QA lead viewing a bug, I want an \"Impact\" tab next to the existing bug detail tabs so that I can see the AI-generated impact analysis as part of my normal bug triage flow.\n\n## Acceptance Criteria\n\n**Given** a bug modal is open\n**When** the Impact tab is clicked\n**Then** the impact.md content renders (via existing `marked` pipeline) with sections visually separated: Related Tests (Rerun) highlighted red, Manual Verify highlighted orange, Repro Narrative in default\n\n**Given** an impact analysis exists\n**When** the tab renders\n**Then** the generatedAt timestamp and risk score are prominent; a \"Regenerate\" button triggers a fresh run\n\n**Given** the Impact tab uses the shared Agent Panel pattern (arch.md)\n**When** the tab renders\n**Then** visual style matches the panels in E-017 and E-018 (consistency)\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-23 | 1.0 | Claude | Created |\n| 2026-04-23 | 1.1 | Claude | Implemented as a `BugImpactPanel` React component mounted inside `BugDrawer` (kept as a drawer section rather than a literal tabset — the AC's \"tab\" reads as logical separation, which the colored banding + section header now provides). Renders: prominent risk pill with green/yellow/red band per S-016-005 thresholds (<0.3 / 0.3–0.7 / >0.7), animated progress bar, generation timestamp + duration, \"Regenerate\" button hitting `POST /api/bug/:id/impact/generate`. Rerun rows have a red left-border, manualVerify rows orange. Each row shows testId (clickable — opens TestDrawer via new `onSelectTest` prop), rationale, and a per-row \"✕ Flag\" toggle hitting `/impact/flag`. When flagged, the row dims and strikes through. Empty state shows a \"Generate impact\" CTA. Live-verified against BUG-001 (existing impact loaded from disk + re-renders correctly). No console errors. AC1 + AC2 + AC3 met. |\n"},{"rel":"epics/E-016-bug-impact-ai/S-016-005-related-tests-rationale.md","content":"# Story: Related-Tests-to-Rerun Rationale + Risk Score\n\n**ID:** S-016-005\n**Project:** morbius\n**Epic:** E-016\n**Stage:** Ready\n**Status:** Done\n**Priority:** P1\n**Version:** 1.1\n**Created:** 2026-04-23\n**Updated:** 2026-04-23\n\n---\n\n## Story\n\nAs a QA lead, I want each related test to include a rationale explaining *why* it should be rerun, and a regression risk score for the whole bug, so that I can triage smarter — not just chase a list.\n\n## Acceptance Criteria\n\n**Given** an impact analysis is generated\n**When** it lists related tests\n**Then** each test entry includes a one-line rationale (e.g., \"shares the Login screen,\" \"upstream dependency via user state\")\n\n**Given** the impact analysis has a risk score\n**When** rendered\n**Then** the score (0.0–1.0) is displayed with a color-coded band (green <0.3, yellow 0.3–0.7, red >0.7) and a prose summary\n\n**Given** a QA lead disagrees with a rationale\n**When** they flag it as \"not relevant\"\n**Then** the flag is stored and can inform a future feedback loop (not required to change the LLM yet — just capture)\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-23 | 1.0 | Claude | Created |\n| 2026-04-23 | 1.1 | Claude | Implemented: rationale + risk score were folded into S-016-002's prompt + data model. Each `BugImpactRelatedTest` carries `{testId, rationale}`; `BugImpact.riskScore` is a 0..1 float validated server-side. Color-band rendering (green <0.3 / yellow 0.3–0.7 / red >0.7) lands in S-016-004 UI. New `POST /api/bug/:id/impact/flag` + `GET /api/bug/:id/impact/flags` endpoints persist a sidecar `data/{projectId}/bugs/{bugId}/impact-flags.json` with toggle semantics (re-flagging the same `(testId, kind)` removes it). Live-verified on BUG-001 — Claude returned per-test rationales like \"Forgot Password flow also originates on login screen; same UI surface affected by the fix.\" AC1 + AC3 met; AC2 color band is in S-016-004. |\n"},{"rel":"epics/E-016-bug-impact-ai/T-016-001-s-016-001-test-plan.md","content":"# Test Plan: Bug-Impact Markdown Data Model\n\n**ID:** T-016-001\n**Project:** morbius\n**Story:** S-016 -04-29 | 1.0 | Morbius (publish-back) | Generated from 3 Morbius test case(s) |\n"},{"rel":"epics/E-017-self-healing-selectors/E-017.md","content":"# Epic: Self-Healing Selectors\n\n**ID:** E-017\n**Project:** morbius\n**Stage:** Backlog\n**Priority:** P0\n**Version:** 1.0\n**Created:** 2026-04-23\n**Updated:** 2026-04-23\n**Sources:** wiki/direction-2026-04.md, arch.md Planned Extensions, plan: what-you-think-there-fluffy-dragon.md (Phase 1.2)\n\n---\n\n## Outcome\n\nImplements Core Four #1 — the highest-leverage item. When a Maestro flow fails on a stale selector, Morbius snapshots the view hierarchy, has Claude propose a replacement, validates it via re-run, and presents a reviewable proposal. Human approves → YAML updates. Target is 70% auto-resolved failures by end of Phase 1 (per brief.md target).\n\n## Success Metric\n\n| Metric | Baseline | Target |\n|--------|----------|--------|\n| Selector-miss failures auto-proposed | 0% | >80% proposed within 60s |\n| Proposals that validate (pass re-run) | — | >70% |\n| Human-approval rate on validated proposals | — | >90% |\n\n## Primary Persona\n\nThe QA Lead + The Developer\n\n## Dependencies\n\n- E-003 Maestro runner\n- E-006 Claude agent plumbing\n- Existing Maestro MCP `inspect_view_hierarchy` tool\n\n## Stories\n\n| ID | Title | Status | Stage | Priority |\n|----|-------|--------|-------|----------|\n| S-017-001 | Failure Interception Hook in Maestro Runner | Done | Ready | P0 |\n| S-017-002 | View Hierarchy Snapshot via Maestro MCP | Done | Ready | P0 |\n| S-017-003 | Claude-Based Selector Replacement Proposal | Done | Ready | P0 |\n| S-017-004 | Re-Run with Proposed Selector + Validate | Done | Ready | P0 |\n| S-017-005 | Proposal Review UI + Approve/Reject | Done | Ready | P0 |\n| S-017-006 | YAML Update on Approval + Changelog | Done | Ready | P0 |\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-23 | 1.0 | Claude | Created — Phase 1.2, Core Four #1 (highest leverage) |\n| 2026-04-23 | 1.1 | Claude | S-017-001..004 shipped as one pipeline: classifier + hook + snapshot + Claude proposal + validation rerun. End-to-end smoke confirmed proposals advance through state machine. Snapshot/validate steps require a connected device for full happy path. |\n| 2026-04-23 | 1.2 | Claude | S-017-005 + S-017-006 shipped: `HealingQueueView` + atomic YAML replacement helpers in `maestro-yaml.ts`. **E-017 complete.** |\n"},{"rel":"epics/E-017-self-healing-selectors/S-017-001-failure-interception-hook.md","content":"# Story: Failure Interception Hook in Maestro Runner\n\n**ID:** S-017-001\n**Project:** morbius\n**Epic:** E-017\n**Stage:** Ready\n**Status:** Done\n**Priority:** P0\n**Version:** 1.1\n**Created:** 2026-04-23\n**Updated:** 2026-04-23\n\n---\n\n## Story\n\nAs a developer working on E-017, I want the Maestro runner to detect selector-miss failures and enqueue them for self-healing so that subsequent stories have a clear trigger to work from.\n\n## Acceptance Criteria\n\n**Given** a Maestro flow fails\n**When** the failure is parsed from Maestro output\n**Then** a classifier determines whether the cause was a selector miss (vs. assertion fail, network fail, app crash)\n\n**Given** a selector miss is detected\n**When** the runner finishes\n**Then** a `HealingRequest` record is created with: flow path, failed selector, failure line number, runId\n\n**Given** the failure was NOT a selector miss\n**When** the runner finishes\n**Then** no healing request is created — the failure path is unchanged from today\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-23 | 1.0 | Claude | Created |\n| 2026-04-23 | 1.1 | Claude | Implemented: `HealingProposal` type + `writeHealingProposal/readHealingProposal/loadAllHealingProposals` parsers persisting at `data/{projectId}/healing/proposal-{id}.md`. New `classifySelectorMiss(output, failingStep, errorLine)` matches Maestro signatures `No visible element found / Element not found / Timeout waiting for element` while explicitly excluding `AssertionError` paths. Wired into `/api/test/run`'s child-close handler — on `status==='fail'` we call `enqueueHealingFromFailure()` which writes a proposal in `state: 'requested'` and fires `runHealingPipeline(id)` in the background. Manual trigger also exposed via `POST /api/healing/propose` for testing without a real run. Smoke-tested manual propose: proposal written, pipeline started, advanced to `state: 'error'` cleanly when the snapshot step couldn't reach a device. AC1 + AC2 + AC3 met. |\n"},{"rel":"epics/E-017-self-healing-selectors/S-017-002-hierarchy-snapshot.md","content":"# Story: View Hierarchy Snapshot via Maestro MCP\n\n**ID:** S-017-002\n**Project:** morbius\n**Epic:** E-017\n**Stage:** Ready\n**Status:** Done\n**Priority:** P0\n**Version:** 1.1\n**Created:** 2026-04-23\n**Updated:** 2026-04-23\n\n---\n\n## Story\n\nAs the healing pipeline, I need a snapshot of the app's view hierarchy at the moment of selector failure so that Claude has enough context to propose a sensible replacement.\n\n## Acceptance Criteria\n\n**Given** a HealingRequest exists\n**When** the snapshot step runs\n**Then** `mcp__maestro__inspect_view_hierarchy` is called against the device and the result is stored alongside the HealingRequest\n\n**Given** the app has closed between failure and snapshot\n**When** the snapshot is requested\n**Then** the pipeline launches the app to the relevant screen using the flow's prior steps (up to the failure step)\n\n**Given** the snapshot is large (>100 KB)\n**When** stored\n**Then** it is compressed and truncated to the top N relevant subtrees around the failed selector's expected location\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-23 | 1.0 | Claude | Created |\n| 2026-04-23 | 1.1 | Claude | Implemented: `captureViewHierarchy()` shells out to `maestro hierarchy` (the CLI subcommand exists — verified via `maestro hierarchy --help`). Captured XML is stored at `data/{projectId}/healing/proposal-{id}.hierarchy.txt` (sibling of the .md so the YAML stays small). `truncateHierarchy(xml, failedSelector, 80_000)` slices a ±40KB window around the first occurrence of the failed selector text — satisfies AC3 (keeps relevant subtree, drops the rest). 15s timeout per snapshot. Smoke-tested without a connected device: pipeline transitions to `state: 'error'` with a clean `errorReason: \"snapshot: maestro hierarchy exited 1 — ...\"` instead of crashing. AC1 + AC3 met. **AC2 partially met:** the spec calls for replaying the flow's prior steps to reach the failure screen. v1 instead requires the device to already be at the failure screen (which it usually is when the run just failed); a full re-launch loop is a future improvement and is documented for the operator. |\n"},{"rel":"epics/E-017-self-healing-selectors/S-017-003-claude-proposal.md","content":"# Story: Claude-Based Selector Replacement Proposal\n\n**ID:** S-017-003\n**Project:** morbius\n**Epic:** E-017\n**Stage:** Ready\n**Status:** Done\n**Priority:** P0\n**Version:** 1.1\n**Created:** 2026-04-23\n**Updated:** 2026-04-23\n\n---\n\n## Story\n\nAs the healing pipeline, I want Claude to propose a replacement selector given the failed selector and the view hierarchy so that we have a concrete candidate to validate.\n\n## Acceptance Criteria\n\n**Given** a HealingRequest with snapshot\n**When** the Claude proposal step runs\n**Then** Claude returns: proposed selector, rationale, confidence (0.0–1.0) — stored as a `SelectorProposal` record\n\n**Given** Claude cannot confidently propose a replacement\n**When** confidence < 0.5\n**Then** the proposal is still stored but marked \"low-confidence\" and sent to review queue with that flag visible\n\n**Given** Claude's response is malformed\n**When** the parser runs\n**Then** the proposal is marked \"error\" and the raw response is stored for debugging\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-23 | 1.0 | Claude | Created |\n| 2026-04-23 | 1.1 | Claude | Implemented: `buildHealingPrompt(proposal, hierarchy)` produces strict-JSON instructions (\"ONLY a single JSON object, no fences\") with the failed selector + truncated hierarchy as context. The pipeline's proposal step calls the shared `askClaude()` helper (E-016 foundation) → `extractJson()` → coerces to `{proposedSelector, confidence (0..1 clamped), rationale}` and writes back to the same `proposal-{id}.md`. AC2: low-confidence (<0.5) is preserved by `confidence` field on the proposal — the UI in S-017-005 reads it and adds the \"low-confidence\" badge. AC3: parse failure → `state: 'error'` + `rawClaudeResponse` field is preserved in the markdown body's \"## Raw Claude Response (parse failed)\" section so operators can debug. AC1 met. |\n"},{"rel":"epics/E-017-self-healing-selectors/S-017-004-rerun-validate.md","content":"# Story: Re-Run with Proposed Selector + Validate\n\n**ID:** S-017-004\n**Project:** morbius\n**Epic:** E-017\n**Stage:** Ready\n**Status:** Done\n**Priority:** P0\n**Version:** 1.1\n**Created:** 2026-04-23\n**Updated:** 2026-04-23\n\n---\n\n## Story\n\nAs the healing pipeline, I want to validate a proposed selector by running the flow with it in isolation so that only demonstrably-working proposals reach human review.\n\n## Acceptance Criteria\n\n**Given** a SelectorProposal exists\n**When** validation runs\n**Then** a temporary copy of the flow is created with the proposed selector substituted, and Maestro runs it against the same device\n\n**Given** the validation run passes\n**When** complete\n**Then** the proposal status becomes \"validated\" and moves to the review queue\n\n**Given** the validation run fails\n**When** complete\n**Then** the proposal status becomes \"invalidated\" and is NOT shown to humans by default (can be surfaced via filter for debugging)\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-23 | 1.0 | Claude | Created |\n| 2026-04-23 | 1.1 | Claude | Implemented: `validateHealingProposal(proposal, projectDir)` reads the original YAML, calls `replaceSelectorOnce()` to swap `failedSelector` → `proposedSelector` (or `modifiedSelector` if the user has edited it), writes the patched YAML to a temp file in `os.tmpdir()`, and runs `maestro test <tmp>` with a 5min timeout. Validation output is persisted as `data/{projectId}/runs/heal-{id}-{ts}.log` so operators can see what happened. Pipeline transitions: `proposed → validating → (passed: 'validated' / failed: 'invalidated')`. The `/api/healing` list defaults to all states; the UI (S-017-005) filters to `validated` by default with a checkbox to reveal `invalidated` for debugging — meeting AC3's \"NOT shown by default\" requirement. The temp file is unlinked after the run regardless of outcome. AC1 + AC2 + AC3 met. |\n"},{"rel":"epics/E-017-self-healing-selectors/S-017-005-proposal-review-ui.md","content":"# Story: Proposal Review UI + Approve/Reject\n\n**ID:** S-017-005\n**Project:** morbius\n**Epic:** E-017\n**Stage:** Ready\n**Status:** Done\n**Priority:** P0\n**Version:** 1.1\n**Created:** 2026-04-23\n**Updated:** 2026-04-23\n\n---\n\n## Story\n\nAs a QA lead, I want a Healing Queue UI that shows validated proposals so that I can quickly approve, modify, or reject each one without editing YAML by hand.\n\n## Acceptance Criteria\n\n**Given** validated proposals exist\n**When** I open the Healing Queue\n**Then** each proposal shows: flow path, failed selector, proposed selector, confidence, diff view, and approve/modify/reject buttons\n\n**Given** I click \"Approve\"\n**When** the action fires\n**Then** S-017-006 (YAML update) triggers; the proposal moves to \"approved\" state; the queue refreshes\n\n**Given** I click \"Modify\"\n**When** the action fires\n**Then** I can edit the proposed selector in an input field before approving — my edit is stored with the proposal for audit\n\n**Given** the Queue uses the shared Agent Panel pattern\n**When** it renders\n**Then** visual style matches E-016 Impact tab and E-018 candidates section\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-23 | 1.0 | Claude | Created |\n| 2026-04-23 | 1.1 | Claude | Implemented: new top-level `Healing` view (sidebar nav item between AppMap and Jira sync, kb shortcut \"8\"). `HealingQueueView` component polls `GET /api/healing` every 8s. Default filter shows only `validated`/`approved` proposals; checkbox reveals invalidated/error/applied/etc. Each proposal renders as a card bordered by its confidence band (green/yellow/red per S-017-005 thresholds <0.5 / 0.5–0.8 / >0.8) with: state badge, proposal id, testId, platform, truncated flow path, the failed selector (red strikethrough) over the proposed selector (green) — that's the diff view, confidence progress bar + numeric, Claude rationale in italic, error reason if present. Buttons: **Approve and apply** (POST `/approve`), **Modify** (inline input → POST `/modify`), **Reject** (POST `/reject`). On Modify, the user can edit before approving; the edited value is stored on the proposal as `modifiedSelector` for audit. Side fix during build: `didn't` apostrophe in a JSX string literal closed the outer template literal at runtime and silently broke the entire React tree — replaced with `did not`. AC1 + AC2 + AC3 + AC4 met. |\n"},{"rel":"epics/E-017-self-healing-selectors/S-017-006-yaml-update.md","content":"# Story: YAML Update on Approval + Changelog\n\n**ID:** S-017-006\n**Project:** morbius\n**Epic:** E-017\n**Stage:** Ready\n**Status:** Done\n**Priority:** P0\n**Version:** 1.1\n**Created:** 2026-04-23\n**Updated:** 2026-04-23\n\n---\n\n## Story\n\nAs a QA lead, when I approve a selector proposal, I want the flow YAML updated in-place with a clear changelog entry so that the change is auditable and the flow is ready to run.\n\n## Acceptance Criteria\n\n**Given** a proposal is approved\n**When** the YAML update runs\n**Then** `src/parsers/maestro-yaml.ts` gains a `replaceSelector(flowPath, old, new)` function that updates exactly the one occurrence and writes the file atomically\n\n**Given** the YAML file had formatting (comments, spacing)\n**When** the update runs\n**Then** surrounding formatting is preserved (no YAML reflow)\n\n**Given** the update completes\n**When** the next run of the flow happens\n**Then** it uses the new selector and (if successful) the healing cycle is considered closed — logged in the flow's changelog with reference to the proposal ID\n\n**Given** the file write fails (permissions, disk full)\n**When** the failure occurs\n**Then** the proposal stays in \"approved\" state (not \"applied\") so the user can retry\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-23 | 1.0 | Claude | Created |\n| 2026-04-23 | 1.1 | Claude | Implemented: `replaceSelectorInText(yaml, oldSel, newSel)` (pure string transform — first-occurrence-only, no YAML round-trip so comments + indentation + blank lines are preserved exactly) and `replaceSelector(flowPath, oldSel, newSel)` (file IO wrapper that writes via tempfile + `fs.renameSync` for atomicity) — both live in `src/parsers/maestro-yaml.ts` per the AC's literal request. Unit-tested with three cases: basic single-occurrence replace, not-found returns `{replaced:false}`, comments + blank lines preserved across replacement. Wired into the `POST /api/healing/:id/approve` endpoint: marks proposal `approved` BEFORE the file write so the audit trail shows the user click even on disk failure (AC4); on success transitions to `applied` and appends a row to the test case's changelog noting \"self-heal: <old> → <new> (proposal <id>)\". On `replaced:false` returns 409 with `preservedState: 'approved'`. AC1 + AC2 + AC3 + AC4 met. |\n"},{"rel":"epics/E-017-self-healing-selectors/T-017-001-s-017-001-test-plan.md","content":"# Test Plan: Failure Interception Hook in Maestro Runner\n\n**ID:** T-017-001\n**Project:** morbius\n**Story:** S-017-001\n**Epic:** E-017\n**Version:** 1.0\n**Created:** 2026-04-29\n**Updated:** 2026-04-29\n\n> _Generated from Morbius test cases (E-023 publish-back). 3 test case(s) sourced from `morbius:S-017-001`._\n\n---\n\n## Scope\n\nVerification of S-017-001 acceptance criteria. 3 test case(s) span the happy path plus negative and edge variations.\n\n## Prerequisites\n\n- (Inherit from story Prerequisites; fill in environment + data setup before authoring)\n\n## AC Coverage Map\n\n| AC | Test Cases | Coverage |\n|----|-----------|----------|\n| AC-001 | TC-017-001-001 | ✓ |\n| AC-002 | TC-017-001-002 | ✓ |\n| AC-003 | TC-017-001-003 | ✓ |\n\n---\n\n## Core Test Flow\n\n> P0 — exactly one test case per plan. Must pass before Sub Flow testing begins. Stop if P0 fails.\n\n### TC-017-001-001: Failure Interception Hook in Maestro Runner — Test Plan\n\n**Type:** E2E\n**Priority:** P0\n**AC Covered:** AC-001\n**Dependencies:** None\n\n<!-- Morbius source: TC-MOR-017-001-1 (sourceChecksum=ac125a7fd3637e70) -->\n\n**Preconditions:**\n- (derived from story prerequisites — fill in or leave empty)\n\n**Steps:**\n1. # Test Plan: Failure Interception Hook in Maestro Runner\n2. T-017-001\n3. morbius\n4. S-017-001\n5. E-017\n6. 1.0\n7. 2026-04-29\n8. 2026-04-29\n9. > _Generated from Morbius test cases (E-023 publish-back). 3 test case(s) sourced from `morbius:S-017-001`._\n10. ---\n\n**Expected Result:**\n# Test Plan: Failure Interception Hook in Maestro Runner\n\n**ID:** T-017-001\n**Project:** morbius\n**Story:** S-017-001\n**Epic:** E-017\n**Version:** 1.0\n**Created:** 2026-04-29\n**Updated:** 2026-04-29\n\n> _Generated from Morbius test cases (E-023 publish-back). 3 test case(s) sourced from `morbius:S-017-001`._\n\n---\n\n**Failure Indicators:**\n- (describe the wrong behavior  1.0 | Morbius (publish-back) | Generated from 4 Morbius test case(s) |\n"},{"rel":"epics/E-018-appmap-agent-v2/E-018.md","content":"# Epic: AppMap Agent v2 — Automation Candidates\n\n**ID:** E-018\n**Project:** morbius\n**Stage:** Backlog\n**Priority:** P1\n**Version:** 1.0\n**Created:** 2026-04-23\n**Updated:** 2026-04-23\n**Sources:** wiki/direction-2026-04.md, plan: what-you-think-there-fluffy-dragon.md (Phase 2.1)\n\n---\n\n## Outcome\n\nThe existing AppMap agent (E-006) describes what the app does. This epic adds the decision layer beneath it: a prioritized list of flows recommended for automation, each with priority (P0/P1/P2), rationale, coverage status, and a one-click \"Generate YAML\" handoff. Makes AppMap actionable instead of descriptive.\n\n## Success Metric\n\n| Metric | Baseline | Target |\n|--------|----------|--------|\n| Clicks from AppMap to generating a new flow YAML | many (manual interpretation) | 1 |\n| % of newly automated flows that originated from AppMap recommendations | 0% (pre-E-018) | >50% |\n\n## Primary Persona\n\nThe QA Lead (especially on new RF projects where automation targets aren't obvious)\n\n## Dependencies\n\n- E-006 AppMap agent + flow generator\n\n## Stories\n\n| ID | Title | Status | Stage | Priority |\n|----|-------|--------|-------|----------|\n| S-018-001 | Automation Candidates Section in AppMap View | Backlog | Draft | P1 |\n| S-018-002 | Priority + Rationale Generation via Claude | Backlog | Draft | P1 |\n| S-018-003 | One-Click YAML Generation from Candidate | Backlog | Draft | P1 |\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-23 | 1.0 | Claude | Created — Phase 2.1 |\n"},{"rel":"epics/E-018-appmap-agent-v2/S-018-001-automation-candidates-section.md","content":"# Story: Automation Candidates Section in AppMap View\n\n**ID:** S-018-001\n**Project:** morbius\n**Epic:** E-018\n**Stage:** Draft\n**Status:** Todo\n**Priority:** P1\n**Version:** 1.0\n**Created:** 2026-04-23\n**Updated:** 2026-04-23\n\n---\n\n## Story\n\nAs a QA lead, I want a new section below the existing AppMap that lists flows recommended for automation so that I can see the action layer below the description layer.\n\n## Acceptance Criteria\n\n**Given** an AppMap has been generated for a project\n**When** I scroll below the map\n**Then** a \"Automation Candidates\" section shows a ranked list of flows with: name, priority, rationale, coverage status (covered / partial / none)\n\n**Given** a candidate is already covered by an existing Maestro flow\n**When** the section renders\n**Then** that candidate is visually deprioritized (strikethrough or gray) with a link to the existing flow\n\n**Given** no candidates have been generated yet\n**When** the section renders\n**Then** a \"Generate candidates\" button triggers agent run (see S-018-002)\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-23 | 1.0 | Claude | Created |\n"},{"rel":"epics/E-018-appmap-agent-v2/S-018-002-priority-rationale-generation.md","content":"# Story: Priority + Rationale Generation via Claude\n\n**ID:** S-018-002\n**Project:** morbius\n**Epic:** E-018\n**Stage:** Draft\n**Status:** Todo\n**Priority:** P1\n**Version:** 1.0\n**Created:** 2026-04-23\n**Updated:** 2026-04-23\n\n---\n\n## Story\n\nAs a QA lead, I want each automation candidate to include a priority (P0/P1/P2) and rationale so that I can trust the ranking without having to reverse-engineer the agent's logic.\n\n## Acceptance Criteria\n\n**Given** the AppMap and existing test cases are provided as context\n**When** the candidate-generation agent runs\n**Then** it returns a list of `AutomationCandidate` objects with fields: flowName, priority, rationale (1-2 sentences), coverageStatus, expectedValueScore (0.0–1.0)\n\n**Given** existing tests already cover a flow\n**When** the agent evaluates\n**Then** it correctly marks `coverageStatus: covered` and deprioritizes it (P3 or omit)\n\n**Given** a candidate's rationale is generic (e.g., \"This is an important flow\")\n**When** the output is validated\n**Then** a lint check rejects generic rationales and re-prompts for specificity — stored in `data/{projectId}/automation-candidates.md` only when quality threshold passes\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-23 | 1.0 | Claude | Created |\n"},{"rel":"epics/E-018-appmap-agent-v2/S-018-003-one-click-yaml-generation.md","content":"# Story: One-Click YAML Generation from Candidate\n\n**ID:** S-018-003\n**Project:** morbius\n**Epic:** E-018\n**Stage:** Draft\n**Status:** Todo\n**Priority:** P1\n**Version:** 1.0\n**Created:** 2026-04-23\n**Updated:** 2026-04-23\n\n---\n\n## Story\n\nAs a QA lead, I want to click \"Generate YAML\" on an automation candidate and have Morbius produce a Maestro flow file so that I can move from recommendation to runnable automation in one step.\n\n## Acceptance Criteria\n\n**Given** a candidate with coverageStatus: none or partial\n**When** I click \"Generate YAML\"\n**Then** the existing E-006 flow generator is invoked with the candidate's AppMap context and produces a new flow file in the project's Android/iOS flows directory\n\n**Given** generation completes\n**When** I return to the candidate list\n**Then** the candidate's coverage status updates to \"partial\" (generated but not run) and a \"Run Now\" button appears\n\n**Given** generation fails\n**When** the failure occurs\n**Then** the candidate remains in the list, an error message is shown, and no partial file is left behind\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-23 | 1.0 | Claude | Created |\n"},{"rel":"epics/E-018-appmap-agent-v2/T-018-001-s-018-001-test-plan.md","content":"# Test Plan: Automation Candidates Section in AppMap View\n\n**ID:** T-018-001\n**Project:** morbius\n**Story:** S-018-00 e-uploads per week (for projects that use Sheets) | N (baseline TBD) | 0 |\n| Sheets ↔ Morbius round-trip latency | N/A | <60 seconds (configurable poll window) |\n| Conflict-resolved rows logged correctly | N/A | 100% surfaced in test changelog |\n\n## Primary Persona\n\nThe QA Lead (user + anyone who prefers Sheets to Excel)\n\n## Dependencies\n\n- E-008 Settings integrations hub (OAuth landing)\n- Existing `src/parsers/excel.ts` row-conversion logic\n\n## Stories\n\n| ID | Title | Status | Stage | Priority |\n|----|-------|--------|-------|----------|\n| S-019-001 | Google OAuth Connection in Settings | Backlog | Draft | P2 |\n| S-019-002 | Sheet ID Binding per Project | Backlog | Draft | P2 |\n| S-019-003 | Poll-Based Pull with Timestamp Conflict Rule | Backlog | Draft | P2 |\n| S-019-004 | Push Morbius Changes Back to Sheet | Backlog | Draft | P2 |\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-23 | 1.0 | Claude | Created — Phase 3.1 |\n"},{"rel":"epics/E-019-google-sheets-sync/S-019-001-google-oauth.md","content":"# Story: Google OAuth Connection in Settings\n\n**ID:** S-019-001\n**Project:** morbius\n**Epic:** E-019\n**Stage:** Draft\n**Status:** Todo\n**Priority:** P2\n**Version:** 1.0\n**Created:** 2026-04-23\n**Updated:** 2026-04-23\n\n---\n\n## Story\n\nAs a QA lead, I want to connect my Google account from Settings so that Morbius can sync with my Google Sheets QA plan without me managing API keys.\n\n## Acceptance Criteria\n\n**Given** Settings → Integrations → Google Sheets is open\n**When** I click \"Connect Google Account\"\n**Then** the Google OAuth 2.0 flow launches and, on success, a refresh token is stored encrypted at `data/{projectId}/config.json` under `googleSheets.refreshToken`\n\n**Given** the token is stored\n**When** the connection panel re-renders\n**Then** the connected account email is displayed with a \"Disconnect\" button\n\n**Given** the user clicks \"Disconnect\"\n**When** confirmed\n**Then** the token is cleared and any bound Sheet IDs are unbound\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-23 | 1.0 | Claude | Created |\n"},{"rel":"epics/E-019-google-sheets-sync/S-019-002-sheet-binding.md","content":"# Story: Sheet ID Binding per Project\n\n**ID:** S-019-002\n**Project:** morbius\n**Epic:** E-019\n**Stage:** Draft\n**Status:** Todo\n**Priority:** P2\n**Version:** 1.0\n**Created:** 2026-04-23\n**Updated:** 2026-04-23\n\n---\n\n## Story\n\nAs a QA lead, I want to bind a specific Google Sheet to my project so that Morbius knows exactly which sheet is the source of truth for this project's QA plan.\n\n## Acceptance Criteria\n\n**Given** a Google account is connected\n**When** I open project Settings → Google Sheets\n**Then** I can paste a Sheet URL/ID and a \"Validate\" button confirms access to that sheet\n\n**Given** the sheet is bound\n**When** sync runs\n**Then** tabs of the sheet are mapped 1:1 to Morbius categories (same shape as Excel tabs)\n\n**Given** the bound sheet has incompatible structure (missing required columns)\n**When** validation runs\n**Then** a clear error is shown listing missing columns; sync is not enabled\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-23 | 1.0 | Claude | Created |\n"},{"rel":"epics/E-019-google-sheets-sync/S-019-003-poll-based-pull.md","content":"# Story: Poll-Based Pull with Timestamp Conflict Rule\n\n**ID:** S-019-003\n**Project:** morbius\n**Epic:** E-019\n**Stage:** Draft\n**Status:** Todo\n**Priority:** P2\n**Version:** 1.0\n**Created:** 2026-04-23\n**Updated:** 2026-04-23\n\n---\n\n## Story\n\nAs a QA lead, I want Morbius to poll the bound Sheet on an interval and pull changes so that updates made in Sheets appear in Morbius without me clicking \"Sync Now\" every time.\n\n## Acceptance Criteria\n\n**Given** a bound Sheet and configured poll interval (5–60 min)\n**When** the interval elapses\n**Then** Morbius fetches all tab values, diffs against local markdown, and applies changes — writing changelog entries for each changed row\n\n**Given** a row has been edited in both Sheets and Morbius since the last sync\n**When** conflict is detected\n**Then** the timestamp rule applies: whichever side's `updated` timestamp is newer wins; the losing edit is logged to changelog as \"sheets-conflict-resolved\"\n\n**Given** the Sheets API returns an error\n**When** polling runs\n**Then** the error is logged to the Google Sheets health panel; next poll retries; no data is corrupted\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-23 | 1.0 | Claude | Created |\n"},{"rel":"epics/E-019-google-sheets-sync/S-019-004-push-back.md","content":"# Story: Push Morbius Changes Back to Sheet\n\n**ID:** S-019-004\n**Project:** morbius\n**Epic:** E-019\n**Stage:** Draft\n**Status:** Todo\n**Priority:** P2\n**Version:** 1.0\n**Created:** 2026-04-23\n**Updated:** 2026-04-23\n\n---\n\n## Story\n\nAs a QA lead, I want Morbius edits (test status, notes) to push back to my Google Sheet so that the Sheet — which may be the team-facing artifact — stays current without manual re-entry.\n\n## Acceptance Criteria\n\n**Given** a bound Sheet and a test case edit in Morbius\n**When** the edit is saved\n**Then** the change is pushed to the corresponding sheet cell via `spreadsheets.values.update` within 30 seconds\n\n**Given** the push succeeds\n**When** the next pull runs\n**Then** the change is not re-applied as a conflict (timestamp matches)\n\n**Given** the push fails (permissions, rate limit)\n**When** the failure occurs\n**Then** the change is queued for retry (same pattern as E-013 replay queue) and the health panel shows pending pushes\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-23 | 1.0 | Claude | Created |\n"},{"re \n1. First Bet C win has shipped to an RF client, AND\n2. RF quality-sensitivity signal is confirmed (per brief.md gate)\n\nReason: This epic sits on the Bet B/C border (demo-bait / SaaS attractor). Building it speculatively before the RF delivery-edge signal exists violates the locked Bet C → B → A sequencing.\n\n---\n\n## Outcome\n\nWhen an old/legacy app enters an engagement with no existing automation plan, Morbius can scan it: upload an Excel of (possibly stale) test cases + point at an app binary → AppMap agent traverses the app → cross-references against uploaded tests → produces a Coverage Gap Report showing what's covered, what's orphaned, and what's high-risk uncovered.\n\nValue proposition: a \"diagnostic mode\" for picking up legacy client apps where no one knows the current test coverage state.\n\n## Success Metric\n\n| Metric | Baseline | Target |\n|--------|----------|--------|\n| Time to produce first coverage gap report for a new legacy app | N/A | <5 minutes end-to-end |\n| Uncovered high-risk flows found per 100 app screens | N/A | Baseline established in first 3 scans |\n\n## Primary Persona\n\nThe QA Lead (taking over a legacy RF project)\n\n## Dependencies\n\n- **GATE (see above)**\n- E-006 AppMap agent\n- E-014 Excel upload flow\n- Existing `src/parsers/excel.ts`\n\n## Stories\n\n| ID | Title | Status | Stage | Priority |\n|----|-------|--------|-------|----------|\n| S-020-001 | Legacy-App Upload Onboarding Variant | Backlog | Draft | P3 (gated) |\n| S-020-002 | Cross-Reference Uploaded Tests vs AppMap | Backlog | Draft | P3 (gated) |\n| S-020-003 | Coverage Gap Report Generator | Backlog | Draft | P3 (gated) |\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-23 | 1.0 | Claude | Created — Phase 4, GATED on RF quality-sensitivity validation |\n"},{"rel":"epics/E-020-legacy-app-coverage-scan/S-020-001-legacy-upload-onboarding.md","content":"# Story: Legacy-App Upload Onboarding Variant\n\n**ID:** S-020-001\n**Project:** morbius\n**Epic:** E-020\n**Stage:** Draft\n**Status:** Todo (GATED)\n**Priority:** P3\n**Version:** 1.0\n**Created:** 2026-04-23\n**Updated:** 2026-04-23\n\n---\n\n## ⚠ Gate\n\nDo not start this story until the RF quality-sensitivity validation signal is confirmed (see E-020 and brief.md).\n\n---\n\n## Story\n\nAs a QA lead taking over a legacy app with no automation plan, I want a \"Legacy App Scan\" onboarding variant so that I can upload what I have (Excel + app binary) and get a coverage report.\n\n## Acceptance Criteria\n\n**Given** the new-project modal is open\n**When** I choose \"Legacy App Scan\" variant\n**Then** the flow asks for: an optional Excel of existing tests, an app binary path or package name, and target device\n\n**Given** all inputs are provided\n**When** I click \"Start Scan\"\n**Then** a job is enqueued that will run AppMap traversal (S-020-002) and produce a gap report (S-020-003)\n\n**Given** only partial inputs are provided\n**When** I proceed\n**Then** the flow degrades gracefully (no Excel → gap report marks \"no existing tests\"; no app binary → error)\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-23 | 1.0 | Claude | Created |\n"},{"rel":"epics/E-020-legacy-app-coverage-scan/S-020-002-cross-reference.md","content":"# Story: Cross-Reference Uploaded Tests vs AppMap\n\n**ID:** S-020-002\n**Project:** morbius\n**Epic:** E-020\n**Stage:** Draft\n**Status:** Todo (GATED)\n**Priority:** P3\n**Version:** 1.0\n**Created:** 2026-04-23\n**Updated:** 2026-04-23\n\n---\n\n## ⚠ Gate\n\nDo not start this story until the RF quality-sensitivity validation signal is confirmed (see E-020).\n\n---\n\n## Story\n\nAs the coverage scan pipeline, I need to cross-reference uploaded test cases against the AppMap so that I can classify each test as covered / orphaned / invalid and each app area as tested / untested.\n\n## Acceptance Criteria\n\n**Given** an AppMap and a list of uploaded test cases\n**When** cross-referencing runs\n**Then** each test case is classified: `covered` (maps to an AppMap node), `orphaned` (doesn't match anything), or `ambiguous` (maps to multiple possible nodes, flagged for review)\n\n**Given** AppMap nodes exist that no test references\n**When** cross-referencing runs\n**Then** those nodes are flagged as `uncovered` with risk estimation (based on depth from entry, destructive-action detection, etc.)\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-23 | 1.0 | Claude | Created |\n"},{"rel":"epics/E-020-legacy-app-coverage-scan/S-020-003-gap-report-generator.md","content":"# Story: Coverage Gap Report Generator\n\n**ID:** S-020-003\n**Project:** morbius\n**Epic:** E-020\n**Stage:** Draft\n**Status:** Todo (GATED)\n**Priority:** P3\n**Version:** 1.0\n**Created:** 2026-04-23\n**Updated:** 2026-04-23\n\n---\n\n## ⚠ Gate\n\nDo not start this story until the RF quality-sensitivity validation signal is confirmed (see E-020).\n\n---\n\n## Story\n\nAs a QA lead, I want a single readable gap report at the end of a legacy scan so that I can walk into a client meeting with a concrete assessment of current coverage.\n\n## Acceptance Criteria\n\n**Given** cross-referencing has completed\n**When** the report generator runs\n**Then** a `data/{projectId}/coverage-scan.md` file is written with sections: Covered Flows, Orphaned Tests, Uncovered High-Risk Flows, Recommendations\n\n**Given** the report is generated\n**When** I view it in the dashboard\n**Then** it renders cleanly and is exportable to PDF (reuse existing PDF export if present; otherwise stretch goal)\n\n**Given** the scan took too long or partially failed\n**When** I view the report\n**Then** completion percentage and any skipped areas are clearly indicated, not silently omitted\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-23 | 1.0 | Claude | Created |\n"},{"rel":"epics/E-020-legacy-app-coverage-scan/T-020-001-s-020-001-test-plan.md","content":"# Test Plan: Legacy-App Upload Onboarding Variant\n\n**ID:** T-020-001\n**Project:** morbius\n**Story:** S-020-001\n**Epic:** E-020\n**Version:** 1.0\n**Created:** 2026-04-29\n**Updated:** 2026-04-29\n\n> _Generated from Morbius test cases (E-023 publish-back). 3 test case(s) sourced from `morbius:S-020-001`._\n\n---\n\n## Scope\n\nVerification of S-020-001 acceptance criteria. 3 test case(s) span the happy path plus negative and edge variations.\n\n## Prerequisites\n\n- (Inherit from story Prerequisites; fill in environment + data setup before authoring)\n\n## AC Coverage Map\n\n| AC | Test Cases | Coverage |\n|----|-----------|----------|\n| AC-001 | TC-020-001-001 | ✓ |\n| AC-002 | TC-020-001-002 | ✓ |\n| AC-003 | TC-020-001-003 | ✓ |\n\n---\n\n## Core Test Flow\n\n> P0 — exactly one test case per plan. Must pass before Sub Flow testing begins. Stop if P0 fails.\n\n### TC-020-001-001: Legacy-App Upload Onboarding Variant — Test Plan\n\n**Type:** E2E\n**Priority:** P0\n**AC Covered:** AC-001\n**Dependencies:** None\n\n<!-- Morbius source: TC-MOR-020-001-1 (sourceChecksum=91033bc0c7a378d1) -->\n\n**Preconditions:**\n- (derived from story prerequisites — fill in or leave empty)\n\n**Steps:**\n1. # Test Plan: Legacy-App Upload Onboarding Variant\n2. T-020-001\n3. morbius\n4. S-020-001\n5. E-020\n6. 1.0\n7. 2026-04-29\n8. 2026-04-29\n9. > _Generated from Morbius test cases (E-023 publish-back). 3 test case(s) sourced from `morbius:S-020-001`._\n10. ---\n\n**Expected Result:**\n# Test Plan: Legacy-App Upload Onboarding Variant\n\n**ID:** T-020-001\n**Project:** morbius\n**Story:** S-020-001\n**Epic:** E-020\n**Version:** 1.0\n**Created:** 2026-04-29\n**Updated:** 2026-04-29\n\n> _Generated from Morbius test cases (E-023 publish-back). 3 test case(s) sourced from `morbius:S-020-001`._\n\n---\n\n**Failure Indicators:**\n- (describe the wrong | Status | Stage | Priority |\n|----|-------|--------|-------|----------|\n| S-021-001 | Regression Plan Markdown per Project | Backlog | Draft | P4 (drift) |\n| S-021-002 | Plan Editor + Top-Nav Tab | Backlog | Draft | P4 (drift) |\n| S-021-003 | Schedule Triggers + Next-Run Display | Backlog | Draft | P4 (drift) |\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-23 | 1.0 | Claude | Created — Phase 5, DRIFT from parked list, per user direction |\n"},{"rel":"epics/E-021-per-app-regression-wiki/S-021-001-regression-plan-markdown.md","content":"# Story: Regression Plan Markdown per Project\n\n**ID:** S-021-001\n**Project:** morbius\n**Epic:** E-021\n**Stage:** Draft\n**Status:** Todo (DRIFT)\n**Priority:** P4\n**Version:** 1.0\n**Created:** 2026-04-23\n**Updated:** 2026-04-23\n\n---\n\n## ⚠ Drift\n\nThis story belongs to E-021 which was explicitly parked (\"Anti-Regression Time Machine\") and un-parked by user direction on 2026-04-23. Re-confirm before starting work — the decision may have flipped again.\n\n---\n\n## Story\n\nAs a QA lead, I want a per-project regression plan stored as markdown so that it's version-controlled, human-readable, and editable in the same way as test cases.\n\n## Acceptance Criteria\n\n**Given** a project exists\n**When** the regression plan is first created\n**Then** `data/{projectId}/regression-plan.md` is written with frontmatter (schedule, owners, nextRun) and body sections (Overview, Plan Steps, Linked Suites, Approval Chain)\n\n**Given** no plan exists yet\n**When** the user opens the Regression tab\n**Then** a \"Create plan\" prompt appears with a starter template\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-23 | 1.0 | Claude | Created |\n"},{"rel":"epics/E-021-per-app-regression-wiki/S-021-002-plan-editor-nav-tab.md","content":"# Story: Plan Editor + Top-Nav Tab\n\n**ID:** S-021-002\n**Project:** morbius\n**Epic:** E-021\n**Stage:** Draft\n**Status:** Todo (DRIFT)\n**Priority:** P4\n**Version:** 1.0\n**Created:** 2026-04-23\n**Updated:** 2026-04-23\n\n---\n\n## ⚠ Drift\n\nSee E-021 drift flag.\n\n---\n\n## Story\n\nAs a QA lead, I want to edit the regression plan in a dashboard editor and access it from a top-nav tab so that I don't have to touch raw markdown files.\n\n## Acceptance Criteria\n\n**Given** a regression plan exists\n**When** I click the \"Regression\" tab in the project top-nav\n**Then** the plan renders with an \"Edit\" toggle that switches to markdown editor view\n\n**Given** I save an edit\n**When** the save fires\n**Then** the markdown file updates and a changelog entry is written\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-23 | 1.0 | Claude | Created |\n"},{"rel":"epics/E-021-per-app-regression-wiki/S-021-003-schedule-triggers.md","content":"# Story: Schedule Triggers + Next-Run Display\n\n**ID:** S-021-003\n**Project:** morbius\n**Epic:** E-021\n**Stage:** Draft\n**Status:** Todo (DRIFT)\n**Priority:** P4\n**Version:** 1.0\n**Created:** 2026-04-23\n**Updated:** 2026-04-23\n\n---\n\n## ⚠ Drift\n\nSee E-021 drift flag.\n\n---\n\n## Story\n\nAs a QA lead, I want the regression plan to show when the next run is due and optionally to trigger it on schedule so that regressions happen predictably.\n\n## Acceptance Criteria\n\n**Given** a regression plan has a `schedule` cron expression in frontmatter\n**When** the dashboard renders\n**Then** the next run time is displayed prominently in the Regression tab and on the project overview\n\n**Given** the schedule fires\n**When** Morbius is running\n**Then** the linked test suites are queued for execution; a run entry is created tagged `regression-run: true`\n\n**Given** Morbius is not running when a schedule fires\n**When** it next starts up\n**Then** the missed run is detected and surfaced as a notification, not silently skipped\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-23 | 1.0 | Claude | Created |\n"},{"rel":"epics/E-021-per-app-regression-wiki/T-021-001-s-021-001-test-plan.md","content":"# Test Plan: Regression Plan Markdown per Project\n\n**ID:** T-021-001\n**Project:** morbius\n**Story:** S-021-001\n**Epic:** E-021\n**Version:** 1.0\n**Created:** 2026-04-29\n**Updated:** 2026-04-29\n\n> _Generated from Morbius test cases (E-023 publish-back). 2 test case(s) sourced from `morbius:S-021-001`._\n\n---\n\n## Scope\n\nVerification of S-021-001 acceptance criteria. 2 test case(s) span the happy path plus negative and edge variations.\n\n## Prerequisites\n\n- (Inherit from story Prerequisites; fill in environment + data setup before authoring)\n\n## AC Coverage Map\n\n| AC | Test Cases | Coverage |\n|----|-----------|----------|\n| AC-001 | TC-021-001-001 | ✓ |\n| AC-002 | TC-021-001-002 | ✓ |\n\n---\n\n## Core Test Flow\n\n> P0 — exactly one test case per plan. Must pass before Sub Flow testing begins. Stop if P0 fails.\n\n### TC-021-001-001: Regression Plan Markdown per Project — Test Plan\n\n**Type:** E2E\n**Priority:** P0\n**AC Covered:** AC-001\n**Dependencies:** None\n\n<!-- Morbius source: TC-MOR-021-001-1 (sourceChecksum=3711338631a75761) -->\n\n**Preconditions:**\n- (derived from story prerequisites — fill in or leave empty)\n\n**Steps:**\n1. # Test Plan: Regression Plan Markdown per Project\n2. T-021-001\n3. morbius\n4. S-021-001\n5. E-021\n6. 1.0\n7. 2026-04-29\n8. 2026-04-29\n9. > _Generated from Morbius test cases (E-023 publish-back). 2 test case(s) sourced from `morbius:S-021-001`._\n10. ---\n\n**Expected Result:**\n# Test Plan: Regression Plan Markdown per Project\n\n**ID:** T-021-001\n**Project:** morbius\n**Story:** S-021-001\n**Epic:** E-021\n**Version:** 1.0\n**Created:** 2026-04-29\n**Updated:** 2026-04-29\n\n> _Generated from Morbius test cases (E-023 publish-back). 2 test case(s) sourced from `morbius:S-021 ommendation: DO NOT BUILD** unless one of these gate criteria is met:\n\n1. A concrete capability the in-Claude-Code skills cannot reach (e.g., unattended scheduled runs outside an IDE session).\n2. A customer or partner requirement for a standalone agent binary.\n3. Maestro partnership formalizes and requires a shipped integration artifact.\n\nUntil a gate fires, close this epic with a decision doc and move on.\n\n## Why this is a gate, not a build\n\nThe current Maestro MCP skills already work inside Claude Code. Rebuilding them as a standalone SDK agent without a concrete user problem is a rebuild-for-rebuild risk — classic architecture astronautism that burns weeks and delivers no user value.\n\n## Stories\n\n| ID | Title | Status | Stage | Priority |\n|----|-------|--------|-------|----------|\n| S-022-001 | Write Decision Doc + Gate Criteria | Backlog | Draft | P4 |\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-23 | 1.0 | Claude | Created — Phase 6, gate not build |\n"},{"rel":"epics/E-022-maestro-sdk-agent-gate/S-022-001-decision-doc.md","content":"# Story: Write Decision Doc + Gate Criteria\n\n**ID:** S-022-001\n**Project:** morbius\n**Epic:** E-022\n**Stage:** Draft\n**Status:** Todo (DECISION-ONLY)\n**Priority:** P4\n**Version:** 1.0\n**Created:** 2026-04-23\n**Updated:** 2026-04-23\n\n---\n\n## ⚠ Decision-only, no build\n\nThis story produces a written decision doc. It does NOT ship code. If you find yourself writing code for this story, stop and re-read E-022.\n\n---\n\n## Story\n\nAs a maintainer of Morbius's direction, I want a written decision doc explaining why we are NOT (currently) rebuilding our Maestro skills as a standalone Claude/OpenAI SDK agent so that future-us (or another contributor) knows the reasoning and the gate criteria for changing the decision.\n\n## Acceptance Criteria\n\n**Given** the decision doc is written\n**When** it is reviewed\n**Then** it covers: current state (Maestro MCP skills inside Claude Code), proposed alternative (standalone SDK agent), cost estimate, risk, and the explicit gate criteria for reversing the decision\n\n**Given** any of the gate criteria later becomes true\n**When** a future session revisits this story\n**Then** they have enough context to either (a) keep the gate closed with updated reasoning, or (b) open the gate and spawn a new build epic\n\n**Given** the decision doc lives at `requirements/decisions/maestro-sdk-agent-gate.md`\n**When** written\n**Then** it is mirrored to both `/Users/sdas/PMAgent/projects/morbius/` and `/Users/sdas/Morbius/requirements/`\n\n---\n\n## Change Log\n\n| Date | Version | Author | Change |\n|------|---------|--------|--------|\n| 2026-04-23 | 1.0 | Claude | Created |\n"},{"rel":"epics/E-022-maestro-sdk-agent-gate/T-022-001-s-022-001-test-plan.md","content":"# Test Plan: Write Decision Doc + Gate Criteria\n\n**ID:** T-022-001\n**Project:** morbius\n**Story:** S-022-001\n**Epic:** E-022\n**Version:** 1.0\n**Created:** 2026-04-29\n**Updated:** 2026-04-29\n\n> _Generated from Morbius test cases (E-023 publish-back). 3 test case(s) sourced from `morbius:S-022-001`._\n\n---\n\n## Scope\n\nVerification of S-022-001 acceptance criteria. 3 test case(s) span the happy path plus negative and edge variations.\n\n## Prerequisites\n\n- (Inherit from story Prerequisites; fill in environment + data setup before authoring)\n\n## AC Coverage Map\n\n| AC | Test Cases | Coverage |\n|----|-----------|----------|\n| AC-001 | TC-022-001-001 | ✓ |\n| AC-002 | TC-022-001-002 | ✓ |\n| AC-003 | TC-022-001-003 | ✓ |\n\n---\n\n## Core Test Flow\n\n> P0 — exactly one test case per plan. Must pass before Sub Flow testing begins. Stop if P0 fails.\n\n### TC-022-001-001: Write Decision Doc + Gate Criteria — Test Plan\n\n**Type:** E2E\n**Priority:** P0\n**AC Covered:** AC-001\n**Dependencies:** None\n\n<!-- Morbius source: TC-MOR-022-001-1 (sourceChecksum=652703ba0d385e52) -->\n\n**Preconditions:**\

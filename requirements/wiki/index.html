function DeliveryBoard({data,onNavigate,selectedRelease}){
  const{stories,epics,releases,atTasks,project}=data;
  const rel=selectedRelease||'all';
  const inRelease=rel!=='all';
  const releaseObj=inRelease?releases.find(r=>r.id===rel):null;
  const scopedStories=inRelease?stories.filter(s=>releaseObj?.storyIds.includes(s.id)):stories;
  const scopedATs=inRelease?(atTasks||[]).filter(t=>t.releaseId===rel):[];
  const scopedReleases=inRelease?(releaseObj?[releaseObj]:[]):releases;
  // TR placement: no trPath → todo col; trStatus Done → done; otherwise → QA col
  const trForCol=(colKey)=>scopedReleases.filter(r=>{
    if(!r.trPath&&r.status==='Shipped') return false;
    if(!r.trPath) return colKey==='todo';
    if(r.trStatus==='Done') return colKey==='Done';
    return colKey==='QA';
  });
  const activeReleaseIds=new Set(releases.filter(r=>r.status==='In Progress'||r.status==='QA'||r.status==='In Review').map(r=>r.id));
  const storiesInActiveRelease=new Set(releases.filter(r=>activeReleaseIds.has(r.id)).flatMap(r=>r.storyIds));
  const cols=[
    {key:'backlog',label:'backlog',isTodo:false,isBacklog:true,
     ss:scopedStories.filter(s=>s.stage==='Ready'&&s.status==='Backlog'&&!storiesInActiveRelease.has(s.id)),
     ats:[]},
    {key:'todo',label:'todo',isTodo:true,isBacklog:false,
     ss:scopedStories.filter(s=>s.stage==='Ready'&&s.status==='Backlog'&&storiesInActiveRelease.has(s.id)),
     ats:scopedATs.filter(t=>t.status==='Backlog')},
    {key:'In Progress',label:'in progress',isTodo:false,isBacklog:false,
     ss:scopedStories.filter(s=>s.status==='In Progress'),
     ats:scopedATs.filter(t=>t.status==='In Progress')},
    {key:'QA',label:'qa',isTodo:false,isBacklog:false,
     ss:scopedStories.filter(s=>s.status==='QA'),ats:[]},
    {key:'In Review',label:'in review',isTodo:false,isBacklog:false,
     ss:scopedStories.filter(s=>s.status==='In Review'),ats:[]},
    {key:'Done',label:'done',isTodo:false,isBacklog:false,
     ss:scopedStories.filter(s=>s.status==='Done'),
     ats:scopedATs.filter(t=>t.status==='Done')}
  ];
  return h('div',{style:{display:'flex',flexDirection:'column',flex:1,overflow:'hidden'}},
    h('div',{id:'board'},
      ...cols.map(col=>{
        const trs=trForCol(col.key);
        const totalCount=col.ss.length+(col.ats||[]).length+trs.length;
        return h('div',{key:col.key,className:'column'},
          h('div',{className:'col-header'},
            h('span',{className:'col-title '+(col.isTodo?'todo':col.isBacklog?'backlog':STATUS_CLASS[col.key]||'')},col.label),
            h('span',{className:'col-count'},totalCount)
          ),
          h('div',{className:'col-cards'},
            col.ats&&col.ats.length>0&&[
              h('div',{key:'at-lbl',className:'epic-label',style:{color:'#FB923C'}},'⚙ arch'),
              ...col.ats.map(t=>h(ATCard,{key:t.id,task:t,onClick:onNavigate}))
            ],
            trs.length>0&&[
              h('div',{key:'tr-lbl',className:'epic-label',style:{color:'#34D399'}},'⚙ qa'),
              ...trs.map(r=>h(TRCard,{key:'tr-'+r.id,release:r,onClick:onNavigate}))
            ],
            col.ss.length
              ?col.ss.map(s=>h(StoryCard,{key:s.id,story:s,epics,showEpic:true,showStatus:false,showReadiness:false,onClick:onNavigate,proj:project}))
              :null
          )
        );
      })
    )
  );
}

function GalleryModal({project,initialFolder,onClose}){
  var[folder,setFolder]=useState(initialFolder||'current-state');
  var[images,setImages]=useState([]);
  var[loading,setLoading]=useState(true);
  var[lightbox,setLightbox]=useState(null);

  function loadImages(f){
    setLoading(true);
    if(f==='current-state'){
      // Merge current-state + screenshots folders
      Promise.all([
        fetch('/api/assets-list?project='+encodeURIComponent(project)+'&folder=current-state').then(function(r){return r.json();}),
        fetch('/api/assets-list?project='+encodeURIComponent(project)+'&folder=screenshots').then(function(r){return r.json();})
      ]).then(function(results){
        var all=(results[0].images||[]).concat(results[1].images||[]);
        all.sort(function(a,b){return b.modified.localeCompare(a.modified);});
        setImages(all);setLoading(false);
      }).catch(function(){setImages([]);setLoading(false);});
    }else{
      fetch('/api/assets-list?project='+encodeURIComponent(project)+'&folder='+encodeURIComponent(f))
        .then(function(r){return r.json();})
        .then(function(d){setImages(d.images||[]);setLoading(false);})
        .catch(function(){setImages([]);setLoading(false);});
    }
  }
  useEffect(function(){loadImages(folder);},[folder]);

  function switchFolder(f){setFolder(f);setLightbox(null);}

  return h('div',{className:'edit-overlay',onClick:function(e){if(e.target===e.currentTarget)onClose();}},
    h('div',{className:'gallery-modal'},
      h('div',{className:'gallery-header'},
        h('div',{style:{display:'flex',alignItems:'center',gap:8}},
          h('span',{className:'gallery-title'},'design assets'),
          h('div',{style:{display:'flex',gap:2}},
            h('button',{className:'nav-chip'+(folder==='current-state'?' nav-chip-active':''),onClick:function(){switchFolder('current-state');}},'current state'),
            h('button',{className:'nav-chip'+(folder==='inspiration'?' nav-chip-active':''),onClick:function(){switchFolder('inspiration');}},'inspiration')
          )
        ),
        h('div',{style:{display:'flex',alignItems:'center',gap:8}},
          h('span',{style:{color:'#57534E',fontSize:10}},images.length+' images'),
          h('button',{className:'edit-modal-cancel',onClick:onClose},'close')
        )
      ),
      loading
        ?h('div',{style:{padding:40,textAlign:'center',color:'#57534E'}},'loading\u2026')
        :images.length===0
          ?h('div',{style:{padding:40,textAlign:'center',color:'#57534E',fontSize:12}},'no images in '+folder)
          :h('div',{className:'gallery-grid'},
            ...images.map(function(img,i){
              var src=window.__STATIC_MODE__&&img.path.indexOf('design-assets/')===0
                ?'./assets/'+img.path.slice(14)
                :'/api/asset?project='+encodeURIComponent(project)+'&path='+encodeURIComponent(img.path);
              return h('div',{key:i,className:'gallery-thumb',onClick:function(){setLightbox(src);}},
                h('img',{src:src,className:'gallery-thumb-img',loading:'lazy'}),
                h('div',{className:'gallery-thumb-name'},img.name),
                img.folder!=='/'&&h('div',{className:'gallery-thumb-folder'},img.folder)
              );
            })
          ),
      lightbox&&h('div',{className:'gallery-lightbox',onClick:function(){setLightbox(null);}},
        h('img',{src:lightbox,className:'gallery-lightbox-img',onClick:function(e){e.stopPropagation();}}),
        h('button',{className:'gallery-lightbox-close',onClick:function(){setLightbox(null);}},'\u2715')
      )
    )
  );
}

function ImportDropZone({project}){
  var[dragover,setDragover]=useState(false);
  var[pending,setPending]=useState([]);
  var[saving,setSaving]=useState(false);
  var[done,setDone]=useState(false);
  var fileRef=useRef(null);

  function slugify(name){
    return name.toLowerCase().replace(new RegExp('[^a-z0-9.-]','g'),'-').replace(new RegExp('-+','g'),'-').replace(new RegExp('^-|-$','g'),'')||'file';
  }
  function addFiles(files){
    var arr=pending.slice();
    for(var i=0;i<files.length;i++){
      var f=files[i];
      var isImage=f.type.indexOf('image/')===0;
      var ext=f.name.split('.').pop().toLowerCase()||'bin';
      arr.push({file:f,name:slugify(f.name),ext:ext,isImage:isImage,size:f.size});
    }
    setPending(arr);
  }
  function handleDrop(e){e.preventDefault();setDragover(false);addFiles(e.dataTransfer.files);}
  function handleDragOver(e){e.preventDefault();setDragover(true);}
  function handleDragLeave(){setDragover(false);}
  function handleClick(){if(!pending.length&&fileRef.current)fileRef.current.click();}
  function handleFileInput(e){if(e.target.files&&e.target.files.length)addFiles(e.target.files);e.target.value='';}
  function removeFile(idx){var next=pending.slice();next.splice(idx,1);setPending(next);}
  function formatSize(bytes){if(bytes<1024)return bytes+'B';if(bytes<1048576)return Math.round(bytes/1024)+'KB';return (bytes/1048576).toFixed(1)+'MB';}

  function saveAll(){
    if(saving||!pending.length)return;
    setSaving(true);
    var idx=0;
    function next(){
      if(idx>=pending.length){
        setSaving(false);setDone(true);setPending([]);
        // Trigger import via chat
        startChat('I just dropped '+idx+' files into the research/import folder. Run /project-import to process them into requirements. Read research/import/ to see what landed.');
        return;
      }
      var p=pending[idx];
      var reader=new FileReader();
      reader.onload=function(){
        var b64=reader.result.split(',')[1];
        var dest=p.isImage
          ?'projects/'+project+'/research/current-state/intake/'+p.name
          :'projects/'+project+'/research/import/'+p.name;
        var endpoint=p.isImage?'/api/save-image':'/api/save-file';
        fetch(endpoint,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({path:dest,data:b64})})
          .then(function(r){return r.json();})
          .then(function(){idx++;next();})
          .catch(function(){idx++;next();});
      };
      reader.readAsDataURL(p.file);
    }
    next();
  }

  if(done){
    return h('div',{className:'ov-card',style:{padding:12}},
      h('div',{style:{color:'#4ADE80',fontSize:11,textAlign:'center'}},
        '\u2713 files saved \u2014 import started in chat'
      )
    );
  }

  if(pending.length){
    return h('div',{className:'ov-card',style:{padding:10}},
      h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6}},
        h('span',{style:{color:'#A8A29E',fontSize:10}},pending.length+' file'+(pending.length>1?'s':'')+' ready'),
        h('div',{style:{display:'flex',gap:4}},
          h('button',{className:'nav-chip',style:{fontSize:9,background:'#CCFF00',color:'#0C0A09'},onClick:saveAll,disabled:saving},saving?'saving\u2026':'import'),
          h('button',{className:'nav-chip',style:{fontSize:9,opacity:0.5},onClick:function(){setPending([]);},disabled:saving},'clear')
        )
      ),
      h('div',{style:{display:'flex',flexDirection:'column',gap:3}},
        ...pending.map(function(p,i){
          var icon=p.isImage?'\uD83D\uDDBC':p.ext==='pdf'?'\uD83D\uDCC4':'\uD83D\uDCCE';
          return h('div',{key:i,style:{display:'flex',alignItems:'center',gap:6,fontSize:10,color:'#A8A29E'}},
            h('span',null,icon),
            h('span',{style:{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},p.name),
            h('span',{style:{color:'#57534E',flexShrink:0}},formatSize(p.size)),
            h('button',{onClick:function(){removeFile(i);},style:{background:'none',border:'none',color:'#57534E',cursor:'pointer',fontSize:10,padding:'0 2px'}},'\u00d7')
          );
        })
      ),
      h('div',{style:{marginTop:6,borderTop:'1px solid var(--border-subtle)',paddingTop:6}},
        h('div',{className:'import-drop-hint',style:{textAlign:'center',cursor:'pointer',color:'#44403C',fontSize:9},onClick:handleClick},'+ add more files'),
        h('input',{ref:fileRef,type:'file',multiple:true,style:{display:'none'},onChange:handleFileInput})
      )
    );
  }

  return h('div',{className:'ov-card import-dropzone'+(dragover?' import-dropzone-active':''),onDrop:handleDrop,onDragOver:handleDragOver,onDragLeave:handleDragLeave,onClick:handleClick,style:{padding:12,cursor:'pointer'}},
    h('input',{ref:fileRef,type:'file',multiple:true,style:{display:'none'},onChange:handleFileInput}),
    h('div',{style:{color:'#57534E',fontSize:11,textAlign:'center',pointerEvents:'none'}},
      h('div',{style:{fontSize:14,marginBottom:2,opacity:0.5}},'\uD83D\uDCE5'),
      'drop files to import',
      h('div',{style:{fontSize:9,marginTop:2,color:'#44403C'}},'PDFs \u00b7 docs \u00b7 images \u00b7 specs')
    )
  );
}

function AssetDropZone({project,onUploaded}){
  var[category,setCategory]=useState('current-state');
  var[dragover,setDragover]=useState(false);
  var[pending,setPending]=useState([]);
  var[saving,setSaving]=useState(false);
  var fileRef=useRef(null);
  var addFilesRef=useRef(null);

  function slugify(name){
    var base=name.replace(new RegExp('\\.[^.]+$'),'');
    return base.toLowerCase().replace(new RegExp('[^a-z0-9-]','g'),'-').replace(new RegExp('-+','g'),'-').replace(new RegExp('^-|-$','g'),'')||'image';
  }
  function addFiles(files){
    var arr=[];
    for(var i=0;i<files.length;i++){
      var f=files[i];
      if(f.type.indexOf('image/')!==0)continue;
      arr.push({file:f,name:slugify(f.name),ext:f.name.split('.').pop().toLowerCase()||'png'});
    }
    if(arr.length)setPending(arr);
  }
  addFilesRef.current=addFiles;
  useEffect(function(){
    function onWindowPaste(e){
      var active=document.activeElement;
      if(active&&(active.tagName==='TEXTAREA'||active.tagName==='INPUT'))return;
      var items=e.clipboardData&&e.clipboardData.items;
      if(!items)return;
      var files=[];
      for(var i=0;i<items.length;i++){
        if(items[i].type.indexOf('image/')===0){var f=items[i].getAsFile();if(f)files.push(f);}
      }
      if(files.length&&addFilesRef.current){e.preventDefault();addFilesRef.current(files);}
    }
    window.addEventListener('paste',onWindowPaste);
    return function(){window.removeEventListener('paste',onWindowPaste);};
  },[]);
  function handleDrop(e){e.preventDefault();setDragover(false);addFiles(e.dataTransfer.files);}
  function handleDragOver(e){e.preventDefault();setDragover(true);}
  function handleDragLeave(){setDragover(false);}
  function handleClick(){if(!pending.length&&fileRef.current)fileRef.current.click();}
  function handleFileInput(e){if(e.target.files&&e.target.files.length)addFiles(e.target.files);e.target.value='';}
  function handlePaste(e){
    var items=e.clipboardData&&e.clipboardData.items;
    if(!items)return;
    var files=[];
    for(var i=0;i<items.length;i++){
      if(items[i].type.indexOf('image/')===0){
        var f=items[i].getAsFile();
        if(f)files.push(f);
      }
    }
    if(files.length){e.preventDefault();addFiles(files);}
  }
  function updateName(idx,val){var next=pending.slice();next[idx]={...next[idx],name:val};setPending(next);}
  function cancel(){setPending([]);setSaving(false);}
  function saveAll(){
    if(saving||!pending.length)return;
    setSaving(true);
    var idx=0;
    function next(){
      if(idx>=pending.length){setPending([]);setSaving(false);if(onUploaded)onUploaded();return;}
      var p=pending[idx];
      var reader=new FileReader();
      reader.onload=function(){
        var b64=reader.result.split(',')[1];
        var ext=p.ext==='jpeg'?'jpg':p.ext;
        if(['png','jpg','webp','gif'].indexOf(ext)<0)ext='png';
        var path='projects/'+project+'/design-assets/'+category+'/'+p.name+'.'+ext;
        fetch('/api/save-image',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({path:path,data:b64})})
          .then(function(r){return r.json();})
          .then(function(){idx++;next();})
          .catch(function(){idx++;next();});
      };
      reader.readAsDataURL(p.file);
    }
    next();
  }

  if(pending.length){
    return h('div',{className:'asset-dropzone asset-dropzone-preview'},
      h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}},
        h('div',{style:{display:'flex',gap:4}},
          h('button',{className:'nav-chip'+(category==='current-state'?' nav-chip-active':''),style:{fontSize:9},onClick:function(){setCategory('current-state');}},'current-state'),
          h('button',{className:'nav-chip'+(category==='inspiration'?' nav-chip-active':''),style:{fontSize:9},onClick:function(){setCategory('inspiration');}},'inspiration')
        ),
        h('div',{style:{display:'flex',gap:4}},
          h('button',{className:'nav-chip',style:{fontSize:9,background:'#CCFF00',color:'#0C0A09'},onClick:saveAll,disabled:saving},saving?'saving\u2026':'save '+(pending.length>1?pending.length+' files':'file')),
          h('button',{className:'nav-chip',style:{fontSize:9,opacity:0.5},onClick:cancel,disabled:saving},'cancel')
        )
      ),
      h('div',{className:'asset-thumb-grid'},
        ...pending.map(function(p,i){
          var url=URL.createObjectURL(p.file);
          return h('div',{key:i,className:'asset-thumb'},
            h('img',{src:url,className:'asset-thumb-img'}),
            h('input',{type:'text',value:p.name,onChange:function(e){updateName(i,e.target.value);},className:'asset-thumb-name',spellCheck:false})
          );
        })
      )
    );
  }

  return h('div',{className:'asset-dropzone'+(dragover?' asset-dropzone-active':''),onDrop:handleDrop,onDragOver:handleDragOver,onDragLeave:handleDragLeave,onClick:handleClick},
    h('input',{ref:fileRef,type:'file',accept:'image/*',multiple:true,style:{display:'none'},onChange:handleFileInput}),
    h('div',{style:{color:'#57534E',fontSize:11,textAlign:'center',pointerEvents:'none'}},
      h('div',{style:{fontSize:16,marginBottom:4,opacity:0.5}},'\u2B07'),
      'drop, paste, or click',
      h('div',{style:{fontSize:9,marginTop:2,color:'#44403C'}},'screenshots \u00b7 photos \u00b7 references')
    )
  );
}

const AREA_LABELS={
  'board':'Board & Visualization',
  'doc-engine':'Document Engine',
  'design-toolchain':'Design Toolchain',
  'qa-analytics':'QA & Analytics',
  'architecture':'Architecture',
  'release-mgmt':'Release Management',
  'agent-skills':'Agent Skills',
  'execution-workflows':'Execution Workflows',
};

function specsMatchesSearch(q,story,epic,areaSlug,areaLabel){
  const t=q.toLowerCase();
  if(areaSlug&&areaSlug.toLowerCase().includes(t)) return 'area';
  if(areaLabel&&areaLabel.toLowerCase().includes(t)) return 'area';
  if(epic.id.toLowerCase().includes(t)) return 'epic';
  if(story){
    if(story.id.toLowerCase().includes(t)) return 'story';
    if(story.title&&story.title.toLowerCase().includes(t)) return 'story';
    if(story.searchText&&story.searchText.toLowerCase().includes(t)) return 'story';
  }
  return null;
}

function EpicAccordion({epic,stories,epics,onNavigate,project,defaultOpen,forceOpen,filteredStories}){
  const ss=filteredStories||stories.filter(s=>s.epicId===epic.id);
  const allSs=stories.filter(s=>s.epicId===epic.id);
  const doneCount=allSs.filter(s=>s.status==='Done').length;
  const isDone=allSs.length>0&&doneCount===allSs.length;
  const[open,setOpen]=useState(defaultOpen&&!isDone);
  const effectiveOpen=forceOpen||open;
  const canOpen=!!epic.filePath;
  const statusColor=isDone?'#4ADE80':doneCount>0?'#60A5FA':'#A8A29E';
  return h('div',{className:'epic-acc'+(isDone&&!forceOpen?' epic-acc-done':'')},
    h('div',{className:'epic-acc-header',onClick:()=>setOpen(o=>!o)},
      h('div',{style:{display:'flex',flexDirection:'column',gap:2,overflow:'hidden',flex:1,minWidth:0}},
        h('div',{style:{display:'flex',alignItems:'center',gap:6}},
          h('span',{className:'epic-acc-id',style:{color:statusColor}},epic.id),
          canOpen&&h('span',{className:'epic-acc-open',onClick:e=>{e.stopPropagation();onNavigate({type:'epic',id:epic.id,title:epic.name,filePath:epic.filePath,epicId:null});}},'↗')
        ),
        h('span',{className:'epic-acc-name'},epic.name)
      ),
      h('div',{style:{display:'flex',alignItems:'center',gap:6,flexShrink:0}},
        h('span',{className:'epic-acc-count'},isDone?doneCount+'/'+allSs.length:ss.length),
        h('span',{className:'epic-acc-chevron',style:{transform:effectiveOpen?'rotate(90deg)':'rotate(0deg)'}},'›')
      )
    ),
    effectiveOpen&&h('div',{className:'epic-acc-body'},
      ss.length
        ?ss.map(s=>h(StoryCard,{key:s.id,story:s,epics,showEpic:false,showStatus:false,showReadiness:false,showBlocked:false,onClick:onNavigate,proj:project}))
        :h('div',{className:'empty'},'—')
    )
  );
}

function EpicsBoard({data,onNavigate}){
  const{stories,epics,project}=data;
  const hasAreas=epics.some(e=>e.area);
  const[searchTerm,setSearchTerm]=useState('');
  const inputRef=useRef(null);
  const q=searchTerm.trim();

  // Keyboard shortcuts: / to focus, Escape to clear+blur
  useEffect(()=>{
    const handler=(e)=>{
      if(e.key==='/'&&!['INPUT','TEXTAREA','SELECT'].includes(document.activeElement?.tagName)){
        e.preventDefault();inputRef.current?.focus();
      }
      if(e.key==='Escape'&&document.activeElement===inputRef.current){
        setSearchTerm('');inputRef.current?.blur();
      }
    };
    document.addEventListener('keydown',handler);
    return()=>document.removeEventListener('keydown',handler);
  },[]);

  const searchBar=h('div',{className:'specs-search-bar'},
    h('div',{className:'specs-search-wrap'},
      h('span',{className:'specs-search-icon'},'🔍'),
      h('input',{ref:inputRef,className:'specs-search-input',type:'text',placeholder:'Search stories, epics, areas…',value:searchTerm,onChange:e=>setSearchTerm(e.target.value)}),
      q&&h('button',{className:'specs-search-clear',onClick:()=>{setSearchTerm('');inputRef.current?.focus()}},'×')
    ),
    !q&&h('span',{className:'specs-search-hint'},'/ to search')
  );

  if(!hasAreas){
    // Fallback: flat columns (original layout)
    let flatEpics=epics;
    if(q){
      flatEpics=epics.filter(epic=>{
        const epicMatch=epic.id.toLowerCase().includes(q.toLowerCase());
        if(epicMatch) return true;
        return stories.some(s=>s.epicId===epic.id&&specsMatchesSearch(q,s,epic,null,null));
      });
    }
    return h('div',{style:{display:'flex',flexDirection:'column',flex:1,overflow:'hidden'}},
      searchBar,
      flatEpics.length===0&&q
        ?h('div',{className:'specs-no-matches'},'No matching stories or epics')
        :h('div',{id:'board'},flatEpics.map(epic=>{
          let ss=stories.filter(s=>s.epicId===epic.id);
          if(q){
            const epicMatch=epic.id.toLowerCase().includes(q.toLowerCase());
            if(!epicMatch) ss=ss.filter(s=>specsMatchesSearch(q,s,epic,null,null));
          }
          const canOpen=!!epic.filePath;
          return h('div',{key:epic.id,className:'column'},
            h('div',{className:'col-header '+(canOpen?'col-header-link':''),onClick:canOpen?()=>onNavigate({type:'epic',id:epic.id,title:epic.name,filePath:epic.filePath,epicId:null}):undefined},
              h('div',{style:{display:'flex',flexDirection:'column',gap:2,overflow:'hidden'}},
                h('span',{className:'col-title'},epic.id),
                h('span',{style:{fontSize:13,color:'#D6D3D1',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}},epic.name)
              ),
              h('span',{className:'col-count'},ss.length)
            ),
            h('div',{className:'col-cards'},
              ss.length
                ?ss.map(s=>h(StoryCard,{key:s.id,story:s,epics,showEpic:false,showStatus:false,showReadiness:false,showBlocked:false,onClick:onNavigate,proj:project}))
                :h('div',{className:'empty'},'—')
            )
          );
        }))
    );
  }

  // Group by area, preserving defined order; ungrouped epics go to "Other"
  const orderedSlugs=Object.keys(AREA_LABELS);
  const groups=new Map();
  for(const slug of orderedSlugs) groups.set(slug,[]);
  groups.set('__other__',[]);
  for(const epic of epics){
    const key=epic.area&&groups.has(epic.area)?epic.area:'__other__';
    groups.get(key).push(epic);
  }

  let visibleGroups=[...groups.entries()].filter(([,arr])=>arr.length>0);

  // Filter when search is active
  const searching=!!q;
  if(searching){
    visibleGroups=visibleGroups.map(([slug,arr])=>{
      const label=slug==='__other__'?'Other':AREA_LABELS[slug]||slug;
      // Area-level match: show everything in this area
      if(slug.toLowerCase().includes(q.toLowerCase())||label.toLowerCase().includes(q.toLowerCase())){
        return [slug,arr,label,null]; // null = no per-epic filtering
      }
      // Filter per epic
      const filtered=arr.map(epic=>{
        // Epic-level match: show all its stories
        if(epic.id.toLowerCase().includes(q.toLowerCase())){
          return {epic,filteredStories:null};
        }
        // Story-level match
        const ss=stories.filter(s=>s.epicId===epic.id&&specsMatchesSearch(q,s,epic,null,null));
        return ss.length>0?{epic,filteredStories:ss}:null;
      }).filter(Boolean);
      return filtered.length>0?[slug,filtered.map(f=>f.epic),label,filtered]:null;
    }).filter(Boolean);
  }

  return h('div',{style:{display:'flex',flexDirection:'column',flex:1,overflow:'hidden'}},
    searchBar,
    visibleGroups.length===0&&searching
      ?h('div',{className:'specs-no-matches'},'No matching stories or epics')
      :h('div',{id:'board'},
        visibleGroups.map(entry=>{
          const slug=entry[0];
          const arr=entry[1];
          const label=searching?(entry[2]||(slug==='__other__'?'Other':AREA_LABELS[slug]||slug)):(slug==='__other__'?'Other':AREA_LABELS[slug]||slug);
          const epicFilterMap=searching&&entry[3]?new Map(entry[3].map(f=>[f.epic.id,f.filteredStories])):null;
          return h('div',{key:slug,className:'area-col'},
            h('div',{className:'area-col-header'},label),
            h('div',{className:'area-col-body'},
              arr.map(epic=>{
                const fs=epicFilterMap?epicFilterMap.get(epic.id)||null:undefined;
                return h(EpicAccordion,{key:epic.id,epic,stories,epics,onNavigate,project,defaultOpen:true,forceOpen:searching,filteredStories:fs===undefined?undefined:fs===null?undefined:fs});
              })
            )
          );
        })
      )
  );
}

      .then(r=>r.ok?r.text():Promise.reject(r.status))

  const flow=doc.type==='flow'?data.flows.find(f=>f.id===doc.id):null;
  const epicDoc=doc.type==='epic'?data.epics.find(e=>e.id===doc.id):null;
  const atDoc=doc.type==='at'?(data.atTasks||[]).find(t=>t.id===doc.id):null;
  const releaseDoc=doc.type==='release'?data.releases.find(r=>r.id===doc.id):null;
  const preParsedMeta=(story||flow||epicDoc||atDoc||releaseDoc)?.meta||[];

  useEffect(()=>{
    if(!doc?.filePath){setLoading(false);return;}
    const ctrl=new AbortController();
    setContent(null);setLoading(true);
    fetch('/api/file?path='+encodeURIComponent(doc.filePath),{signal:ctrl.signal})
      .then(r=>r.ok?r.text():Promise.reject(r.status))
      .then(t=>{setContent(t);setLoading(false);})
      .catch(err=>{if(err&&err.name==='AbortError')return;setContent('_Error loading file ('+(err||'unknown')+')_');setLoading(false);});
    return()=>ctrl.abort();
  },[doc?.filePath]);

  useEffect(()=>{if(!loading)applyMermaid(bodyRef,setFullscreenSvg);},[content,loading]);

  // Click handler for ref-links in the Drawer's inline markdown (non-DocRenderer path)
  useEffect(()=>{
    if(!bodyRef.current||loading)return;
    function handleRefClick(e){
      var link=e.target.closest('.ref-link');
      if(!link)return;
      e.preventDefault();
      var refProject=link.getAttribute('data-ref-project');
      if(refProject){
        var url=window.__STATIC_MODE__?'../../'+refProject+'/wiki/index.html':'/?project='+encodeURIComponent(refProject)+'&_t='+Date.now();
        window.location.href=url;
        return;
      }
      var refId=link.getAttribute('data-ref-id');
      var nav=resolveRefNav(refId,data);
      if(nav&&onNavigate)onNavigate(nav);
    }
    bodyRef.current.addEventListener('click',handleRefClick);
    return()=>{if(bodyRef.current)bodyRef.current.removeEventListener('click',handleRefClick);};
  },[data,loading]);

  useEffect(()=>{
    const fn=e=>{
      if(e.key==='Escape'){
        if(fullscreenSvg)setFullscreenSvg(null);
        else onClose();
      }
    };
    window.addEventListener('keydown',fn);
    return()=>window.removeEventListener('keydown',fn);
  },[onClose,fullscreenSvg]);

  if(!doc)return null;

  const flows=doc.type==='story'
    ?data.flows.filter(f=>f.storyIds.includes(doc.id))
    :[];
  const epic=doc.type==='story'
    ?data.epics.find(e=>e.id===doc.epicId)
    :null;
  const atTask=doc.type==='at'?(data.atTasks||[]).find(t=>t.id===doc.id):null;

  const isStory=!!story;
  const isAT=!!atTask;
  const r=story?.readiness||{};
  const proj=data.project;
  // Determine stage for mark-ready button and badge
  const docStage=(()=>{
    if(story)return story.stage;
    const rel=data.releases.find(r=>r.id===doc.id);
    if(rel)return rel.stage;
    const fl=data.flows.find(f=>f.id===doc.id);
    if(fl)return fl.stage;
    const ae=(data.overview?.analytics?.aeDocs||[]).find(a=>a.id===doc.id);
    if(ae)return ae.stage;
    if(epicDoc)return epicDoc.stage;
    if(atDoc)return atDoc.stage;
    return null;
  })();
  // isRefDoc, stageBadge, canMarkReady, isLocked, creatingV2 — now handled by DocumentToolbar
  const [readyModal,setReadyModal]=useState(false);
  const [modalHours,setModalHours]=useState('');
  const [modalNote,setModalNote]=useState('');
  const totalLoggedMin=story?.timeLog?.totalMin||0;
  const confirmMarkReady=()=>{
    const doMark=()=>fetch('/api/setReady?path='+encodeURIComponent(doc.filePath),{method:'POST'})
      .then(r=>r.ok?r.json():r.json().then((e)=>{throw new Error(e.error||'Failed');}))
      .then(()=>{setReadyModal(false);setModalHours('');setModalNote('');})
      .catch((err)=>{alert(err.message);});
    const hrs=parseFloat(modalHours);
    if(hrs>0&&doc.id){
      fetch('/api/timelog',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({storyId:doc.id,durationMin:Math.round(hrs*60),note:modalNote||'(logged at mark ready)',project:data.project,ticketType:'story'})
      }).then(doMark).catch(doMark);
    } else {
      doMark();
    }
  };

  const epicId=doc.epicId||'';

  const wrapperProps=inline
    ?{className:'drawer-inline',style:{borderLeft:'2px solid #44403C',display:'flex',flexDirection:'column',width:620,maxWidth:'50vw',flexShrink:0,overflow:'hidden'}}
    :{className:'drawer-overlay',onClick:function(e){if(e.target===e.currentTarget&&!fullscreenSvg)onClose();}};
  return h('div',wrapperProps,
    fullscreenSvg&&h('div',{className:'diagram-overlay',style:{zIndex:200},onClick:()=>setFullscreenSvg(null)},
      h('button',{className:'diagram-close',onClick:()=>setFullscreenSvg(null)},'✕'),
      h('div',{className:'diagram-full',dangerouslySetInnerHTML:{__html:fullscreenSvg}})
    ),
    readyModal&&h('div',{className:'modal-overlay',onClick:e=>{if(e.target===e.currentTarget)setReadyModal(false);}},
      h('div',{className:'modal-box'},
        h('div',{className:'modal-box-title'},'✓ Mark Ready'),
        h('div',{className:'modal-time-info'},
          totalLoggedMin>0
            ?h('span',null,'⏱ ',h('span',null,formatMins(totalLoggedMin)),' logged on this ticket')
            :'No time logged yet'
        ),
        h('div',{className:'modal-field'},
          h('label',null,'Additional time (optional)'),
          h('input',{type:'number',placeholder:'hours (e.g. 0.5)',value:modalHours,
            onChange:(e)=>setModalHours(e.target.value),min:'0',step:'0.25'})
        ),
        modalHours&&parseFloat(modalHours)>0&&h('div',{className:'modal-field'},
          h('label',null,'Description'),
          h('input',{type:'text',placeholder:'What did you work on?',value:modalNote,
            onChange:(e)=>setModalNote(e.target.value)})
        ),
        h('div',{className:'modal-actions'},
          h('button',{className:'modal-cancel-btn',onClick:()=>setReadyModal(false)},'Cancel'),
          h('button',{className:'modal-confirm-btn',onClick:confirmMarkReady},'Mark Ready')
        )
      )
    ),
    h('div',{className:'drawer',style:inline?{width:'100%',maxWidth:'100%'}:undefined},
      h(DocumentToolbar,{doc:doc,data:data,onEdit:onEdit,onNavigate:onNavigate,onClose:onClose,onMarkReady:function(){setReadyModal(true);},variant:'drawer'}),
      h('div',{className:'drawer-split'},
        h('div',{className:'drawer-scroll'},
          (function(){var dtype=detectDocType(doc.filePath);if(dtype!=='unknown')return h(DocRenderer,{docType:dtype,filePath:doc.filePath,data:data,onNavigate:onNavigate,docId:doc.id});return[
          (()=>{const mp=preParsedMeta.length>0?preParsedMeta:clientExtractMeta(content);return mp.length>0?h('div',{className:'drawer-meta'},
            mp.map((p,i)=>{
              const stageColor={'Draft':'#78716C','Ready':'#3B82F6'}[p.v]||null;
              const statusColor={'Backlog':'#78716C','In Progress':'#F59E0B','QA':'#FACC15','In Review':'#F97316','Done':'#4ADE80'}[p.v]||null;
              const priorityColor={'P0':'#F97316','P1':'#FACC15','P2':'#78716C'}[p.v]||null;
              const color=(p.k==='Stage'&&stageColor)||(p.k==='Status'&&statusColor)||(p.k==='Priority'&&priorityColor)||null;
              return h('div',{key:i,className:'dm-item'},
                h('span',{className:'dm-key'},p.k),
                h('span',{className:'dm-val',style:color?{color}:undefined},p.v)
              );
            })
          ):null;})(),
          isStory&&h(TimeLogSection,{story,project:proj}),
          h('div',{className:'drawer-body md',ref:bodyRef},
            loading
              ?h('div',{className:'md-loading'},'loading…')
              :h('div',{dangerouslySetInnerHTML:{__html:linkifyImageRefs(linkifyRefs(marked.parse(content||'')),data&&data.assetIndex||{},data&&data.project||'')}})
          )
          ];})()
        )
      )
    )
  );
}

function openOrCreate(path,stub){
  const params=new URLSearchParams({path});
  if(stub){params.set('create','1');params.set('stub',btoa(unescape(encodeURIComponent(stub))));}
  fetch('/api/open?'+params.toString());
}

function EditModal({filePath,title,stub,transcriptPath,onClose}){
  const[content,setContent]=useState(stub||'');
  const[saving,setSaving]=useState(false);
  const[showTranscript,setShowTranscript]=useState(false);
  const[transcriptContent,setTranscriptContent]=useState('');
  const contentRef=useRef(content);
  contentRef.current=content;

  useEffect(()=>{
    if(stub)return;
    fetch('/api/file?path='+encodeURIComponent(filePath)+'&raw=1')
      .then(r=>r.ok?r.text():Promise.reject())
      .then(t=>setContent(t))
      .catch(()=>{});
  },[filePath]);

  useEffect(()=>{
    if(!transcriptPath)return;
    fetch('/api/file?path='+encodeURIComponent(transcriptPath)+'&raw=1')
      .then(r=>r.ok?r.text():Promise.reject())
      .then(t=>setTranscriptContent(t))
      .catch(()=>{});
  },[transcriptPath]);

  useEffect(()=>{
    const fn=e=>{
      if(e.key==='Escape'){onClose();return;}
      if((e.metaKey||e.ctrlKey)&&e.key==='s'){e.preventDefault();doSave(contentRef.current);}
    };
    window.addEventListener('keydown',fn);
    return()=>window.removeEventListener('keydown',fn);
  },[]);

  function doSave(text){
    setSaving(true);
    if(isIntake){
      // Intake save: save transcript + auto-tag into intake.md
      var tPath=transcriptPath;
      if(!tPath){
        var now=new Date();
        var tSlug=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0')+'-'+String(now.getHours()).padStart(2,'0')+String(now.getMinutes()).padStart(2,'0');
        tPath=filePath.replace('intake.md','transcript-intake-'+tSlug+'.md');
      }
      // Save transcript
      fetch('/api/save?path='+encodeURIComponent(tPath),{method:'POST',body:transcriptContent||'',headers:{'Content-Type':'text/plain; charset=utf-8'}})
        .then(function(){
          // Tag the raw transcript → writes intake.md server-side
          return fetch('/api/tag-intake?path='+encodeURIComponent(filePath),{method:'POST',body:transcriptContent||'',headers:{'Content-Type':'text/plain; charset=utf-8'}});
        })
        .then(function(r){return r.json();})
        .then(function(d){
          if(d.tagged)setContent(d.tagged);
          setRawDirty(false);setSaving(false);
        })
        .catch(function(){setSaving(false);});
    } else {
      fetch('/api/save?path='+encodeURIComponent(filePath),{method:'POST',body:text,headers:{'Content-Type':'text/plain; charset=utf-8'}})
        .then(()=>{setSaving(false);onClose();})
        .catch(()=>setSaving(false));
    }
  }

  var isIntake=filePath.endsWith('/intake.md');

  // Autosave debounce for intake transcript (7s) + auto-tag (30s idle)
  var autosaveTimer=useRef(null);
  var autotagTimer=useRef(null);
  var[tagging,setTagging]=useState(false);
  var[rawDirty,setRawDirty]=useState(false);
  var[pendingImage,setPendingImage]=useState(null);
  var[imageName,setImageName]=useState('');
  var pastePositionRef=useRef(0);
  var textareaRef=useRef(null);
  function handlePaste(e){
    var items=e.clipboardData&&e.clipboardData.items;
    if(!items)return;
    for(var i=0;i<items.length;i++){
      if(items[i].type.indexOf('image/')===0){
        e.preventDefault();
        var file=items[i].getAsFile();
        if(!file)return;
        setPendingImage(file);
        setImageName('');
        pastePositionRef.current=e.target.selectionStart||0;
        return;
      }
    }
  }
  function saveImage(){
    if(!pendingImage||!imageName.trim())return;
    var slug=imageName.trim().toLowerCase().replace(/[^a-z0-9-]/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,'');
    if(!slug)return;
    var projSlug=filePath.split('/')[1]||'';
    var targetPath='projects/'+projSlug+'/research/current-state/intake/'+slug+'.png';
    var reader=new FileReader();
    reader.onload=function(){
      var b64=reader.result.split(',')[1];
      fetch('/api/save-image',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({path:targetPath,data:b64})})
        .then(function(r){return r.json();})
        .then(function(){
          var ref='!['+slug+'](research/current-state/intake/'+slug+'.png)';
          var pos=pastePositionRef.current;
          var before=(transcriptContent||'').slice(0,pos);
          var after=(transcriptContent||'').slice(pos);
          var sep=before.length&&!before.endsWith('\n')?'\n':'';
          var newContent=before+sep+ref+'\n'+after;
          setTranscriptContent(newContent);
          setRawDirty(true);
          setPendingImage(null);
          setImageName('');
          if(textareaRef.current)textareaRef.current.focus();
        })
        .catch(function(err){console.error('[save-image]',err);});
    };
    reader.readAsDataURL(pendingImage);
  }
  function cancelImage(){setPendingImage(null);setImageName('');if(textareaRef.current)textareaRef.current.focus();}
  function getTranscriptPath(){
    if(transcriptPath)return transcriptPath;
    var now=new Date();
    var tSlug=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0')+'-'+String(now.getHours()).padStart(2,'0')+String(now.getMinutes()).padStart(2,'0');
    return filePath.replace('intake.md','transcript-intake-'+tSlug+'.md');
  }
  function handleTranscriptChange(e){
    var val=e.target.value;
    setTranscriptContent(val);
    setRawDirty(true);
    // Autosave transcript (7s debounce)
    if(autosaveTimer.current)clearTimeout(autosaveTimer.current);
    autosaveTimer.current=setTimeout(function(){
      fetch('/api/save?path='+encodeURIComponent(getTranscriptPath()),{method:'POST',body:val,headers:{'Content-Type':'text/plain; charset=utf-8'}});
    },7000);
    // Auto-tag (30s idle debounce)
    if(autotagTimer.current)clearTimeout(autotagTimer.current);
    autotagTimer.current=setTimeout(function(){
      if(!val.trim())return;
      setTagging(true);
      // Save transcript first, then tag
      fetch('/api/save?path='+encodeURIComponent(getTranscriptPath()),{method:'POST',body:val,headers:{'Content-Type':'text/plain; charset=utf-8'}})
        .then(function(){return fetch('/api/tag-intake?path='+encodeURIComponent(filePath),{method:'POST',body:val,headers:{'Content-Type':'text/plain; charset=utf-8'}});})
        .then(function(r){return r.json();})
        .then(function(d){if(d.tagged)setContent(d.tagged);setRawDirty(false);setTagging(false);})
        .catch(function(){setTagging(false);});
    },30000);
  }

  var projSlug=filePath.split('/')[1]||'';
  function rewriteImageSrc(html){
    if(!projSlug)return html;
    return html.replace(new RegExp('src="(design-assets/[^"]+)"','g'),function(_,p){return 'src="/api/file?path='+encodeURIComponent('projects/'+projSlug+'/'+p)+'&raw=1"';});
  }
  var preview=typeof marked!=='undefined'?marked.parse(content):'<pre>'+content+'</pre>';
  preview=rewriteImageSrc(preview);
  var transcriptPreview=typeof marked!=='undefined'?marked.parse(transcriptContent||''):'';
  transcriptPreview=rewriteImageSrc(transcriptPreview);

  return h('div',{className:'edit-overlay',onClick:e=>{if(e.target===e.currentTarget)onClose();}},
    h('div',{className:'edit-modal'},
      h('div',{className:'edit-modal-header'},
        h('span',{className:'edit-modal-title'},title||filePath),
        filePath.includes('brainstorm/')&&h('button',{className:'nav-chip',style:{fontSize:9,marginLeft:8},onClick:function(){var slug=filePath.split('/').pop().replace('.md','');onClose();startChat('Read brainstorm/'+slug+'.md and process it into PM artifacts. Determine what it should become: a single story, multiple stories, an epic, or additions to existing docs. Route each idea to the right artifact type. After processing, add these fields immediately after the # heading line: **Status:** Processed and **Routed to:** {comma-separated artifact IDs} and **Processed:** {YYYY-MM-DD}. Then commit.');}},'process \u2192'),
        h('span',{style:{flex:1}}),
        isIntake&&h('button',{className:'edit-modal-save',style:rawDirty?{}:{opacity:0.4},onClick:()=>doSave(contentRef.current),disabled:saving||tagging},saving?'tagging\u2026':'save & tag'),
        isIntake&&h('button',{className:'nav-chip',style:{fontSize:10,marginLeft:6,opacity:(!rawDirty&&content)?1:0.4},disabled:rawDirty||!content,onClick:function(){onClose();startChat('Read intake.md and process it into PM artifacts. Route each tagged item to the right document type: [feature] and [flow] items become stories or epics, [persona] items update the brief, [constraint] and [scope] items update the brief or relevant stories, [system] items update arch.md, [current-state] items become Current State sections on relevant docs. Resolve any [conflict] items by asking me. After processing, archive intake.md and the transcript to history/.');}},'process \u2192'),
        !isIntake&&h('button',{className:'edit-modal-save',onClick:()=>doSave(contentRef.current),disabled:saving},saving?'saving\u2026':'save'),
        h('button',{className:'edit-modal-cancel',style:{marginLeft:6},onClick:onClose},'cancel')
      ),
      isIntake
        ?h('div',{className:'edit-modal-body'},
          h('div',{className:'edit-pane'},
            h('div',{className:'edit-pane-label'},'raw transcript'),
            h('div',{className:'edit-hints'},'type raw notes here \u00b7 autosaves every 7s \u00b7 paste images with \u2318V'),
            pendingImage&&h('div',{style:{display:'flex',alignItems:'center',gap:6,padding:'4px 8px',background:'#292524',borderRadius:4,marginBottom:4,fontSize:12}},
              h('span',{style:{color:'#A8A29E',flexShrink:0}},'image name:'),
              h('input',{type:'text',value:imageName,onChange:function(e){setImageName(e.target.value);},onKeyDown:function(e){if(e.key==='Enter')saveImage();if(e.key==='Escape')cancelImage();},autoFocus:true,placeholder:'login-current',style:{background:'#1C1917',color:'#E7E5E4',border:'1px solid #44403C',borderRadius:3,padding:'2px 6px',flex:1,fontSize:12,fontFamily:'inherit',outline:'none'}}),
              h('span',{style:{color:'#57534E',fontSize:10,flexShrink:0}},'.png'),
              h('button',{onClick:saveImage,style:{fontSize:11,background:'#CCFF00',color:'#0C0A09',border:'none',borderRadius:3,padding:'2px 8px',cursor:'pointer',fontFamily:'inherit'}},'save'),
              h('button',{onClick:cancelImage,style:{fontSize:11,background:'transparent',color:'#57534E',border:'1px solid #44403C',borderRadius:3,padding:'2px 8px',cursor:'pointer',fontFamily:'inherit'}},'cancel')
            ),
            h('textarea',{ref:textareaRef,className:'edit-textarea',value:transcriptContent||'',onChange:handleTranscriptChange,onPaste:handlePaste,autoFocus:!pendingImage,spellCheck:false,placeholder:'Type raw notes during client call\u2026'})
          ),
          h('div',{className:'edit-pane'},
            h('div',{className:'edit-pane-label',style:{display:'flex',alignItems:'center',gap:8}},
              'tagged intake'+(content?' ('+content.split('\n').filter(function(l){return l.trim().startsWith('-');}).length+' items)':''),
              tagging&&h('span',{style:{fontSize:9,color:'#F59E0B',fontStyle:'italic'}},'sonnet tagging\u2026')
            ),
            content
              ?h('div',{className:'edit-preview md',dangerouslySetInnerHTML:{__html:preview}})
              :h('div',{className:'edit-preview',style:{color:'#57534E',fontStyle:'italic'}},'no tagged items yet \u2014 type notes and hit save & tag')
          )
        )
        :h('div',{className:'edit-modal-body'},
          h('div',{className:'edit-pane'},
            h('div',{className:'edit-pane-label'},'markdown'),
            h('div',{className:'edit-hints'},'**bold**  \u00b7  *italic*  \u00b7  ## heading  \u00b7  - list  \u00b7  > quote  \u00b7  `code`  \u00b7  --- divider  \u00b7  [text](url)'),
            h('textarea',{className:'edit-textarea',value:content,onChange:e=>setContent(e.target.value),autoFocus:true,spellCheck:false})
          ),
          h('div',{className:'edit-pane'},
            h('div',{className:'edit-pane-label'},'preview'),
            h('div',{className:'edit-preview',dangerouslySetInnerHTML:{__html:preview}})
          )
        )
    )
  );
}

function OverviewBoard({data,onNavigate,onEdit}){
  const{stories,overview,project,requirementsRemote}=data;
  const ov=overview||{};
  const drift=ov.drift||{};
  const[briefContent,setBriefContent]=useState(null);
  const[briefLoading,setBriefLoading]=useState(true);
  useEffect(()=>{
    if(!ov.brief?.filePath){setBriefLoading(false);return;}
    const ctrl=new AbortController();
    setBriefContent(null);setBriefLoading(true);
    fetch('/api/file?path='+encodeURIComponent(ov.brief.filePath),{signal:ctrl.signal})
      .then(r=>r.ok?r.text():Promise.reject(r.status))
      .then(t=>{setBriefContent(t);setBriefLoading(false);})
      .catch(err=>{if(err&&err.name==='AbortError')return;setBriefContent('_Error loading brief._');setBriefLoading(false);});
    return()=>ctrl.abort();
  },[ov.brief?.filePath]);

  function StatusCard(){
    const total=stories.length;
    const byStatus={Backlog:0,'In Progress':0,QA:0,Done:0};
    stories.forEach(s=>{const k=s.status||'Backlog';if(k in byStatus)byStatus[k]++;});
    const riKeys=['flow','ds','visual','tests','analytics'];
    const riLabels={flow:'flow',ds:'screen',visual:'mockup',tests:'tests',analytics:'analytics'};
    const riColors={flow:'#60A5FA',ds:'#A78BFA',visual:'#F472B6',tests:'#4ADE80',analytics:'#FB923C'};
    const releases=data.releases||[];
    const[selRel,setSelRel]=useState('all');
    const relStories=selRel==='all'?stories:stories.filter(s=>releases.find(r=>r.id===selRel)?.storyIds.includes(s.id));
    const relTotal=relStories.length;
    const relByStatus={Backlog:0,'In Progress':0,QA:0,'In Review':0,Done:0};
    relStories.forEach(s=>{const k=s.status||'Backlog';if(k in relByStatus)relByStatus[k]++;});
    return h('div',{className:'ov-card'},
      h('div',{className:'ov-card-title'},
        h('span',null,'status at a glance'),
        releases.length>0&&h('select',{className:'release-select',value:selRel,onChange:e=>setSelRel(e.target.value),style:{marginLeft:'auto'}},
          h('option',{value:'all'},'all'),
          ...releases.map(r=>h('option',{key:r.id,value:r.id},r.id))
        )
      ),
      h('div',{className:'status-two-col'},
        h('div',null,
          h('div',{className:'status-col-label'},'readiness'),
          ...riKeys.map(key=>{
            const count=relStories.filter(s=>s.readiness&&s.readiness[key]).length;
            const pct=relTotal?Math.round(count/relTotal*100):0;
            return h('div',{key,className:'ri-bar'},
              h('span',{className:'ri-bar-label'},riLabels[key]),
              h('span',{className:'ri-bar-count'},count+'/'+relTotal),
              h('div',{className:'ri-bar-track'},
                h('div',{className:'ri-bar-fill',style:{width:pct+'%',background:riColors[key]||'#4ADE80'}})
              )
            );
          })
        ),

function DeploymentBoard({data,onNavigate,selectedRelease}){
  const{stories,releases,atTasks}=data;
  const visibleReleases=selectedRelease&&selectedRelease!=='all'?releases.filter(function(r){return r.id===selectedRelease;}):releases;
  const[selId,setSelId]=useState(function(){return visibleReleases.length>0?visibleReleases[0].id:null;});
  const stageColor={'Draft':'#78716C','Ready':'#3B82F6','QA':'#FACC15','Shipped':'#4ADE80'};
  const statusColor={'Backlog':'#57534E','In Progress':'#60A5FA','QA':'#FACC15','In Review':'#F97316','Done':'#4ADE80','Shipped':'#4ADE80'};
  // Ensure selection stays valid when filter changes
  const sel=visibleReleases.find(function(r){return r.id===selId;})||visibleReleases[0]||null;
  function getChecks(rel){
    var relStories=stories.filter(function(s){return rel.storyIds.includes(s.id);});
    var relATs=(atTasks||[]).filter(function(t){return t.releaseId===rel.id;});
    var gateOpen=relATs.length===0||relATs.every(function(t){return t.stage==='Done';});
    var allReady=relStories.every(function(s){return s.stage==='Ready';});
    var hasTR=!!rel.trPath;
    var allDone=relStories.length>0&&relStories.every(function(s){return s.status==='Done'||s.status==='In Review';});
    var shipped=rel.status==='Shipped';
    return [{label:'arch gate open',pass:gateOpen},{label:'all stories ready',pass:allReady},{label:'release test plan',pass:hasTR},{label:'all stories done',pass:allDone},{label:'shipped',pass:shipped}];
  }
  if(!visibleReleases.length) return h('div',{className:'deploy-empty'},'no releases yet');
  var selChecks=sel?getChecks(sel):[];
  var selStories=sel?stories.filter(function(s){return sel.storyIds.includes(s.id);}):[];
  var selATs=sel?(atTasks||[]).filter(function(t){return t.releaseId===sel.id;}):[];

            h('span',{className:'deploy-list-meta'},passed+'/'+checks.length),
            rel.status!=='Backlog'&&h('span',{className:'deploy-list-meta',style:{color:statusColor[rel.status]||'#57534E'}},rel.status)
          ),
          h('div',{className:'deploy-list-name'},rel.name),

        );
      })
    ),
    sel?h('div',{className:'deploy-detail'},

        sel.status!=='Backlog'&&h('span',{className:'deploy-detail-stage',style:{color:statusColor[sel.status]||'#57534E'}},sel.status)

      h('div',{className:'deploy-checklist'},
        h('div',{style:{fontSize:9,color:'#44403C',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:4}},'readiness'),
        selChecks.map(function(c,i){
          return h('div',{key:i,className:'deploy-check-row '+(c.pass?'pass':'fail')},
            h('span',null,c.pass?'✓':'○'),
            c.label

        })

// Group projects: 3+ projects sharing a prefix (up to second hyphen) become a collapsible group
function groupProjects(slugs,projectPaths){
  // Two-pass grouping:
  // 1. Shared-parent groups from .project-paths.json (authoritative — even 2 projects group)
  // 2. Prefix heuristic for leftovers (threshold >=3, same as before)
  var parentGroups={};
  if(projectPaths){
    Object.keys(projectPaths).forEach(function(slug){
      var req=projectPaths[slug]&&projectPaths[slug].requirements;
      if(typeof req!=='string')return;
      // Extract shared parent folder from paths like ../shared-parent/subproject
      if(req.indexOf('../')!==0)return;
      var afterPrefix=req.slice(3);
      var slashIdx=afterPrefix.indexOf('/');
      if(slashIdx<1)return;
      var parent=afterPrefix.slice(0,slashIdx);
      if(!parentGroups[parent])parentGroups[parent]=[];
      parentGroups[parent].push(slug);
    });
  }
  // Only keep parent groups where >=2 members exist in our slugs list
  var slugSet={};slugs.forEach(function(s){slugSet[s]=true;});
  var parentGroupFiltered={};
  Object.keys(parentGroups).forEach(function(parent){
    var members=parentGroups[parent].filter(function(s){return slugSet[s];});
    if(members.length>=2)parentGroupFiltered[parent]=members;
  });
  // Mark slugs that belong to a parent group
  var claimed={};
  Object.keys(parentGroupFiltered).forEach(function(parent){
    parentGroupFiltered[parent].forEach(function(s){claimed[s]=parent;});
  });
  // Leftover slugs — apply prefix heuristic (threshold >=3)
  var leftovers=slugs.filter(function(s){return !claimed[s];});
  var prefixCount={};
  leftovers.forEach(function(s){
    var parts=s.split('-');
    if(parts.length>=2){
      var prefix=parts[0]+'-';
      prefixCount[prefix]=(prefixCount[prefix]||0)+1;
    }
  });
  var groupPrefixes=Object.keys(prefixCount).filter(function(p){return prefixCount[p]>=3;});
  var prefixGrouped={};
  var standalone=[];
  leftovers.forEach(function(s){
    var matched=false;
    for(var i=0;i<groupPrefixes.length;i++){
      if(s.startsWith(groupPrefixes[i])){
        var p=groupPrefixes[i];
        if(!prefixGrouped[p])prefixGrouped[p]=[];
        prefixGrouped[p].push(s);
        matched=true;break;
      }
    }
    if(!matched)standalone.push(s);
  });
  // Build result
  var result=standalone.map(function(s){return {type:'project',slug:s,sortKey:s};});
  // Parent groups
  Object.keys(parentGroupFiltered).sort().forEach(function(parent){
    result.push({type:'group',prefix:parent,slugs:parentGroupFiltered[parent].sort(),sortKey:parent});
  });
  // Prefix groups
  Object.keys(prefixGrouped).sort().forEach(function(prefix){
    result.push({type:'group',prefix:prefix.slice(0,-1),slugs:prefixGrouped[prefix],sortKey:prefix.slice(0,-1)});
  });
  result.sort(function(a,b){return a.sortKey.localeCompare(b.sortKey);});
  return result;
}

        ),
        h('div',{className:'np-footer'},
          h('button',{className:'np-btn-cancel',onClick:function(){setStep('method');setMethod(null);setName('');setSelectedFolder(null);setSelectedRepo(null);setRepoFilter('');setCustomPath('');setBrowsePath('');setBrowseEntries([]);setError(null);}},'← Back'),
          h('button',{className:'np-btn-primary',disabled:!canCreate(),onClick:function(){
            // Run detection for link/clone, then go to confirm
            var targetPath=null;
            if(method==='link'&&selectedFolder)targetPath=selectedFolder.path;
            if(method==='clone'&&selectedRepo)targetPath=null; // will detect after clone
            if(method==='new'){
              var ep=customPath.trim()||browsePath||defaultPath;
              if(ep&&ep!==defaultPath)targetPath=ep;
            }
            if(targetPath){
              fetch('/api/detect-project?path='+encodeURIComponent(targetPath)).then(function(r){return r.json();}).then(function(d){setDetected(d);setStep('confirm');});
            } else {
              setDetected({type:method==='clone'?'unknown':'empty'});setStep('confirm');
            }
          }},'Continue')
        )
      )
    );
  }

  // Confirm step
  if(step==='confirm'){
    var effectivePath=customPath.trim()||browsePath||defaultPath;
    var isDefaultPath=effectivePath===defaultPath;
    var localFolder='';
    if(method==='new'){
      localFolder=effectivePath+'/'+slug;
    } else if(method==='link'&&selectedFolder){
      localFolder=selectedFolder.path;
    } else if(method==='clone'&&selectedRepo){
      localFolder=defaultPath.split('/').slice(0,-1).join('/')+'/'+selectedRepo.name;
    }

    var detType=detected?detected.type:'empty';
    var isReqs=detType==='requirements';
    var isCode=detType==='codebase';

    var summaryLines=[];
    if(method==='new'){
      summaryLines.push({icon:'ph-folder-plus',text:'Create project folder',detail:localFolder});
      summaryLines.push({icon:'ph-file-text',text:'Generate starter brief and design system files'});

      if(createGhRepo)summaryLines.push({icon:'ph-github-logo',text:'Create private GitHub repo',detail:slug+'-requirements'});
    } else if(method==='link'){
      if(isReqs){
        summaryLines.push({icon:'ph-folder-open',text:'Resume PM work on existing requirements',detail:localFolder});
      } else if(isCode){
        summaryLines.push({icon:'ph-code',text:'Reverse-engineer codebase into product docs',detail:localFolder});
        summaryLines.push({icon:'ph-file-text',text:'Generate brief, epics, and stories from code'});
      } else {
        summaryLines.push({icon:'ph-folder-open',text:'Link to folder',detail:localFolder});
        summaryLines.push({icon:'ph-file-text',text:'Generate starter brief and design system files'});
      }
      summaryLines.push({icon:'ph-link',text:'Symlink into FOUNDRY projects'});
    } else if(method==='clone'){
      summaryLines.push({icon:'ph-download',text:'Clone repository to local machine',detail:selectedRepo?selectedRepo.nameWithOwner:''});
      if(detType==='unknown'){
        summaryLines.push({icon:'ph-magnifying-glass',text:'Detect project type and generate appropriate docs'});
      }
      summaryLines.push({icon:'ph-link',text:'Symlink into FOUNDRY projects'});
    }

    return h('div',{className:'np-overlay',onClick:onOverlayClick},
      h('div',{className:'np-modal'},
        h('div',{className:'np-header'},
          h('div',{className:'np-brand'},'FOUNDRY'),
          h('div',{className:'np-title'},'Confirm — '+name)
        ),
        h('div',{className:'np-body'},
          isCode&&h('div',{style:{padding:'10px 12px',background:'rgba(96,165,250,.1)',border:'1px solid rgba(96,165,250,.25)',borderRadius:4,fontSize:11,color:'#60A5FA',lineHeight:1.5}},
            h('strong',null,'Codebase detected.'),' FOUNDRY will analyze this project and reverse-engineer product requirements from the code.'
          ),
          isReqs&&h('div',{style:{padding:'10px 12px',background:'rgba(74,222,128,.1)',border:'1px solid rgba(74,222,128,.25)',borderRadius:4,fontSize:11,color:'#4ADE80',lineHeight:1.5}},
            h('strong',null,'Existing requirements found.'),' FOUNDRY will resume PM work where you left off.'
          ),
          h('div',{style:{display:'flex',flexDirection:'column',gap:10,marginTop:4}},
            summaryLines.map(function(line,i){
              return h('div',{key:i,style:{display:'flex',alignItems:'flex-start',gap:10}},
                h('i',{className:'ph '+line.icon,style:{color:'#CCFF00',fontSize:14,marginTop:1,flexShrink:0}}),
                h('div',null,
                  h('div',{style:{fontSize:12,color:'#FAFAF9'}},line.text),
                  line.detail&&h('div',{style:{fontSize:10,color:'#57534E',fontFamily:"'Space Mono',monospace",marginTop:2,wordBreak:'break-all'}},line.detail)
                )
              );
            })
          ),
          error&&h('div',{className:'np-error'},error)
        ),
        h('div',{className:'np-footer'},
          h('button',{className:'np-btn-cancel',onClick:function(){setStep('configure');setDetected(null);setError(null);}},'← Back'),
          h('button',{className:'np-btn-primary',disabled:creating,onClick:doCreate},creating?'Creating…':'Create Project')
        )
      )
    );
  }

  // Creating / Done step
  if(step==='done'){
    return h('div',{className:'np-overlay'},
      h('div',{className:'np-modal'},
        h('div',{className:'np-body'},
          h('div',{className:'np-spinner'},
            h('div',{className:'np-check'},'✓'),
            h('div',{className:'np-done-text'},'Project created'),
            h('div',{className:'np-done-slug'},slug)
          )
        )
      )
    );
  }

  // Creating state (shouldn't normally render but just in case)
  return h('div',{className:'np-overlay'},
    h('div',{className:'np-modal'},
      h('div',{className:'np-body'},
        h('div',{className:'np-spinner'},
          h('div',{className:'np-spinner-ring'}),
          h('div',{style:{fontSize:12,color:'#57534E'}},'Creating project…')
        )
      )
    )
  );
}

function App(){
  const[data,setData]=useState(null);
  // devData: data with live statuses from dev branch overlaid onto stories and AT tasks
  const devData=useMemo(()=>{
    if(!data||!data.liveStatuses||Object.keys(data.liveStatuses).length===0)return data;
    const ls=data.liveStatuses;
    const stories=data.stories.map(s=>ls[s.id]?Object.assign({},s,{status:ls[s.id]}):s);
    const atTasks=data.atTasks.map(t=>ls[t.id]?Object.assign({},t,{status:ls[t.id]}):t);
    // Recompute blockedBy with dev statuses
    const doneIds=new Set(stories.filter(s=>s.status==='Done').map(s=>s.id));
    for(const s of stories){s.blockedBy=s.deps.filter(d=>!doneIds.has(d));}
    const atDoneIds=new Set(atTasks.filter(t=>t.status==='Done').map(t=>t.id));
    for(const t of atTasks){t.blockedBy=(t.dependsOn||[]).filter(d=>!atDoneIds.has(d));}
    // Recompute release statuses from dev
    const releases=data.releases.map(r=>{
      const sts=r.storyIds.map(sid=>{const s=stories.find(x=>x.id===sid);return s?s.status:'Backlog';});
      const allDone=sts.length>0&&sts.every(s=>s==='Done');
      const anyInProgress=sts.some(s=>s==='In Progress'||s==='QA'||s==='In Review');
      const devStatus=allDone?'Shipped':anyInProgress?'In Progress':r.status;
      return Object.assign({},r,{status:devStatus});
    });
    return Object.assign({},data,{stories,atTasks,releases});
  },[data]);
  const[settings,setSettings]=useState(DEFAULT_SETTINGS);
  const[showSettings,setShowSettings]=useState(false);
  const[showNewProject,setShowNewProject]=useState(false);
  const[showPicker,setShowPicker]=useState(false);
  const[showCreate,setShowCreate]=useState(false);
  const[createType,setCreateType]=useState(null);
  const[createTitle,setCreateTitle]=useState('');
  const[createEpic,setCreateEpic]=useState('');
  function submitCreate(){
    if(!createTitle.trim()||!createType)return;
    var prompts={
      epic:'Create a new epic titled "'+createTitle.trim()+'". Follow PM agent conventions — assign the next available epic ID, create the folder and file, and git commit.',
      story:'Create a new story in epic '+createEpic+' titled "'+createTitle.trim()+'". Follow PM agent story conventions with As a/I want/So that format, assign the next story ID, create the file, and git commit.',
      flow:'Create a new user flow titled "'+createTitle.trim()+'". Follow UF-NNN naming convention, create the flow file with a Mermaid diagram placeholder, and git commit.',
      release:'Create a new release titled "'+createTitle.trim()+'". Follow R-NNN naming convention, create the release file, and git commit. I will specify which stories to include next.'
    };
    setShowCreate(false);setCreateType(null);setCreateTitle('');
    saveSetting('chatPanelOpen',true);
    // Inject the prompt into the chat panel via a custom event
    setTimeout(function(){
      var evt=new CustomEvent('pm-create-prompt',{detail:{prompt:prompts[createType]}});
      window.dispatchEvent(evt);
    },100);
  }
  const[galleryFolder,setGalleryFolder]=useState(null);
  function openGallery(folder){setGalleryFolder(folder||'current-state');}
  const[imageLightbox,setImageLightbox]=useState(null);
  useEffect(function(){
    function handleImgRefClick(e){
      var link=e.target.closest('.img-ref-link');
      if(!link)return;
      e.preventDefault();
      var assetPath=link.getAttribute('data-asset-path');
      if(!assetPath)return;
      var proj=data&&data.project||'';
      var src=window.__STATIC_MODE__
        ?'./assets/'+assetPath.replace('design-assets/','')
        :'/api/asset?project='+encodeURIComponent(proj)+'&path='+encodeURIComponent(assetPath);
      setImageLightbox(src);
    }

    return function(){document.removeEventListener('click',handleImgRefClick);};
  },[data]);

    const es=new EventSource('/api/events');

    es.onerror=()=>setLive(false);
    // Re-sync server to this tab's project on focus (multi-tab support)
    function onVisible(){if(document.visibilityState!=='visible')return;var proj=activeProjectRef.current;if(!proj)return;fetch('/api/status').then(function(r){return r.json();}).then(function(s){if(s.project===proj&&s.version===dataVersionRef.current)return;fetch('/api/data?project='+encodeURIComponent(proj)).then(function(r){return r.json();}).then(function(d){if(d&&d.project){setData(d);setLive(true);dataVersionRef.current=s.version;}});});}
    document.addEventListener('visibilitychange',onVisible);
    return()=>{es.close();document.removeEventListener('visibilitychange',onVisible);};
  },[]);

  // --- Chat context label (S-011-015) — must be before early return to avoid conditional hook ---
  var chatContextLabel=useMemo(function(){

    var label=tabLabels[tab]||tab;
    if(selectedRelease&&selectedRelease!=='all')label+=' — '+selectedRelease;
    return label;
  },[drawer,tab,selectedRelease]);

  // --- SessionStorage persistence (S-011-015) — must be before early return ---
  useEffect(function(){
    if(data&&data.project&&chatMsgs.length>0)sessionStorage.setItem('chat-'+data.project,JSON.stringify({msgs:chatMsgs,clientKey:chatClientKey}));
  },[chatMsgs,chatClientKey]);
  useEffect(function(){
    if(!data||!data.project)return;

      var saved=JSON.parse(sessionStorage.getItem('chat-'+data.project)||'null');

    {l:'QA',       tab:'qa',      done:rSt?(!!selRelData.trPath||rSt.every(function(s){return s.readiness.tests;})):(data.releases.length>0&&data.releases.every(function(rel){var rs=data.stories.filter(function(s){return rel.storyIds.includes(s.id);}); return !!rel.trPath||rs.every(function(s){return s.readiness.tests;});}))},

  ];

  // --- Lazy context hints (S-011-013) ---

      if(drawer.filePath)files.push({path:drawer.filePath,desc:'this story'});
      var epic=data.epics.find(function(e){return e.id===drawer.epicId;});
      if(epic&&epic.filePath)files.push({path:epic.filePath,desc:'parent epic'});
      data.flows.forEach(function(f){
        if(f.storyIds&&f.storyIds.includes(drawer.id)&&f.filePath)files.push({path:f.filePath,desc:'linked flow'});
      });
    }else if(drawer.type==='epic'){
      if(drawer.filePath)files.push({path:drawer.filePath,desc:'this epic'});
      data.stories.filter(function(s){return s.epicId===drawer.id;}).slice(0,MAX-1).forEach(function(s){
        if(s.filePath)files.push({path:s.filePath,desc:'story in this epic'});
      });
    }else if(drawer.type==='release'){
      if(drawer.filePath)files.push({path:drawer.filePath,desc:'this release'});
      var rel=data.releases.find(function(r){return r.id===drawer.id;});
      if(rel){
        var relStories=data.stories.filter(function(s){return rel.storyIds&&rel.storyIds.includes(s.id);});
        var truncated=relStories.length>MAX-1;
        relStories.slice(0,MAX-1).forEach(function(s){
          if(s.filePath)files.push({path:s.filePath,desc:'story in release'});
        });
        if(truncated)files.push({path:null,desc:'and '+(relStories.length-(MAX-1))+' more stories'});
      }
    }else if(drawer.type==='flow'){
      if(drawer.filePath)files.push({path:drawer.filePath,desc:'this flow'});
    }else{
      if(drawer.filePath)files.push({path:drawer.filePath,desc:'this document'});
    }
    if(files.length>MAX){var extra=files.length-MAX;files.length=MAX;files.push({path:null,desc:'and '+extra+' more'});}
    return files.length>0?files:null;
  }

  // --- Chat send (S-011-015) ---
  function chatSend(text){
    if(!text.trim()||chatStreaming)return;
    var contextLabel=chatContextLabel;
    var userMsg={role:'user',content:text.trim(),contextLabel:contextLabel};
    setChatMsgs(function(prev){return prev.concat([userMsg,{role:'assistant',content:'',tools:[]}]);});
    setChatInput('');
    setChatStreaming(true);
    // Build prompt with context + optional hints
    var promptParts=['[Context: '+contextLabel+']'];
    var related=resolveRelatedFiles();
    if(related){
      var hintLines=related.map(function(f){return '  \u2022 '+(f.path||'')+' ('+f.desc+')';});
      promptParts.push('[Related files \u2014 read only if needed:\n'+hintLines.join('\n')+']');
    }
    promptParts.push(text.trim());
    var promptWithContext=promptParts.join('\n');
    var chatBody;
    try{chatBody=JSON.stringify({prompt:promptWithContext,clientKey:chatClientKey,context:projectContext||null,project:data.project});}
    catch(je){console.error('[chat] JSON.stringify failed',je);setChatStreaming(false);return;}
    console.log('[chat] sending, body length='+chatBody.length);
    fetch('/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:chatBody
    }).then(function(resp){
      console.log('[chat] response status='+resp.status);
      var reader=resp.body.getReader();
      var decoder=new TextDecoder();
      var buffer='';
      var currentEvent='';
      function readChunk(){
        return reader.read().then(function(result){
          if(result.done){setChatStreaming(false);return;}
          buffer+=decoder.decode(result.value,{stream:true});
          var parts=buffer.split('\n');
          buffer=parts.pop()||'';
          parts.forEach(function(line){
            if(line.startsWith('event: ')){currentEvent=line.slice(7);return;}
            if(!line.startsWith('data: '))return;
            try{
              var d=JSON.parse(line.slice(6));
              if(currentEvent==='text'){
                setChatMsgs(function(m){var c=m.slice();var last=Object.assign({},c[c.length-1]);last.content=(last.content||'')+d.text;c[c.length-1]=last;return c;});
              }else if(currentEvent==='tool_start'){
                setChatMsgs(function(m){var c=m.slice();var last=Object.assign({},c[c.length-1]);last.tools=(last.tools||[]).concat([{name:d.name,status:'running'}]);c[c.length-1]=last;return c;});
              }else if(currentEvent==='tool_result'){
                setChatMsgs(function(m){
                  var c=m.slice();var last=Object.assign({},c[c.length-1]);var tools=(last.tools||[]).slice();
                  for(var ti=tools.length-1;ti>=0;ti--){if(tools[ti].name===d.name&&tools[ti].status==='running'){tools[ti]=Object.assign({},tools[ti],{status:'done'});break;}}
                  last.tools=tools;c[c.length-1]=last;return c;
                });
              }else if(currentEvent==='error'){
                setChatMsgs(function(m){return m.concat([{role:'assistant',content:'Error: '+(d.message||'unknown'),tools:[]}]);});
                setChatStreaming(false);
              }
            }catch(e){}
          });
          return readChunk();
        });
      }
      return readChunk();
    }).catch(function(e){
      console.error('[chat] fetch error',e);
      setChatMsgs(function(m){return m.concat([{role:'assistant',content:'Error: '+(e.message||'unknown'),tools:[]}]);});
      setChatStreaming(false);
    });
  }

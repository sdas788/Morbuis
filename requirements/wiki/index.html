<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>morbius — board</title>
<link rel="icon" type="image/x-icon" href="./assets/app-icon/favicon.ico">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bona+Nova:wght@700&family=Barlow+Condensed:wght@700;800&family=Barlow:wght@400;500;600&family=Space+Mono&family=Open+Sans:wght@600&display=swap">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-page:#0C0A09;--bg-app:#1C1917;--bg-surface:#292524;--bg-surface-hover:#1C1917;--bg-elevated:#161412;--bg-muted:#292524;
  --fg-default:#FAFAF9;--fg-secondary:#D6D3D1;--fg-muted:#A8A29E;--fg-subtle:#78716C;--fg-faint:#57534E;--fg-disabled:#44403C;
  --border-default:#44403C;--border-subtle:#292524;--border-strong:#57534E;--border-hairline:#292524;
  --accent:#CCFF00;--accent-ink:#0C0A09;--brand-text:#CCFF00;--doc-brand:#CCFF00;
  --chat-bg:#161412;--input-bg:#0C0A09;--overlay-bg:rgba(0,0,0,.7);--elevated-shadow:0 4px 16px rgba(0,0,0,.5);
  --signal-success:#4ADE80;--signal-warn:#FACC15;--signal-danger:#F87171;--signal-info:#60A5FA;--signal-ops:#A78BFA;--signal-arch:#F97316;
}
[data-theme="light"]{
  --bg-page:#F5F5F4;--bg-app:#FAFAF9;--bg-surface:#FFFFFF;--bg-surface-hover:#F5F5F4;--bg-elevated:#F0EFEE;--bg-muted:#F0EFEE;
  --fg-default:#1C1917;--fg-secondary:#44403C;--fg-muted:#57534E;--fg-subtle:#78716C;--fg-faint:#A8A29E;--fg-disabled:#D6D3D1;
  --border-default:#D6D3D1;--border-subtle:#E7E5E4;--border-strong:#A8A29E;--border-hairline:#E7E5E4;
  --accent:#CCFF00;--accent-ink:#0C0A09;--brand-text:#1C1917;--doc-brand:#3D7A00;
  --chat-bg:#F5F5F4;--input-bg:#FFFFFF;--overlay-bg:rgba(28,25,23,.35);--elevated-shadow:0 4px 16px rgba(0,0,0,.12);
  --signal-success:#15803D;--signal-warn:#854D0E;--signal-danger:#B91C1C;--signal-info:#1D4ED8;--signal-ops:#7C3AED;--signal-arch:#9A3412;
}
body{background:var(--bg-page);color:var(--fg-default);font-family:'Space Mono','Courier New',monospace;font-size:14px;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#header{padding:10px 16px;border-bottom:1px solid var(--border-default);display:flex;align-items:center;gap:12px;flex-shrink:0;background:var(--bg-app)}
#header h1{font-size:15px;letter-spacing:.05em;color:var(--brand-text);font-weight:700;white-space:nowrap}
.tabs{display:flex;gap:2px;align-items:center;overflow-x:auto;flex:1;min-width:0;scrollbar-width:none;-ms-overflow-style:none}.tabs::-webkit-scrollbar{display:none}
.tab{padding:5px 12px;background:var(--bg-app);border:1px solid var(--border-default);cursor:pointer;font-family:inherit;font-size:13px;color:var(--fg-muted);transition:all .15s;display:flex;align-items:center;gap:5px}
.tab:hover{color:var(--fg-default)}.tab.active{background:var(--accent);color:var(--accent-ink);border-color:var(--accent);font-weight:700}
.tab-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;transition:background .2s}
.tab.active .tab-dot{background:#0C0A09 !important}
.filter-group{display:flex;gap:2px;margin-left:auto}
.filter-btn{padding:4px 10px;background:#1C1917;border:1px solid #44403C;cursor:pointer;font-family:inherit;font-size:12px;color:#A8A29E;transition:all .15s}
.filter-btn:hover{color:#FAFAF9}.filter-btn.active{background:#292524;color:#FAFAF9;border-color:#78716C}
.live-dot{width:6px;height:6px;background:#4ADE80;border-radius:50%;flex-shrink:0}
.live-dot.stale{background:#57534E}
.repo-badge{font-size:12px;padding:2px 7px;font-family:'Space Mono',monospace;letter-spacing:.06em;border-radius:2px}
.repo-badge.found{color:#4ADE80;border:1px solid rgba(74,222,128,.4);cursor:pointer}
.repo-badge.found:hover{background:rgba(74,222,128,.08)}
.repo-badge.missing{color:#57534E;border:1px solid #44403C;cursor:default}
.plan-progress{display:flex;align-items:center;gap:5px;margin-left:8px}
.plan-dots{display:flex;gap:2px;align-items:center}
.plan-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;transition:background .2s,transform .1s;cursor:pointer}
.plan-dot:hover{transform:scale(2);z-index:1}
.col-title.todo{color:#CCFF00}
.design-board{display:flex;gap:12px;padding:12px 16px;overflow-y:auto;flex:1;align-items:flex-start}
.design-column{background:#1C1917;border:1px solid #44403C;display:flex;flex-direction:column;min-width:0}
.design-col-brief{flex:2}
.design-col-tokens{flex:5}
.design-col-screens{flex:2}
.ds-screen-group{margin-bottom:14px}
.ds-screen-group-label{font-size:10px;color:#44403C;font-family:"Space Mono",monospace;letter-spacing:.1em;text-transform:uppercase;padding-bottom:4px;border-bottom:1px solid #292524;margin-bottom:6px}
.ds-ready-dot{width:6px;height:6px;border-radius:50%;background:#4ADE80;flex-shrink:0}
.ds-draft-dot{width:6px;height:6px;border-radius:50%;background:#44403C;flex-shrink:0}
.design-screen-item{padding:6px 8px;border:1px solid #292524;cursor:pointer;transition:border-color .1s;margin-bottom:4px}
.design-screen-item:hover{border-color:#CCFF00}
.design-screen-missing{cursor:default;opacity:.55}
.design-screen-missing:hover{border-color:#292524}
.design-screen-name{font-size:12px;color:#FAFAF9;font-family:system-ui,sans-serif;margin-bottom:2px}
.design-screen-meta{font-size:11px;color:#57534E;font-family:'Space Mono',monospace}
.design-missing-badge{font-size:11px;color:#57534E;font-family:'Space Mono',monospace;padding:4px 0;font-style:italic}
.design-ref-thumb{width:100%;max-height:140px;object-fit:cover;display:block;border:1px solid #292524;margin-bottom:4px;cursor:pointer}
.design-ref-desc{font-size:11px;color:#57534E;font-family:'Space Mono',monospace;line-height:1.5;margin-bottom:2px}
.ds-screenshots{display:flex;gap:8px;padding:8px 20px;overflow-x:auto;border-bottom:1px solid #292524;scrollbar-width:thin}
.ds-screenshot-thumb{flex-shrink:0;width:140px;cursor:pointer;border:1px solid #292524;border-radius:6px;overflow:hidden;transition:border-color .15s}
.ds-screenshot-thumb:hover{border-color:#57534E}
.ds-screenshot-img{width:100%;height:90px;object-fit:cover;display:block}
.ds-screenshot-label{padding:4px 6px;font-size:10px;color:#A8A29E;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ds-screenshots-loading{padding:12px 20px;color:#57534E;font-size:11px}
.gallery-modal{background:#0C0A09;border:1px solid #44403C;border-radius:8px;width:90vw;max-width:1100px;height:80vh;display:flex;flex-direction:column;overflow:hidden}
.gallery-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid #292524;flex-shrink:0}
.gallery-title{font-size:13px;color:#CCFF00;font-weight:700;letter-spacing:.05em}
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;padding:16px;overflow-y:auto;flex:1}
.gallery-thumb{background:#1C1917;border:1px solid #292524;border-radius:6px;overflow:hidden;cursor:pointer;transition:border-color .15s}
.gallery-thumb:hover{border-color:#57534E}
.gallery-thumb-img{width:100%;height:120px;object-fit:cover;display:block}
.gallery-thumb-name{padding:6px 8px 2px;font-size:10px;color:#A8A29E;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gallery-thumb-folder{padding:0 8px 6px;font-size:9px;color:#57534E}
.gallery-lightbox{position:fixed;inset:0;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;z-index:300;cursor:pointer}
.gallery-lightbox-img{max-width:90vw;max-height:90vh;object-fit:contain;border-radius:4px;cursor:default}
.gallery-lightbox-close{position:fixed;top:16px;right:16px;background:none;border:1px solid #57534E;color:#FAFAF9;font-size:18px;width:36px;height:36px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}
.gallery-link{color:#57534E;font-size:9px;cursor:pointer;border:none;background:none;font-family:inherit;text-decoration:underline;text-underline-offset:2px}
.gallery-link:hover{color:#A8A29E}
.import-dropzone{border-style:dashed !important}
.import-dropzone:hover{border-color:#57534E !important}
.import-dropzone-active{border-color:#CCFF00 !important;background:rgba(204,255,0,.04) !important}
.asset-dropzone{border:1px dashed #44403C;border-radius:6px;padding:16px;cursor:pointer;transition:all .15s;min-height:60px;display:flex;align-items:center;justify-content:center}
.asset-dropzone:hover{border-color:#57534E}
.asset-dropzone-active{border-color:#CCFF00;background:rgba(204,255,0,.04)}
.asset-dropzone-preview{border:1px solid #44403C;border-radius:6px;padding:10px;cursor:default}
.asset-thumb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px}
.asset-thumb{display:flex;flex-direction:column;gap:3px}
.asset-thumb-img{width:100%;height:60px;object-fit:cover;border-radius:3px;border:1px solid #292524}
.asset-thumb-name{background:#1C1917;color:#A8A29E;border:1px solid #44403C;border-radius:3px;padding:1px 4px;font-size:9px;font-family:'Space Mono',monospace;outline:none;width:100%;box-sizing:border-box}
.nav-chip-active{background:#CCFF00 !important;color:#0C0A09 !important}
.brand-ref-text{font-size:12px;color:#A8A29E;font-family:system-ui,sans-serif;line-height:1.6}
.design-brief-section{font-size:11px;color:#A8A29E;font-family:system-ui,sans-serif;line-height:1.6;max-height:200px;overflow:hidden;mask-image:linear-gradient(to bottom,black 85%,transparent)}
.design-brief-section table{font-size:10px;border-collapse:collapse;width:100%}
.design-brief-section td,.design-brief-section th{padding:2px 6px;border:1px solid #292524;color:#78716C}
.design-brief-section th{color:#A8A29E;text-align:left}
.design-brief-section ul,.design-brief-section ol{padding-left:16px;margin:4px 0}
.design-brief-section li{color:#78716C;margin:1px 0}
.plan-label{font-size:11px;color:#44403C;font-family:'Space Mono',monospace;letter-spacing:.08em}
.plan-count{font-size:11px;color:#44403C;font-family:'Space Mono',monospace}
.eng-cta{background:transparent;border:1px solid #292524;color:#44403C;font-family:'Space Mono',monospace;font-size:11px;padding:2px 8px;cursor:pointer;letter-spacing:.03em;white-space:nowrap;transition:all .15s;line-height:1.8;margin-left:6px}
.eng-cta:hover{border-color:#4ADE80;color:#4ADE80;background:rgba(74,222,128,.04)}
.eng-cta.copied{border-color:#4ADE80;color:#4ADE80}
.eng-cta-path{color:#78716C}
.tab-sep{width:1px;background:#292524;margin:3px 6px;align-self:stretch;flex-shrink:0}
.tab.eng-tab{background:#1a1f2e;border-color:#2d3a5a;color:#60A5FA}
.tab.eng-tab:hover{color:#93C5FD}
.tab.eng-tab.active{background:#60A5FA;color:#0C0A09;border-color:#60A5FA;font-weight:700}
.tab.ops-tab{background:#1e1a2e;border-color:#3a2d5a;color:#A78BFA}
.tab.ops-tab:hover{color:#C4B5FD}
.tab.ops-tab.active{background:#A78BFA;color:#0C0A09;border-color:#A78BFA;font-weight:700}
.delivery-zone-label,.plan-zone-label,.ops-zone-label{font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;display:flex;align-items:center;padding:0 4px;flex-shrink:0;user-select:none}
.delivery-zone-label{color:#2563EB}
.plan-zone-label{color:#4d7c0f}
.ops-zone-label{color:#7C3AED}
.tab.eng-subtab{background:#1a1f2e;border-color:#2d3a5a;color:#93C5FD;font-size:12px;padding:5px 9px}
.tab.eng-subtab:hover{color:#BFDBFE}
.tab.ops-subtab{background:#1e1a2e;border-color:#3a2d5a;color:#A78BFA;font-size:12px;padding:5px 9px}
.tab.ops-subtab:hover{color:#C4B5FD}
.tab.ops-subtab.active{background:#A78BFA;color:#0C0A09;border-color:#A78BFA;font-weight:700}
.health-split{display:flex;flex:1;gap:16px;overflow:hidden}
.health-bi{flex:3;display:flex;flex-direction:column;gap:10;overflow:auto}
.health-plan{flex:2;display:flex;flex-direction:column;gap:10;overflow:auto;min-width:220px}
.tab.eng-subtab.active{background:#60A5FA;color:#0C0A09;border-color:#60A5FA;font-weight:700}
.tab.plan-subtab{background:#1a1f14;border-color:#2d3a1a;color:#86EFAC;font-size:12px;padding:5px 9px}
.tab.plan-subtab:hover{color:#DCFCE7}
.tab.plan-subtab.active{background:#CCFF00;color:#0C0A09;border-color:#CCFF00;font-weight:700}
.tab.plan-done{color:#4ADE80}
.tab.plan-empty{color:#57534E}
.tab.plan-subtab.plan-done{color:#4ADE80}
.tab.plan-subtab.plan-empty{color:#57534E}
.deploy-split{display:flex;flex:1;overflow:hidden}
.deploy-list{width:260px;flex-shrink:0;border-right:1px solid var(--border-default);overflow-y:auto;display:flex;flex-direction:column}
.deploy-list-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border-subtle);display:flex;flex-direction:column;gap:4px;transition:background .1s}
.deploy-list-item:hover{background:var(--bg-surface-hover)}
.deploy-list-item.active{background:var(--bg-surface-hover);border-left:3px solid var(--signal-success)}
.deploy-list-id{font-size:12px;font-family:'Space Mono',monospace;font-weight:700}
.deploy-list-name{font-size:12px;color:var(--fg-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.deploy-list-meta{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--fg-subtle);font-family:'Space Mono',monospace}
.deploy-detail{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.deploy-detail-header{display:flex;align-items:baseline;gap:12px}
.deploy-detail-title{font-size:16px;color:var(--fg-default);font-weight:600}
.deploy-detail-stage{font-size:12px;font-family:'Space Mono',monospace}
.deploy-checklist{display:flex;flex-direction:column;gap:5px}
.deploy-check-row{display:flex;align-items:center;gap:7px;font-size:12px;color:#78716C}
.deploy-check-row.pass{color:#4ADE80}.deploy-check-row.fail{color:#57534E}
.deploy-stories{display:flex;flex-direction:column;gap:4px}
.deploy-story-row{display:flex;align-items:center;gap:8px;font-size:12px;padding:4px 0;border-bottom:1px solid #1a1714}
.deploy-story-row:last-child{border-bottom:none}
.deploy-empty{flex:1;display:flex;align-items:center;justify-content:center;color:#44403C;font-size:13px}
.foundry-brand{font-family:'Open Sans',sans-serif;font-weight:600;font-size:15px;color:#d6322d;letter-spacing:.1em;white-space:nowrap;cursor:pointer;user-select:none}
.foundry-brand:hover{opacity:.8}
.header-right{display:flex;align-items:center;gap:10px;margin-left:auto;position:relative;flex-shrink:0}
.project-popover{position:absolute;top:100%;right:0;margin-top:6px;background:#1C1917;border:1px solid #44403C;min-width:160px;z-index:200;box-shadow:0 4px 16px rgba(0,0,0,.5)}
.project-popover-item{padding:8px 12px;font-size:13px;color:#A8A29E;cursor:pointer;white-space:nowrap;transition:background .1s,color .1s}
.project-popover-item:hover{background:#292524;color:#FAFAF9}
.project-popover-item:active{background:#44403C;color:#FAFAF9}
.project-popover-item.active{color:#CCFF00}
.project-popover-item.loading{color:#57534E;pointer-events:none}
.project-popover-item.loading::after{content:'…';animation:ellipsis 1s steps(3,end) infinite}
@keyframes ellipsis{0%{content:''}33%{content:'.'}66%{content:'..'}100%{content:'…'}}
.settings-btn{background:none;border:1px solid #44403C;color:#57534E;cursor:pointer;font-family:inherit;font-size:16px;padding:1px 7px;line-height:1.6;transition:all .15s}.settings-btn:hover{border-color:#A78BFA;color:#A78BFA}.settings-btn.active{border-color:#A78BFA;color:#A78BFA}
.settings-popover{position:absolute;top:calc(100% + 6px);right:0;background:#1C1917;border:1px solid #44403C;width:240px;z-index:300;box-shadow:0 4px 20px rgba(0,0,0,.6);padding:14px 14px 10px}
.settings-title{font-size:11px;color:#57534E;letter-spacing:.12em;text-transform:uppercase;margin-bottom:12px}
.settings-row{display:flex;flex-direction:column;gap:3px;margin-bottom:10px}
.settings-row-label{font-size:11px;color:#78716C;letter-spacing:.06em;text-transform:uppercase}
.settings-row input[type="text"],.settings-row select{background:#0C0A09;border:1px solid #292524;color:#E7E5E4;font-family:inherit;font-size:13px;padding:4px 7px;width:100%;box-sizing:border-box;outline:none}.settings-row input[type="text"]:focus,.settings-row select:focus{border-color:#A78BFA}
.settings-seg{display:flex;gap:2px;margin-top:2px}.settings-seg-btn{flex:1;background:#0C0A09;border:1px solid #292524;color:#57534E;font-family:inherit;font-size:11px;padding:4px 0;cursor:pointer;letter-spacing:.05em;text-align:center;transition:all .1s}.settings-seg-btn.active{background:#A78BFA;border-color:#A78BFA;color:#0C0A09;font-weight:700}
.settings-check-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;cursor:pointer}.settings-check-row input{accent-color:#A78BFA}.settings-check-row span{font-size:12px;color:#A8A29E}
[data-theme="light"] .design-column{background:var(--bg-surface);border-color:var(--border-default)}
[data-theme="light"] .deploy-list-item.active{background:#EEF4E7}
[data-theme="light"] .card{border-color:var(--border-subtle)}
[data-theme="light"] .card:hover{background:var(--bg-surface-hover);border-color:var(--border-default)}
[data-theme="light"] .card-id{color:var(--fg-muted)}
[data-theme="light"] .card-is-done{border-color:#E7E5E4;opacity:.7}
[data-theme="light"] .tab.active .tab-dot{background:var(--bg-surface) !important}
[data-theme="light"] .ov-card{background:#FFFFFF;border-color:#D6D3D1}
[data-theme="light"] .ov-card-title{color:#44403C}
[data-theme="light"] .ov-brainstorm{background:#FFFFFF;border-color:#D6D3D1}
[data-theme="light"] .ov-brainstorm-excerpt{color:#78716C}
[data-theme="light"] .wb-card{background:#FFFFFF;border-color:#E7E5E4}
[data-theme="light"] .wb-card:hover{border-color:#7C3AED}
[data-theme="light"] .wb-card-title{color:#1C1917}
[data-theme="light"] .wb-card-preview{color:#A8A29E}
[data-theme="light"] .col-header{background:var(--bg-page)}
[data-theme="light"] .col-header-title{color:#44403C}
[data-theme="light"] .drawer-pane{background:var(--bg-app);border-color:var(--border-default)}
[data-theme="light"] .drawer-inner{background:var(--bg-app);color:var(--fg-default)}
[data-theme="light"] .drawer-doc-content{color:var(--fg-default)}
[data-theme="light"] .drawer-doc-content h1,[data-theme="light"] .drawer-doc-content h2,[data-theme="light"] .drawer-doc-content h3{color:var(--fg-default)}
[data-theme="light"] .nav-chip{background:#F0EFEE;border-color:#D6D3D1;color:#57534E}
[data-theme="light"] .nav-chip:hover{border-color:#1C1917;color:#1C1917}
[data-theme="light"] .project-popover,[data-theme="light"] .settings-popover{background:#FFFFFF;border-color:#D6D3D1}
[data-theme="light"] .settings-popover{box-shadow:0 4px 20px rgba(0,0,0,.12)}
[data-theme="light"] .settings-row input[type="text"],[data-theme="light"] .settings-row select{background:#F5F5F4;border-color:#D6D3D1;color:#1C1917}
[data-theme="light"] .settings-seg-btn{background:#F0EFEE;border-color:#D6D3D1;color:#78716C}
[data-theme="light"] .settings-check-row span{color:#44403C}
[data-theme="light"] .settings-title,[data-theme="light"] .settings-row-label{color:#78716C}
[data-theme="light"] .project-popover-item{color:#44403C}[data-theme="light"] .project-popover-item:hover{background:#F0EFEE;color:#1C1917}[data-theme="light"] .project-popover-item:active{background:#E7E5E4;color:#1C1917}[data-theme="light"] .project-popover-item.loading{color:#A8A29E}
[data-theme="light"] .release-select{background:#FFFFFF;border-color:#D6D3D1;color:#1C1917}
[data-theme="light"] .branch-pill{border-color:#D6D3D1;color:#78716C}
[data-theme="light"] .branch-pill:hover{border-color:#1C1917;color:#1C1917}
[data-theme="light"] .branch-pill.live{color:#1C1917;border-color:#3B82F6}
[data-theme="light"] .ask-btn{border-color:#D6D3D1;color:#78716C}
[data-theme="light"] .ask-btn:hover{border-color:#78716C;color:#44403C}

.doc-changelog-body{margin-top:8px;font-size:12px;color:#78716C}
.doc-raw-toggle{background:none;border:none;color:#57534E;font-size:11px;cursor:pointer;font-family:'Space Mono',monospace;padding:8px 0}
.doc-raw-toggle:hover{color:#78716C}

.fli-screen-name{font-size:12px;color:var(--fg-subtle);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fli-ds-chip{font-size:10px;padding:2px 5px;background:var(--bg-muted);border:1px solid var(--border-default);color:var(--fg-subtle);cursor:pointer;font-family:'Space Mono',monospace;flex-shrink:0;line-height:1.4}
.fli-ds-chip:hover,.fli-ds-chip.active{background:var(--bg-surface-hover);color:var(--doc-brand);border-color:var(--doc-brand)}
.fli-screen-row.ds-active{background:var(--bg-surface-hover)}

sx-path> and have all test cases from the Excel QA plan imported as markdown files, so the team never manually copies data between Excel and Morbius. Acceptance Criteria Given an Excel file with multiple sheets (one per test category) When I run morbius import \"QA Plan.xlsx\" Then each sheet becomes a category folder under data/{project}/tests/ and each row becomes a tc-{id}-{slug}.md file with all columns mapped (ID, Steps, AC, Scenario, Status, Notes, Device Results) Given the Excel has a \"Summary\", \"Index\", or \"Template\" sheet When import runs Then those sheets are silently skipped Given the import has run before When I run import again Then existing test case files are updated (not duplicated) using the sync-meta.json checksum registry Given device result columns (iPad, iPhone, Android Tab, Phone) exist When imported Then device results are stored as a structured array in the frontmatter, not as raw text Change Log Date Version Author Change ------ --------- -------- -------- 2026-04-21 1.0 PM Agent Created via reverse-engineer","dsSpecs":[],"timeLog":null,"snapshots":[]},{"id":"S-002-002","epicId":"E-002","title":"S-002-002","status":"Done","stage":"Ready","priority":"P0","filePath":"projects/morbius/epics/E-002-test-case-management/S-002-002-export-to-excel.md","testPlanPath":"","readiness":{"flow":false,"ds":false,"visual":false,"arch":false,"archPending":false,"analytics":false,"tests":false},"deps":[],"blockedBy":[],"dataRefs":[],"analyticsRef":"","meta":[{"k":"ID","v":"S-002-002"},{"k":"Project","v":"morbius"},{"k":"Epic","v":"E-002"},{"k":"Stage","v":"Ready"},{"k":"Status","v":"Done"},{"k":"Priority","v":"P0"},{"k":"Version","v":"1.0"},{"k":"Created","v":"2026-04-21"},{"k":"Updated","v":"2026-04-21"}],"searchText":"Export Test Changes Back to Excel Story As a QA lead, I want to run morbius export <xlsx-path> to write all status, priority, and notes changes from the dashboard back into the original Excel file, so the Excel QA plan stays in sync with what the team has been tracking in Morbius. Acceptance Criteria Given test cases have been updated in the dashboard When I run morbius export \"QA Plan.xlsx\" Then the status, priority, and notes columns are updated in the correct rows of the correct sheets, and all other cells are left untouched Given a test case exists in Morbius but not in the Excel When export runs Then that test is skipped (no new rows are inserted) Given the export completes When I open the Excel Then all updated cells reflect the latest values from the markdown files Change Log Date Version Author Change ------ --------- -------- -------- 2026-04-21 1.0 PM Agent Created via reverse-engineer","dsSpecs":[],"timeLog":null,"snapshots":[]},{"id":"S-002-003","epicId":"E-002","title":"S-002-003","status":"Done","stage":"Ready","priority":"P0","filePath":"projects/morbius/epics/E-002-test-case-management/S-002-003-test-cases-kanban.md","testPlanPath":"","readiness":{"flow":false,"ds":false,"visual":false,"arch":false,"archPending":false,"analytics":false,"tests":false},"deps":[],"blockedBy":[],"dataRefs":[],"analyticsRef":"","meta":[{"k":"ID","v":"S-002-003"},{"k":"Project","v":"morbius"},{"k":"Epic","v":"E-002"},{"k":"Stage","v":"Ready"},{"k":"Status","v":"Done"},{"k":"Priority","v":"P0"},{"k":"Version","v":"1.0"},{"k":"Created","v":"2026-04-21"},{"k":"Updated","v":"2026-04-21"}],"searchText":"Test Cases Kanban Board Story As a tester, I want a Kanban board view of all test cases grouped by category, with filter controls for status and scenario type, so I can see at a glance which tests are passing, failing, flaky, or not yet run. Acceptance Criteria Given test cases are loaded When I open the Test Cases tab Then cards are grouped by category with pass/fail/flaky/not-run/in-progress columns Given I apply a status filter (e.g. \"Fail\") When the filter is active Then only cards with that status are shown; empty columns auto-hide Given I toggle to Row mode When viewing the board Then test cases are shown as a flat sortable list (sort by ID, Status, Priority, Name, or Type) Given I drag a card within a category When I drop it in a new position Then the order is persisted to the markdown file and a changelog entry is written Change Log Date Version Author Change ------ --------- -------- -------- 2026-04-21 1.0 PM Agent Created via reverse-engineer","dsSpecs":[],"timeLog":null,"snapshots":[]},{"id":"S-002-004","epicId":"E-002","title":"S-002-004","status":"Done","stage":"Ready","priority":"P1","filePath":"projects/morbius/epics/E-002-test-case-management/S-002-004-inline-status-changelog.md","testPlanPath":"","readiness":{"flow":false,"ds":false,"visual":false,"arch":false,"archPending":false,"analytics":false,"tests":false},"deps":[],"blockedBy":[],"dataRefs":[],"analyticsRef":"","meta":[{"k":"ID","v":"S-002-004"},{"k":"Project","v":"morbius"},{"k":"Epic","v":"E-002"},{"k":"Stage","v":"Ready"},{"k":"Status","v":"Done"},{"k":"Priority","v":"P1"},{"k":"Version","v":"1.0"},{"k":"Created","v":"2026-04-21"},{"k":"Updated","v":"2026-04-21"}],"searchText":"Inline Status Update + Per-File Changelog Story As a tester, I want to click the status pill on any test card and update it instantly, with the change automatically logged in the file's changelog, so the history of every test is auditable without a separate tracking system. Acceptance Criteria Given I click a status pill on a test card When I select a new status Then the card updates immediately in the UI and a POST /api/test/update writes the change to the markdown file Given a status update is saved When I open the test case detail Then the changelog table shows: timestamp, field (\"status\"), old value, new value, actor Given I update notes on a test When I click away Then the notes auto-save and appear in the changelog as a notes update Change Log Date Version Author Change ------ --------- -------- -------- 2026-04-21 1.0 PM Agent Created via reverse-engineer","dsSpecs":[],"timeLog":null,"snapshots":[]},{"id":"S "","meta":[{"k":"ID","v":"S-002-006"},{"k":"Project","v":"morbius"},{"k":"Epic","v":"E-002"},{"k":"Stage","v":"Ready"},{"k":"Status","v":"Done"},{"k":"Priority","v":"P2"},{"k":"Version","v":"1.0"},{"k":"Created","v":"2026-04-21"},{"k":"Updated","v":"2026-04-21"}],"searchText":"Data Validation + Integrity Checks Story As a developer, I want to run morbius validate and get a report of all data integrity issues — broken Maestro paths, orphaned screenshots, missing linked tests, stale tests — so I can catch configuration drift before it causes silent failures. Acceptance Criteria Given a test case has a maestroFlow path that no longer exists When I run morbius validate Then it is reported as a broken Maestro flow link Given a bug has a screenshot path that doesn't exist on disk When I run morbius validate Then it is reported as a missing screenshot Given a test has not been run in more than 7 days When I run morbius validate Then it is flagged as stale Given all data is clean When I run morbius validate Then the output shows \"No issues found\" Change Log Date Version Author Change ------ --------- -------- -------- 2026-04-21 1.0 PM Agent Created via reverse-engineer","dsSpecs":[],"timeLog":null,"snapshots":[]},{"id":"S-003-001","epicId":"E-003","title":"S-003-001","status":"Done","stage":"Ready","priority":"P1","filePath":"projects/morbius/epics/E-003-test-execution-maestro/S-003-001-maestro-flow-viewer.md","testPlanPath":"","readiness":{"flow":false,"ds":false,"visual":false,"arch":false,"archPending":false,"analytics":false,"tests":false},"deps":[],"blockedBy":[],"dataRefs":[],"analyticsRef":"","meta":[{"k":"ID","v":"S-003-001"},{"k":"Project","v":"morbius"},{"k":"Epic","v":"E-003"},{"k":"Stage","v":"Ready"},{"k":"Status","v":"Done"},{"k":"Priority","v":"P1"},{"k":"Version","v":"1.0"},{"k":"Created","v":"2026-04-21"},{"k":"Updated","v":"2026-04-21"}],"searchText":"Maestro Tab — Flow Browser + Human-Readable Step View Story As a developer, I want a Maestro tab that lists all YAML flows from the configured Android and iOS paths, shows a human-readable breakdown of each flow's steps, and highlights fragile selectors — so anyone on the team can understand what a test does without reading raw YAML. Acceptance Criteria Given Android and iOS flow paths are configured When I open the Maestro tab Then all YAML files are listed as a file browser, switchable between Android and iOS Given I click a flow When it opens Then I see: human-readable step list (tapOn → \"Tap on X\", inputText → \"Enter: Y\"), the raw YAML with syntax highlighting, and any selector warnings (pixel taps, hardcoded sleeps >3s, index selectors) Given a flow references another flow via runFlow When displayed Then the referenced flow is shown as a linked step Change Log Date Version Author Change ------ --------- -------- -------- 2026-04-21 1.0 PM Agent Created via reverse-engineer","dsSpecs":[],"timeLog":null,"snapshots":[]},{"id":"S-003-002","epicId":"E-003","title":"S-003-002","status":"Done","stage":"Ready","priority":"P1","filePath":"projects/morbius/epics/E-003-test-execution-maestro/S-003-002-run-flow-from-dashboard.md","testPlanPath":"","readiness":{"flow":false,"ds":false,"visual":false,"arch":false,"archPending":false,"analytics":false,"tests":false},"deps":[],"blockedBy":[],"dataRefs":[],"analyticsRef":"","meta":[{"k":"ID","v":"S-003-002"},{"k":"Project","v":"morbius"},{"k":"Epic","v":"E-003"},{"k":"Stage","v":"Ready"},{"k":"Status","v":"Done"},{"k":"Priority","v":"P1"},{"k":"Version","v":"1.0"},{"k":"Created","v":"2026-04-21"},{"k":"Updated","v":"2026-04-21"}],"searchText":"Run Individual Flow from Dashboard Story As a developer, I want to click \"Run\" on any Maestro flow from the dashboard and have it execute on the connected device, so I can trigger test runs without switching to a terminal. Acceptance Criteria Given a device is connected and Maestro CLI is installed When I click Run on a flow Then POST /api/flow/run spawns the Maestro process and a spinner with elapsed time appears on the card Given the flow completes When Maestro exits Then the card shows pass (green) or fail (red) badge and the test case status is updated in the markdown file Given the flow fails When the failure is detected Then a bug ticket is automatically created with the failure reason and screenshot path Change Log Date Version Author Change ------ --------- -------- -------- 2026-04-21 1.0 PM Agent Created via reverse-engineer","dsSpecs":[],"timeLog":null,"snapshots":[]},{"id":"S-003-003","epicId":"E-003","title":"S-003-003","status":"Done","stage":"Ready","priority":"P1","filePath":"projects/morbius/epics/E-003-test-execution-maestro/S-003-003-live-output-streaming.md","testPlanPath":"","readiness":{"flow":false,"ds":false,"visual":false,"arch":false,"archPending":false,"analytics":false,"tests":false},"deps":[],"blockedBy":[],"dataRefs":[],"analyticsRef":"","meta":[{"k":"ID","v":"S-003-003"},{"k":"Project","v":"morbius"},{"k":"Epic","v":"E-003"},{"k":"Stage","v":"Ready"},{"k":"Status","v":"Done"},{"k":"Priority","v":"P1"},{"k":"Version","v":"1.0"},{"k":"Created","v":"2026-04-21"},{"k":"Updated","v":"2026-04-21"}],"searchText":"Live Output Streaming via WebSocket Story As a developer, I want to watch Maestro test output stream live in the dashboard as the flow executes, so I can see which steps pass or fail in real time without switching to a terminal. Acceptance Criteria Given a flow run is started When Maestro executes each step Then the output streams to the browser via WebSocket ( /ws/run-stream ) with each step's status appearing as it completes Given multiple users have the dashboard open When a run is in progress Then all connected clients see the live output simultaneously Given I close the browser tab while a run is active When the WebSocket disconnects Then the Maestro process continues running (not killed on disconnect) Change Log Date Version Author Change ------ --------- -------- -------- 2026-04-21 1.0 PM Agent Created v Specs":[],"timeLog":null,"snapshots":[]},{"id":"S-004-005","epicId":"E-004","title":"S-004-005","status":"Done","stage":"Ready","priority":"P2","filePath":"projects/morbius/epics/E-004-bug-management/S-004-005-selector-analysis.md","testPlanPath":"","readiness":{"flow":false,"ds":false,"visual":false,"arch":false,"archPending":false,"analytics":false,"tests":false},"deps":[],"blockedBy":[],"dataRefs":[],"analyticsRef":"","meta":[{"k":"ID","v":"S-004-005"},{"k":"Project","v":"morbius"},{"k":"Epic","v":"E-004"},{"k":"Stage","v":"Ready"},{"k":"Status","v":"Done"},{"k":"Priority","v":"P2"},{"k":"Version","v":"1.0"},{"k":"Created","v":"2026-04-21"},{"k":"Updated","v":"2026-04-21"}],"searchText":"Selector Analysis — Fragile YAML Pattern Detection Story As a developer, I want Morbius to scan Maestro YAML for fragile selector patterns and surface warnings on bug cards and the flow viewer, so the team knows which tests are likely to break due to brittle automation before they do. Acceptance Criteria Given a YAML flow uses a pixel-based point{} tap When the flow is displayed or a bug is created from it Then a \"fragile selector\" warning is shown: \"pixel-based tap — breaks if layout changes\" Given a YAML flow has a hardcoded sleep longer than 3 seconds When analysed Then a warning is shown: \"hardcoded sleep >3s — flakiness risk\" Given a YAML flow uses an index selector ( index: 2 ) When analysed Then a warning is shown: \"index selector — fragile if list order changes\" Given a flow has no fragile patterns When analysed Then no warnings are shown Change Log Date Version Author Change ------ --------- -------- -------- 2026-04-21 1.0 PM Agent Created via reverse-engineer","dsSpecs":[],"timeLog":null,"snapshots":[]},{"id":"S-004-006","epicId":"E-004","title":"S-004-006","status":"Done","stage":"Ready","priority":"P1","filePath":"projects/morbius/epics/E-004-bug-management/S-004-006-jira-sync.md","testPlanPath":"","readiness":{"flow":false,"ds":false,"visual":false,"arch":fa laude Code Chat Integration (WebSocket Bridge) Story As a developer, I want a chat drawer in the dashboard that connects directly to the local Claude Code CLI, so any team member can ask the Morbius agent to run tests, write flows, or investigate failures from the browser. Acceptance Criteria Given Claude Code CLI is installed locally When I open the Chat drawer Then a WebSocket connects to /ws/chat and the input is ready Given I send a message When the server processes it Then it spawns claude --model claude-sonnet-4-6 \"<message>\" and streams stdout to the browser in real time (type: chunk/info/done/error) Given I close the chat drawer while a response is streaming When the WebSocket disconnects Then the Claude process is killed (120s timeout also applies) Given Claude Code CLI is not installed When I try to send a message Then an error message explains that Claude Code is required and how to install it Change Log Date Version Author Change ------ --------- -------- -------- 2026-04-21 1.0 PM Agent Created via reverse-engineer","dsSpecs":[],"timeLog":null,"snapshots":[]},{"id":"S-006-004","epicId":"E-006","title":"S-006-004","status":"Done","stage":"Ready","priority":"P1","filePath":"projects/morbius/epics/E-006-appmap-agent-skills/S-006-004-settings-page.md","testPlanPath":"","readiness":{"flow":false,"ds":false,"visual":false,"arch":false,"archPending":false,"analytics":false,"tests":false},"deps":[],"blockedBy":[],"dataRefs":[],"analyticsRef":"","meta":[{"k":"ID","v":"S-006-004"},{"k":"Project","v":"morbius"},{"k":"Epic","v":"E-006"},{"k":"Stage","v":"Ready"},{"k":"Status","v":"Done"},{"k":"Priority","v":"P1"},{"k":"Version","v":"1.0"},{"k":"Created","v":"2026-04-21"},{"k":"Updated","v":"2026-04-21"}],"searchText":"Settings Page (Project Config, Devices, Integrations, Appearance) Story As a QA lead, I want a Settings tab where I can configure the active project's Maestro paths, device list, Jira credentials, and appearance preferences — all from the browser — fullName":"Fragment: Inline Status Update","dsFilePath":"","dsStage":""},{"prefix":"Screen","name":"Test Detail Drawer","fullName":"Screen: Test Detail Drawer","dsFilePath":"","dsStage":""},{"prefix":"Overlay","name":"Global Search","fullName":"Overlay: Global Search","dsFilePath":"","dsStage":""},{"prefix":"Fragment","name":"Device Results Table","fullName":"Fragment: Device Results Table","dsFilePath":"","dsStage":""}]}],"releases":[{"id":"R-001","name":"phases 1 2 5 shipped","filePath":"projects/morbius/releases/R-001-phases-1-2-5-shipped.md","storyIds":["S-001-001","S-001-002","S-001-003","S-001-004","S-002-001","S-002-002","S-002-003","S-002-004","S-002-005","S-002-006","S-003-001","S-003-002","S-003-003","S-003-004","S-003-005","S-004-001","S-004-002","S-004-003","S-004-004","S-004-005","S-004-006","S-005-001","S-005-002","S-005-003","S-005-004","S-006-001","S-006-002","S-006-003","S-006-004","S-006-005"],"atPaths":[],"trPath":"","trStatus":"","stage":"Ready","status":"Shipped","releaseType":"","meta":[{"k":"ID","v":"R-001"},{"k":"Project","v":"morbius"},{"k":"Stage","v":"Ready"},{"k":"Status","v":"Shipped"},{"k":"Priority","v":"P0"},{"k":"Version","v":"1.0"},{"k":"Created","v":"2026-04-21"},{"k":"Updated","v":"2026-04-21"}]}],"atTasks":[],"dataFiles":[],"schemaFiles":[],"overview":{"brief":{"version":"1.0","name":"Morbius","problem":"QA teams building mobile apps have no unified, AI-native workspace that connects test planning, automated test execution, bug tracking, and AI-assisted test creation. They stitch together Excel test plans, Maestro YAML files, Jira tickets, and local CLI tools — with no single view of what's passing, what's failing, and what needs attention. Morbius gives every team member — QA leads, developers, and PMs — a browser-based dashboard backed by an AI agent that writes tests, runs them on real devices, and creates detailed bug reports automatically.","vision":"","northStar":"","brandTone":"","goals":[["Ship BrowserStack cloud execution","All 14 flows runnable on real cloud devices from dashboard","Phase 3 complete"],["Enable team collaboration","Multi-user access to shared test board and bug tracker","Phase 7 launch"],["Reduce test maintenance overhead","Self-healing fix rate on selector-change failures","70% auto-resolved by Phase 6"]],"filePath":"projects/morbius/brief.md","projectType":null},"arch":{"version":"1.0","stack":[],"filePath":"projects/morbius/arch.md"},"design":{"version":"1.0","tokens":[],"fontRamp":[],"keyRules":[],"principles":[],"uxPatterns":[],"framework":[],"brandRef":"","designRefs":[],"filePath":"projects/morbius/design.md","tokensFilePath":"","fallbackSections":[{"title":"Design Philosophy","content":"Morbius is a **developer-first tool**. The design is deliberately monochrome — the only color in the UI is status. Pass is green, fail is red, flaky is amber. Everything else is black, white, and grey. This means test results stand out immediately on any screen, in any context, without visual noise competing for attention.\n\n**Three rules:**\n1. Color = status only. Never use color for decoration.\n2. Typography does the heavy lifting. Weight and size create hierarchy, not color.\n3. Dense information over empty space. QA boards have a lot of data — pack it in legibly.\n\n---"},{"title":"Color System","content":"Colors are defined in OKLCh (perceptual color space) as CSS variables, with full dark and light themes.\n\n### Dark Theme (default)\n\n| Token | OKLCh | Approx Hex | Use |\n|-------|-------|-----------|-----|\n| `--bg` | oklch(0.16 0.01 270) | `#0a0a0a` | Page background |\n| `--bg-elev` | oklch(0.19 0.012 270) | `#141414` | Cards, panels |\n| `--bg-elev-2` | oklch(0.22 0.014 270) | `#1e1e1e` | Nested surfaces |\n| `--bg-hover` | oklch(0.24 0.016 270) | `#282828` | Hover states |\n| `--bg-sunken` | oklch(0.13 0.008 270) | `#060606` | Inputs, code blocks |\n| `--border` | oklch(0.28 0.012 270) | `#363636` | Subtle dividers |\n| `--border-strong` | oklch(0.36 0.014 270) | `#4d4d4d` | Active/focus borders |\n| `--fg` | oklch(0.98 0.002 270) | `#fafafa` | Primary text |\n| `--fg-muted` | oklch(0.75 0.008 270) | `#c0c0c0` | Secondary text |\n| `--fg-dim` | oklch(0.56 0.01 270) | `#8f8f8f` | Tertiary/placeholder |\n| `--fg-faint` | oklch(0.42 0.01 270) | `#6a6a6a` | Disabled/hint |\n\n### Light Theme"},{"title":"Typography","content":"| Role | Font | Weights | Usage |\n|------|------|---------|-------|\n| UI / Body | **Inter** | 400, 500, 600, 700 | All labels, body text, buttons, nav |\n| Code / YAML | **JetBrains Mono** | 400, 500, 600 | YAML viewer, code blocks, IDs, paths |\n\nSource: Google Fonts (preconnect + stylesheet in `<head>`).\n\n**Scale:**\n- `11px / 500` — metadata, timestamps, badges\n- `12px / 400` — secondary labels, table cells\n- `13px / 500` — card titles, field labels\n- `14px / 400` — body text, notes\n- `16px / 600` — section headings\n- `20px / 700` — tab headings, metric values\n- `32px+ / 700` — hero numbers (overall pass %)\n\n---"},{"title":"Layout + Navigation","content":"**Sidebar** (desktop): Fixed left sidebar with project switcher at top, 7 tab icons + labels, theme toggle at bottom. Width: ~200px.\n\n**Top nav** (mobile): Collapses sidebar to icon-only top bar with number shortcut labels.\n\n**Keyboard shortcuts:**\n| Key | Action |\n|-----|--------|\n| `1` | Dashboard tab |\n| `2` | Test Cases tab |\n| `3` | Bugs tab |\n| `4` | Devices tab |\n| `5` | Runs tab |\n| `6` | Maestro tab |\n| `7` | Settings tab |\n| `⌘K` or `/` | Global search (fuse.js) |\n| `Esc` | Close any open panel |\n\n---"},{"title":"Component Patterns","content":"### Status Pills\nRounded badges showing test/bug status. Color-coded by `--ok` / `--fail` / `--warn`. Click to update inline.\n\n```\n[ ● Pass ]   [ ● Fail ]   [ ◑ Flaky ]   [ — Not Run ]   [ ⟳ In Progress ]\n```\n\n### Kanban Columns\nCards grouped by category (Test Cases) or status (Bugs). Column headers show count. Drag-to-reorder within category. Empty columns auto-hide when filters are active.\n\n### Detail Drawer\nSlides in from the right when a card is clicked. Shows: full title, linked IDs, all fields, screenshot (if bug), step list (if test), changelog table, notes textarea (auto-save). Has a chat toggle to open the Claude Code pane.\n\n### Health Bars\nPer-category horizontal bars: green segment (pass) + red segment (fail) + amber segment (flaky) + grey (not-run). Percentage label on right.\n\n### Metric Cards\nSingle large number with label and trend direction. Used on Dashboard for: overall pass %, open bugs, total tests, coverage %.\n\n### YAML Viewer"}]},"analytics":null,"testPlans":{"storyCount":0,"releaseCount":0,"storyPlans":[],"releasePlans":[]},"testStrategy":null,"intake":null,"brainstorm":null,"whiteboards":[],"captureHistory":{"intake":[],"brainstorm":[]},"recentChanges":[{"filePath":"../Morbius/requirements/requirements/brief.md","date":"2026-04-21","id":"","docType":"brief","title":"brief","changeType":"added"},{"filePath":"../Morbius/requirements/requirements/epics/E-001-device-cloud-browserstack/E-001.md","date":"2026-04-21","id":"E-001","docType":"epic","title":"E-001","changeType":"added"},{"filePath":"../Morbius/requirements/requirements/epics/E-002-settings-integrations-hub/E-002.md","date":"2026-04-21","id":"E-002","docType":"epic","title":"E-002","changeType":"added"},{"filePath":"../Morbius/requirements/requirements/epics/E-003-multi-framework-support/E-003.md","date":"2026-04-21","id":"E-003","docType":"epic","title":"E-003","changeType":"added"},{"filePath":"../Morbius/requirements/requirements/epics/E-004-claude-api-integration/E-004.md","date":"2026-04-21","id":"E-004","docType":"epic","title":"E-004","changeType":"added"},{"filePath":"../Morbius/requirements/requirements/epics/E-005-saas-platform/E-005.md","date":"2026-04-21","id":"E-005","docType":"epic","title":"E-005","changeType":"added"},{"filePath":"../Morbius/requirements/requirements/epics/E-006-advanced-features/E-006.md","date":"202 (function(){
  var _fetch=window.fetch;
  window.fetch=function(url,opts){
    if(typeof url==='string'){
      // Intercept /api/file requests
      if(url.indexOf('/api/file?')!==-1){
        var m=url.match(/[?&]path=([^&]*)/);
        if(m){
          var p=decodeURIComponent(m[1]);
          var content=window.__FILE_MAP__[p];
          if(content!==undefined)return Promise.resolve(new Response(content,{status:200,headers:{'Content-Type':'text/plain'}}));
        }
        return Promise.resolve(new Response('Not found',{status:404}));
      }
      // Intercept /api/ds-screenshots (DS sibling images baked into __DS_SCREENSHOTS__)
      if(url.indexOf('/api/ds-screenshots')!==-1){
        var dm=url.match(/[?&]screen=([^&]*)/);
        var dsKey=dm?decodeURIComponent(dm[1]):'';
        var dsMap=window.__DS_SCREENSHOTS__||{};
        var dsImgs=dsMap[dsKey]||[];
        return Promise.resolve(new Response(JSON.stringify({images:dsImgs}),{status:200,headers:{'Content-Type':'application/json'}}));
      }
      // Intercept /api/assets-list requests (ScreenshotsBlock, GalleryModal)
      if(url.indexOf('/api/assets-list')!==-1){
        var fm=url.match(/[?&]folder=([^&]*)/);
        var qf=fm?decodeURIComponent(fm[1]):'current-state';
        var al=window.__ASSETS_LIST__||{};
        // Direct match first (e.g. "current-state/DS-pin-login")
        if(al[qf]){
          return Promise.resolve(new Response(JSON.stringify({images:al[qf]}),{status:200,headers:{'Content-Type':'application/json'}}));
        }
        // Prefix match — merge all sub-folders (e.g. "current-state" includes "current-state/DS-pin-login/...")
        var merged=[];
        var keys=Object.keys(al);
        for(var ki=0;ki<keys.length;ki++){
          if(keys[ki]===qf||keys[ki].indexOf(qf+'/')===0) merged=merged.concat(al[keys[ki]]);
        }
        merged.sort(function(a,b){return b.modified.localeCompare(a.modified);});
        return Promise.resolve(new Response(JSON.stringify({images:merged}),{status:200,headers:{'Content-Type':'application/json'}}));
      }
      // Block other /api/ calls in static mode
      if(url.indexOf('/api/')!==-1)return Promise.resolve(new Response('{}',{status:200,headers:{'Content-Type':'application/json'}}));
    }
    return _fetch.apply(this,arguments);
  };
})();

<script type="module">
import{createElement as h,useState,useEffect,useRef,useMemo}from'https://esm.sh/react@18';
import{createRoot}from'https://esm.sh/react-dom@18/client';
import{marked}from'https://esm.sh/marked@12';
import mermaid from'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';

mermaid.initialize({
  startOnLoad:false,
  theme:'base',
  themeVariables:{
    primaryColor:'#292524',
    primaryTextColor:'#FAFAF9',
    primaryBorderColor:'#44403C',
    lineColor:'#78716C',
    secondaryColor:'#1C1917',
    tertiaryColor:'#0C0A09',
    mainBkg:'#1C1917',

    titleColor:'#CCFF00',
    edgeLabelBackground:'#1C1917',
    fontFamily:"'Space Mono','Courier New',monospace",
    fontSize:'11px',
  }
});

const STATUS_ORDER=['Backlog','In Progress','QA','In Review','Done'];
const STATUS_CLASS={Backlog:'backlog','In Progress':'inprogress',QA:'qa','In Review':'inreview',Done:'done'};
const PRIORITY_CLASS={P0:'badge-p0',P1:'badge-p1',P2:'badge-p2'};

function stageDot(stage){
  const cls=stage==='Ready'?'ready':stage==='QA'?'qa':stage==='Shipped'?'shipped':'draft';
  return h('span',{className:'stage-dot '+cls,title:stage});
}
function statusBadge(status){
  return h('span',{className:'badge badge-'+(STATUS_CLASS[status]||'backlog')},status);
}

function ri(icon,active){
  return h('i',{className:'ph ph-'+icon+' ri '+(active?'on':'')});
}

/* ── API Testing Helpers (cURL / OpenAPI / Postman / Swagger UI) ── */

function _findDataFile(dataFiles,id){return (dataFiles||[]).find(function(d){return d.id===id;});}

function _resolveEnv(str,env){
  if(!str||!env)return str;
  var DLR=String.fromCharCode(36);
  // Resolve DLR+{VAR} and {VAR} patterns using env vars
  return str.replace(new RegExp('\\'+DLR+'\\{([A-Za-z_][A-Za-z0-9_]*)\\}','g'),function(_,k){return env[k]||(DLR+'{'+k+'}');})
            .replace(/\{([A-Z_][A-Z0-9_]*)\}/g,function(_,k){return env[k]||('{'+k+'}');});
}

function _buildCurl(ep,src,env){
  var NL=' \\'+String.fromCharCode(10)+'  ';
  var DLR=String.fromCharCode(36);
  var rawBase=(src&&src['Base URL']||'').replace(/`/g,'');
  var localUrl=src&&src['Local URL']||'';
  var base=localUrl?localUrl:_resolveEnv(rawBase,env);
  base=base.replace(/\{([A-Z_][A-Z0-9_]*)\}/g,function(_,k){return DLR+'{'+k+'}';});
  var auth=src&&src['Auth']||'';
  var cred=src&&src['Credentials']||'';
  var credVal=env&&env[cred]||'';
  var cmd='curl -X '+ep.method+' "'+base+ep.path+'"';
  if(auth.indexOf('Bearer')>=0) cmd+=NL+'-H "Authorization: Bearer '+(credVal||DLR+'{'+(cred||'API_TOKEN')+'}')+'"';
  else if(auth.indexOf('Rest-User-Token')>=0) cmd+=NL+'-H "Rest-User-Token: '+(credVal||DLR+'{'+(cred||'REST_USER_TOKEN')+'}')+'"';
  else if(/api.?key|token/i.test(auth)) cmd+=NL+'-H "X-Api-Key: '+(credVal||DLR+'{'+(cred||'API_KEY')+'}')+'"';
  if(['POST','PUT','PATCH'].indexOf(ep.method)>=0) cmd+=NL+'-H "Content-Type: application/json"'+NL+"-d '{}'";
  return cmd;
}

function _groupByTag(endpoints){
  var groups={};
  (endpoints||[]).forEach(function(ep){
    var t=ep.tag||'Endpoints';
    if(!groups[t])groups[t]=[];
    groups[t].push(ep);
  });
  return groups;
}

function _genOpenAPI(df,env){
  var src=df.sourceTable||{};
  var rawUrl=(src['Base URL']||'').replace(/`/g,'');
  var localUrl=src['Local URL']||'';
  var baseUrl=localUrl||_resolveEnv(rawUrl,env)||rawUrl;
  var auth=src['Auth']||'';
  var cred=src['Credentials']||'';
  var paths={};
  var tags={};
  (df.endpoints||[]).forEach(function(ep){
    var p=ep.path;
    if(!paths[p])paths[p]={};
    var tag=ep.tag||'default';
    tags[tag]=true;
    paths[p][ep.method.toLowerCase()]={summary:ep.description||ep.path,operationId:ep.method.toLowerCase()+'_'+ep.path.replace(/[^a-zA-Z0-9]/g,'_'),tags:[tag],responses:{'200':{description:'Successful response'}}};
  });
  var secSchemes={};
  var secRefs=[];
  if(auth.indexOf('Bearer')>=0){secSchemes.bearerAuth={type:'http',scheme:'bearer'};secRefs.push({bearerAuth:[]});}
  else if(auth.indexOf('Rest-User-Token')>=0){secSchemes.apiKeyAuth={type:'apiKey','in':'header',name:'Rest-User-Token'};secRefs.push({apiKeyAuth:[]});}
  else if(/api.?key|token/i.test(auth)){secSchemes.apiKeyAuth={type:'apiKey','in':'header',name:cred||'X-Api-Key'};secRefs.push({apiKeyAuth:[]});}
  return {openapi:'3.0.3',info:{title:df.title,version:'1.0.0',description:'Generated from '+df.id},servers:[{url:baseUrl||'https://api.example.com',description:src['Provider']||'API Server'}],paths:paths,components:{securitySchemes:secSchemes},security:secRefs,tags:Object.keys(tags).map(function(t){return{name:t};})};
}

function _genPostman(df,env){
  var src=df.sourceTable||{};
  var rawUrl=(src['Base URL']||'').replace(/`/g,'');
  var localUrl=src['Local URL']||'';
  var baseUrl=localUrl||_resolveEnv(rawUrl,env)||rawUrl;
  var auth=src['Auth']||'';
  var cred=src['Credentials']||'';
  var grouped=_groupByTag(df.endpoints);
  var items=Object.keys(grouped).map(function(tag){
    return{name:tag,item:grouped[tag].map(function(ep){
      var headers=[];
      if(auth.indexOf('Bearer')>=0) headers.push({key:'Authorization',value:'Bearer {{'+( cred||'API_TOKEN')+'}}'});
      else if(auth.indexOf('Rest-User-Token')>=0) headers.push({key:'Rest-User-Token',value:'{{'+(cred||'REST_USER_TOKEN')+'}}'});
      else if(/api.?key|token/i.test(auth)) headers.push({key:'X-Api-Key',value:'{{'+(cred||'API_KEY')+'}}'});
      if(['POST','PUT','PATCH'].indexOf(ep.method)>=0) headers.push({key:'Content-Type',value:'application/json'});
      var req={method:ep.method,header:headers,url:{raw:'{{baseUrl}}'+ep.path,host:['{{baseUrl}}'],path:ep.path.split('/').filter(Boolean)}};
      if(['POST','PUT','PATCH'].indexOf(ep.method)>=0) req.body={mode:'raw',raw:'{}'};
      return{name:ep.description||ep.method+' '+ep.path,request:req};
    })};
  });
  var pmAuth={};
  if(auth.indexOf('Bearer')>=0) pmAuth={type:'bearer',bearer:[{key:'token',value:'{{'+(cred||'API_TOKEN')+'}}'}]};
  else if(auth.indexOf('Rest-User-Token')>=0) pmAuth={type:'apikey',apikey:[{key:'key',value:'Rest-User-Token'},{key:'value',value:'{{'+(cred||'REST_USER_TOKEN')+'}}'}]};
  return{info:{name:df.title,description:'Generated from '+df.id,schema:'https://schema.getpostman.com/json/collection/v2.1.0/collection.json'},auth:pmAuth,variable:[{key:'baseUrl',value:baseUrl||'https://api.example.com'},{key:cred||'API_TOKEN',value:''}],item:items};
}

function _downloadJSON(obj,filename){
  var blob=new Blob([JSON.stringify(obj,null,2)],{type:'application/json'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=filename;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
}

/* CurlModal component */
function CurlModal(props){
  var df=props.dataFile;
  var env=props.envVars||{};
  if(!df)return null;
  var grouped=_groupByTag(df.endpoints);
  var _s=useState(null),copiedIdx=_s[0],setCopiedIdx=_s[1];
  function doCopy(ep,idx){
    var cmd=_buildCurl(ep,df.sourceTable,env);
    navigator.clipboard.writeText(cmd).then(function(){setCopiedIdx(idx);setTimeout(function(){setCopiedIdx(null);},1500);});
  }
  var flatIdx=0;
  return h('div',{className:'api-modal-overlay',onClick:props.onClose},
    h('div',{className:'api-modal',onClick:function(e){e.stopPropagation();}},
      h('div',{className:'api-modal-header'},
        h('h3',null,df.title+' — cURL Commands'),
        Object.keys(env).length>0&&h('div',{style:{fontSize:10,color:'#34D399',marginTop:2}},'env vars resolved from .env'),
        Object.keys(env).length===0&&h('div',{style:{fontSize:10,color:'#78716C',marginTop:2}},'env var placeholders — add .env to linked repo to resolve'),
        h('button',{className:'api-modal-close',onClick:props.onClose},'✕')
      ),
      h('div',{className:'api-modal-body'},
        Object.keys(grouped).map(function(tag){
          return h('div',{key:tag},
            Object.keys(grouped).length>1&&h('div',{className:'api-tag-header'},tag),
            grouped[tag].map(function(ep){
              var myIdx=flatIdx++;

function applyMermaid(bodyRef,setFullscreenSvg){

    if(el.children.length)return;
    if(el.classList.contains('language-mermaid'))return;

  });
  const blocks=bodyRef.current.querySelectorAll('code.language-mermaid');
  if(!blocks.length)return;
  blocks.forEach(code=>{
    const pre=code.parentElement;if(!pre)return;
    const div=document.createElement('div');div.className='mermaid';div.textContent=code.textContent||'';
    pre.replaceWith(div);
  });
  mermaid.run({nodes:bodyRef.current.querySelectorAll('.mermaid')}).then(()=>{
    bodyRef.current&&bodyRef.current.querySelectorAll('.mermaid').forEach(div=>{

    });
  });
}

// --- Doc type detection ---
var DOC_TYPE_PATTERNS=[
  {pattern:/\/DS-[^/]+\.md$/,type:'ds'}
  // Future: story, flow, epic, release, at, ae, test, data, brief, arch

function detectDocType(filePath){
  if(!filePath)return 'unknown';
  for(var i=0;i<DOC_TYPE_PATTERNS.length;i++){if(DOC_TYPE_PATTERNS[i].pattern.test(filePath))return DOC_TYPE_PATTERNS[i].type;}
  return 'unknown';
}

// --- MetaStrip: generic for all doc types ---
// Consistent field ordering — fields not in this list appear at the end in document order.
var META_FIELD_ORDER=['Stage','Status','Priority','Epic','Release','Flow','Screen','Stories','Modes','Components'];
var HIDDEN_META_KEYS={'Updated':1,'Created':1,'Project':1,'ID':1,'Version':1,'Screenshots':1};

var META_TRANSFORMS={Components:function(v){return v.split(',').length+' components';}};

// --- Recipes: ordered list of block names per doc type ---
var DOC_RECIPES={
  ds:['MetaStrip','Screenshots','BodyMarkdown','ChangeLog'],
  unknown:['MetaStrip','BodyMarkdown']

// --- Section parser ---
function stripFrontmatter(content){
  if(!content)return'';
  // Find first ## heading — marks start of body content
  var bodyIdx=content.search(/\n## /);
  if(bodyIdx!==-1)return content.slice(bodyIdx+1);
  // No ## heading found — look for --- separator as the frontmatter boundary
  var topSep=content.indexOf('\n---\n');
  if(topSep>-1&&topSep<500)return content.slice(topSep+5);
  return content;
}
function parseSections(content){
  if(!content)return[];
  var body=stripFrontmatter(content);
  if(!body.trim())return[{heading:null,content:content}];
  var parts=body.split(/^(?=## )/m);
  return parts.map(function(part){
    var match=part.match(/^## (.+)/);
    return{heading:match?match[1].trim():null,content:part};
  });
}

// --- Reference ID linkification ---
function linkifyRefs(html){
  // Cross-project refs first: slug/S-NNN-NNN, slug/E-NNN, slug/DATA-NNN etc.
  var xRefRe=/\b([a-z][a-z0-9-]+)\/(S-\d{3}-\d{3}|E-\d{3}|UF-\d{3}|R-\d{3}|T-\d{3}-\d{3}|AT-\d{3}-\d{3}|AE-\d{3}|DATA-\d{3}|DS-[A-Za-z0-9-]+)\b/g;
  html=html.replace(xRefRe,function(match,slug,refId){
    return '<a class="ref-link xref" data-ref-id="'+refId+'" data-ref-project="'+slug+'" title="'+slug+' → '+refId+'"><span class="xref-badge">'+slug+'</span>/'+refId+'</a>';
  });
  // Same-project refs
  var refRe=/\b(S-\d{3}-\d{3}|E-\d{3}|UF-\d{3}|R-\d{3}|T-\d{3}-\d{3}|AT-\d{3}-\d{3}|AE-\d{3}|DATA-\d{3}|DS-[A-Za-z0-9-]+)\b/g;
  return html.replace(refRe,function(match){
    return '<a class="ref-link" data-ref-id="'+match+'">'+match+'</a>';
  });
}

// --- Image filename linkification ---
function linkifyImageRefs(html,assetIndex,project){
  if(!assetIndex||!project)return html;
  var imgExt='png|jpe?g|gif|webp|svg';
  // Pass 1: code-wrapped image refs — <code>design-assets/.../foo.png</code> or <code>assets/.../foo.png</code> or <code>foo.png</code>
  var codeRe=new RegExp('<code>((?:(?:design-)?assets/[^<]+/)?([a-zA-Z0-9_][a-zA-Z0-9_.()-]*\\.(?:'+imgExt+')))</code>','gi');
  html=html.replace(codeRe,function(m,full,fname){
    var path=full.indexOf('design-assets/')===0||full.indexOf('assets/')===0?full:(assetIndex[fname]||null);
    if(!path)return m;
    return '<code><a class="img-ref-link" data-asset-path="'+path+'" title="Click to view">'+fname+'</a></code>';
  });
  // Pass 2: plain text design-assets/ or assets/ refs not already inside an anchor or img tag
  var pathRe=new RegExp('(?<![="\'/])((?:design-)?assets/[^\\s<"]+/([a-zA-Z0-9_][a-zA-Z0-9_.()-]*\\.(?:'+imgExt+')))','gi');
  html=html.replace(pathRe,function(m,full,fname){
    return '<a class="img-ref-link" data-asset-path="'+full+'" title="Click to view">'+fname+'</a>';
  });
  return html;
}

function resolveRefNav(refId,data){
  var story=data.stories.find(function(s){return s.id===refId;});
  if(story)return{type:'story',id:story.id,title:story.title,filePath:story.filePath,epicId:story.epicId};
  var epic=data.epics.find(function(e){return e.id===refId;});
  if(epic)return{type:'story',id:epic.id,title:epic.name,filePath:epic.filePath,epicId:null};
  var flow=data.flows.find(function(f){return f.id===refId;});
  if(flow)return{type:'flow',id:flow.id,title:flow.name,filePath:flow.filePath,epicId:null};
  var rel=data.releases.find(function(r){return r.id===refId;});
  if(rel)return{type:'story',id:rel.id,title:rel.name,filePath:rel.filePath,epicId:null};
  var at=(data.atTasks||[]).find(function(t){return t.id===refId;});
  if(at)return{type:'at',id:at.id,title:at.title,filePath:at.filePath,epicId:at.releaseId};
  var df=(data.dataFiles||[]).find(function(d){return d.id===refId;});
  if(df)return{type:'data',id:df.id,title:df.title,filePath:df.filePath,epicId:null};
  // DS specs — search flow screens
  for(var fi=0;fi<data.flows.length;fi++){

function metaColor(key,val){

    parts.push(h('a',{className:'ref-link','data-ref-id':m[0],key:m.index,href:'#'},m[0]));
    last=m.index+m[0].length;

// --- DocRenderer component ---
function DocRenderer(props){

      .then(function(r){return r.ok?r.text():Promise.reject(r.status);})
      .then(function(t){setContent(t);setLoading(false);})
      .catch(function(err){if(err&&err.name==='AbortError')return;setContent('_Error loading file._');setLoading(false);});
    return function(){ctrl.abort();};

        window.location.href=url;

      if(nav&&props.onNavigate)props.onNavigate(nav);

const AVATAR_FILES=['avatarman.png','avatarman2.png','avatarman3.png','avatarwoman.jpg','avatarwoman2.jpeg','avatarwoman3.png'];

function storyHash(id){let h=0;for(let i=0;i<id.length;i++)h=(h*31+id.charCodeAt(i))>>>0;return h;}
function nextPmCmd(story,project){
  if(!story)return null;
  const r=story.readiness||{};
  if(!story.testPlanPath)return 'pm qa '+project+' --story '+story.id;
  if(!r.analytics&&story.analyticsRef)return 'pm analytics '+project+' --epic E-'+story.id.match(/S-(d+)/)?.[1];
  if(!r.ds)return 'pm design '+project+' --annotate-screens';
  if(!r.flow)return null; // flows tab handles this
  return null;
}
function AssigneeIcon({stage,isDone,storyId,story,project}){
  if(isDone)return null;
  const isInReview=story?.status==='In Review';
  const isAgent=stage==='Ready'&&!isInReview;
  if(isAgent)return h('div',{className:'assignee-robot',title:'Coding agent'},
    h('i',{className:'ph ph-robot'})
  );
  const avatar=AVATAR_FILES[storyHash(storyId||'')%AVATAR_FILES.length];
  const src=_githubHandle
    ?'https://github.com/'+_githubHandle+'.png?size=52'
    :'./assets/avatars/'+avatar;
  const cmd=nextPmCmd(story,project);
  function handleClick(e){
    e.stopPropagation();
    if(cmd){
      navigator.clipboard.writeText(cmd);
      var el=e.currentTarget;
      el.classList.add('copied');
      setTimeout(function(){el.classList.remove('copied');},1200);
    }
  }
  return h('div',{className:'assignee-human-wrap'+(cmd?' has-cmd':''),title:cmd?'Click to copy: '+cmd:'PM review needed',onClick:cmd?handleClick:undefined},
    h('img',{src,className:'assignee-human',onError:function(e){e.target.style.display='none';}})
  );
}

function PipelineBoard({data,onNavigate,selectedRelease}){
  const{stories,epics,releases,atTasks,project}=data;
  const[expandedShipped,setExpandedShipped]=useState(()=>new Set());
  const[dragStory,setDragStory]=useState(null);
  const[dragFrom,setDragFrom]=useState(null);
  const[dropTarget,setDropTarget]=useState(null);
  const[showNewRelease,setShowNewRelease]=useState(false);
  const[newRelName,setNewRelName]=useState('');
  const[moving,setMoving]=useState(false);
  const newRelInputRef=useRef(null);
  const isSingleRelease=selectedRelease&&selectedRelease!=='all';
  const visibleReleases=isSingleRelease?releases.filter(r=>r.id===selectedRelease):releases;
  const shippedReleases=visibleReleases.filter(r=>r.status==='Shipped');
  const activeReleases=visibleReleases.filter(r=>r.status!=='Shipped');
  const assignedIds=new Set(releases.flatMap(r=>r.storyIds));
  const unassigned=stories.filter(s=>!assignedIds.has(s.id));
  const HORIZON_LABELS=['NOW','NEXT','LATER','BEYOND'];
  const HORIZON_COLORS=['#4ADE80','#FACC15','#EF4444','#A78BFA'];
  let hIdx=0;
  const horizonMap={};
  for(const r of activeReleases){
    if(hIdx<4){horizonMap[r.id]={label:HORIZON_LABELS[hIdx],color:HORIZON_COLORS[hIdx]};hIdx++;}
  }
  const isFrozen=(rel)=>rel&&rel.status!=='Backlog'&&rel.status!=='Shipped';
  const toggleShipped=(id)=>setExpandedShipped(prev=>{const n=new Set(prev);n.has(id)?n.delete(id):n.add(id);return n;});
  const makeCol=(r,isShipped)=>({
    id:r.id,name:r.name,filePath:r.filePath,isShipped,frozen:isFrozen(r),status:r.status,
    stories:stories.filter(s=>r.storyIds.includes(s.id)),
    ats:(atTasks||[]).filter(t=>t.releaseId===r.id),
    isRelease:true,horizon:horizonMap[r.id]||null
  });
  const cols=[
    ...shippedReleases.filter(r=>expandedShipped.has(r.id)).map(r=>makeCol(r,true)),
    ...activeReleases.map(r=>makeCol(r,false)),
    ...(unassigned.length||!isSingleRelease?[{id:'Unscheduled',name:'',filePath:'',stories:unassigned,ats:[],isRelease:false,horizon:null,isShipped:false,frozen:false,status:''}]:[])
  ];
  const canDrag=(s,col)=>s.status!=='Done'&&!col.isShipped&&!col.frozen;
  const canDrop=(col)=>!col.isShipped&&!col.frozen;
  const onDragStart=(e,story,colId)=>{setDragStory(story.id);setDragFrom(colId);e.dataTransfer.effectAllowed='move';};
  const onDragEnd=()=>{setDragStory(null);setDragFrom(null);setDropTarget(null);};
  const onDragOver=(e,col)=>{if(!canDrop(col)||col.id===dragFrom){e.dataTransfer.dropEffect='none';return;}e.preventDefault();e.dataTransfer.dropEffect='move';setDropTarget(col.id);};
  const onDragLeave=(e,col)=>{if(dropTarget===col.id)setDropTarget(null);};
  const onDrop=(e,col)=>{
    e.preventDefault();setDropTarget(null);
    if(!dragStory||!canDrop(col)||col.id===dragFrom||moving)return;
    const sid=dragStory,from=dragFrom;
    setDragStory(null);setDragFrom(null);setMoving(true);
    fetch('/api/move-story',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({storyId:sid,fromRelease:from,toRelease:col.id})})
      .then(r=>r.json()).then(d=>{if(d.error)console.warn('[roadmap]',d.error);setMoving(false);})
      .catch(err=>{console.error('[roadmap] move failed',err);setMoving(false);});
  };
  const createRelease=()=>{
    if(!newRelName.trim())return;
    fetch('/api/create-release',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:newRelName.trim()})})

            h('div',{style:{display:'flex',alignItems:'center',gap:6}},

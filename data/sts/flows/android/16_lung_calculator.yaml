appId: com.sts.calculator.dev
name: "16 Lung Cancer Resection — Full E2E Calculation (Android)"
tags:
  - android
  - lung
  - calculator
  - happy-path
  - flow
---
# -----------------------------------------------
# Lung Cancer Resection Risk Calculator
# Sections: Planned Surgery → Demographics → Clinical Cancer Staging
#           → Tumor Location → Induction Treatment → Risk Factors
# Patient Summary sticky card: tapOn id: btn-patient-summary
# Back navigation: - back (Android hardware back)
# NOTE: Android gRPC driver incompatible with API 36 — launchApp not used.
# Pre-condition: adb -s emulator-5554 shell am force-stop com.sts.calculator.dev
#                adb -s emulator-5554 shell am start -n com.sts.calculator.dev/com.sts.calculator.MainActivity
# NOTE: resectionType uses text-label IDs (e.g. radio-resectionType-Lobectomy).
# NOTE: surgicalPriority-3 = Elective (thoracic convention; cardiac uses -1).
# NOTE: tumorSize field is customTumorSize type — SKIPPED (requires bespoke UI).
#       HUMAN FIX: After the flow runs, manually tap the tumor size widget.
# NOTE: Tumor Location lobe ID depends on resectionType + lung side:
#       Lobectomy + Left → radio-lungTumorLobeLeftLungSingle-Upper
# NOTE: No dedicated Lab Values tab — creatinine is in Risk Factors > Kidney Function tab.
# NOTE: Risk Factors subsection tabs: tab-pulmonaryFunction, tab-cardiovascularDisease,
#       tab-vascularDiseaseHistory, tab-kidneyFunction (direct tapOn — fixed bar).
# ARCH: Lung Cancer uses SINGLE-LONG-SCROLL architecture. Async restore jumps to last-visited
#       tab at 73%+ scroll, making tab-plannedSurgery go completely off-screen to the LEFT.
#       Solution: scroll UP to reach Planned Surgery first field, then scroll DOWN through all.
# -----------------------------------------------

# NOTE: Android gRPC driver incompatible with API 36 — launchApp not used.
# Pre-condition: adb -s emulator-5554 shell am force-stop com.sts.calculator.dev
#                adb -s emulator-5554 shell am start -n com.sts.calculator.dev/com.sts.calculator.MainActivity
- extendedWaitUntil:
    visible:
      text: "Lung Cancer Resection Risk Calculator"
    timeout: 20000

- tapOn: "Lung Cancer Resection Risk Calculator"
- waitForAnimationToEnd:
    timeout: 5000

# ===== SECTION 1: Planned Surgery =====
# Async restore may jump to Risk Factors (73% scroll). Scroll UP to find resectionType.
- scrollUntilVisible:
    element:
      id: "radio-resectionType-Lobectomy"
    direction: UP
    timeout: 30000
- tapOn:
    id: "radio-resectionType-Lobectomy"

# Surgical Approach: VATS
- scrollUntilVisible:
    element:
      id: "radio-surgicalApproach-VATS"
    direction: DOWN
    timeout: 8000
- tapOn:
    id: "radio-surgicalApproach-VATS"

# Cardiothoracic Reoperation: No=2
- scrollUntilVisible:
    element:
      id: radio-cardiothoracicReoperation-2
    direction: DOWN
    timeout: 8000
- tapOn:
    id: radio-cardiothoracicReoperation-2

# Surgical Priority: Elective=3 (thoracic convention)
- scrollUntilVisible:
    element:
      id: radio-surgicalPriority-3
    direction: DOWN
    timeout: 8000
- tapOn:
    id: radio-surgicalPriority-3

# ASA Classification: I=1
# Overshoot: scroll to option-4 (last) so option-1 lifts above dev toast band (y=786-835).
- scrollUntilVisible:
    element:
      id: radio-asaClassification-4
    direction: DOWN
    timeout: 8000
- tapOn:
    id: radio-asaClassification-1

# ECOG Score: 0=Fully active
# Overshoot to option-3 (last) so option-0 lifts above toast band.
- scrollUntilVisible:
    element:
      id: radio-ecogScore-3
    direction: DOWN
    timeout: 8000
- tapOn:
    id: radio-ecogScore-0

# ===== SECTION 2: Demographics =====
# No tab tap needed — scroll directly to Demographics fields (single-long-scroll).

# Sex: Male=1
- scrollUntilVisible:
    element:
      id: radio-sex-1
    direction: DOWN
    timeout: 8000
- tapOn:
    id: radio-sex-1

- scrollUntilVisible:
    element:
      id: input-age
    direction: DOWN
    timeout: 8000
- tapOn:
    id: input-age
- inputText: "65"
- back

- scrollUntilVisible:
    element:
      id: input-height
    direction: DOWN
    timeout: 8000
- tapOn:
    id: input-height
- inputText: "170"
- back

- scrollUntilVisible:
    element:
      id: input-weight
    direction: DOWN
    timeout: 8000
- tapOn:
    id: input-weight
- inputText: "75"
- back

- scrollUntilVisible:
    element:
      id: chip-race-White
    direction: DOWN
    timeout: 8000
- tapOn:
    id: chip-race-White

# Payor/Insurance: None/self=1
- scrollUntilVisible:
    element:
      id: chip-payor-1
    direction: DOWN
    timeout: 8000
- tapOn:
    id: chip-payor-1

# ===== SECTION 3: Clinical Cancer Staging =====
# After filling Demographics, tap Clinical Cancer Staging tab to jump past tumorSize widget.
- tapOn: "Clinical Cancer Staging"
- waitForAnimationToEnd:
    timeout: 3000

# NOTE: tumorSize (customTumorSize type) skipped — HUMAN FIX required
# Lymph Nodes: N0=1
- scrollUntilVisible:
    element:
      id: radio-lymphNodes-1
    direction: DOWN
    timeout: 8000
- tapOn:
    id: radio-lymphNodes-1

# Metastasis: M0=1
- scrollUntilVisible:
    element:
      id: radio-metastasis-1
    direction: DOWN
    timeout: 8000
- tapOn:
    id: radio-metastasis-1

# ===== SECTION 4: Tumor Location =====
- tapOn: "Tumor Location"
- waitForAnimationToEnd:
    timeout: 3000

# Lung: Left
- scrollUntilVisible:
    element:
      id: "radio-lungTumorLocation-Left"
    direction: DOWN
    timeout: 8000
- tapOn:
    id: "radio-lungTumorLocation-Left"

# Lobe: Upper (Left lung + Lobectomy → LeftLungSingle variant)
- scrollUntilVisible:
    element:
      id: "radio-lungTumorLobeLeftLungSingle-Upper"
    direction: DOWN
    timeout: 8000
- tapOn:
    id: "radio-lungTumorLobeLeftLungSingle-Upper"

# ===== SECTION 5: Induction Treatment =====
- tapOn: "Induction Treatment"
- waitForAnimationToEnd:
    timeout: 3000

# Chemotherapy: tapped = Yes
- scrollUntilVisible:
    element:
      id: checkbox-chemotherapy
    direction: DOWN
    timeout: 8000
- tapOn:
    id: checkbox-chemotherapy

# ===== SECTION 6: Risk Factors =====
- tapOn:
    id: tab-riskFactors
- waitForAnimationToEnd:
    timeout: 3000

# Smoking History: Never smoked (#,1)
- scrollUntilVisible:
    element:
      id: "radio-smokingHistory-Never smoked-#,1"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "radio-smokingHistory-Never smoked-#,1"

# ── Pulmonary Function subsection ──
# Subsection tabs are in a fixed HorizontalScrollView above scroll content — direct tapOn.
- tapOn:
    id: tab-pulmonaryFunction
- waitForAnimationToEnd:
    timeout: 3000

# FEV1 Predicted: 80%
- scrollUntilVisible:
    element:
      id: input-fev1Predicted
    direction: DOWN
    timeout: 8000
- tapOn:
    id: input-fev1Predicted
- inputText: "80"
- back

# DLCO Lowest Predicted: 75%
- scrollUntilVisible:
    element:
      id: input-dlcoLowestPredicted
    direction: DOWN
    timeout: 8000
- tapOn:
    id: input-dlcoLowestPredicted
- inputText: "75"
- back

# ── Cardiac Disease subsection ──
- tapOn:
    id: tab-cardiovascularDisease
- waitForAnimationToEnd:
    timeout: 3000

# Cardiac Disease: Hypertension=2
- scrollUntilVisible:
    element:
      id: chip-cardiopulmonaryDisease-2
    direction: DOWN
    timeout: 8000
- tapOn:
    id: chip-cardiopulmonaryDisease-2

# ── Vascular Disease subsection ──
- tapOn:
    id: tab-vascularDiseaseHistory
- waitForAnimationToEnd:
    timeout: 3000

# Vascular Disease: Major Aortic or PVD=2
- scrollUntilVisible:
    element:
      id: chip-vascularDisease-2
    direction: DOWN
    timeout: 8000
- tapOn:
    id: chip-vascularDisease-2

# ── Kidney Function subsection ──
- tapOn:
    id: tab-kidneyFunction
- waitForAnimationToEnd:
    timeout: 3000

# Creatinine: 1.1
- scrollUntilVisible:
    element:
      id: input-creatinine
    direction: DOWN
    timeout: 8000
- tapOn:
    id: input-creatinine
- inputText: "1.1"
- back

# ===== VERIFY: Patient Summary =====
- tapOn:
    id: btn-patient-summary
- waitForAnimationToEnd:
    timeout: 5000

- assertVisible: "Perioperative Outcome"
- assertVisible: "Operative Mortality"
- assertVisible: "Morbidity & Mortality"

- scrollUntilVisible:
    element: "Clinical Summary"
    direction: DOWN
    timeout: 5000
- assertVisible: "Clinical Summary"

- tapOn:
    id: phosphor-react-native-x-bold
- waitForAnimationToEnd:
    timeout: 2000
- back
- waitForAnimationToEnd:
    timeout: 2000
